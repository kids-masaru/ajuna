<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>まほうのおえかきボード</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&display=swap');

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            touch-action: none;
            overflow: hidden;
            background-color: #fdf2f8;
            user-select: none;
            -webkit-user-select: none;
            position: fixed;
            width: 100%;
            height: 100%;
            margin: 0;
        }

        .tool-btn {
            transition: all 0.2s;
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.1);
            flex-shrink: 0;
        }

        .tool-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .tool-btn.active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.1);
            border: 3px solid #f472b6;
            background-color: #fff1f2;
        }

        .color-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .color-btn.active {
            transform: scale(1.2);
            border-color: #333;
        }

        #canvas-container {
            background-color: white;
            background-image: radial-gradient(#e2e8f0 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            cursor: crosshair;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .full-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            padding: 20px;
            background: rgba(255, 241, 242, 0.98);
        }

        .gallery-item {
            position: relative;
        }

        .gallery-img-wrapper {
            cursor: pointer;
            border-radius: 12px;
            overflow: hidden;
            background: white;
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
            -webkit-touch-callout: none;
        }

        .gallery-img-wrapper:active {
            transform: scale(0.95);
        }

        .gallery-img-wrapper img {
            width: 100%;
            display: block;
            pointer-events: none;
            user-drag: none;
            -webkit-user-drag: none;
        }

        .delete-btn {
            position: absolute;
            top: -12px;
            right: -12px;
            background: #ef4444;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            border: 3px solid white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            z-index: 50;
            cursor: pointer;
        }

        #save-toast {
            display: none;
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 16px 28px;
            border-radius: 99px;
            z-index: 300;
            pointer-events: none;
        }

        .custom-dialog {
            background: white;
            padding: 24px;
            border-radius: 32px;
            border: 4px solid #f9a8d4;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            max-width: 90%;
            margin: auto;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="h-full w-full bg-pink-50">

    <div id="canvas-container" class="touch-none">
        <canvas id="drawingCanvas"></canvas>
    </div>

    <!-- UI: 上部 -->
    <div class="fixed top-0 left-0 w-full p-3 flex justify-between items-start z-50 pointer-events-none">
        <button onclick="location.href='index.html'"
            class="pointer-events-auto bg-white/90 backdrop-blur-sm p-2 rounded-full shadow-lg border-2 border-pink-100 text-xl flex items-center justify-center w-12 h-12 active:scale-90">
            🏠
        </button>

        <div class="flex space-x-2 pointer-events-auto">
            <label
                class="bg-white/90 backdrop-blur-sm p-2 rounded-2xl shadow-lg border-2 border-green-200 flex flex-col items-center justify-center w-14 h-14 active:scale-90 cursor-pointer">
                <span class="text-2xl">📂</span>
                <span class="text-[8px] text-green-600 font-bold leading-none">しゃしん</span>
                <input type="file" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
            </label>
            <button onclick="showGallery()"
                class="bg-white/90 backdrop-blur-sm p-2 rounded-2xl shadow-lg border-2 border-blue-200 flex flex-col items-center justify-center w-14 h-14 active:scale-90">
                <span class="text-2xl">🖼️</span>
                <span class="text-[8px] text-blue-500 font-bold leading-none">みたよ</span>
            </button>
            <button onclick="saveToGallery()"
                class="bg-yellow-400 p-2 rounded-2xl shadow-lg border-4 border-white flex flex-col items-center justify-center w-16 h-16 active:scale-90">
                <span class="text-2xl">📸</span>
                <span class="text-[9px] text-white font-bold leading-none mt-1">保存</span>
            </button>
        </div>
    </div>

    <!-- UI: ツールバー -->
    <div
        class="fixed bottom-16 left-0 w-full px-2 py-2 flex justify-center items-center space-x-2 z-50 pointer-events-none">
        <div
            class="flex space-x-2 bg-white/60 backdrop-blur-md p-2 rounded-3xl shadow-xl border border-white/50 pointer-events-auto overflow-x-auto no-scrollbar">
            <button id="btnPen"
                class="tool-btn active bg-white p-2 rounded-2xl flex flex-col items-center justify-center w-14 h-14"
                onclick="setMode('pen')">
                <span class="text-2xl">✏️</span>
                <span class="text-[9px] text-gray-500 font-bold">かく</span>
            </button>
            <button id="btnMagic"
                class="tool-btn bg-white p-2 rounded-2xl flex flex-col items-center justify-center w-14 h-14"
                onclick="setMode('magic')">
                <span class="text-2xl">🌈</span>
                <span class="text-[9px] text-gray-500 font-bold">まほう</span>
            </button>
            <button id="btnStamp"
                class="tool-btn bg-white p-2 rounded-2xl flex flex-col items-center justify-center w-14 h-14 relative"
                onclick="setMode('stamp')">
                <span id="currentStampIcon" class="text-2xl">⭐</span>
                <span class="text-[9px] text-gray-500 font-bold">ポン！</span>
                <div onclick="event.stopPropagation(); changeStampType()"
                    class="absolute -top-1 -right-1 bg-yellow-400 text-white w-5 h-5 rounded-full flex items-center justify-center border border-white shadow-sm active:scale-90 text-[10px]">
                    ↻</div>
            </button>
            <button id="btnEraser"
                class="tool-btn bg-white p-2 rounded-2xl flex flex-col items-center justify-center w-14 h-14"
                onclick="setMode('eraser')">
                <span class="text-2xl">🧼</span>
                <span class="text-[9px] text-gray-500 font-bold">けし</span>
            </button>
            <div class="w-px bg-pink-200 h-10 self-center mx-1 flex-shrink-0"></div>
            <button
                class="tool-btn bg-red-50 p-2 rounded-2xl flex flex-col items-center justify-center w-14 h-14 text-red-500 border border-red-100"
                onclick="execClear()">
                <span class="text-2xl">🗑️</span>
                <span class="text-[9px] font-bold">ぜんぶ</span>
            </button>
        </div>
    </div>

    <!-- UI: カラーパレット -->
    <div class="fixed bottom-2 left-0 w-full px-4 z-50 pointer-events-none">
        <div
            class="flex space-x-3 py-2 bg-white/70 backdrop-blur-md rounded-full px-5 shadow-lg max-w-[95vw] mx-auto border border-white/50 pointer-events-auto overflow-x-auto no-scrollbar">
            <button class="color-btn active bg-black" onclick="setColor('black', this)"></button>
            <button class="color-btn bg-red-500" onclick="setColor('#ef4444', this)"></button>
            <button class="color-btn bg-orange-400" onclick="setColor('#fb923c', this)"></button>
            <button class="color-btn bg-yellow-400" onclick="setColor('#facc15', this)"></button>
            <button class="color-btn bg-green-500" onclick="setColor('#22c55e', this)"></button>
            <button class="color-btn bg-sky-500" onclick="setColor('#0ea5e9', this)"></button>
            <button class="color-btn bg-blue-600" onclick="setColor('#2563eb', this)"></button>
            <button class="color-btn bg-purple-500" onclick="setColor('#a855f7', this)"></button>
            <button class="color-btn bg-pink-400" onclick="setColor('#f472b6', this)"></button>
        </div>
    </div>

    <!-- ギャラリー -->
    <div id="gallery-overlay" class="full-overlay hidden flex flex-col">
        <div class="w-full max-w-md flex justify-between items-center mb-4 px-4 mt-2 mx-auto">
            <h2 class="text-pink-600 text-2xl font-bold italic">🖼️ ギャラリー</h2>
            <button onclick="hideGallery()"
                class="bg-pink-500 text-white px-6 py-2 rounded-full font-bold shadow-md active:scale-95">とじる</button>
        </div>
        <p class="text-pink-400 text-[10px] mb-4 text-center px-4 leading-tight">
            えをえらぶと つづきがかけるよ！<br>
            <span class="font-bold text-pink-600">ながーくおすと</span> スマホにほぞんできるよ
        </p>
        <div id="gallery-list"
            class="flex-grow w-full max-w-2xl overflow-y-auto grid grid-cols-2 sm:grid-cols-3 gap-8 pb-20 px-8 no-scrollbar mx-auto">
        </div>
    </div>

    <!-- 削除確認 -->
    <div id="confirm-overlay" class="fixed inset-0 z-[300] hidden flex items-center justify-center bg-black/50 p-6">
        <div class="custom-dialog">
            <p class="text-gray-700 text-xl font-bold mb-6">これを けしちゃう？</p>
            <div class="flex space-x-4 justify-center">
                <button onclick="closeDeleteConfirm()"
                    class="bg-gray-200 text-gray-600 px-6 py-3 rounded-full font-bold">やめる</button>
                <button id="confirm-delete-ok"
                    class="bg-red-500 text-white px-8 py-3 rounded-full font-bold shadow-lg">けす！</button>
            </div>
        </div>
    </div>

    <div id="save-toast">
        <p class="font-bold text-lg">🖼️ ギャラリーに いれたよ！</p>
    </div>

    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
        function playSound(freq, duration, type = 'sine', gainVal = 0.1) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, now);
            osc.frequency.exponentialRampToValueAtTime(freq / 2, now + duration);
            gain.gain.setValueAtTime(gainVal, now);
            gain.gain.linearRampToValueAtTime(0, now + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(now + duration);
        }

        const playDrawSound = () => playSound(250 + Math.random() * 50, 0.08, 'triangle', 0.02);
        const playEraseSound = () => playSound(600, 0.08, 'sine', 0.02);
        const playStampSound = () => playSound(500, 0.1, 'sine', 0.08);
        const playClearSound = () => playSound(300, 0.4, 'sawtooth', 0.05);
        const playActionSound = () => playSound(1000, 0.1, 'sine', 0.1);

        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let lastX = 0, lastY = 0;
        let currentColor = 'black';
        let currentMode = 'pen';
        let currentStamp = '⭐';
        const stamps = ['⭐', '❤️', '🐶', '🚗', '🍎', '🌸', '👑', '🌈', '🍦', '✨', '🎈', '🐱', '🦋', '🦖', '⚽', '🍩', '🍓', '🎁', '💩'];
        let stampIndex = 0;
        let galleryImages = [];
        let longPressTimer = null;
        let isUIBusy = false; // UI操作後のガード用

        try {
            const saved = localStorage.getItem('magic_board_gallery_v8');
            if (saved) galleryImages = JSON.parse(saved);
        } catch (e) { console.error(e); }

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            const width = window.innerWidth;
            const height = window.innerHeight;
            let temp = null;
            if (canvas.width > 0) temp = canvas.toDataURL();
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            ctx.scale(dpr, dpr);
            setBrushStyle();
            if (temp) {
                const img = new Image();
                img.onload = () => {
                    ctx.drawImage(img, 0, 0, width, height);
                    setBrushStyle();
                };
                img.src = temp;
            }
        }

        function setBrushStyle() {
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        window.addEventListener('resize', resize);
        window.addEventListener('load', () => {
            resize();
            document.getElementById('gallery-overlay').classList.add('hidden');
            document.getElementById('confirm-overlay').classList.add('hidden');
        });

        function resetApp() {
            initAudio();
            playActionSound();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            setMode('pen');
            setColor('black', document.querySelector('.color-btn.bg-black'));
        }

        function setMode(mode) {
            initAudio();
            currentMode = mode;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            const idMap = { pen: 'btnPen', magic: 'btnMagic', stamp: 'btnStamp', eraser: 'btnEraser' };
            if (idMap[mode]) document.getElementById(idMap[mode]).classList.add('active');
        }

        function setColor(color, btn) {
            initAudio(); currentColor = color;
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (currentMode === 'eraser') setMode('pen');
        }

        function changeStampType() {
            initAudio();
            stampIndex = (stampIndex + 1) % stamps.length;
            currentStamp = stamps[stampIndex];
            document.getElementById('currentStampIcon').innerText = currentStamp;
            setMode('stamp');
        }

        function execClear() {
            initAudio();
            playClearSound();
            canvas.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s';
            canvas.style.transform = 'scale(0.95) rotate(1.5deg)';
            canvas.style.opacity = '0.5';
            setTimeout(() => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                canvas.style.transform = 'scale(1) rotate(0deg)';
                canvas.style.opacity = '1';
                setTimeout(() => canvas.style.transition = 'none', 400);
            }, 300);
        }

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            initAudio();
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const dpr = window.devicePixelRatio || 1;
                    const cw = canvas.width / dpr;
                    const ch = canvas.height / dpr;
                    const scale = Math.max(cw / img.width, ch / img.height);
                    const drawWidth = img.width * scale;
                    const drawHeight = img.height * scale;
                    const x = (cw - drawWidth) / 2;
                    const y = (ch - drawHeight) / 2;
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.drawImage(img, x, y, drawWidth, drawHeight);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function saveToGallery() {
            initAudio(); playActionSound();
            const dpr = window.devicePixelRatio || 1;
            const saveCanvas = document.createElement('canvas');
            saveCanvas.width = canvas.width; saveCanvas.height = canvas.height;
            const sCtx = saveCanvas.getContext('2d');
            sCtx.fillStyle = 'white'; sCtx.fillRect(0, 0, saveCanvas.width, saveCanvas.height);
            sCtx.drawImage(canvas, 0, 0);
            const dataUrl = saveCanvas.toDataURL('image/png');
            galleryImages.unshift(dataUrl);
            if (galleryImages.length > 30) galleryImages.pop();
            syncStorage();
            const toast = document.getElementById('save-toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }

        function syncStorage() {
            try { localStorage.setItem('magic_board_gallery_v8', JSON.stringify(galleryImages)); } catch (e) { }
        }

        function showGallery() {
            initAudio();
            isUIBusy = true; // メニュー表示中は描画禁止
            const overlay = document.getElementById('gallery-overlay');
            const list = document.getElementById('gallery-list');
            list.innerHTML = '';

            if (galleryImages.length === 0) {
                list.innerHTML = '<div class="col-span-full text-pink-300 text-center mt-10 text-sm">まだ えがないよ！</div>';
            } else {
                galleryImages.forEach((imgData, idx) => {
                    const itemContainer = document.createElement('div');
                    itemContainer.className = "gallery-item";

                    const imgWrapper = document.createElement('div');
                    imgWrapper.className = "gallery-img-wrapper";

                    const startPress = (e) => {
                        e.stopPropagation();
                        longPressTimer = setTimeout(() => {
                            longPressTimer = null;
                            confirmDownload(idx);
                        }, 1000);
                    };
                    const endPress = (e) => {
                        e.stopPropagation();
                        if (longPressTimer) {
                            clearTimeout(longPressTimer);
                            longPressTimer = null;
                            loadFromGallery(idx);
                        }
                    };
                    const cancelPress = (e) => {
                        if (longPressTimer) clearTimeout(longPressTimer);
                        longPressTimer = null;
                    };

                    imgWrapper.addEventListener('touchstart', startPress, { passive: false });
                    imgWrapper.addEventListener('touchend', endPress);
                    imgWrapper.addEventListener('touchmove', cancelPress);
                    imgWrapper.addEventListener('mousedown', startPress);
                    imgWrapper.addEventListener('mouseup', endPress);
                    imgWrapper.addEventListener('mouseleave', cancelPress);
                    imgWrapper.oncontextmenu = (e) => e.preventDefault();
                    imgWrapper.innerHTML = `<img src="${imgData}">`;

                    const delBtn = document.createElement('div');
                    delBtn.className = "delete-btn";
                    delBtn.innerText = "✕";
                    delBtn.onclick = (e) => {
                        e.stopPropagation();
                        requestDelete(idx);
                    };

                    itemContainer.appendChild(imgWrapper);
                    itemContainer.appendChild(delBtn);
                    list.appendChild(itemContainer);
                });
            }
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
        }

        function hideGallery() {
            const overlay = document.getElementById('gallery-overlay');
            overlay.classList.add('hidden');
            overlay.classList.remove('flex');
            // ゴーストクリック防止のため、0.3秒後に描画を許可
            setTimeout(() => { isUIBusy = false; }, 300);
        }

        function loadFromGallery(idx) {
            initAudio(); playActionSound();
            const img = new Image();
            img.onload = () => {
                const dpr = window.devicePixelRatio || 1;
                ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
                ctx.drawImage(img, 0, 0, canvas.width / dpr, canvas.height / dpr);
                hideGallery();
            };
            img.src = galleryImages[idx];
        }

        function requestDelete(idx) {
            initAudio();
            const overlay = document.getElementById('confirm-overlay');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            document.getElementById('confirm-delete-ok').onclick = () => {
                galleryImages.splice(idx, 1);
                syncStorage();
                showGallery();
                closeDeleteConfirm();
            };
        }

        function closeDeleteConfirm() {
            const overlay = document.getElementById('confirm-overlay');
            overlay.classList.add('hidden');
            overlay.classList.remove('flex');
            // ガードの延長
            setTimeout(() => { if (document.getElementById('gallery-overlay').classList.contains('hidden')) isUIBusy = false; }, 300);
        }

        function confirmDownload(idx) {
            playActionSound();
            if (confirm("この えを スマホに ほぞん(ダウンロード) する？")) {
                const link = document.createElement('a');
                link.download = `まほうのおえかき-${Date.now()}.png`;
                link.href = galleryImages[idx];
                link.click();
            }
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
            const clientY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startDraw(e) {
            if (e.target !== canvas || isUIBusy) return;
            initAudio();
            isDrawing = true;
            const pos = getPos(e);
            lastX = pos.x; lastY = pos.y;
            if (currentMode === 'stamp') {
                ctx.globalCompositeOperation = 'source-over';
                drawStamp(pos.x, pos.y);
            } else { draw(e); }
        }

        function moveDraw(e) {
            if (!isDrawing || isUIBusy) return;
            const pos = getPos(e);
            if (currentMode === 'stamp') {
                const dist = Math.hypot(pos.x - lastX, pos.y - lastY);
                if (dist > 35) { drawStamp(pos.x, pos.y); lastX = pos.x; lastY = pos.y; }
            } else { draw(e); }
        }

        function drawStamp(x, y) {
            playStampSound();
            ctx.save(); ctx.translate(x, y); ctx.rotate((Math.random() - 0.5) * 0.7);
            ctx.font = "60px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText(currentStamp, 0, 0); ctx.restore();
        }

        function draw(e) {
            const pos = getPos(e);
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            if (currentMode === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 50;
                if (Math.random() > 0.9) playEraseSound();
            } else {
                ctx.globalCompositeOperation = 'source-over'; ctx.strokeStyle = currentColor; ctx.lineWidth = 10;
                if (Math.random() > 0.9) playDrawSound();
            }
            if (currentMode === 'pen' || currentMode === 'eraser') {
                ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(pos.x, pos.y); ctx.stroke();
            } else if (currentMode === 'magic') {
                const cx = window.innerWidth / 2; const cy = window.innerHeight / 2; const points = 8;
                const sX = lastX - cx, sY = lastY - cy, eX = pos.x - cx, eY = pos.y - cy;
                for (let i = 0; i < points; i++) {
                    ctx.save(); ctx.translate(cx, cy); ctx.rotate((Math.PI * 2 / points) * i);
                    ctx.beginPath(); ctx.moveTo(sX, sY); ctx.lineTo(eX, eY); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(sX, -sY); ctx.lineTo(eX, -eY); ctx.stroke();
                    ctx.restore();
                }
            }
            lastX = pos.x; lastY = pos.y;
        }

        canvas.addEventListener('mousedown', startDraw);
        window.addEventListener('mousemove', moveDraw);
        window.addEventListener('mouseup', () => { isDrawing = false; });
        canvas.addEventListener('touchstart', (e) => {
            if (isUIBusy) return;
            e.preventDefault();
            startDraw(e);
        }, { passive: false });
        window.addEventListener('touchmove', (e) => {
            if (isUIBusy) return;
            e.preventDefault();
            moveDraw(e);
        }, { passive: false });
        window.addEventListener('touchend', () => { isDrawing = false; });
    </script>
</body>

</html>
