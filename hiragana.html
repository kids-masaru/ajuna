<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ひらがな なぞりっこ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&display=swap');

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            user-select: none;
            touch-action: manipulation;
            overscroll-behavior: none;
            background-color: #f0f9ff;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const HIRAGANA_LIST = [
          'あ', 'い', 'う', 'え', 'お',
          'か', 'き', 'く', 'け', 'こ',
          'さ', 'し', 'す', 'せ', 'そ',
          'た', 'ち', 'つ', 'て', 'と',
          'な', 'に', 'ぬ', 'ね', 'の',
          'は', 'ひ', 'ふ', 'へ', 'ほ',
          'ま', 'み', 'む', 'め', 'も',
          'や', 'ゆ', 'よ',
          'ら', 'り', 'る', 'れ', 'ろ',
          'わ', 'を', 'ん'
        ];

        const NAMAE_SEQUENCE = ['い', 'ざ', 'き', 'あ', 'じ', 'ゅ', 'な'];

        const COLORS = [
          { name: 'あか', value: '#ef4444' },
          { name: 'あお', value: '#3b82f6' },
          { name: 'きいろ', value: '#eab308' },
          { name: 'みどり', value: '#22c55e' },
          { name: 'ぴんく', value: '#ec4899' },
          { name: 'くろ', value: '#1f2937' },
        ];

        const CANVAS_SIZE = 400;
        const KANJIVG_SIZE = 109;
        const SCALE = CANVAS_SIZE / KANJIVG_SIZE;

        function App() {
          const [sequenceIndex, setSequenceIndex] = useState(0);
          const [currentIndex, setCurrentIndex] = useState(() =>
            HIRAGANA_LIST.indexOf(NAMAE_SEQUENCE[0])
          );
          const [currentColor, setCurrentColor] = useState(COLORS[0].value);
          const [isDrawing, setIsDrawing] = useState(false);
          const [showSuccess, setShowSuccess] = useState(false);
          const [isLoading, setIsLoading] = useState(false);
          const [strokeInfo, setStrokeInfo] = useState({ current: 0, total: 0 });

          const canvasRef = useRef(null);
          // 判定用：文字全体のピクセル（もともとの仕組みそのまま）
          const targetPixelsRef = useRef([]);
          // 書き順ガイド用：現在の筆順のピクセル（ガイド色を変えるだけに使う）
          const currentStrokePixelsRef = useRef([]);
          const isSuccessRef = useRef(false);
          const drawCountRef = useRef(0);
          const strokePathsRef = useRef([]);
          const currentStrokeRef = useRef(0);

          const currentLetter = sequenceIndex < NAMAE_SEQUENCE.length 
            ? NAMAE_SEQUENCE[sequenceIndex] 
            : HIRAGANA_LIST[currentIndex];

          const speakText = (text, rate = 0.8) => {
            if ('speechSynthesis' in window) {
              window.speechSynthesis.cancel();
              const utterance = new SpeechSynthesisUtterance(text);
              utterance.lang = 'ja-JP';
              utterance.rate = rate;
              window.speechSynthesis.speak(utterance);
            }
          };

          // SVGパスの最初のM座標を取得
          const getStartPoint = (pathStr) => {
            const m = pathStr.match(/M\s*([\d.]+)[,\s]+([\d.]+)/);
            if (m) return { x: parseFloat(m[1]) * SCALE, y: parseFloat(m[2]) * SCALE };
            return null;
          };

          // オフスクリーンで特定の筆順のピクセルを計算（ガイド進行判定用のみ）
          const calcStrokePixels = (pathStr) => {
            const offscreen = document.createElement('canvas');
            offscreen.width = CANVAS_SIZE;
            offscreen.height = CANVAS_SIZE;
            const ctx = offscreen.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            ctx.save();
            ctx.scale(SCALE, SCALE);
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 16 / SCALE;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke(new Path2D(pathStr));
            ctx.restore();
            const data = ctx.getImageData(0, 0, CANVAS_SIZE, CANVAS_SIZE).data;
            const pixels = [];
            for (let i = 0; i < data.length; i += 4) {
              if (data[i] + data[i+1] + data[i+2] < 300) pixels.push(i);
            }
            return pixels;
          };

          // 次の筆順ガイドをキャンバスに重ねて描く（消さない！）
          const drawNextStrokeGuide = (paths, nextIdx) => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });

            ctx.save();
            ctx.scale(SCALE, SCALE);
            ctx.strokeStyle = '#fdba74';
            ctx.lineWidth = 13 / SCALE;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke(new Path2D(paths[nextIdx]));
            ctx.restore();

            const start = getStartPoint(paths[nextIdx]);
            if (start) {
              ctx.beginPath();
              ctx.arc(start.x, start.y, 10, 0, Math.PI * 2);
              ctx.fillStyle = '#fb923c';
              ctx.fill();
              ctx.strokeStyle = '#ffffff';
              ctx.lineWidth = 2;
              ctx.stroke();
            }
          };

          // キャンバス初期化（文字が変わった時だけ呼ぶ）
          const initCanvas = (letter, paths) => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });

            // --- 判定用ピクセルを計算 ---
            // KanjiVGパスがある場合はそれを使う（ガイドと判定を一致させる）
            // ない場合はフォント文字で計算（フォールバック）
            const offscreen = document.createElement('canvas');
            offscreen.width = CANVAS_SIZE;
            offscreen.height = CANVAS_SIZE;
            const offCtx = offscreen.getContext('2d');
            offCtx.fillStyle = '#ffffff';
            offCtx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

            if (paths.length > 0) {
              offCtx.save();
              offCtx.scale(SCALE, SCALE);
              offCtx.strokeStyle = '#000000';
              offCtx.lineWidth = 16 / SCALE;
              offCtx.lineCap = 'round';
              offCtx.lineJoin = 'round';
              for (const p of paths) offCtx.stroke(new Path2D(p));
              offCtx.restore();
            } else {
              offCtx.font = `bold ${CANVAS_SIZE * 0.75}px "Hiragino Maru Gothic ProN", "Rounded Mplus 1c", "Meiryo", sans-serif`;
              offCtx.textAlign = 'center';
              offCtx.textBaseline = 'middle';
              offCtx.fillStyle = '#000000';
              offCtx.fillText(letter, CANVAS_SIZE / 2, CANVAS_SIZE / 2 + CANVAS_SIZE * 0.05);
            }

            const offData = offscreen.getContext('2d').getImageData(0, 0, CANVAS_SIZE, CANVAS_SIZE).data;
            const allPixels = [];
            for (let i = 0; i < offData.length; i += 4) {
              if (offData[i] + offData[i+1] + offData[i+2] < 300) allPixels.push(i);
            }
            targetPixelsRef.current = allPixels;

            // --- 画面に表示するガイドを描く ---
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

            if (paths.length > 0) {
              // 全筆順を薄いグレーで表示
              for (let i = 0; i < paths.length; i++) {
                ctx.save();
                ctx.scale(SCALE, SCALE);
                ctx.strokeStyle = '#e5e7eb';
                ctx.lineWidth = 10 / SCALE;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke(new Path2D(paths[i]));
                ctx.restore();
              }
              // 最初の筆順をオレンジで上書き
              ctx.save();
              ctx.scale(SCALE, SCALE);
              ctx.strokeStyle = '#fdba74';
              ctx.lineWidth = 13 / SCALE;
              ctx.lineCap = 'round';
              ctx.lineJoin = 'round';
              ctx.stroke(new Path2D(paths[0]));
              ctx.restore();

              // スタート丸印
              const start = getStartPoint(paths[0]);
              if (start) {
                ctx.beginPath();
                ctx.arc(start.x, start.y, 10, 0, Math.PI * 2);
                ctx.fillStyle = '#fb923c';
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.stroke();
              }

              // 1筆目の進行判定用ピクセルをセット
              currentStrokePixelsRef.current = calcStrokePixels(paths[0]);
            } else {
              // 書き順データなし：薄いオレンジで文字全体をガイド表示
              ctx.fillStyle = '#fdba74';
              ctx.fillText(letter, CANVAS_SIZE / 2, CANVAS_SIZE / 2 + CANVAS_SIZE * 0.05);
              currentStrokePixelsRef.current = [];
            }

            isSuccessRef.current = false;
            setShowSuccess(false);
            drawCountRef.current = 0;
            currentStrokeRef.current = 0;
          };

          // KanjiVGから書き順データを取得
          const fetchStrokeData = async (letter) => {
            setIsLoading(true);
            setStrokeInfo({ current: 0, total: 0 });
            try {
              const code = letter.codePointAt(0).toString(16).padStart(5, '0');
              const url = `https://raw.githubusercontent.com/KanjiVG/kanjivg/master/kanji/${code}.svg`;
              const res = await fetch(url);
              if (!res.ok) throw new Error('fetch failed');
              const text = await res.text();
              const parser = new DOMParser();
              const doc = parser.parseFromString(text, 'image/svg+xml');
              const strokeGroup = doc.querySelector('g[id*="StrokePaths"]');
              const paths = strokeGroup
                ? Array.from(strokeGroup.querySelectorAll('path[d]')).map(p => p.getAttribute('d'))
                : Array.from(doc.querySelectorAll('path[d]')).map(p => p.getAttribute('d'));

              if (paths.length === 0) throw new Error('no paths');
              strokePathsRef.current = paths;
              setStrokeInfo({ current: 1, total: paths.length });
              initCanvas(letter, paths);
            } catch(e) {
              strokePathsRef.current = [];
              initCanvas(letter, []);
            }
            setIsLoading(false);
          };

          useEffect(() => {
            fetchStrokeData(currentLetter);
            speakText(currentLetter);
          }, [currentIndex]);

          const getCoordinates = (e) => {
            const canvas = canvasRef.current;
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
              x: (clientX - rect.left) * (canvas.width / rect.width),
              y: (clientY - rect.top) * (canvas.height / rect.height)
            };
          };

          const checkCompletion = () => {
            if (isSuccessRef.current) return;
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            // --- もともとの判定：文字全体の80%で成功 ---
            const targetPixels = targetPixelsRef.current;
            if (targetPixels.length === 0) return;
            let filledCount = 0;
            for (let j = 0; j < targetPixels.length; j++) {
              const i = targetPixels[j];
              if (data[i] + data[i+1] + data[i+2] < 600) filledCount++;
            }
            if (filledCount / targetPixels.length >= 0.98) {
              handleSuccess();
              return;
            }

            // 書き順ガイドの自動進行はなし。色表示のみ。
          };

          const startDrawing = (e) => {
            e.preventDefault();
            if (isSuccessRef.current) return;
            setIsDrawing(true);
            const coords = getCoordinates(e);
            const ctx = canvasRef.current.getContext('2d');
            ctx.beginPath();
            ctx.moveTo(coords.x, coords.y);
          };

          const draw = (e) => {
            e.preventDefault();
            if (!isDrawing || isSuccessRef.current) return;
            const coords = getCoordinates(e);
            const ctx = canvasRef.current.getContext('2d');
            ctx.lineTo(coords.x, coords.y);
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = 36;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();

            drawCountRef.current += 1;
            if (drawCountRef.current % 15 === 0) checkCompletion();
          };

          const stopDrawing = () => {
            setIsDrawing(false);
            checkCompletion();
          };

          const handleSuccess = () => {
            isSuccessRef.current = true;
            setShowSuccess(true);
            setIsDrawing(false);
            speakText('よくできました！', 1.0);
          };

          const handleNext = () => {
            if (sequenceIndex < NAMAE_SEQUENCE.length - 1) {
              const nextSeqIndex = sequenceIndex + 1;
              setSequenceIndex(nextSeqIndex);
              // Update currentIndex to match the next sequence character for consistency
              setCurrentIndex(HIRAGANA_LIST.indexOf(NAMAE_SEQUENCE[nextSeqIndex]));
            } else {
              // Once sequence is done, move to random (or increment sequenceIndex once more to stay in random mode)
              if (sequenceIndex < NAMAE_SEQUENCE.length) {
                setSequenceIndex(NAMAE_SEQUENCE.length);
              }
              let nextIndex;
              do {
                nextIndex = Math.floor(Math.random() * HIRAGANA_LIST.length);
              } while (nextIndex === currentIndex);
              setCurrentIndex(nextIndex);
            }
          };

          const handleReset = () => {
            const paths = strokePathsRef.current;
            initCanvas(currentLetter, paths);
            if (paths.length > 0) setStrokeInfo({ current: 1, total: paths.length });
          };

          return (
            <div className="min-h-screen bg-sky-50 flex flex-col items-center py-6 touch-none select-none">

              {/* ホームに戻るボタン */}
              <div className="w-full max-w-[450px] px-2 mb-2 flex">
                <button
                  onClick={() => { window.location.href = 'index.html'; }}
                  className="bg-white/90 p-2 rounded-full shadow-lg border-2 border-sky-100 text-xl flex items-center justify-center w-12 h-12 active:scale-90 transition-transform"
                >
                  🏠
                </button>
              </div>

              <div className="text-center mb-3">
                <h1 className="text-2xl md:text-3xl font-bold text-sky-600 mb-1">
                  ひらがな なぞりっこ
                </h1>
                <p className="text-gray-600 text-lg">
                  「<span className="font-bold text-pink-500 text-2xl">{currentLetter}</span>」をなぞってみよう！
                </p>
                {strokeInfo.total > 0 && !showSuccess && (
                  <p className="text-orange-400 font-bold text-sm mt-1">
                    {strokeInfo.current}かくめ（ぜんぶで {strokeInfo.total}かく）
                  </p>
                )}
                {isLoading && (
                  <p className="text-gray-400 text-xs mt-1">よみこみちゅう…</p>
                )}
              </div>

              <div className="relative bg-white p-2 rounded-3xl shadow-xl mb-6">
                <canvas
                  ref={canvasRef}
                  width={400}
                  height={400}
                  className="w-[85vw] max-w-[400px] aspect-square rounded-2xl border-4 border-sky-100 bg-white"
                  style={{ touchAction: 'none' }}
                  onPointerDown={startDrawing}
                  onPointerMove={draw}
                  onPointerUp={stopDrawing}
                  onPointerOut={stopDrawing}
                  onTouchStart={startDrawing}
                  onTouchMove={draw}
                  onTouchEnd={stopDrawing}
                />

                {showSuccess && (
                  <div className="absolute inset-0 z-10 flex flex-col items-center justify-center bg-white/80 rounded-2xl backdrop-blur-sm">
                    <div className="text-8xl md:text-9xl animate-bounce drop-shadow-lg mb-4">💮</div>
                    <h2 className="text-3xl font-bold text-pink-500 mb-6 drop-shadow-md">
                      よくできました！
                    </h2>
                    <button
                      onClick={handleNext}
                      className="px-8 py-4 bg-orange-400 active:bg-orange-600 text-white text-2xl font-bold rounded-full shadow-lg transition active:scale-95 flex items-center gap-2"
                    >
                      つぎへ <span>👉</span>
                    </button>
                  </div>
                )}
              </div>

              <div className="w-[90vw] max-w-[450px] bg-white p-4 rounded-3xl shadow-md flex flex-col gap-4">

                <div className="flex flex-col items-center">
                  <p className="text-gray-500 text-sm font-bold mb-2">いろをえらぼう</p>
                  <div className="flex justify-center gap-3 md:gap-4">
                    {COLORS.map((color) => (
                      <button
                        key={color.name}
                        onClick={() => setCurrentColor(color.value)}
                        className={`w-10 h-10 md:w-12 md:h-12 rounded-full shadow-sm transform transition-transform ${
                          currentColor === color.value ? 'scale-125 ring-4 ring-offset-2 ring-sky-300' : 'hover:scale-110'
                        }`}
                        style={{ backgroundColor: color.value }}
                        aria-label={color.name}
                      />
                    ))}
                  </div>
                </div>

                <div className="w-full h-px bg-gray-100 my-1"></div>

                <button
                  onClick={handleReset}
                  className="w-full py-3 md:py-4 bg-gray-200 active:bg-gray-400 text-gray-700 text-xl font-bold rounded-2xl shadow-sm transform transition active:scale-95 flex justify-center items-center gap-2"
                >
                  やりなおす <span>🔄</span>
                </button>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
