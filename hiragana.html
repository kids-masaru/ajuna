<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ひらがな なぞりっこ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&display=swap');

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            user-select: none;
            touch-action: manipulation;
            overscroll-behavior: none;
            background-color: #f0f9ff;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const HIRAGANA_LIST = [
          'あ', 'い', 'う', 'え', 'お',
          'か', 'き', 'く', 'け', 'こ',
          'さ', 'し', 'す', 'せ', 'そ',
          'た', 'ち', 'つ', 'て', 'と',
          'な', 'に', 'ぬ', 'ね', 'の',
          'は', 'ひ', 'ふ', 'へ', 'ほ',
          'ま', 'み', 'む', 'め', 'も',
          'や', 'ゆ', 'よ',
          'ら', 'り', 'る', 'れ', 'ろ',
          'わ', 'を', 'ん'
        ];

        const COLORS = [
          { name: 'あか', value: '#ef4444' },
          { name: 'あお', value: '#3b82f6' },
          { name: 'きいろ', value: '#eab308' },
          { name: 'みどり', value: '#22c55e' },
          { name: 'ぴんく', value: '#ec4899' },
          { name: 'くろ', value: '#1f2937' },
        ];

        const CANVAS_SIZE = 400;
        const KANJIVG_SIZE = 109;
        const SCALE = CANVAS_SIZE / KANJIVG_SIZE;

        function App() {
          const [currentIndex, setCurrentIndex] = useState(() =>
            Math.floor(Math.random() * HIRAGANA_LIST.length)
          );
          const [currentColor, setCurrentColor] = useState(COLORS[0].value);
          const [isDrawing, setIsDrawing] = useState(false);
          const [showSuccess, setShowSuccess] = useState(false);
          const [isLoading, setIsLoading] = useState(false);
          const [strokeInfo, setStrokeInfo] = useState({ current: 0, total: 0 });

          const canvasRef = useRef(null);
          const targetPixelsRef = useRef([]);
          const isSuccessRef = useRef(false);
          const drawCountRef = useRef(0);
          const strokePathsRef = useRef([]);
          const currentStrokeRef = useRef(0);

          const currentLetter = HIRAGANA_LIST[currentIndex];

          const speakText = (text, rate = 0.8) => {
            if ('speechSynthesis' in window) {
              window.speechSynthesis.cancel();
              const utterance = new SpeechSynthesisUtterance(text);
              utterance.lang = 'ja-JP';
              utterance.rate = rate;
              window.speechSynthesis.speak(utterance);
            }
          };

          // SVGパスの最初のM座標を取得（スタート丸印のため）
          const getStartPoint = (pathStr) => {
            const m = pathStr.match(/M\s*([\d.]+)[,\s]+([\d.]+)/);
            if (m) return { x: parseFloat(m[1]) * SCALE, y: parseFloat(m[2]) * SCALE };
            return null;
          };

          // キャンバスに書き順ガイドを描画
          const drawStrokesOnCanvas = (ctx, paths, currentIdx) => {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

            // まだ来ていない筆順（とても薄いグレー）
            for (let i = currentIdx + 1; i < paths.length; i++) {
              ctx.save();
              ctx.scale(SCALE, SCALE);
              ctx.strokeStyle = '#eeeeee';
              ctx.lineWidth = 10 / SCALE;
              ctx.lineCap = 'round';
              ctx.lineJoin = 'round';
              ctx.stroke(new Path2D(paths[i]));
              ctx.restore();
            }

            // 完了した筆順（薄いグレー）
            for (let i = 0; i < currentIdx; i++) {
              ctx.save();
              ctx.scale(SCALE, SCALE);
              ctx.strokeStyle = '#d1d5db';
              ctx.lineWidth = 10 / SCALE;
              ctx.lineCap = 'round';
              ctx.lineJoin = 'round';
              ctx.stroke(new Path2D(paths[i]));
              ctx.restore();
            }

            // 今の筆順（薄めのオレンジ）
            if (currentIdx < paths.length) {
              ctx.save();
              ctx.scale(SCALE, SCALE);
              ctx.strokeStyle = '#fdba74';
              ctx.lineWidth = 13 / SCALE;
              ctx.lineCap = 'round';
              ctx.lineJoin = 'round';
              ctx.stroke(new Path2D(paths[currentIdx]));
              ctx.restore();

              // スタート地点に丸印
              const start = getStartPoint(paths[currentIdx]);
              if (start) {
                ctx.beginPath();
                ctx.arc(start.x, start.y, 10, 0, Math.PI * 2);
                ctx.fillStyle = '#fb923c';
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.stroke();
              }
            }
          };

          // 現在の筆順の目標ピクセルを計算
          const calcTargetPixels = (pathStr) => {
            const offscreen = document.createElement('canvas');
            offscreen.width = CANVAS_SIZE;
            offscreen.height = CANVAS_SIZE;
            const ctx = offscreen.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            ctx.save();
            ctx.scale(SCALE, SCALE);
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 16 / SCALE; // 少し太めにして判定を甘くする
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke(new Path2D(pathStr));
            ctx.restore();

            const imageData = ctx.getImageData(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            const data = imageData.data;
            const pixels = [];
            for (let i = 0; i < data.length; i += 4) {
              if (data[i] + data[i+1] + data[i+2] < 300) pixels.push(i);
            }
            return pixels;
          };

          // 筆順ガイドありで初期化
          const initForStroke = (paths, strokeIdx) => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            drawStrokesOnCanvas(ctx, paths, strokeIdx);
            if (paths.length > 0 && strokeIdx < paths.length) {
              targetPixelsRef.current = calcTargetPixels(paths[strokeIdx]);
            }
            isSuccessRef.current = false;
            drawCountRef.current = 0;
          };

          // 書き順データなし（フォールバック）
          const initCanvasFallback = (letter) => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            ctx.font = `bold ${CANVAS_SIZE * 0.75}px "Hiragino Maru Gothic ProN", "Meiryo", sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#000000';
            ctx.fillText(letter, CANVAS_SIZE / 2, CANVAS_SIZE / 2 + CANVAS_SIZE * 0.05);

            const imageData = ctx.getImageData(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            const data = imageData.data;
            const pixels = [];
            for (let i = 0; i < data.length; i += 4) {
              if (data[i] + data[i+1] + data[i+2] < 300) pixels.push(i);
            }
            targetPixelsRef.current = pixels;

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            ctx.fillStyle = '#fdba74'; // オレンジで全体ガイド
            ctx.fillText(letter, CANVAS_SIZE / 2, CANVAS_SIZE / 2 + CANVAS_SIZE * 0.05);

            isSuccessRef.current = false;
            setShowSuccess(false);
            drawCountRef.current = 0;
          };

          // KanjiVGから書き順データを取得
          const fetchStrokeData = async (char) => {
            setIsLoading(true);
            setShowSuccess(false);
            isSuccessRef.current = false;
            try {
              const code = char.codePointAt(0).toString(16).padStart(5, '0');
              const url = `https://raw.githubusercontent.com/KanjiVG/kanjivg/master/kanji/${code}.svg`;
              const res = await fetch(url);
              if (!res.ok) throw new Error('fetch failed');
              const text = await res.text();
              const parser = new DOMParser();
              const doc = parser.parseFromString(text, 'image/svg+xml');

              // StrokePathsグループを優先して取得
              const strokeGroup = doc.querySelector('g[id*="StrokePaths"]');
              const paths = strokeGroup
                ? Array.from(strokeGroup.querySelectorAll('path[d]')).map(p => p.getAttribute('d'))
                : Array.from(doc.querySelectorAll('path[d]')).map(p => p.getAttribute('d'));

              if (paths.length === 0) throw new Error('no paths');

              strokePathsRef.current = paths;
              currentStrokeRef.current = 0;
              setStrokeInfo({ current: 1, total: paths.length });
              initForStroke(paths, 0);
            } catch(e) {
              strokePathsRef.current = [];
              currentStrokeRef.current = 0;
              setStrokeInfo({ current: 0, total: 0 });
              initCanvasFallback(char);
            }
            setIsLoading(false);
          };

          useEffect(() => {
            fetchStrokeData(currentLetter);
            speakText(currentLetter);
          }, [currentIndex]);

          const getCoordinates = (e) => {
            const canvas = canvasRef.current;
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
              x: (clientX - rect.left) * (canvas.width / rect.width),
              y: (clientY - rect.top) * (canvas.height / rect.height)
            };
          };

          const checkCompletion = () => {
            if (isSuccessRef.current) return;
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            const targetPixels = targetPixelsRef.current;
            if (targetPixels.length === 0) return;

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            let filledCount = 0;

            for (let j = 0; j < targetPixels.length; j++) {
              const i = targetPixels[j];
              if (data[i] + data[i+1] + data[i+2] < 600) filledCount++;
            }

            const ratio = filledCount / targetPixels.length;

            if (ratio >= 0.8) {
              const paths = strokePathsRef.current;
              const strokeIdx = currentStrokeRef.current;

              if (paths.length > 0 && strokeIdx < paths.length - 1) {
                // 次の筆順へ
                isSuccessRef.current = true;
                setIsDrawing(false);
                const nextIdx = strokeIdx + 1;
                currentStrokeRef.current = nextIdx;
                setStrokeInfo({ current: nextIdx + 1, total: paths.length });
                setTimeout(() => {
                  initForStroke(paths, nextIdx);
                }, 400);
              } else {
                handleSuccess();
              }
            }
          };

          const startDrawing = (e) => {
            e.preventDefault();
            if (isSuccessRef.current) return;
            setIsDrawing(true);
            const coords = getCoordinates(e);
            const ctx = canvasRef.current.getContext('2d');
            ctx.beginPath();
            ctx.moveTo(coords.x, coords.y);
          };

          const draw = (e) => {
            e.preventDefault();
            if (!isDrawing || isSuccessRef.current) return;
            const coords = getCoordinates(e);
            const ctx = canvasRef.current.getContext('2d');
            ctx.lineTo(coords.x, coords.y);
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = 36;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();

            drawCountRef.current += 1;
            if (drawCountRef.current % 15 === 0) checkCompletion();
          };

          const stopDrawing = () => {
            setIsDrawing(false);
            checkCompletion();
          };

          const handleSuccess = () => {
            isSuccessRef.current = true;
            setShowSuccess(true);
            setIsDrawing(false);
            speakText('よくできました！', 1.0);
          };

          const handleNext = () => {
            let nextIndex;
            do {
              nextIndex = Math.floor(Math.random() * HIRAGANA_LIST.length);
            } while (nextIndex === currentIndex);
            setCurrentIndex(nextIndex);
          };

          const handleReset = () => {
            const paths = strokePathsRef.current;
            if (paths.length > 0) {
              currentStrokeRef.current = 0;
              setStrokeInfo({ current: 1, total: paths.length });
              initForStroke(paths, 0);
            } else {
              initCanvasFallback(currentLetter);
            }
            setShowSuccess(false);
          };

          return (
            <div className="min-h-screen bg-sky-50 flex flex-col items-center py-6 touch-none select-none">

              {/* ホームに戻るボタン */}
              <div className="w-full max-w-[450px] px-2 mb-2 flex">
                <button
                  onClick={() => { window.location.href = 'index.html'; }}
                  className="bg-white/90 p-2 rounded-full shadow-lg border-2 border-sky-100 text-xl flex items-center justify-center w-12 h-12 active:scale-90 transition-transform"
                >
                  🏠
                </button>
              </div>

              <div className="text-center mb-3">
                <h1 className="text-2xl md:text-3xl font-bold text-sky-600 mb-1">
                  ひらがな なぞりっこ
                </h1>
                <p className="text-gray-600 text-lg">
                  「<span className="font-bold text-pink-500 text-2xl">{currentLetter}</span>」をなぞってみよう！
                </p>
                {/* 書き順カウンター */}
                {strokeInfo.total > 0 && !showSuccess && (
                  <p className="text-orange-400 font-bold text-sm mt-1">
                    {strokeInfo.current}かくめ（ぜんぶで {strokeInfo.total}かく）
                  </p>
                )}
                {isLoading && (
                  <p className="text-gray-400 text-xs mt-1">よみこみちゅう…</p>
                )}
              </div>

              <div className="relative bg-white p-2 rounded-3xl shadow-xl mb-6">
                <canvas
                  ref={canvasRef}
                  width={400}
                  height={400}
                  className="w-[85vw] max-w-[400px] aspect-square rounded-2xl border-4 border-sky-100 bg-white"
                  style={{ touchAction: 'none' }}
                  onPointerDown={startDrawing}
                  onPointerMove={draw}
                  onPointerUp={stopDrawing}
                  onPointerOut={stopDrawing}
                  onTouchStart={startDrawing}
                  onTouchMove={draw}
                  onTouchEnd={stopDrawing}
                />

                {showSuccess && (
                  <div className="absolute inset-0 z-10 flex flex-col items-center justify-center bg-white/80 rounded-2xl backdrop-blur-sm">
                    <div className="text-8xl md:text-9xl animate-bounce drop-shadow-lg mb-4">💮</div>
                    <h2 className="text-3xl font-bold text-pink-500 mb-6 drop-shadow-md">
                      よくできました！
                    </h2>
                    <button
                      onClick={handleNext}
                      className="px-8 py-4 bg-orange-400 active:bg-orange-600 text-white text-2xl font-bold rounded-full shadow-lg transition active:scale-95 flex items-center gap-2"
                    >
                      つぎへ <span>👉</span>
                    </button>
                  </div>
                )}
              </div>

              <div className="w-[90vw] max-w-[450px] bg-white p-4 rounded-3xl shadow-md flex flex-col gap-4">

                <div className="flex flex-col items-center">
                  <p className="text-gray-500 text-sm font-bold mb-2">いろをえらぼう</p>
                  <div className="flex justify-center gap-3 md:gap-4">
                    {COLORS.map((color) => (
                      <button
                        key={color.name}
                        onClick={() => setCurrentColor(color.value)}
                        className={`w-10 h-10 md:w-12 md:h-12 rounded-full shadow-sm transform transition-transform ${
                          currentColor === color.value ? 'scale-125 ring-4 ring-offset-2 ring-sky-300' : 'hover:scale-110'
                        }`}
                        style={{ backgroundColor: color.value }}
                        aria-label={color.name}
                      />
                    ))}
                  </div>
                </div>

                <div className="w-full h-px bg-gray-100 my-1"></div>

                <button
                  onClick={handleReset}
                  className="w-full py-3 md:py-4 bg-gray-200 active:bg-gray-400 text-gray-700 text-xl font-bold rounded-2xl shadow-sm transform transition active:scale-95 flex justify-center items-center gap-2"
                >
                  やりなおす <span>🔄</span>
                </button>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
