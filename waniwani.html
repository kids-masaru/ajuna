<html lang="ja">
<head>

<title>ワニワニパニック</title>

<style>
@font-face {
  font-family: 'DSEG7';
  src: url('https://cdn.jsdelivr.net/npm/dseg@0.46/fonts/DSEG7-Classic/DSEG7Classic-Bold.woff2') format('woff2');
  font-weight: normal;

<style>
/* ===== Base ===== */
body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  user-select: none;
  touch-action: manipulation;
  overscroll-behavior: none;
  width: 100vw;
  height: 100dvh;
  background: linear-gradient(170deg, #1a5c28 0%, #0e3d18 25%, #1b4a24 50%, #2d6b1a 75%, #3a7a22 100%);
}

#game-container {
  width: 100vw;
  height: 100dvh;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ===== Score Bar (top 1/3) ===== */
#score-bar {
  position: relative;
  z-index: 20;
  width: 100%;
  height: 30vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: max(10px, env(safe-area-inset-top)) 12px 6px 12px;
  box-sizing: border-box;
  pointer-events: none;
  background: linear-gradient(180deg, #1a3a1a 0%, #2d5a2d 80%, transparent 100%);
}
#score-bar > * { pointer-events: auto; }

#score-display-box {
  background: #111;
  border: 3px solid #444;
  border-radius: 10px;
  padding: 8px 20px;
  box-shadow: inset 0 2px 8px rgba(0,0,0,0.8), 0 2px 6px rgba(0,0,0,0.5);
}
#hud-count {
  font-family: 'DSEG7', 'Courier New', monospace;
  font-size: 48px;
  font-weight: 400;
  color: #00ff44;
  text-shadow: 0 0 10px #00ff44, 0 0 20px rgba(0,255,68,0.3);
  letter-spacing: 4px;
  text-align: right;
  min-width: 160px;
}
#hud-count-suffix {
  font-family: sans-serif;
  font-size: 18px;
  font-weight: 800;
  color: #00ff44;
  margin-left: 4px;
}
#hud-points {
  font-family: 'DSEG7', 'Courier New', monospace;
  font-size: 20px;
  font-weight: 400;
  color: #ffaa00;
  text-shadow: 0 0 8px #ffaa00;
  margin-top: 2px;
  letter-spacing: 2px;
  text-align: right;
}
#hud-timer-row {
  font-size: 16px;
  font-weight: 700;
  color: rgba(255,255,255,0.8);
  margin-top: 4px;
}
#hud-timer-row.warning { color: #ff4444; animation: pulse-warn 0.5s infinite; }
@keyframes pulse-warn { 0%,100%{opacity:1} 50%{opacity:0.5} }

.hud-box {
  background: rgba(255,255,255,0.93);
  border-radius: var(--gp-r-full);
  padding: 6px 16px;
  font-weight: 800;
  font-size: 1.1rem;
  color: var(--gp-ink);
  box-shadow: var(--gp-shadow-sm);
  white-space: nowrap;
  min-width: 64px;
  text-align: center;
}

#hud-timer.warning {
  color: #dc2626;
  animation: timer-pulse 0.5s ease-in-out infinite alternate;
}
@keyframes timer-pulse {
  0%   { transform: scale(1);    background: rgba(255,255,255,0.93); }
  100% { transform: scale(1.08); background: rgba(255,200,200,0.95); }
}

/* ===== Jungle canopy decoration (top) ===== */
.canopy {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 60px;
  z-index: 1;
  pointer-events: none;
  overflow: hidden;
}
.canopy::before {
  content: '';
  position: absolute;
  top: -30px; left: -10%; right: -10%;
  height: 80px;
  background:
    radial-gradient(ellipse 120px 60px at 10% 100%, #2d8c3e 60%, transparent 61%),
    radial-gradient(ellipse 100px 55px at 30% 100%, #1e7a32 60%, transparent 61%),
    radial-gradient(ellipse 130px 65px at 55% 100%, #2d9640 60%, transparent 61%),
    radial-gradient(ellipse 110px 58px at 75% 100%, #1e7a32 60%, transparent 61%),
    radial-gradient(ellipse 120px 62px at 95% 100%, #2d8c3e 60%, transparent 61%);
}

/* ===== Rocky Cliff Wall ===== */
#cliff {
  position: relative;
  z-index: 10;
  width: min(96vw, 480px);
  margin-top: 10px;
  flex: 1;
  max-height: 520px;
  background:
    /* Rock texture layers */
    radial-gradient(ellipse 80px 40px at 15% 20%, rgba(120,100,80,0.4) 0%, transparent 70%),
    radial-gradient(ellipse 60px 30px at 70% 15%, rgba(90,75,60,0.3) 0%, transparent 70%),
    radial-gradient(ellipse 90px 50px at 40% 70%, rgba(100,85,65,0.35) 0%, transparent 70%),
    radial-gradient(ellipse 70px 35px at 85% 55%, rgba(110,90,70,0.3) 0%, transparent 70%),
    radial-gradient(ellipse 50px 25px at 25% 85%, rgba(95,80,60,0.25) 0%, transparent 70%),
    radial-gradient(ellipse 65px 30px at 60% 40%, rgba(105,88,68,0.2) 0%, transparent 70%),
    /* Base rock gradient */
    linear-gradient(180deg,
      #7a6b55 0%,
      #6b5c48 15%,
      #5e503e 35%,
      #6a5b47 50%,
      #594c3a 70%,
      #4d412f 100%);
  border-radius: 18px 18px 30px 30px;
  box-shadow:
    inset 0 2px 6px rgba(255,255,255,0.15),
    inset 0 -4px 10px rgba(0,0,0,0.3),
    0 8px 30px rgba(0,0,0,0.4),
    0 2px 8px rgba(0,0,0,0.3);
  border: 3px solid #3d3225;
  border-top-color: #8a7b65;
  padding: 20px 10px 30px 10px;
  box-sizing: border-box;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: clamp(10px, 2.5vw, 22px);
  align-content: center;
}

/* Rock surface cracks (decorative) */
#cliff::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background:
    linear-gradient(135deg, transparent 20%, rgba(0,0,0,0.06) 21%, transparent 22%),
    linear-gradient(45deg, transparent 40%, rgba(0,0,0,0.04) 41%, transparent 42%),
    linear-gradient(200deg, transparent 55%, rgba(255,255,255,0.04) 56%, transparent 57%),
    linear-gradient(160deg, transparent 70%, rgba(0,0,0,0.05) 71%, transparent 72%);
  pointer-events: none;
  z-index: 0;
}

/* Moss/vine accents on the cliff */
#cliff::after {
  content: '';
  position: absolute;
  top: -6px; left: 10%; right: 10%;
  height: 14px;
  background:
    radial-gradient(ellipse 40px 12px at 5% 100%, #3da34a 60%, transparent 61%),
    radial-gradient(ellipse 30px 10px at 25% 100%, #2d8c3e 60%, transparent 61%),
    radial-gradient(ellipse 35px 11px at 50% 100%, #3da34a 60%, transparent 61%),
    radial-gradient(ellipse 28px 9px at 72% 100%, #2d9640 60%, transparent 61%),
    radial-gradient(ellipse 38px 12px at 92% 100%, #2d8c3e 60%, transparent 61%);
  pointer-events: none;
  z-index: 1;
}

/* ===== Hole Wrapper (each cell in the grid) ===== */
.hole-wrapper {
  position: relative;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: flex-start;
  justify-content: center;
}

/* Dark hole opening */
.hole {
  position: relative;
  width: 90%;
  height: 80%;
  max-width: 200px;
  max-height: 200px;
  background: #0a0604;
  border-radius: 16px;
  box-shadow:
    inset 0 6px 14px rgba(0,0,0,0.8),
    0 2px 4px rgba(0,0,0,0.4);
  overflow: hidden;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  z-index: 2;
}

/* Rock cover - sits ON TOP of the hole to mask the croc sliding in */
.rock-cover {
  display: none; /* DEBUG: 岩を非表示にしてワニの動きを確認 */
  position: absolute;
  top: -10px;
  left: -12px;
  right: -12px;
  height: 40%;
  background:
    radial-gradient(ellipse 50px 20px at 20% 90%, rgba(100,85,65,0.5) 0%, transparent 70%),
    radial-gradient(ellipse 40px 18px at 75% 85%, rgba(90,75,58,0.4) 0%, transparent 70%),
    linear-gradient(180deg,
      #6b5c48 0%,
      #5e503e 40%,
      #6a5b47 70%,
      #594c3a 100%);
  border-radius: 10px 10px 50% 50% / 10px 10px 30% 30%;
  z-index: 5;
  pointer-events: none;
  box-shadow: 0 4px 8px rgba(0,0,0,0.3);
}

/* Croc image inside hole */
.croc-img {
  position: absolute;
  top: 0;
  left: 50%;
  width: clamp(120px, 90%, 180px);
  height: auto;
  transform: translateX(-50%) translateY(-105%);
  transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  will-change: transform;
  z-index: 3;
  pointer-events: none;
  image-rendering: auto;
}

.croc-img.pop {
  transform: translateX(-50%) translateY(35%);
}

.croc-img.hit {
  transform: translateX(-50%) translateY(35%) rotate(12deg) scale(0.88);
  filter: brightness(1.5) saturate(0.7);
  transition: transform 0.12s ease-out, filter 0.12s ease-out;
}

.croc-img.retreat {
  transform: translateX(-50%) translateY(-105%);
  transition: transform 0.2s ease-in;
}

/* ===== Hit Effect ===== */
.hit-effect {
  position: absolute;
  bottom: 5%;
  left: 50%;
  transform: translateX(-50%) scale(0);
  font-weight: 900;
  font-size: clamp(0.85rem, 3.5vw, 1.4rem);
  color: #fbbf24;
  text-shadow: 0 2px 4px rgba(0,0,0,0.5), 0 0 12px rgba(255,200,0,0.5);
  z-index: 20;
  pointer-events: none;
  white-space: nowrap;
}
.hit-effect.show {
  animation: hit-pop 0.5s ease-out forwards;
}
@keyframes hit-pop {
  0%   { transform: translateX(-50%) scale(0) rotate(-10deg); opacity: 1; }
  30%  { transform: translateX(-50%) scale(1.4) rotate(5deg); opacity: 1; }
  60%  { transform: translateX(-50%) scale(1.1) rotate(-3deg); opacity: 1; }
  100% { transform: translateX(-50%) scale(0.8) translateY(20px) rotate(0deg); opacity: 0; }
}

/* ===== Stars (hit daze) ===== */
.stars {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 110%;
  height: 60%;
  pointer-events: none;
  z-index: 10;
  opacity: 0;
}
.stars.show {
  opacity: 1;
  animation: stars-fade 0.6s linear forwards;
}
@keyframes stars-fade {
  0%   { opacity: 1; }
  80%  { opacity: 1; }
  100% { opacity: 0; }
}
.stars .star {
  position: absolute;
  font-size: clamp(0.7rem, 2.5vw, 1.1rem);
}
.stars .star:nth-child(1) { top: 0; left: 10%;  animation: star-orbit1 0.6s linear; }
.stars .star:nth-child(2) { top: 5%; right: 10%; animation: star-orbit2 0.6s linear; }
.stars .star:nth-child(3) { top: -5%; left: 42%; animation: star-orbit3 0.6s linear; }

@keyframes star-orbit1 {
  0%   { transform: translate(12px, 5px) scale(0); }
  30%  { transform: translate(-6px, -10px) scale(1.2); }
  100% { transform: translate(18px, -18px) scale(0); }
}
@keyframes star-orbit2 {
  0%   { transform: translate(-12px, 5px) scale(0); }
  30%  { transform: translate(6px, -10px) scale(1.2); }
  100% { transform: translate(-18px, -18px) scale(0); }
}
@keyframes star-orbit3 {
  0%   { transform: translate(0, 8px) scale(0); }
  30%  { transform: translate(0, -6px) scale(1.3); }
  100% { transform: translate(0, -20px) scale(0); }
}

/* ===== Combo display ===== */
#combo-display {
  position: absolute;
  top: 38%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-weight: 900;
  font-size: 2.2rem;
  color: #fff;
  text-shadow: 0 3px 10px rgba(0,0,0,0.5), 0 0 30px rgba(255,200,0,0.6);
  pointer-events: none;
  z-index: 25;
  opacity: 0;
  transition: opacity 0.2s;
}
#combo-display.show {
  opacity: 1;
  animation: combo-pop 0.3s ease-out;
}
@keyframes combo-pop {
  0%   { transform: translate(-50%, -50%) scale(0.5); }
  60%  { transform: translate(-50%, -50%) scale(1.3); }
  100% { transform: translate(-50%, -50%) scale(1); }
}

/* ===== Score Fly ===== */
.score-fly {
  position: fixed;
  font-weight: 900;
  font-size: 1.4rem;
  color: #fbbf24;
  text-shadow: 0 2px 6px rgba(0,0,0,0.4);
  pointer-events: none;
  z-index: 100;
  animation: score-fly-up 0.7s ease-out forwards;
}
@keyframes score-fly-up {
  0%   { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
}

/* ===== Ground area below cliff ===== */
#ground {
  position: relative;
  z-index: 5;
  width: 100%;
  flex: 0 0 auto;
  min-height: 40px;
  pointer-events: none;
}

/* ===== Screens ===== */
.screen {
  position: absolute;
  inset: 0;
  z-index: 50;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  padding: 24px;
  text-align: center;
  transition: opacity 0.35s;
}
.screen.hidden {
  opacity: 0;
  pointer-events: none;
}

/* ===== Title Screen ===== */
#title-screen {
  background:
    radial-gradient(120% 80% at 50% 20%, rgba(34,197,94,0.4) 0%, transparent 60%),
    linear-gradient(180deg, #0f2e17 0%, #1b4a24 40%, #2d6b1a 100%);
}

.title-croc-img {
  width: clamp(100px, 35vw, 180px);
  height: auto;
  filter: drop-shadow(0 8px 20px rgba(0,0,0,0.4));
  animation: gp-float 3s ease-in-out infinite;
}

.title-text {
  font-weight: 900;
  font-size: clamp(1.8rem, 7vw, 2.8rem);
  color: #fff;
  letter-spacing: 0.04em;
  text-shadow:
    0 4px 12px rgba(0,0,0,0.5),
    0 0 40px rgba(34,197,94,0.3);
}

.title-sub {
  font-weight: 700;
  font-size: 1rem;
  color: rgba(255,255,255,0.7);
}

/* Decorative croc emojis on title */
.title-deco {
  position: absolute;
  font-size: 2.5rem;
  opacity: 0.25;
  animation: gp-float 4s ease-in-out infinite;
}
.title-deco:nth-child(1) { top: 12%; left: 6%;  animation-delay: -1s; }
.title-deco:nth-child(2) { top: 18%; right: 8%; animation-delay: -2.5s; transform: scaleX(-1); }
.title-deco:nth-child(3) { bottom: 15%; left: 10%; animation-delay: -0.5s; }
.title-deco:nth-child(4) { bottom: 20%; right: 6%; animation-delay: -3s; transform: scaleX(-1); }

/* Rocky frame decoration on title */
.title-rock-frame {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 80px;
  background:
    radial-gradient(ellipse 60px 40px at 8% 0%, #6b5c48 60%, transparent 61%),
    radial-gradient(ellipse 50px 35px at 25% 10%, #5e503e 60%, transparent 61%),
    radial-gradient(ellipse 70px 45px at 50% 0%, #6a5b47 60%, transparent 61%),
    radial-gradient(ellipse 55px 38px at 75% 5%, #594c3a 60%, transparent 61%),
    radial-gradient(ellipse 65px 42px at 95% 0%, #6b5c48 60%, transparent 61%);
  pointer-events: none;
  z-index: 0;
}

/* ===== Result Screen ===== */
#result-screen {
  background: rgba(0,0,0,0.78);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.result-card {
  background: #ffffff;
  border-radius: var(--gp-r-lg);
  box-shadow: var(--gp-shadow-lg);
  padding: 32px 28px;
  border: 6px solid rgba(34,197,94,0.4);
  max-width: 320px;
  width: 90%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.result-emoji { font-size: 64px; line-height: 1; }
.result-title { font-weight: 900; font-size: 1.6rem; color: var(--gp-ink); }
.result-score { font-weight: 800; font-size: 1.3rem; color: var(--gp-ink-soft); }
.result-detail { font-weight: 700; font-size: 0.95rem; color: var(--gp-ink-soft); }
.result-best { font-weight: 700; font-size: 0.9rem; color: var(--gp-accent-d); }

/* ===== Confetti ===== */
.confetti {
  position: absolute;
  width: 10px; height: 10px;
  border-radius: 2px;
  pointer-events: none;
  z-index: 60;
}

/* ===== Screen shake ===== */
@keyframes screen-shake {
  0%, 100% { transform: translate(0, 0); }
  10% { transform: translate(-4px, -3px); }
  20% { transform: translate(4px, 2px); }
  30% { transform: translate(-3px, 4px); }
  40% { transform: translate(3px, -2px); }
  50% { transform: translate(-2px, 3px); }
}

/* ===== Responsive ===== */
@media (orientation: landscape) and (max-height: 500px) {
  #cliff {
    max-height: 340px;
    width: min(80vw, 520px);
    margin-top: 4px;
    padding: 12px 8px 18px 8px;
  }
  .hud-box { font-size: 0.9rem; padding: 4px 12px; }
}

@media (max-width: 360px) {
  .croc-img { width: clamp(100px, 85%, 160px); }
  #cliff { gap: 6px; padding: 14px 6px 20px 6px; }
}
</style>
</head>

        <div class="result-best" id="result-best"></div>
        <button class="gp-btn gp-btn--lg" id="btn-retry" style="margin-top:8px;">
          もういっかい！
        </button>
      </div>
    </div>
  </div>

<script>
window.onerror = function(msg, src, line) {
  document.title = 'ERR:' + msg + ' L' + line;
  var d = document.createElement('div');
  d.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:red;color:white;padding:8px;font-size:12px;';
  d.textContent = 'ERR: ' + msg + ' (line ' + line + ')';
  document.body.appendChild(d);
};
// ============================================================
// Whack-a-Croc (ワニワニパニック) - Arcade Style
// Crocs pop DOWN from holes in a rocky cliff
// ============================================================

const container   = document.getElementById('game-container');
const titleScreen = document.getElementById('title-screen');
const resultScreen= document.getElementById('result-screen');
const scoreBar    = document.getElementById('score-bar');
const cliff       = document.getElementById('cliff');
const comboDisplay= document.getElementById('combo-display');

// DOM elements for each hole
const crocImgs = document.querySelectorAll('.croc-img');
const holeDivs = document.querySelectorAll('.hole');

// ============================================================
// State
// ============================================================
let gameState = 'title'; // title | playing | gameover
let score     = 0;
let hitCount  = 0;
let timeLeft  = 60;
let combo     = 0;
let maxCombo  = 0;
let totalHits = 0;
let bestScore = parseInt(localStorage.getItem('waniwani-whack-best') || '0');

// Croc state per hole
const crocState = new Array(6).fill(null).map(() => ({
  isUp: false,
  isHit: false,
  timer: null,
}));

let gameTimer     = null;
let spawnInterval = null;

// ============================================================
// Audio (Web Audio API)
// ============================================================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playBoing() {
  ensureAudio();
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(300, t);
  osc.frequency.exponentialRampToValueAtTime(600, t + 0.05);
  osc.frequency.exponentialRampToValueAtTime(200, t + 0.15);
  gain.gain.setValueAtTime(0.15, t);
  gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
  osc.start(t);
  osc.stop(t + 0.15);
}

function playBonk(comboNum) {
  ensureAudio();
  const t = audioCtx.currentTime;
  const basePitch = 400 + Math.min(comboNum, 10) * 40;

  // Thwack noise burst
  const bufferSize = audioCtx.sampleRate * 0.15;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 3);
  }
  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;

  const filt = audioCtx.createBiquadFilter();
  filt.type = 'bandpass';
  filt.frequency.value = 1200;
  filt.Q.value = 1.5;

  const noiseGain = audioCtx.createGain();
  noise.connect(filt);
  filt.connect(noiseGain);
  noiseGain.connect(audioCtx.destination);
  noiseGain.gain.setValueAtTime(0.35, t);
  noiseGain.gain.exponentialRampToValueAtTime(0.01, t + 0.12);
  noise.start(t);

  // Pitched bonk tone
  const osc = audioCtx.createOscillator();
  const oscGain = audioCtx.createGain();
  osc.connect(oscGain);
  oscGain.connect(audioCtx.destination);
  osc.type = 'square';
  osc.frequency.setValueAtTime(basePitch, t);
  osc.frequency.exponentialRampToValueAtTime(basePitch * 0.6, t + 0.1);
  oscGain.gain.setValueAtTime(0.2, t);
  oscGain.gain.exponentialRampToValueAtTime(0.01, t + 0.12);
  osc.start(t);
  osc.stop(t + 0.12);
}

function playComboSound(comboNum) {
  ensureAudio();
  const t = audioCtx.currentTime;
  const baseFreq = 523 + comboNum * 80;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(baseFreq, t);
  osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.5, t + 0.15);
  gain.gain.setValueAtTime(0.15, t);
  gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
  osc.start(t);
  osc.stop(t + 0.2);
}

function playTick() {
  ensureAudio();
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(800, t);
  gain.gain.setValueAtTime(0.08, t);
  gain.gain.exponentialRampToValueAtTime(0.01, t + 0.05);
  osc.start(t);
  osc.stop(t + 0.05);

  setTimeout(() => {
    if (audioCtx.state !== 'running') return;
    const t2 = audioCtx.currentTime;
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(600, t2);
    gain2.gain.setValueAtTime(0.06, t2);
    gain2.gain.exponentialRampToValueAtTime(0.01, t2 + 0.05);
    osc2.start(t2);
    osc2.stop(t2 + 0.05);
  }, 250);
}

function playFanfare() {
  ensureAudio();
  const t = audioCtx.currentTime;
  const melody = [523, 659, 784, 880, 1047];
  melody.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = i < 3 ? 'square' : 'sine';
    osc.frequency.setValueAtTime(freq, t + i * 0.12);
    gain.gain.setValueAtTime(0, t + i * 0.12);
    gain.gain.linearRampToValueAtTime(0.18, t + i * 0.12 + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.01, t + i * 0.12 + (i === melody.length - 1 ? 0.6 : 0.25));
    osc.start(t + i * 0.12);
    osc.stop(t + i * 0.12 + (i === melody.length - 1 ? 0.6 : 0.25));
  });
}

// ============================================================
// Difficulty parameters
// ============================================================
function getDifficulty() {
  const elapsed = 60 - timeLeft;
  if (elapsed < 15) {
    return { maxCrocs: 2, popDuration: 2000, spawnDelay: 1200 };
  } else if (elapsed < 30) {
    return { maxCrocs: 3, popDuration: 1500, spawnDelay: 900 };
  } else if (elapsed < 45) {
    return { maxCrocs: 4, popDuration: 1200, spawnDelay: 700 };
  } else {
    return { maxCrocs: 5, popDuration: 800, spawnDelay: 500 };
  }
}

// ============================================================
// Croc spawning
// ============================================================
function popUpCroc() {
  if (gameState !== 'playing') return;

  const diff = getDifficulty();
  const activeCount = crocState.filter(c => c.isUp && !c.isHit).length;
  if (activeCount >= diff.maxCrocs) return;

  // Find available holes
  const available = [];
  for (let i = 0; i < 6; i++) {
    if (!crocState[i].isUp && !crocState[i].isHit) {
      available.push(i);
    }
  }
  if (available.length === 0) return;

  const holeIdx = available[Math.floor(Math.random() * available.length)];
  const imgEl   = crocImgs[holeIdx];
  const state   = crocState[holeIdx];

  state.isUp  = true;
  state.isHit = false;

  // Pop down (appear)
  imgEl.classList.remove('retreat', 'hit');
  imgEl.classList.add('pop');
  playBoing();

  // Schedule retreat
  state.timer = setTimeout(() => {
    if (state.isUp && !state.isHit) {
      retreatCroc(holeIdx);
      combo = 0;
      updateComboDisplay();
    }
  }, diff.popDuration);
}

function retreatCroc(idx) {
  const imgEl = crocImgs[idx];
  const state = crocState[idx];
  const hole  = holeDivs[idx];

  state.isUp = false;
  imgEl.classList.remove('pop', 'hit');
  imgEl.classList.add('retreat');

  // Clear effects
  const hitEffect = hole.querySelector('.hit-effect');
  const stars     = hole.querySelector('.stars');
  hitEffect.classList.remove('show');
  stars.classList.remove('show');

  // Reset after animation
  setTimeout(() => {
    imgEl.classList.remove('retreat');
    imgEl.style.filter = '';
    state.isHit = false;
  }, 250);
}

function hitCroc(idx, event) {
  const state = crocState[idx];
  if (!state.isUp || state.isHit || gameState !== 'playing') return;

  state.isHit = true;
  if (state.timer) {
    clearTimeout(state.timer);
    state.timer = null;
  }

  const imgEl = crocImgs[idx];
  const hole  = holeDivs[idx];

  // Combo tracking
  combo++;
  totalHits++;
  if (combo > maxCombo) maxCombo = combo;

  // Calculate score
  let points = 10;
  let bonusText = '';
  if (combo >= 3) {
    const multiplier = Math.min(combo, 10);
    points = 10 * multiplier;
    bonusText = ' x' + multiplier;
    playComboSound(combo);
  }
  score += points;
  hitCount++;
  updateHUD();
  updateComboDisplay();

  // Play bonk sound
  playBonk(combo);

  // Show hit effect
  const hitEffect = hole.querySelector('.hit-effect');
  const hitTexts = ['BONK!', 'パチン！', 'えいっ！', 'ぺしっ！'];
  hitEffect.textContent = hitTexts[Math.floor(Math.random() * hitTexts.length)] + bonusText;
  hitEffect.classList.remove('show');
  void hitEffect.offsetWidth;
  hitEffect.classList.add('show');

  // Show stars
  const stars = hole.querySelector('.stars');
  stars.classList.remove('show');
  void stars.offsetWidth;
  stars.classList.add('show');

  // Croc hit animation
  imgEl.classList.add('hit');

  // Spawn flying score at tap location
  if (event) {
    const cx = event.clientX || event.touches?.[0]?.clientX || 0;
    const cy = event.clientY || event.touches?.[0]?.clientY || 0;
    spawnScoreFly(cx, cy, '+' + points);
  }

  // Vibrate
  if (navigator.vibrate) navigator.vibrate(40);

  // Retreat after brief pause
  setTimeout(() => retreatCroc(idx), 350);
}

// ============================================================
// Score fly animation
// ============================================================
function spawnScoreFly(x, y, text) {
  const el = document.createElement('div');
  el.className = 'score-fly';
  el.textContent = text;
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

// ============================================================
// Combo display
// ============================================================
function updateComboDisplay() {
  if (combo >= 3) {
    comboDisplay.textContent = 'COMBO x' + combo + '!';
    comboDisplay.classList.remove('show');
    void comboDisplay.offsetWidth;
    comboDisplay.classList.add('show');
  } else {
    comboDisplay.classList.remove('show');
  }
}

// ============================================================
// HUD updates
// ============================================================
function updateHUD() {
  document.getElementById('hud-count').textContent = String(hitCount).padStart(3, '0');
  document.getElementById('hud-points').textContent = score + ' てん';
  const timerEl = document.getElementById('hud-timer-row');
  timerEl.textContent = 'のこり ' + timeLeft + ' びょう';

  if (timeLeft <= 10) {
    timerEl.classList.add('warning');
  } else {
    timerEl.classList.remove('warning');
  }
}

// ============================================================
// Spawn loop
// ============================================================
function startSpawning() {
  function scheduleNext() {
    if (gameState !== 'playing') return;
    const diff = getDifficulty();
    const jitter = diff.spawnDelay * 0.4 * (Math.random() - 0.5);
    const delay = Math.max(200, diff.spawnDelay + jitter);

    spawnInterval = setTimeout(() => {
      popUpCroc();
      scheduleNext();
    }, delay);
  }

  function spawnBurst() {
    if (gameState !== 'playing') return;
    const diff = getDifficulty();
    const activeCount = crocState.filter(c => c.isUp && !c.isHit).length;
    const deficit = diff.maxCrocs - activeCount - 1;
    for (let i = 0; i < deficit && i < 2; i++) {
      setTimeout(() => popUpCroc(), i * 150);
    }
  }

  // Initial pop
  setTimeout(() => {
    popUpCroc();
    scheduleNext();
  }, 800);

  // Periodic burst check
  const burstCheck = setInterval(() => {
    if (gameState !== 'playing') {
      clearInterval(burstCheck);
      return;
    }
    spawnBurst();
  }, 2000);
}

// ============================================================
// Game timer
// ============================================================
function startTimer() {
  timeLeft = 60;
  updateHUD();

  gameTimer = setInterval(() => {
    if (gameState !== 'playing') return;
    timeLeft--;
    updateHUD();

    if (timeLeft <= 10 && timeLeft > 0) {
      playTick();
    }

    if (timeLeft <= 0) {
      endGame();
    }
  }, 1000);
}

// ============================================================
// Game lifecycle
// ============================================================
function startGame() {
  gameState = 'playing';
  score     = 0;
  hitCount  = 0;
  combo     = 0;
  maxCombo  = 0;
  totalHits = 0;
  timeLeft  = 60;

  // Reset all crocs
  crocImgs.forEach((imgEl, i) => {
    imgEl.classList.remove('pop', 'hit', 'retreat');
    imgEl.style.filter = '';
    const state = crocState[i];
    state.isUp  = false;
    state.isHit = false;
    if (state.timer) clearTimeout(state.timer);
    state.timer = null;

    const hole = holeDivs[i];
    hole.querySelector('.hit-effect').classList.remove('show');
    hole.querySelector('.stars').classList.remove('show');
  });

  titleScreen.classList.add('hidden');
  resultScreen.classList.add('hidden');
  scoreBar.style.display = '';
  cliff.style.display    = '';
  comboDisplay.classList.remove('show');

  updateHUD();
  startTimer();
  startSpawning();
}

function endGame() {
  gameState = 'gameover';

  clearInterval(gameTimer);
  clearTimeout(spawnInterval);

  // Retreat all crocs
  for (let i = 0; i < 6; i++) {
    const state = crocState[i];
    if (state.timer) clearTimeout(state.timer);
    if (state.isUp) retreatCroc(i);
  }

  setTimeout(() => {
    playFanfare();
    spawnConfetti();
    showResult();
  }, 600);
}

function showResult() {
  const emoji   = document.getElementById('result-emoji');
  const title   = document.getElementById('result-title');
  const scoreEl = document.getElementById('result-score');
  const detailEl= document.getElementById('result-detail');
  const bestEl  = document.getElementById('result-best');

  scoreEl.textContent = score + ' てん';

  if (score >= 500) {
    emoji.textContent = '🏆';
    title.textContent = 'すごすぎ！！';
  } else if (score >= 300) {
    emoji.textContent = '🎉';
    title.textContent = 'やったね！';
  } else if (score >= 150) {
    emoji.textContent = '😊';
    title.textContent = 'がんばったね！';
  } else {
    emoji.textContent = '🐊';
    title.textContent = 'おしまい！';
  }

  const details = [];
  details.push(totalHits + ' ひき たたいたよ');
  if (maxCombo >= 3) {
    details.push('さいだいコンボ: ' + maxCombo);
  }
  detailEl.textContent = details.join(' / ');

  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('waniwani-whack-best', bestScore.toString());
    bestEl.textContent = '🏆 あたらしい きろく！ ' + bestScore + ' てん';
    bestEl.style.color = '#e11d48';
  } else if (bestScore > 0) {
    bestEl.textContent = 'さいこう きろく: ' + bestScore + ' てん';
    bestEl.style.color = '';
  } else {
    bestEl.textContent = '';
  }

  resultScreen.classList.remove('hidden');
}

// ============================================================
// Confetti
// ============================================================
function spawnConfetti() {
  const colors = ['#f1c40f','#e74c3c','#3498db','#2ecc71','#9b59b6','#e67e22','#1abc9c','#ff69b4'];
  const W = container.clientWidth;
  const H = container.clientHeight;

  for (let i = 0; i < 50; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random() * 100 + '%';
    el.style.top  = '-20px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width  = (6 + Math.random() * 8) + 'px';
    el.style.height = (6 + Math.random() * 8) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
    container.appendChild(el);

    const destX = (Math.random() - 0.5) * W * 0.8;
    const destY = H + 50;
    const dur   = 1000 + Math.random() * 1500;
    const delay = Math.random() * 400;

    el.animate([
      { transform: 'translate(0, 0) rotate(0deg)', opacity: 1 },
      { transform: 'translate(' + destX + 'px, ' + destY + 'px) rotate(' + (720 + Math.random() * 720) + 'deg)', opacity: 0 }
    ], {
      duration: dur,
      delay: delay,
      easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
      fill: 'forwards'
    }).onfinish = () => el.remove();
  }
}

// ============================================================
// Input handling
// ============================================================
holeDivs.forEach((hole, idx) => {
  hole.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    hitCroc(idx, e);
  });
});

// ============================================================
// Button handlers
// ============================================================
document.getElementById('btn-start').addEventListener('click', () => {
  ensureAudio();
  startGame();
});

document.getElementById('btn-retry').addEventListener('click', () => {
  ensureAudio();
  startGame();
});

// Prevent double-tap zoom
document.addEventListener('dblclick', (e) => e.preventDefault());
// Prevent context menu on long press
document.addEventListener('contextmenu', (e) => e.preventDefault());
</script>
</body>
</html>
