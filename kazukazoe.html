<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>いくつあるかな</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&display=swap');
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            user-select: none;
            touch-action: manipulation;
            overscroll-behavior: none;
            background-color: #eff6ff;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const EMOJI_LIST = [
          "🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐨","🐯",
          "🦁","🐮","🐷","🐸","🐵","🐧","🐦","🐤","🦆","🐢",
          "🚗","🚕","🚙","🚌","🚓","🚑","🚒","🚜","🚲","✈️",
          "🚀","🚁","⛵","🚢","🚂","🍎","🍌","🍇","🍓","🍉",
          "🍊","🍋","🍍","🥝","🍅","🍆","🌽","🥕","🍄","🍔",
          "🍟","🍕","🌭","🍦","🍩","🍪","🍫","🍬","🍭","🍰"
        ];

        const playSound = (type) => {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (!AC) return;
          const ctx = new AC();
          if (type === 'correct') {
            const o1=ctx.createOscillator(), o2=ctx.createOscillator(), g=ctx.createGain();
            o1.type='sine'; o2.type='sine';
            o1.frequency.setValueAtTime(659.25, ctx.currentTime);
            o2.frequency.setValueAtTime(880.00, ctx.currentTime+0.15);
            g.gain.setValueAtTime(0,ctx.currentTime);
            g.gain.linearRampToValueAtTime(0.3,ctx.currentTime+0.05);
            g.gain.linearRampToValueAtTime(0,ctx.currentTime+0.5);
            o1.connect(g); o2.connect(g); g.connect(ctx.destination);
            o1.start(ctx.currentTime); o1.stop(ctx.currentTime+0.15);
            o2.start(ctx.currentTime+0.15); o2.stop(ctx.currentTime+0.5);
          } else {
            const o=ctx.createOscillator(), g=ctx.createGain();
            o.type='sawtooth'; o.frequency.setValueAtTime(150,ctx.currentTime);
            g.gain.setValueAtTime(0,ctx.currentTime);
            g.gain.linearRampToValueAtTime(0.3,ctx.currentTime+0.05);
            g.gain.linearRampToValueAtTime(0,ctx.currentTime+0.4);
            o.connect(g); g.connect(ctx.destination);
            o.start(); o.stop(ctx.currentTime+0.4);
          }
        };

        // なぞり書きキャンバス
        const TracingCanvas = ({ number, onDraw, clearTrigger }) => {
          const canvasRef = useRef(null);
          const isDrawingRef = useRef(false);

          useEffect(() => {
            const canvas = canvasRef.current;
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
          }, [clearTrigger]);

          // CSS表示サイズとcanvasピクセルサイズのずれを補正
          const getCoords = (e, canvas) => {
            const rect = canvas.getBoundingClientRect();
            const sx = canvas.width / rect.width;
            const sy = canvas.height / rect.height;
            const src = e.touches ? e.touches[0] : e;
            return { x: (src.clientX - rect.left) * sx, y: (src.clientY - rect.top) * sy };
          };

          const onStart = (e) => {
            e.preventDefault();
            isDrawingRef.current = true;
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            const { x, y } = getCoords(e, canvas);
            ctx.beginPath(); ctx.moveTo(x, y);
            ctx.lineWidth = 14; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.strokeStyle = '#FF6B6B';
            onDraw();
          };
          const onMove = (e) => {
            e.preventDefault();
            if (!isDrawingRef.current) return;
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            const { x, y } = getCoords(e, canvas);
            ctx.lineTo(x, y); ctx.stroke();
            onDraw();
          };
          const onEnd = (e) => { e.preventDefault(); isDrawingRef.current = false; };

          return (
            <div className="relative border-4 border-dashed border-gray-300 rounded-2xl bg-white shadow-sm overflow-hidden touch-none"
              style={{ width: '7rem', aspectRatio: '4/5' }}>
              <div className="absolute inset-0 flex items-center justify-center text-gray-200 select-none pointer-events-none"
                style={{ fontSize: '5.5rem', fontWeight: 'bold', lineHeight: 1 }}>
                {number}
              </div>
              <canvas ref={canvasRef} width={160} height={200}
                className="absolute inset-0 w-full h-full z-10 cursor-crosshair"
                onMouseDown={onStart} onMouseMove={onMove} onMouseUp={onEnd} onMouseLeave={onEnd}
                onTouchStart={onStart} onTouchMove={onMove} onTouchEnd={onEnd}
              />
            </div>
          );
        };

        function App() {
          const [targetCount, setTargetCount] = useState(0);
          const [currentEmoji, setCurrentEmoji] = useState("");
          const [options, setOptions] = useState([0, 0]);
          const [drawCounts, setDrawCounts] = useState([0, 0]);
          const [clearTrigger, setClearTrigger] = useState(0);
          const [result, setResult] = useState(null); // null | 'correct' | 'incorrect'

          const generateProblem = () => {
            const count = Math.floor(Math.random() * 10) + 1;
            const emoji = EMOJI_LIST[Math.floor(Math.random() * EMOJI_LIST.length)];
            let wrong = Math.floor(Math.random() * 10) + 1;
            while (wrong === count) wrong = Math.floor(Math.random() * 10) + 1;
            const opts = Math.random() > 0.5 ? [count, wrong] : [wrong, count];
            setTargetCount(count);
            setCurrentEmoji(emoji);
            setOptions(opts);
            setDrawCounts([0, 0]);
            setClearTrigger(p => p + 1);
            setResult(null);
          };

          useEffect(() => { generateProblem(); }, []);

          const handleDraw = (idx) => {
            if (result !== null) return;
            setDrawCounts(prev => { const n=[...prev]; n[idx]+=1; return n; });
          };

          const checkAnswer = () => {
            if (drawCounts[0] === 0 && drawCounts[1] === 0) {
              alert("どちらかの すうじを なぞってね！");
              return;
            }
            const minCount = Math.min(drawCounts[0], drawCounts[1]);
            // 両方に書いた場合は不正解
            if (minCount >= 8) {
              setResult('incorrect');
              playSound('incorrect');
              return;
            }
            const selected = options[drawCounts[0] > drawCounts[1] ? 0 : 1];
            if (selected === targetCount) {
              setResult('correct');
              playSound('correct');
            } else {
              setResult('incorrect');
              playSound('incorrect');
            }
          };

          const resetDrawing = () => {
            setDrawCounts([0, 0]);
            setClearTrigger(p => p + 1);
          };

          const emojiArray = Array.from({ length: targetCount }, (_, i) => i);

          return (
            <div className="h-screen overflow-hidden flex flex-col bg-blue-50 px-3 py-3 touch-manipulation">

              {/* ヘッダー：ホームボタン＋タイトル */}
              <div className="flex items-center gap-2 mb-2 flex-shrink-0">
                <button onClick={() => window.location.href = 'index.html'}
                  className="bg-white rounded-full shadow-md border-2 border-blue-200 text-lg flex items-center justify-center w-10 h-10 active:scale-90 transition-transform flex-shrink-0">
                  🏠
                </button>
                <h1 className="text-xl font-bold text-blue-600">いくつ あるかな？</h1>
              </div>

              {/* メインカード */}
              <div className="flex-1 min-h-0 bg-white rounded-3xl shadow-xl flex flex-col px-4 pt-3 pb-4 gap-2">

                {/* 絵文字エリア */}
                <div className="flex-1 min-h-0 flex flex-wrap justify-center items-center content-center gap-1 bg-blue-100 rounded-2xl p-2 overflow-hidden">
                  {emojiArray.map(i => (
                    <span key={i} className="text-3xl sm:text-4xl animate-bounce"
                      style={{ animationDelay: `${i * 0.1}s` }}>
                      {currentEmoji}
                    </span>
                  ))}
                </div>

                {/* 説明テキスト */}
                <p className="text-sm font-bold text-gray-600 text-center flex-shrink-0">
                  せいかいの すうじを なぞってね！
                </p>

                {/* なぞり書きエリア */}
                <div className="flex justify-center gap-6 flex-shrink-0">
                  <TracingCanvas number={options[0]} onDraw={() => handleDraw(0)} clearTrigger={clearTrigger} />
                  <TracingCanvas number={options[1]} onDraw={() => handleDraw(1)} clearTrigger={clearTrigger} />
                </div>

                {/* ボタンエリア */}
                <div className="flex flex-col gap-2 flex-shrink-0">
                  {!result && (
                    <button onClick={resetDrawing}
                      className="w-full py-2 bg-gray-100 text-gray-600 text-sm font-bold rounded-xl active:bg-gray-300 active:scale-95 transition-all">
                      なぞりなおす 🔄
                    </button>
                  )}

                  {!result ? (
                    <button onClick={checkAnswer}
                      className="w-full py-3 bg-green-500 text-white text-xl font-bold rounded-2xl shadow-md active:scale-95 transition-all">
                      こたえあわせ！
                    </button>
                  ) : (
                    <div className="flex flex-col items-center gap-2">
                      <div className={`text-2xl font-bold ${result === 'correct' ? 'text-red-500' : 'text-blue-500'}`}>
                        {result === 'correct' ? '🎉 せいかい！ 🎉' : '😢 ちがうよ 😢'}
                      </div>
                      {result === 'correct' ? (
                        <button onClick={generateProblem}
                          className="w-full py-3 bg-yellow-400 text-yellow-900 text-xl font-bold rounded-2xl shadow-md active:scale-95 transition-all">
                          つぎの もんだい！
                        </button>
                      ) : (
                        <button onClick={() => { setResult(null); resetDrawing(); }}
                          className="w-full py-3 bg-blue-400 text-white text-xl font-bold rounded-2xl shadow-md active:scale-95 transition-all">
                          もういっかい！
                        </button>
                      )}
                    </div>
                  )}
                </div>

              </div>
            </div>
          );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
