<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>オーダー回転寿司</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
body {
  margin: 0;
  padding: 0;
  font-family: sans-serif;
  user-select: none;
  touch-action: manipulation;
  overscroll-behavior: none;
  overflow: hidden;
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const INGREDIENTS = [
  { id: 'shari', name: 'シャリ', type: 'css', price: 50 },
  { id: 'maguro', name: 'マグロ', type: 'css', price: 150 },
  { id: 'salmon', name: 'サーモン', type: 'css', price: 150 },
  { id: 'tamago', name: 'たまご', type: 'css', price: 100 },
  { id: 'ebi', name: 'えび', type: 'emoji', emoji: '🦐', price: 200 },
  { id: 'ikura', name: 'いくら', type: 'css', price: 30 },
  { id: 'nori', name: '海苔', type: 'css', price: 20 },
  { id: 'wasabi', name: 'わさび', type: 'css', price: 0 },
];

const ORDERS = [
  {
    id: 1,
    previewItems: [
      { id: 'p1', baseId: 'shari', type: 'css', x: 120, y: 130, rotation: 0, zIndex: 1 },
      { id: 'p2', baseId: 'maguro', type: 'css', x: 120, y: 110, rotation: 0, zIndex: 2 },
    ],
    requiredCounts: { shari: 1, maguro: 1 },
    score: 100
  },
  {
    id: 2,
    previewItems: [
      { id: 'p1', baseId: 'shari', type: 'css', x: 120, y: 130, rotation: 0, zIndex: 1 },
      { id: 'p2', baseId: 'wasabi', type: 'css', x: 100, y: 125, rotation: 0, zIndex: 2 },
      { id: 'p3', baseId: 'salmon', type: 'css', x: 120, y: 110, rotation: 0, zIndex: 3 },
    ],
    requiredCounts: { shari: 1, wasabi: 1, salmon: 1 },
    score: 150
  },
  {
    id: 3,
    previewItems: [
      { id: 'p1', baseId: 'shari', type: 'css', x: 120, y: 130, rotation: 0, zIndex: 1 },
      { id: 'p2', baseId: 'tamago', type: 'css', x: 120, y: 110, rotation: 0, zIndex: 2 },
      { id: 'p3', baseId: 'nori', type: 'css', x: 120, y: 120, rotation: 90, zIndex: 3 },
    ],
    requiredCounts: { shari: 1, tamago: 1, nori: 1 },
    score: 180
  },
  {
    id: 4,
    previewItems: [
      { id: 'p1', baseId: 'shari', type: 'css', x: 120, y: 130, rotation: 0, zIndex: 1 },
      { id: 'p2', baseId: 'nori', type: 'css', x: 120, y: 120, rotation: 90, zIndex: 2 },
      { id: 'p3', baseId: 'ikura', type: 'css', x: 120, y: 100, rotation: 0, zIndex: 3 },
    ],
    requiredCounts: { shari: 1, nori: 1, ikura: 1 },
    score: 200
  },
  {
    id: 5,
    previewItems: [
      { id: 'p1', baseId: 'shari', type: 'css', x: 80, y: 130, rotation: 0, zIndex: 1 },
      { id: 'p2', baseId: 'ebi', type: 'emoji', emoji: '🦐', x: 80, y: 110, rotation: -20, zIndex: 3 },
      { id: 'p3', baseId: 'shari', type: 'css', x: 160, y: 130, rotation: 0, zIndex: 2 },
      { id: 'p4', baseId: 'ebi', type: 'emoji', emoji: '🦐', x: 160, y: 110, rotation: 20, zIndex: 4 },
      { id: 'p5', baseId: 'ebi', type: 'emoji', emoji: '🦐', x: 120, y: 80, rotation: 90, zIndex: 5 },
    ],
    requiredCounts: { shari: 2, ebi: 3 },
    score: 300
  },
  {
    id: 6,
    previewItems: [
      { id: 'p1', baseId: 'shari', type: 'css', x: 120, y: 130, rotation: 0, zIndex: 1 },
      { id: 'p2', baseId: 'wasabi', type: 'css', x: 100, y: 100, rotation: 0, zIndex: 2 },
      { id: 'p3', baseId: 'wasabi', type: 'css', x: 140, y: 100, rotation: 0, zIndex: 3 },
      { id: 'p4', baseId: 'wasabi', type: 'css', x: 120, y: 80, rotation: 0, zIndex: 4 },
    ],
    requiredCounts: { shari: 1, wasabi: 3 },
    score: 250
  }
];

const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
const IconArrowUp = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 19V5M5 12l7-7 7 7"></path></svg>;
const IconArrowDown = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14M19 12l-7 7-7-7"></path></svg>;

let audioCtx = null;
const initAudio = () => {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
};

const playSound = (type) => {
  if (!audioCtx) return;
  const oscillator = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();
  oscillator.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  const now = audioCtx.currentTime;

  switch (type) {
    case 'put':
      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(400, now);
      oscillator.frequency.exponentialRampToValueAtTime(100, now + 0.1);
      gainNode.gain.setValueAtTime(0.5, now);
      gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
      oscillator.start(now);
      oscillator.stop(now + 0.1);
      break;
    case 'grab':
      oscillator.type = 'triangle';
      oscillator.frequency.setValueAtTime(300, now);
      oscillator.frequency.linearRampToValueAtTime(500, now + 0.05);
      gainNode.gain.setValueAtTime(0.2, now);
      gainNode.gain.linearRampToValueAtTime(0.01, now + 0.05);
      oscillator.start(now);
      oscillator.stop(now + 0.05);
      break;
    case 'slide': {
      oscillator.type = 'sawtooth';
      oscillator.frequency.setValueAtTime(150, now);
      oscillator.frequency.linearRampToValueAtTime(50, now + 0.5);
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(1000, now);
      filter.frequency.linearRampToValueAtTime(100, now + 0.5);
      oscillator.disconnect();
      oscillator.connect(filter);
      filter.connect(gainNode);
      gainNode.gain.setValueAtTime(0.3, now);
      gainNode.gain.linearRampToValueAtTime(0.01, now + 0.5);
      oscillator.start(now);
      oscillator.stop(now + 0.5);
      break;
    }
    case 'success': {
      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(659.25, now);
      gainNode.gain.setValueAtTime(0.5, now);
      gainNode.gain.setValueAtTime(0.5, now + 0.15);
      gainNode.gain.linearRampToValueAtTime(0.01, now + 0.2);
      oscillator.start(now);
      oscillator.stop(now + 0.2);
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(830.61, now + 0.2);
      gain2.gain.setValueAtTime(0, now);
      gain2.gain.setValueAtTime(0.5, now + 0.2);
      gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.start(now + 0.2);
      osc2.stop(now + 0.6);
      break;
    }
    case 'fail': {
      oscillator.type = 'sawtooth';
      oscillator.frequency.setValueAtTime(150, now);
      gainNode.gain.setValueAtTime(0.3, now);
      gainNode.gain.linearRampToValueAtTime(0.3, now + 0.3);
      gainNode.gain.linearRampToValueAtTime(0.01, now + 0.4);
      const oscFail = audioCtx.createOscillator();
      oscFail.type = 'square';
      oscFail.frequency.setValueAtTime(160, now);
      oscFail.connect(gainNode);
      oscFail.start(now);
      oscFail.stop(now + 0.4);
      oscillator.start(now);
      oscillator.stop(now + 0.4);
      break;
    }
  }
};

function App() {
  const [gameState, setGameState] = useState('title');
  const [currentOrderIndex, setCurrentOrderIndex] = useState(0);
  const [items, setItems] = useState([]);
  const [selectedId, setSelectedId] = useState(null);
  const [maxZ, setMaxZ] = useState(10);
  const [dragInfo, setDragInfo] = useState(null);
  const [score, setScore] = useState(0);
  const [resultStatus, setResultStatus] = useState(null);
  const [isConveying, setIsConveying] = useState(false);

  const workspaceRef = useRef(null);
  const currentOrder = ORDERS[currentOrderIndex];

  const startGame = () => {
    initAudio();
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    setGameState('playing');
    setScore(0);
    setCurrentOrderIndex(0);
    startOrder(0);
  };

  const startOrder = (index) => {
    if (index >= ORDERS.length) {
      setGameState('result');
      return;
    }
    setItems([]);
    setSelectedId(null);
    setResultStatus(null);
    setIsConveying(false);
  };

  const handlePointerDown = (e, id, item) => {
    if (isConveying || gameState !== 'playing' || resultStatus !== null) return;
    e.stopPropagation();
    e.target.setPointerCapture(e.pointerId);
    initAudio();
    playSound('grab');
    const newMaxZ = maxZ + 1;
    setMaxZ(newMaxZ);
    setSelectedId(id);
    setItems(items.map(i => i.id === id ? { ...i, zIndex: newMaxZ } : i));
    setDragInfo({
      id,
      startX: item.x,
      startY: item.y,
      pointerX: e.clientX,
      pointerY: e.clientY
    });
  };

  const handlePointerMove = (e) => {
    if (!dragInfo) return;
    const dx = e.clientX - dragInfo.pointerX;
    const dy = e.clientY - dragInfo.pointerY;
    setItems(items.map(i =>
      i.id === dragInfo.id
        ? { ...i, x: dragInfo.startX + dx, y: dragInfo.startY + dy }
        : i
    ));
  };

  const handlePointerUp = () => {
    if (dragInfo) {
      playSound('put');
      setDragInfo(null);
    }
  };

  const handleWorkspaceClick = () => {
    if (!isConveying) setSelectedId(null);
  };

  const addItem = (baseItem) => {
    if (isConveying || gameState !== 'playing' || resultStatus !== null) return;
    initAudio();
    playSound('put');
    const newMaxZ = maxZ + 1;
    setMaxZ(newMaxZ);
    const offsetX = Math.random() * 40 - 20;
    const offsetY = Math.random() * 40 - 20;
    const newItem = {
      id: `item-${Date.now()}-${Math.floor(Math.random() * 1000)}`,
      baseId: baseItem.id,
      type: baseItem.type,
      emoji: baseItem.emoji,
      x: 120 + offsetX,
      y: 100 + offsetY,
      rotation: 0,
      zIndex: newMaxZ,
    };
    setItems([...items, newItem]);
    setSelectedId(newItem.id);
  };

  const updateSelectedItem = (changes) => {
    if (!selectedId || isConveying) return;
    setItems(items.map(i => i.id === selectedId ? { ...i, ...changes } : i));
  };

  const deleteSelectedItem = () => {
    if (!selectedId || isConveying) return;
    playSound('grab');
    setItems(items.filter(i => i.id !== selectedId));
    setSelectedId(null);
  };

  const moveZ = (direction) => {
    if (!selectedId || isConveying) return;
    const item = items.find(i => i.id === selectedId);
    if (!item) return;
    playSound('grab');
    if (direction === 'up') {
      const newMaxZ = maxZ + 1;
      setMaxZ(newMaxZ);
      updateSelectedItem({ zIndex: newMaxZ });
    } else {
      updateSelectedItem({ zIndex: Math.max(1, item.zIndex - 1) });
    }
  };

  const submitSushi = () => {
    if (isConveying || resultStatus !== null) return;
    setSelectedId(null);
    const currentCounts = {};
    items.forEach(item => {
      currentCounts[item.baseId] = (currentCounts[item.baseId] || 0) + 1;
    });
    let isCorrect = true;
    const req = currentOrder.requiredCounts;
    for (const [key, val] of Object.entries(req)) {
      if ((currentCounts[key] || 0) !== val) { isCorrect = false; break; }
    }
    for (const key of Object.keys(currentCounts)) {
      if (!req[key] || req[key] !== currentCounts[key]) { isCorrect = false; break; }
    }
    if (isCorrect) {
      playSound('success');
      setTimeout(() => playSound('slide'), 500);
      setResultStatus('success');
      setIsConveying(true);
      setScore(prev => prev + currentOrder.score);
      setTimeout(() => {
        const nextIndex = currentOrderIndex + 1;
        setCurrentOrderIndex(nextIndex);
        startOrder(nextIndex);
      }, 2500);
    } else {
      playSound('fail');
      setResultStatus('fail');
      setTimeout(() => { setResultStatus(null); }, 1500);
    }
  };

  const renderShape = (item, isPreview = false) => {
    const isSelected = !isPreview && item.id === selectedId;
    const baseClass = "absolute select-none transform-gpu origin-center " + (isConveying || isPreview ? "" : "cursor-grab active:cursor-grabbing");
    const selectedStyle = isSelected ? "ring-4 ring-blue-500 ring-offset-2 ring-offset-transparent" : "";

    let content = null;
    if (item.type === 'emoji') {
      content = <div className={`text-6xl drop-shadow-lg ${selectedStyle}`}>{item.emoji}</div>;
    } else {
      switch (item.baseId) {
        case 'shari':
          content = <div className={`w-24 h-12 bg-[#fffff8] rounded-[60px] shadow-md border border-gray-100 ${selectedStyle}`} style={{ boxShadow: 'inset -2px -5px 10px rgba(0,0,0,0.05), 2px 5px 5px rgba(0,0,0,0.1)' }}></div>;
          break;
        case 'maguro':
          content = <div className={`w-28 h-14 bg-red-600 rounded-[60px] opacity-95 ${selectedStyle}`} style={{ boxShadow: 'inset -5px -5px 15px rgba(0,0,0,0.2), inset 2px 2px 5px rgba(255,255,255,0.3)' }}></div>;
          break;
        case 'salmon':
          content = (
            <div className={`w-28 h-14 bg-orange-400 rounded-[60px] opacity-95 flex flex-col justify-evenly overflow-hidden relative ${selectedStyle}`} style={{ boxShadow: 'inset -5px -5px 15px rgba(0,0,0,0.1)' }}>
              <div className="w-[150%] h-1 bg-white opacity-40 -rotate-12 absolute -left-2 top-3"></div>
              <div className="w-[150%] h-1 bg-white opacity-40 -rotate-12 absolute -left-2 top-7"></div>
              <div className="w-[150%] h-1 bg-white opacity-40 -rotate-12 absolute -left-2 top-11"></div>
            </div>
          );
          break;
        case 'tamago':
          content = <div className={`w-24 h-12 bg-yellow-400 rounded-md shadow-sm border-b-4 border-yellow-500 ${selectedStyle}`}></div>;
          break;
        case 'nori':
          content = <div className={`w-6 h-28 bg-[#1a1c18] rounded-sm shadow-md border border-gray-800 ${selectedStyle}`} style={{ backgroundImage: 'repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(255,255,255,0.05) 2px, rgba(255,255,255,0.05) 4px)' }}></div>;
          break;
        case 'ikura':
          content = (
            <div className={`w-16 h-10 flex flex-wrap gap-1 justify-center items-center ${selectedStyle}`}>
              {[...Array(6)].map((_, i) => (
                <div key={i} className="w-4 h-4 bg-orange-500 rounded-full shadow-sm" style={{ boxShadow: 'inset -1px -1px 2px rgba(200,50,0,0.8), inset 1px 1px 1px rgba(255,255,255,0.8)' }}></div>
              ))}
            </div>
          );
          break;
        case 'wasabi':
          content = <div className={`w-6 h-6 bg-green-500 rounded-[40%] blur-[0.5px] opacity-90 ${selectedStyle}`} style={{ boxShadow: 'inset -2px -2px 5px rgba(0,100,0,0.5)' }}></div>;
          break;
        default:
          content = <div className="w-10 h-10 bg-gray-500"></div>;
      }
    }

    return (
      <div
        key={item.id}
        onPointerDown={isPreview ? undefined : (e) => handlePointerDown(e, item.id, item)}
        className={baseClass}
        style={{
          transform: `translate(${item.x}px, ${item.y}px) rotate(${item.rotation}deg) translate(-50%, -50%)`,
          zIndex: item.zIndex,
          touchAction: 'none'
        }}
      >
        {content}
      </div>
    );
  };

  const selectedItemData = items.find(i => i.id === selectedId);

  return (
    <div className="flex flex-col h-screen w-full bg-[#f0e6d2] overflow-hidden font-sans">

      <style>{`
        @keyframes slideRight {
          from { transform: translateX(0); }
          to { transform: translateX(-50%); }
        }
        .conveying-plate {
          transition: transform 2s ease-in;
          transform: translateX(100vw);
        }
        @keyframes popIn {
          0% { transform: scale(0.5); opacity: 0; }
          70% { transform: scale(1.2); opacity: 1; }
          100% { transform: scale(1); opacity: 1; }
        }
        @keyframes shakeIcon {
          0%, 100% { transform: translateX(0); }
          25% { transform: translateX(-15px) rotate(-10deg); }
          50% { transform: translateX(15px) rotate(10deg); }
          75% { transform: translateX(-15px) rotate(-10deg); }
        }
        .animate-pop-in { animation: popIn 0.4s ease-out forwards; }
        .animate-shake-icon { animation: shakeIcon 0.5s ease-in-out; }
      `}</style>

      {/* タイトル画面 */}
      {gameState === 'title' && (
        <div className="absolute inset-0 z-50 flex flex-col items-center justify-center bg-[#2c3e50] text-white p-6">
          <a href="index.html" className="absolute top-4 left-4 w-12 h-12 bg-white/20 backdrop-blur rounded-full flex items-center justify-center text-2xl no-underline shadow-lg border border-white/50" style={{zIndex:100}}>🏠</a>
          <div className="text-8xl mb-6 animate-bounce">🍣</div>
          <h1 className="text-4xl md:text-5xl font-black mb-4 text-center tracking-wider text-[#e74c3c]">
            オーダー回転寿司
          </h1>
          <button
            onClick={startGame}
            className="mt-8 bg-[#e74c3c] hover:bg-[#c0392b] text-white text-2xl font-bold py-4 px-12 rounded-full shadow-[0_6px_0_#962d22] active:shadow-[0_0px_0_#962d22] active:translate-y-[6px] transition-all"
          >
            スタート
          </button>
        </div>
      )}

      {/* リザルト画面 */}
      {gameState === 'result' && (
        <div className="absolute inset-0 z-50 flex flex-col items-center justify-center bg-[#2c3e50] text-white p-6">
          <h2 className="text-4xl font-bold mb-2">営業終了！</h2>
          <p className="text-xl text-gray-300 mb-8">今日のスコア</p>
          <div className="text-6xl font-black text-[#f1c40f] mb-12 drop-shadow-lg">
            {score}
          </div>
          <div className="flex gap-4">
            <button
              onClick={() => window.location.href = 'index.html'}
              className="bg-gray-500 hover:bg-gray-400 text-white text-xl font-bold py-3 px-8 rounded-full shadow-[0_4px_0_#374151] active:shadow-[0_0px_0_#374151] active:translate-y-[4px] transition-all"
            >
              🏠 もどる
            </button>
            <button
              onClick={() => setGameState('title')}
              className="bg-[#3498db] hover:bg-[#2980b9] text-white text-xl font-bold py-3 px-8 rounded-full shadow-[0_4px_0_#1f618d] active:shadow-[0_0px_0_#1f618d] active:translate-y-[4px] transition-all"
            >
              もういちど
            </button>
          </div>
        </div>
      )}

      {/* ゲーム画面 */}
      {gameState === 'playing' && (
        <>
          <header className="bg-slate-800 text-white px-4 py-3 flex justify-between items-center shadow-md z-20">
            <a href="index.html" className="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-xl no-underline">🏠</a>
            <div className="font-bold text-xl tracking-wider">
              スコア: <span className="text-yellow-400">{score}</span>
            </div>
            <div className="w-10"></div>
          </header>

          <div className="bg-white border-b-4 border-red-500 py-3 z-10 shadow-sm relative flex flex-col justify-center items-center">
            <div className="flex items-center gap-2 mb-1">
              <span className="text-sm font-black text-red-600 tracking-widest bg-red-100 px-4 py-1 rounded-full">お手本</span>
            </div>
            <div className="relative w-[110px] h-[110px] bg-red-50 rounded-full shadow-inner border-[3px] border-red-200 overflow-hidden pointer-events-none flex justify-center items-center">
              <div className="absolute w-[240px] h-[240px] scale-[0.45] origin-center">
                {currentOrder?.previewItems?.map(item => renderShape(item, true))}
              </div>
            </div>
            <div className="mt-2 flex flex-wrap justify-center gap-2 px-2">
              {Object.entries(currentOrder?.requiredCounts || {}).map(([baseId, count]) => {
                const ing = INGREDIENTS.find(i => i.id === baseId);
                if (!ing) return null;
                return (
                  <div key={baseId} className="flex items-center bg-gray-100 rounded-full px-3 py-1 shadow-sm border border-gray-200">
                    <div className="w-6 h-6 flex items-center justify-center relative pointer-events-none mr-2">
                      {ing.type === 'emoji' ? (
                        <span className="text-sm">{ing.emoji}</span>
                      ) : (
                        <div className="scale-[0.25] origin-center absolute top-1/2 left-1/2">
                          {renderShape({ ...ing, baseId: ing.id, x: 0, y: 0, rotation: 0, zIndex: 1, type: ing.type }, true)}
                        </div>
                      )}
                    </div>
                    <span className="text-sm font-black text-gray-700">× {count}</span>
                  </div>
                );
              })}
            </div>
          </div>

          <main
            className="flex-1 relative overflow-hidden bg-gray-100 flex flex-col"
            onPointerMove={handlePointerMove}
            onPointerUp={handlePointerUp}
            onPointerLeave={handlePointerUp}
            onClick={handleWorkspaceClick}
          >
            <div className="absolute top-1/2 left-0 w-full h-24 bg-gray-300 -translate-y-1/2 shadow-inner border-y border-gray-400 flex items-center overflow-hidden">
              <div className="w-[200%] h-full flex items-center" style={{ animation: 'slideRight 10s linear infinite' }}>
                <div className="w-20 h-4 bg-gray-400 mx-10 rounded-full opacity-50"></div>
                <div className="w-20 h-4 bg-gray-400 mx-10 rounded-full opacity-50"></div>
                <div className="w-20 h-4 bg-gray-400 mx-10 rounded-full opacity-50"></div>
                <div className="w-20 h-4 bg-gray-400 mx-10 rounded-full opacity-50"></div>
              </div>
            </div>

            <div className="flex-1 relative flex justify-center items-center">
              <div
                ref={workspaceRef}
                className={`relative w-[240px] h-[240px] bg-red-100 rounded-full shadow-xl border-[12px] border-red-500 flex justify-center items-center ${isConveying ? 'conveying-plate' : ''}`}
                style={{ touchAction: 'none' }}
              >
                <div className="absolute w-[180px] h-[180px] rounded-full border-2 border-red-200"></div>
                {items.map(item => renderShape(item))}
              </div>
            </div>

            {resultStatus === 'success' && (
              <div className="absolute inset-0 z-50 flex justify-center items-center pointer-events-none">
                <div className="text-[180px] text-red-500 font-bold drop-shadow-[0_0_15px_rgba(255,255,255,1)] animate-pop-in">
                  ⭕️
                </div>
              </div>
            )}
            {resultStatus === 'fail' && (
              <div className="absolute inset-0 z-50 flex justify-center items-center pointer-events-none bg-black/20">
                <div className="text-[180px] text-blue-500 font-bold drop-shadow-[0_0_15px_rgba(255,255,255,1)] animate-shake-icon">
                  ❌
                </div>
              </div>
            )}

            <div className="absolute bottom-6 right-4 z-10">
              <button
                onClick={submitSushi}
                disabled={isConveying || resultStatus !== null}
                className={`w-24 h-24 rounded-full font-black text-xl shadow-lg border-4 transition-transform active:scale-95 flex flex-col items-center justify-center
                  ${(isConveying || resultStatus !== null)
                    ? 'bg-gray-400 border-gray-500 text-gray-200 cursor-not-allowed'
                    : 'bg-green-500 hover:bg-green-400 border-green-700 text-white'}`}
              >
                <span>レーンに</span>
                <span>流す</span>
              </button>
            </div>
          </main>

          {!isConveying && selectedItemData && resultStatus === null && (
            <div className="bg-white px-4 py-2 border-t border-b border-gray-200 flex flex-wrap gap-4 justify-between items-center z-10 shadow-lg">
              <div className="flex flex-col flex-1 max-w-[150px]">
                <label className="text-xs text-gray-500 font-bold">回転</label>
                <input
                  type="range" min="0" max="360"
                  value={selectedItemData.rotation}
                  onChange={(e) => updateSelectedItem({ rotation: Number(e.target.value) })}
                  className="w-full accent-blue-600"
                />
              </div>
              <div className="flex gap-2">
                <button onClick={() => moveZ('down')} className="p-1 bg-gray-100 rounded-md text-xs text-gray-700"><IconArrowDown /></button>
                <button onClick={() => moveZ('up')} className="p-1 bg-gray-100 rounded-md text-xs text-gray-700"><IconArrowUp /></button>
                <button onClick={deleteSelectedItem} className="p-1 bg-red-100 text-red-600 rounded-md text-xs"><IconTrash /></button>
              </div>
            </div>
          )}

          <div className="bg-gray-100 pb-2 pt-2">
            <footer className={`bg-slate-100 p-3 mx-2 rounded-xl border border-gray-200 overflow-x-auto whitespace-nowrap shadow-lg z-20 ${isConveying || resultStatus !== null ? 'opacity-50 pointer-events-none' : ''}`}>
              <div className="flex gap-2 px-1">
                {INGREDIENTS.map((ing) => (
                  <button
                    key={ing.id}
                    onClick={() => addItem(ing)}
                    className="flex flex-col items-center min-w-[65px] bg-white p-2 rounded-xl shadow-sm border border-gray-200 active:bg-blue-50 active:scale-95 transition-all"
                  >
                    <div className="w-10 h-10 flex items-center justify-center mb-1 relative pointer-events-none">
                      {ing.type === 'emoji' ? (
                        <span className="text-2xl">{ing.emoji}</span>
                      ) : (
                        <div className="scale-[0.35] origin-center absolute top-1/2 left-1/2">
                          {renderShape({ ...ing, baseId: ing.id, x: 0, y: 0, rotation: 0, zIndex: 1, type: ing.type }, true)}
                        </div>
                      )}
                    </div>
                  </button>
                ))}
              </div>
            </footer>
          </div>
        </>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
