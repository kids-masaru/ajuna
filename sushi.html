<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>オーダー回転寿司</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
body {
  margin: 0;
  padding: 0;
  font-family: sans-serif;
  user-select: none;
  touch-action: manipulation;
  overscroll-behavior: none;
  overflow: hidden;
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const INGREDIENTS = [
  { id: 'shari', name: 'シャリ', type: 'css' },
  { id: 'maguro', name: 'マグロ', type: 'css' },
  { id: 'salmon', name: 'サーモン', type: 'css' },
  { id: 'tamago', name: 'たまご', type: 'css' },
  { id: 'ebi', name: 'えび', type: 'emoji', emoji: '🦐' },
  { id: 'ikura', name: 'いくら', type: 'css' },
  { id: 'nori', name: '海苔', type: 'css' },
  { id: 'wasabi', name: 'わさび', type: 'css' },
];

const ORDER_POOL = [
  { requiredCounts: { shari: 1, maguro: 1 }, score: 100 },
  { requiredCounts: { shari: 1, salmon: 1 }, score: 100 },
  { requiredCounts: { shari: 1, tamago: 1 }, score: 100 },
  { requiredCounts: { shari: 1, ebi: 1 }, score: 120 },
  { requiredCounts: { shari: 1, wasabi: 1, maguro: 1 }, score: 150 },
  { requiredCounts: { shari: 1, wasabi: 1, salmon: 1 }, score: 150 },
  { requiredCounts: { shari: 1, tamago: 1, nori: 1 }, score: 180 },
  { requiredCounts: { shari: 1, nori: 1, ikura: 1 }, score: 200 },
  { requiredCounts: { shari: 2, maguro: 2 }, score: 200 },
  { requiredCounts: { shari: 2, salmon: 2 }, score: 200 },
  { requiredCounts: { shari: 2, ebi: 2 }, score: 240 },
  { requiredCounts: { shari: 2, tamago: 2 }, score: 200 },
  { requiredCounts: { shari: 2, maguro: 1, salmon: 1 }, score: 220 },
  { requiredCounts: { shari: 2, wasabi: 2, maguro: 2 }, score: 300 },
  { requiredCounts: { shari: 2, tamago: 2, nori: 2 }, score: 360 },
];

function generatePreviewItems(req) {
  const items = [];
  const kanCount = req.shari || 1;
  const is2 = kanCount >= 2;
  const neta = Object.entries(req).filter(([k]) => !['shari','wasabi','nori'].includes(k));
  const hasWasabi = (req.wasabi || 0) > 0;
  const hasNori = (req.nori || 0) > 0;
  const isGunkan = hasNori && req.ikura;
  let id = 0;
  if (is2) {
    const yOffsets = [-28, 28];
    for (let i = 0; i < 2; i++) {
      const cy = 115 + yOffsets[i];
      let z = i * 10 + 1;
      items.push({ id: `pv${id++}`, baseId: 'shari', type: 'css', x: 120, y: cy + 10, rotation: 0, zIndex: z++ });
      if (hasWasabi) items.push({ id: `pv${id++}`, baseId: 'wasabi', type: 'css', x: 108, y: cy + 5, rotation: 0, zIndex: z++ });
      if (hasNori) items.push({ id: `pv${id++}`, baseId: 'nori', type: 'css', x: 120, y: cy, rotation: 90, zIndex: z++ });
      const n = neta[i] || neta[0];
      if (n) {
        const ing = INGREDIENTS.find(x => x.id === n[0]);
        items.push({ id: `pv${id++}`, baseId: n[0], type: ing?.type || 'css', emoji: ing?.emoji, x: 120, y: isGunkan ? cy - 10 : cy - 5, rotation: 0, zIndex: z++ });
      }
    }
  } else {
    let z = 1;
    items.push({ id: `pv${id++}`, baseId: 'shari', type: 'css', x: 120, y: 130, rotation: 0, zIndex: z++ });
    if (hasWasabi) items.push({ id: `pv${id++}`, baseId: 'wasabi', type: 'css', x: 100, y: 123, rotation: 0, zIndex: z++ });
    if (hasNori && !isGunkan) items.push({ id: `pv${id++}`, baseId: 'nori', type: 'css', x: 120, y: 120, rotation: 90, zIndex: z++ });
    if (isGunkan) {
      items.push({ id: `pv${id++}`, baseId: 'nori', type: 'css', x: 120, y: 120, rotation: 90, zIndex: z++ });
      items.push({ id: `pv${id++}`, baseId: 'ikura', type: 'css', x: 120, y: 100, rotation: 0, zIndex: z++ });
    } else if (neta[0]) {
      const ing = INGREDIENTS.find(x => x.id === neta[0][0]);
      items.push({ id: `pv${id++}`, baseId: neta[0][0], type: ing?.type || 'css', emoji: ing?.emoji, x: 120, y: 110, rotation: 0, zIndex: z++ });
    }
  }
  return items;
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
const IconArrowUp = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 19V5M5 12l7-7 7 7"></path></svg>;
const IconArrowDown = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14M19 12l-7 7-7-7"></path></svg>;

let audioCtx = null;
const initAudio = () => { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); };

const playSound = (type) => {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  const now = audioCtx.currentTime;
  switch (type) {
    case 'put':
      o.type='sine'; o.frequency.setValueAtTime(400,now); o.frequency.exponentialRampToValueAtTime(100,now+0.1);
      g.gain.setValueAtTime(0.5,now); g.gain.exponentialRampToValueAtTime(0.01,now+0.1);
      o.start(now); o.stop(now+0.1); break;
    case 'grab':
      o.type='triangle'; o.frequency.setValueAtTime(300,now); o.frequency.linearRampToValueAtTime(500,now+0.05);
      g.gain.setValueAtTime(0.2,now); g.gain.linearRampToValueAtTime(0.01,now+0.05);
      o.start(now); o.stop(now+0.05); break;
    case 'slide': {
      o.type='sawtooth'; o.frequency.setValueAtTime(150,now); o.frequency.linearRampToValueAtTime(50,now+0.5);
      const f=audioCtx.createBiquadFilter(); f.type='lowpass'; f.frequency.setValueAtTime(1000,now); f.frequency.linearRampToValueAtTime(100,now+0.5);
      o.disconnect(); o.connect(f); f.connect(g);
      g.gain.setValueAtTime(0.3,now); g.gain.linearRampToValueAtTime(0.01,now+0.5);
      o.start(now); o.stop(now+0.5); break;
    }
    case 'success': {
      o.type='sine'; o.frequency.setValueAtTime(659.25,now);
      g.gain.setValueAtTime(0.5,now); g.gain.linearRampToValueAtTime(0.01,now+0.2);
      o.start(now); o.stop(now+0.2);
      const o2=audioCtx.createOscillator(), g2=audioCtx.createGain();
      o2.type='sine'; o2.frequency.setValueAtTime(830.61,now+0.2);
      g2.gain.setValueAtTime(0,now); g2.gain.setValueAtTime(0.5,now+0.2); g2.gain.exponentialRampToValueAtTime(0.01,now+0.6);
      o2.connect(g2); g2.connect(audioCtx.destination); o2.start(now+0.2); o2.stop(now+0.6); break;
    }
    case 'fail': {
      o.type='sawtooth'; o.frequency.setValueAtTime(150,now);
      g.gain.setValueAtTime(0.3,now); g.gain.linearRampToValueAtTime(0.01,now+0.4);
      const of2=audioCtx.createOscillator(); of2.type='square'; of2.frequency.setValueAtTime(160,now);
      of2.connect(g); of2.start(now); of2.stop(now+0.4);
      o.start(now); o.stop(now+0.4); break;
    }
  }
};

const ROUND_COUNT = 8;

function App() {
  const [gameState, setGameState] = useState('title');
  const [orders, setOrders] = useState([]);
  const [currentOrderIndex, setCurrentOrderIndex] = useState(0);
  const [items, setItems] = useState([]);
  const [selectedId, setSelectedId] = useState(null);
  const [maxZ, setMaxZ] = useState(10);
  const [dragInfo, setDragInfo] = useState(null);
  const [score, setScore] = useState(0);
  const [resultStatus, setResultStatus] = useState(null);
  const [isConveying, setIsConveying] = useState(false);

  const workspaceRef = useRef(null);
  const currentOrder = orders[currentOrderIndex];

  const startGame = () => {
    initAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    const shuffled = shuffleArray(ORDER_POOL).slice(0, ROUND_COUNT);
    setOrders(shuffled);
    setGameState('playing');
    setScore(0);
    setCurrentOrderIndex(0);
    resetOrder();
  };

  const resetOrder = () => {
    setItems([]);
    setSelectedId(null);
    setResultStatus(null);
    setIsConveying(false);
  };

  const handlePointerDown = (e, id, item) => {
    if (isConveying || gameState !== 'playing' || resultStatus !== null) return;
    e.stopPropagation();
    e.target.setPointerCapture(e.pointerId);
    initAudio(); playSound('grab');
    setMaxZ(prev => { const nz = prev + 1; setItems(p => p.map(i => i.id === id ? { ...i, zIndex: nz } : i)); return nz; });
    setSelectedId(id);
    setDragInfo({ id, startX: item.x, startY: item.y, pointerX: e.clientX, pointerY: e.clientY });
  };

  const handlePointerMove = (e) => {
    if (!dragInfo) return;
    const dx = e.clientX - dragInfo.pointerX, dy = e.clientY - dragInfo.pointerY;
    setItems(prev => prev.map(i => i.id === dragInfo.id ? { ...i, x: dragInfo.startX + dx, y: dragInfo.startY + dy } : i));
  };

  const handlePointerUp = () => { if (dragInfo) { playSound('put'); setDragInfo(null); } };
  const handleWorkspaceClick = () => { if (!isConveying) setSelectedId(null); };

  const addItem = (baseItem) => {
    if (isConveying || gameState !== 'playing' || resultStatus !== null) return;
    initAudio(); playSound('put');
    const ox = Math.random() * 20 - 10, oy = Math.random() * 20 - 10;
    const newId = `item-${Date.now()}-${Math.floor(Math.random()*1000)}`;
    setMaxZ(prev => {
      const nz = prev + 1;
      const newItem = {
        id: newId, baseId: baseItem.id, type: baseItem.type, emoji: baseItem.emoji,
        x: 100 + ox, y: 100 + oy, rotation: 0, zIndex: nz,
      };
      setItems(p => [...p, newItem]);
      return nz;
    });
    setSelectedId(newId);
  };

  const updateSelectedItem = (changes) => {
    if (!selectedId || isConveying) return;
    setItems(prev => prev.map(i => i.id === selectedId ? { ...i, ...changes } : i));
  };

  const deleteSelectedItem = () => {
    if (!selectedId || isConveying) return;
    playSound('grab'); setItems(prev => prev.filter(i => i.id !== selectedId)); setSelectedId(null);
  };

  const moveZ = (dir) => {
    if (!selectedId || isConveying) return;
    playSound('grab');
    if (dir === 'up') {
      setMaxZ(prev => {
        const nz = prev + 1;
        setItems(p => p.map(i => i.id === selectedId ? { ...i, zIndex: nz } : i));
        return nz;
      });
    } else {
      setItems(prev => prev.map(i => i.id === selectedId ? { ...i, zIndex: Math.max(1, i.zIndex - 1) } : i));
    }
  };

  const clearAllItems = () => {
    if (isConveying || resultStatus !== null) return;
    playSound('grab'); setItems([]); setSelectedId(null);
  };

  const undoLastItem = () => {
    if (isConveying || resultStatus !== null) return;
    playSound('grab');
    setItems(prev => {
      if (prev.length === 0) return prev;
      const removed = prev[prev.length - 1];
      if (selectedId === removed.id) setSelectedId(null);
      return prev.slice(0, -1);
    });
  };

  const isOnPlate = (item) => {
    const dx = item.x - 100, dy = item.y - 100;
    return Math.sqrt(dx * dx + dy * dy) <= 90;
  };

  const submitSushi = () => {
    if (isConveying || resultStatus !== null || !currentOrder) return;
    setSelectedId(null);
    const cc = {};
    items.forEach(item => { if (isOnPlate(item)) cc[item.baseId] = (cc[item.baseId] || 0) + 1; });
    const req = currentOrder.requiredCounts;
    const reqKeys = new Set(Object.keys(req));
    const ccKeys = new Set(Object.keys(cc));
    let ok = reqKeys.size === ccKeys.size;
    if (ok) { for (const k of reqKeys) { if (cc[k] !== req[k]) { ok = false; break; } } }
    if (ok) {
      playSound('success'); setTimeout(() => playSound('slide'), 500);
      setResultStatus('success'); setIsConveying(true);
      setScore(prev => prev + currentOrder.score);
      setTimeout(() => {
        const next = currentOrderIndex + 1;
        if (next >= orders.length) { setGameState('result'); }
        else { setCurrentOrderIndex(next); resetOrder(); }
      }, 2500);
    } else {
      playSound('fail'); setResultStatus('fail');
      setTimeout(() => setResultStatus(null), 1500);
    }
  };

  const renderShape = (item, isPreview = false) => {
    const isSelected = !isPreview && item.id === selectedId;
    const baseClass = "absolute select-none transform-gpu origin-center " + (isConveying || isPreview ? "" : "cursor-grab active:cursor-grabbing");
    const sel = isSelected ? "ring-4 ring-blue-500 ring-offset-2 ring-offset-transparent" : "";
    let content = null;
    if (item.type === 'emoji') {
      content = <div className={`text-6xl drop-shadow-lg ${sel}`}>{item.emoji}</div>;
    } else {
      switch (item.baseId) {
        case 'shari': content = <div className={`w-24 h-12 bg-[#fffff8] rounded-[60px] shadow-md border border-gray-100 ${sel}`} style={{ boxShadow: 'inset -2px -5px 10px rgba(0,0,0,0.05), 2px 5px 5px rgba(0,0,0,0.1)' }}></div>; break;
        case 'maguro': content = <div className={`w-28 h-14 bg-red-600 rounded-[60px] opacity-95 ${sel}`} style={{ boxShadow: 'inset -5px -5px 15px rgba(0,0,0,0.2), inset 2px 2px 5px rgba(255,255,255,0.3)' }}></div>; break;
        case 'salmon': content = (<div className={`w-28 h-14 bg-orange-400 rounded-[60px] opacity-95 overflow-hidden relative ${sel}`} style={{ boxShadow: 'inset -5px -5px 15px rgba(0,0,0,0.1)' }}><div className="w-[150%] h-1 bg-white opacity-40 -rotate-12 absolute -left-2 top-3"></div><div className="w-[150%] h-1 bg-white opacity-40 -rotate-12 absolute -left-2 top-7"></div><div className="w-[150%] h-1 bg-white opacity-40 -rotate-12 absolute -left-2 top-11"></div></div>); break;
        case 'tamago': content = <div className={`w-24 h-12 bg-yellow-400 rounded-md shadow-sm border-b-4 border-yellow-500 ${sel}`}></div>; break;
        case 'nori': content = <div className={`w-6 h-28 bg-[#1a1c18] rounded-sm shadow-md border border-gray-800 ${sel}`} style={{ backgroundImage: 'repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(255,255,255,0.05) 2px, rgba(255,255,255,0.05) 4px)' }}></div>; break;
        case 'ikura': content = (<div className={`w-16 h-10 flex flex-wrap gap-1 justify-center items-center ${sel}`}>{[...Array(6)].map((_,i) => (<div key={i} className="w-4 h-4 bg-orange-500 rounded-full shadow-sm" style={{ boxShadow: 'inset -1px -1px 2px rgba(200,50,0,0.8), inset 1px 1px 1px rgba(255,255,255,0.8)' }}></div>))}</div>); break;
        case 'wasabi': content = <div className={`w-6 h-6 bg-green-500 rounded-[40%] blur-[0.5px] opacity-90 ${sel}`} style={{ boxShadow: 'inset -2px -2px 5px rgba(0,100,0,0.5)' }}></div>; break;
        default: content = <div className="w-10 h-10 bg-gray-500"></div>;
      }
    }
    return (
      <div key={item.id} onPointerDown={isPreview ? undefined : (e) => handlePointerDown(e, item.id, item)} className={baseClass}
        style={{ transform: `translate(${item.x}px, ${item.y}px) rotate(${item.rotation}deg) translate(-50%, -50%)`, zIndex: item.zIndex, touchAction: 'none' }}>
        {content}
      </div>
    );
  };

  const renderIngredientIcon = (baseId) => {
    const ing = INGREDIENTS.find(i => i.id === baseId);
    if (!ing) return null;
    if (ing.type === 'emoji') return <span className="text-lg">{ing.emoji}</span>;
    const colors = { shari: 'bg-[#fffff8] border border-gray-200', maguro: 'bg-red-600', salmon: 'bg-orange-400', tamago: 'bg-yellow-400', nori: 'bg-[#1a1c18]', ikura: 'bg-orange-500', wasabi: 'bg-green-500' };
    const shapes = { nori: 'w-2 h-6 rounded-sm', wasabi: 'w-4 h-4 rounded-full', ikura: 'w-4 h-4 rounded-full' };
    return <div className={`${shapes[baseId] || 'w-7 h-3 rounded-[60px]'} ${colors[baseId] || 'bg-gray-400'}`}></div>;
  };

  const selectedItemData = items.find(i => i.id === selectedId);
  const previewItems = currentOrder ? generatePreviewItems(currentOrder.requiredCounts) : [];

  return (
    <div className="flex flex-col h-[100dvh] w-full bg-[#f0e6d2] overflow-hidden font-sans">
      <style>{`
        @keyframes slideRight { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        .conveying-plate { transition: transform 2s ease-in; transform: translateX(100vw); }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 70% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes shakeIcon { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-15px) rotate(-10deg); } 50% { transform: translateX(15px) rotate(10deg); } 75% { transform: translateX(-15px) rotate(-10deg); } }
        .animate-pop-in { animation: popIn 0.4s ease-out forwards; }
        .animate-shake-icon { animation: shakeIcon 0.5s ease-in-out; }
      `}</style>

      {gameState === 'title' && (
        <div className="absolute inset-0 z-50 flex flex-col items-center justify-center bg-[#2c3e50] text-white p-6">
          <a href="index.html" className="absolute top-4 left-4 w-12 h-12 bg-white/20 backdrop-blur rounded-full flex items-center justify-center text-2xl no-underline shadow-lg border border-white/50" style={{zIndex:100}}>🏠</a>
          <div className="text-8xl mb-6 animate-bounce">🍣</div>
          <h1 className="text-4xl font-black mb-4 text-center tracking-wider text-[#e74c3c]">オーダー回転寿司</h1>
          <button onClick={startGame} className="mt-8 bg-[#e74c3c] hover:bg-[#c0392b] text-white text-2xl font-bold py-4 px-12 rounded-full shadow-[0_6px_0_#962d22] active:shadow-[0_0px_0_#962d22] active:translate-y-[6px] transition-all">スタート</button>
        </div>
      )}

      {gameState === 'result' && (
        <div className="absolute inset-0 z-50 flex flex-col items-center justify-center bg-[#2c3e50] text-white p-6">
          <h2 className="text-4xl font-bold mb-2">営業終了！</h2>
          <p className="text-xl text-gray-300 mb-8">今日のスコア</p>
          <div className="text-6xl font-black text-[#f1c40f] mb-12 drop-shadow-lg">{score}</div>
          <div className="flex gap-4">
            <button onClick={() => window.location.href = 'index.html'} className="bg-gray-500 text-white text-xl font-bold py-3 px-8 rounded-full shadow-[0_4px_0_#374151] active:translate-y-[4px] transition-all">🏠 もどる</button>
            <button onClick={startGame} className="bg-[#3498db] text-white text-xl font-bold py-3 px-8 rounded-full shadow-[0_4px_0_#1f618d] active:translate-y-[4px] transition-all">もういちど</button>
          </div>
        </div>
      )}

      {gameState === 'playing' && currentOrder && (
        <>
          {/* ヘッダー */}
          <header className="bg-slate-800 text-white px-3 py-2 flex justify-between items-center shadow-md z-20 shrink-0">
            <a href="index.html" className="w-9 h-9 bg-white/20 rounded-full flex items-center justify-center text-lg no-underline">🏠</a>
            <div className="font-bold text-lg">スコア: <span className="text-yellow-400">{score}</span></div>
            <div className="text-xs text-gray-400">{currentOrderIndex + 1}/{orders.length}</div>
          </header>

          {/* お手本エリア（横並び：プレビュー左、素材数右） */}
          <div className="bg-white border-b-4 border-red-500 px-3 py-2 z-10 shadow-sm shrink-0">
            <div className="flex items-center gap-3">
              {/* プレビュー画像 */}
              <div className="shrink-0">
                <div className="text-[10px] font-black text-red-600 text-center mb-1 bg-red-100 px-2 py-0.5 rounded-full">お手本</div>
                <div className="relative w-[80px] h-[80px] bg-red-50 rounded-full shadow-inner border-2 border-red-200 overflow-hidden pointer-events-none flex justify-center items-center">
                  <div className="absolute w-[240px] h-[240px] scale-[0.32] origin-center">
                    {previewItems.map(item => renderShape(item, true))}
                  </div>
                </div>
              </div>
              {/* 素材リスト */}
              <div className="flex flex-wrap gap-1.5 flex-1">
                {Object.entries(currentOrder.requiredCounts).map(([baseId, count]) => (
                  <div key={baseId} className="flex items-center bg-gray-50 rounded-full px-2.5 py-1 border border-gray-200 gap-1.5">
                    <div className="w-7 h-7 flex items-center justify-center">{renderIngredientIcon(baseId)}</div>
                    <span className="text-sm font-black text-gray-700">×{count}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* ワークスペース */}
          <main className="flex-1 relative overflow-hidden bg-gray-100 flex flex-col min-h-0"
            onPointerMove={handlePointerMove} onPointerUp={handlePointerUp} onPointerLeave={handlePointerUp} onClick={handleWorkspaceClick}>
            {/* レーン背景 */}
            <div className="absolute top-1/2 left-0 w-full h-16 bg-gray-300 -translate-y-1/2 shadow-inner border-y border-gray-400 flex items-center overflow-hidden">
              <div className="w-[200%] h-full flex items-center" style={{ animation: 'slideRight 10s linear infinite' }}>
                <div className="w-16 h-3 bg-gray-400 mx-8 rounded-full opacity-50"></div>
                <div className="w-16 h-3 bg-gray-400 mx-8 rounded-full opacity-50"></div>
                <div className="w-16 h-3 bg-gray-400 mx-8 rounded-full opacity-50"></div>
                <div className="w-16 h-3 bg-gray-400 mx-8 rounded-full opacity-50"></div>
              </div>
            </div>

            <div className="flex-1 relative flex justify-center items-center">
              <div ref={workspaceRef}
                className={`relative w-[200px] h-[200px] bg-red-100 rounded-full shadow-xl border-[10px] border-red-500 flex justify-center items-center ${isConveying ? 'conveying-plate' : ''}`}
                style={{ touchAction: 'none' }}>
                <div className="absolute w-[150px] h-[150px] rounded-full border-2 border-red-200"></div>
                {items.map(item => renderShape(item))}
                {items.length > 0 && (
                  <div className="absolute -top-2 -left-2 bg-blue-500 text-white text-xs font-black w-6 h-6 rounded-full flex items-center justify-center shadow z-50">{items.filter(isOnPlate).length}</div>
                )}
              </div>
            </div>

            {resultStatus === 'success' && (
              <div className="absolute inset-0 z-50 flex justify-center items-center pointer-events-none">
                <div className="text-[150px] text-red-500 font-bold drop-shadow-[0_0_15px_rgba(255,255,255,1)] animate-pop-in">⭕️</div>
              </div>
            )}
            {resultStatus === 'fail' && (
              <div className="absolute inset-0 z-50 flex justify-center items-center pointer-events-none bg-black/20">
                <div className="text-[150px] text-blue-500 font-bold drop-shadow-[0_0_15px_rgba(255,255,255,1)] animate-shake-icon">❌</div>
              </div>
            )}

            <div className="absolute bottom-2 left-3 z-10 flex gap-2">
              <button onClick={undoLastItem} disabled={isConveying || resultStatus !== null || items.length === 0}
                className={`w-12 h-12 rounded-full font-black text-lg shadow-md border-2 flex items-center justify-center
                  ${(isConveying || resultStatus !== null || items.length === 0) ? 'bg-gray-300 border-gray-400 text-gray-400' : 'bg-yellow-400 border-yellow-600 text-yellow-800 active:scale-95'}`}>↩</button>
              <button onClick={clearAllItems} disabled={isConveying || resultStatus !== null || items.length === 0}
                className={`w-12 h-12 rounded-full font-black text-xs shadow-md border-2 flex items-center justify-center
                  ${(isConveying || resultStatus !== null || items.length === 0) ? 'bg-gray-300 border-gray-400 text-gray-400' : 'bg-red-400 border-red-600 text-white active:scale-95'}`}>全消し</button>
            </div>
            <div className="absolute bottom-2 right-3 z-10">
              <button onClick={submitSushi} disabled={isConveying || resultStatus !== null}
                className={`w-20 h-20 rounded-full font-black text-base shadow-lg border-4 transition-transform active:scale-95 flex flex-col items-center justify-center
                  ${(isConveying || resultStatus !== null) ? 'bg-gray-400 border-gray-500 text-gray-200' : 'bg-green-500 border-green-700 text-white'}`}>
                <span>レーンに</span><span>流す</span>
              </button>
            </div>
          </main>

          {/* コントロールパネル */}
          {!isConveying && selectedItemData && resultStatus === null && (
            <div className="bg-white px-3 py-1.5 border-t border-gray-200 flex gap-3 justify-between items-center z-10 shadow-lg shrink-0">
              <div className="flex flex-col flex-1 max-w-[140px]">
                <label className="text-[10px] text-gray-500 font-bold">回転</label>
                <input type="range" min="0" max="360" value={selectedItemData.rotation}
                  onChange={(e) => updateSelectedItem({ rotation: Number(e.target.value) })} className="w-full accent-blue-600" />
              </div>
              <div className="flex gap-2">
                <button onClick={() => moveZ('down')} className="p-1 bg-gray-100 rounded-md"><IconArrowDown /></button>
                <button onClick={() => moveZ('up')} className="p-1 bg-gray-100 rounded-md"><IconArrowUp /></button>
                <button onClick={deleteSelectedItem} className="p-1 bg-red-100 text-red-600 rounded-md"><IconTrash /></button>
              </div>
            </div>
          )}

          {/* 素材パレット */}
          <div className="bg-gray-200 px-2 py-2 shrink-0" style={{ paddingBottom: 'max(8px, env(safe-area-inset-bottom))' }}>
            <div className={`bg-white p-2 rounded-xl border border-gray-200 overflow-x-auto whitespace-nowrap shadow-lg ${isConveying || resultStatus !== null ? 'opacity-50 pointer-events-none' : ''}`}>
              <div className="flex gap-1.5 px-0.5">
                {INGREDIENTS.map((ing) => (
                  <button key={ing.id} onClick={() => addItem(ing)}
                    className="flex flex-col items-center min-w-[58px] bg-gray-50 p-1.5 rounded-lg shadow-sm border border-gray-200 active:bg-blue-50 active:scale-95 transition-all">
                    <div className="w-9 h-9 flex items-center justify-center relative pointer-events-none">
                      {ing.type === 'emoji' ? <span className="text-xl">{ing.emoji}</span> : (
                        <div className="scale-[0.3] origin-center absolute top-1/2 left-1/2">
                          {renderShape({ ...ing, baseId: ing.id, x: 0, y: 0, rotation: 0, zIndex: 1, type: ing.type }, true)}
                        </div>
                      )}
                    </div>
                    <span className="text-[9px] text-gray-500 font-bold leading-none mt-0.5">{ing.name}</span>
                  </button>
                ))}
              </div>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
