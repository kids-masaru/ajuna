<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>おかいものごっこ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&display=swap');

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            user-select: none;
            touch-action: manipulation;
            overscroll-behavior: none;
            background-color: #0f172a;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .animate-bounce-slow {
            animation: bounce 2s infinite;
        }

        .animate-sway {
            animation: sway 3s ease-in-out infinite;
        }

        @keyframes sway {

            0%,
            100% {
                transform: rotate(-2deg);
            }

            50% {
                transform: rotate(2deg);
            }
        }

        .portrait-warning {
            display: none;
        }

        /* Only show warning if NOT in pre_start and is portrait */
        @media (orientation: portrait) {
            body.game-started .portrait-warning {
                display: flex;
            }

            body.game-started .game-content {
                display: none !important;
            }
        }
    </style>
    <script>
        window.onerror = function (message, source, lineno, colno, error) {
            const root = document.getElementById('root');
            if (root) {
                root.innerHTML = `<div style="color:#f87171;background:#450a0a;padding:20px;"><h2>⚠️ エラー</h2><p>${message}</p></div>`;
            }
        };
    </script>
</head>

<body class="fixed inset-0 overflow-hidden">
    <!-- Portrait Warning Overlay -->
    <div
        class="portrait-warning fixed inset-0 z-[9999] bg-orange-100 flex-col items-center justify-center p-8 text-center animate-in zoom-in">
        <div class="text-8xl mb-8">📱🔄</div>
        <h1 class="text-4xl text-orange-600 font-bold mb-4">スマホを<br>よこにしてね</h1>
        <p class="text-xl text-orange-400">あじゅなのおかいものごっこ</p>
    </div>

    <div id="root" class="w-full h-full game-content"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Icons ---
        const IconBase = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Play = (props) => (<IconBase {...props}><polygon points="5 3 19 12 5 21 5 3" /></IconBase>);
        const Volume2 = (props) => (<IconBase {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" /><path d="M19.07 4.93a10 10 0 0 1 0 14.14" /><path d="M15.54 8.46a5 5 0 0 1 0 7.07" /></IconBase>);
        const VolumeX = (props) => (<IconBase {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" /><line x1="23" x2="17" y1="9" y2="15" /><line x1="17" x2="23" y1="9" y2="15" /></IconBase>);
        const MapIcon = (props) => (<IconBase {...props}><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6" /><line x1="8" x2="8" y1="2" y2="18" /><line x1="16" x2="16" y1="6" y2="22" /></IconBase>); // Changed to Map Icon

        // --- Clipboard Style Shopping List ---
        const ClipboardList = ({ items, foundItems, onSpeak }) => (
            <div className="relative bg-[#fdf6e3] rounded-sm shadow-lg border-2 border-[#d3c6aa] p-2 flex flex-col gap-2 min-h-[140px] w-20 md:w-24">
                {/* Clipboard Top Clip */}
                <div className="absolute -top-3 left-1/2 -translate-x-1/2 w-8 h-4 bg-gray-400 rounded-t-md border-b-2 border-gray-500 flex items-center justify-center z-10">
                    <div className="w-4 h-1 bg-gray-300 rounded-full"></div>
                </div>
                <div className="text-[10px] font-bold text-gray-500 text-center border-b border-gray-300 pb-1 mb-1 mt-1">LIST</div>
                <div className="flex flex-col gap-3">
                    {items.map(item => {
                        const done = foundItems.some(f => f.id === item.id);
                        return (
                            <div
                                key={item.id}
                                onClick={() => onSpeak(item.name)}
                                className={`relative flex flex-col items-center justify-center transition-all ${done ? 'opacity-30' : 'scale-110'}`}
                            >
                                <div className="relative">
                                    <span className="text-3xl md:text-4xl">{item.icon}</span>
                                    {done && (
                                        <div className="absolute inset-0 flex items-center justify-center">
                                            <span className="text-4xl text-green-600 font-bold drop-shadow-md">✓</span>
                                        </div>
                                    )}
                                </div>
                            </div>
                        );
                    })}
                </div>
            </div>
        );

        // --- Wire Mesh Shopping Cart SVG ---
        const WireCart = ({ children, className }) => (
            <div className={`relative ${className}`}>
                <svg viewBox="0 0 120 100" className="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                    {/* Cart Body (Wire Mesh) */}
                    <path d="M20 20 L100 20 L90 70 L30 70 Z" fill="none" stroke="#60a5fa" strokeWidth="2" />
                    {/* Vertical Wires */}
                    <line x1="35" y1="20" x2="40" y2="70" stroke="#60a5fa" strokeWidth="1" />
                    <line x1="50" y1="20" x2="52" y2="70" stroke="#60a5fa" strokeWidth="1" />
                    <line x1="65" y1="20" x2="63" y2="70" stroke="#60a5fa" strokeWidth="1" />
                    <line x1="80" y1="20" x2="75" y2="70" stroke="#60a5fa" strokeWidth="1" />
                    {/* Horizontal Wires */}
                    <line x1="24" y1="35" x2="96" y2="35" stroke="#60a5fa" strokeWidth="1" />
                    <line x1="27" y1="52" x2="93" y2="52" stroke="#60a5fa" strokeWidth="1" />
                    {/* Handle */}
                    <path d="M20 20 L10 20 Q 5 20 5 10 L 5 5" fill="none" stroke="#2563eb" strokeWidth="4" strokeLinecap="round" />
                    {/* Chassis & Wheels */}
                    <line x1="30" y1="70" x2="90" y2="70" stroke="#3b82f6" strokeWidth="4" strokeLinecap="round" />
                    <circle cx="40" cy="85" r="8" fill="#1e293b" />
                    <circle cx="40" cy="85" r="3" fill="#94a3b8" />
                    <circle cx="80" cy="85" r="8" fill="#1e293b" />
                    <circle cx="80" cy="85" r="3" fill="#94a3b8" />
                </svg>
                {/* Content Overlay Container */}
                <div className="absolute top-[20%] left-[20%] right-[10%] bottom-[30%] flex items-center justify-center flex-wrap gap-1 pointer-events-none">
                    {children}
                </div>
            </div>
        );

        // --- Wooden Shelf Component ---
        const ShelfLayer = ({ children }) => (
            <div className="relative w-full h-40 flex flex-col items-center justify-end group">
                {/* The Wooden Board */}
                <div className="absolute inset-x-0 bottom-0 h-6 bg-[#8b4513] rounded shadow-lg z-0 overflow-hidden">
                    {/* Wood Texture Lines */}
                    <div className="absolute top-1 left-0 right-0 h-[1px] bg-white/10"></div>
                    <div className="absolute top-3 left-0 right-0 h-[1px] bg-black/20"></div>
                    <div className="absolute top-4 left-0 right-0 h-[1px] bg-white/5"></div>
                </div>
                {/* Depth Lip */}
                <div className="absolute inset-x-2 bottom-6 h-1 bg-[#654321] rounded-full z-0"></div>
                {/* Items Container */}
                <div className="relative z-10 flex items-end justify-center w-full h-full pb-4 px-2">
                    {children}
                </div>
            </div>
        );

        // --- Half-Body Girl Character ---
        const GirlHalfBody = ({ className }) => (
            <svg viewBox="0 0 100 80" className={className} xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                        <feDropShadow dx="2" dy="2" stdDeviation="2" floodOpacity="0.3" />
                    </filter>
                </defs>
                <g filter="url(#shadow)">
                    {/* Dress/Body */}
                    <path d="M20 80 L80 80 L75 40 L25 40 Z" fill="#f472b6" />
                    {/* Arms */}
                    <path d="M25 45 L10 65 A5 5 0 0 0 15 70 L30 50 Z" fill="#fce5cd" />
                    <path d="M75 45 L90 65 A5 5 0 0 0 85 70 L70 50 Z" fill="#fce5cd" />
                    {/* Head */}
                    <circle cx="50" cy="25" r="22" fill="#1f2937" />
                    <path d="M28 25 A 22 22 0 0 1 72 25 L 75 45 Q 50 40 25 45 Z" fill="#1f2937" />
                </g>
            </svg>
        );

        const SHOPS = [
            { id: 'greengrocer', name: 'やおやさん', icon: '🥕', bg: 'bg-[#f7fee7]', border: 'border-[#bef264]', items: [{ id: 'v1', name: 'にんじん', icon: '🥕' }, { id: 'v2', name: 'じゃがいも', icon: '🥔' }, { id: 'v3', name: 'コーン', icon: '🌽' }, { id: 'v4', name: 'トマト', icon: '🍅' }, { id: 'v5', name: 'なす', icon: '🍆' }, { id: 'v6', name: 'きゅうり', icon: '🥒' }, { id: 'v7', name: 'たまねぎ', icon: '🧅' }, { id: 'v8', name: 'ブロッコリー', icon: '🥦' }, { id: 'v9', name: 'かぼちゃ', icon: '🎃' }, { id: 'v10', name: 'さつまいも', icon: '🍠' }, { id: 'v11', name: 'ぶどう', icon: '🍇' }, { id: 'v12', name: 'メロン', icon: '🍈' }, { id: 'v13', name: 'すいか', icon: '🍉' }, { id: 'v14', name: 'いちご', icon: '🍓' }, { id: 'v15', name: 'もも', icon: '🍑' }, { id: 'v16', name: 'りんご', icon: '🍎' }, { id: 'v17', name: 'キノコ', icon: '🍄' }, { id: 'v18', name: 'さくらんぼ', icon: '🍒' }] },
            { id: 'fish', name: 'おさかなや', icon: '🐟', bg: 'bg-[#f0f9ff]', border: 'border-[#7dd3fc]', items: [{ id: 'f1', name: 'さかな', icon: '🐟' }, { id: 'f2', name: 'たこ', icon: '🐙' }, { id: 'f3', name: 'いか', icon: '🦑' }, { id: 'f4', name: 'えび', icon: '🦐' }, { id: 'f5', name: 'かに', icon: '🦀' }, { id: 'f6', name: 'ふぐ', icon: '🐡' }, { id: 'f7', name: 'かい', icon: '🐚' }, { id: 'f8', name: 'さめ', icon: '🦈' }, { id: 'f9', name: 'くじら', icon: '🐋' }, { id: 'f10', name: 'いるか', icon: '🐬' }, { id: 'f11', name: 'ねったいぎょ', icon: '🐠' }, { id: 'f12', name: 'ロブスター', icon: '🦞' }, { id: 'f13', name: 'ペンギン', icon: '🐧' }, { id: 'f14', name: 'かめ', icon: '🐢' }] },
            { id: 'sweets', name: 'おかしや', icon: '🍬', bg: 'bg-[#fff1f2]', border: 'border-[#fba1b7]', items: [{ id: 's1', name: 'あめ', icon: '🍬' }, { id: 's2', name: 'クッキー', icon: '🍪' }, { id: 's3', name: 'チョコ', icon: '🍫' }, { id: 's4', name: 'ドーナツ', icon: '🍩' }, { id: 's5', name: 'ケーキ', icon: '🍰' }, { id: 's6', name: 'プリン', icon: '🍮' }, { id: 's7', name: 'アイス', icon: '🍦' }, { id: 's8', name: 'だんご', icon: '🍡' }, { id: 's9', name: 'ペロペロキャンディ', icon: '🍭' }, { id: 's10', name: 'かきごおり', icon: '🍧' }, { id: 's11', name: 'はちみつ', icon: '🍯' }, { id: 's12', name: 'ポップコーン', icon: '🍿' }, { id: 's13', name: 'バースデーケーキ', icon: '🎂' }, { id: 's14', name: 'クロワッサン', icon: '🥐' }] },
            { id: 'bakery', name: 'パンやさん', icon: '🍞', bg: 'bg-[#fff7ed]', border: 'border-[#fdba74]', items: [{ id: 'b1', name: 'しょくパン', icon: '🍞' }, { id: 'b2', name: 'クロワッサン', icon: '🥐' }, { id: 'b3', name: 'フランスパン', icon: '🥖' }, { id: 'b4', name: 'ベーグル', icon: '🥯' }, { id: 'b5', name: 'パンケーキ', icon: '🥞' }, { id: 'b6', name: 'ワッフル', icon: 'カートリッジ' }, { id: 'b7', name: 'サンドイッチ', icon: '🥪' }, { id: 'b8', name: 'ホットドッグ', icon: '🌭' }, { id: 'b9', name: 'ピザ', icon: '🍕' }, { id: 'b10', name: 'プレッツェル', icon: '🥨' }] },
            { id: 'toys', name: 'おもちゃや', icon: '🧸', bg: 'bg-[#fefce8]', border: 'border-[#fde047]', items: [{ id: 't1', name: 'くまさん', icon: '🧸' }, { id: 't2', name: 'ロボット', icon: '🤖' }, { id: 't3', name: 'くるま', icon: '🚗' }, { id: 't4', name: 'きしゃ', icon: '🚂' }, { id: 't5', name: 'ボール', icon: '⚽' }, { id: 't6', name: 'ゲーム', icon: '🎮' }, { id: 't7', name: 'パズル', icon: '🧩' }, { id: 't8', name: 'たいこ', icon: '🥁' }, { id: 't9', name: 'きょうりゅう', icon: '🦖' }, { id: 't10', name: 'UFO', icon: '🛸' }, { id: 't11', name: 'しょうぼうしゃ', icon: '🚒' }, { id: 't12', name: 'パトカー', icon: '🚓' }] },
            { id: 'flowers', name: 'おはなや', icon: '💐', bg: 'bg-[#fff1f2]', border: 'border-[#fda4af]', items: [{ id: 'fl1', name: 'はなたば', icon: '💐' }, { id: 'fl2', name: 'バラ', icon: '🌹' }, { id: 'fl3', name: 'ひまわり', icon: '🌻' }, { id: 'fl4', name: 'チューリップ', icon: '🌷' }, { id: 'fl5', name: 'ハイビスカス', icon: '🌺' }, { id: 'fl6', name: 'サクラ', icon: '🌸' }, { id: 'fl7', name: 'マーガレット', icon: '🌼' }, { id: 'fl8', name: 'サボテン', icon: '🌵' }, { id: 'fl9', name: 'ツリー', icon: '🌲' }, { id: 'fl10', name: 'クローバー', icon: '🍀' }, { id: 'fl11', name: 'もみじ', icon: '🍁' }, { id: 'fl12', name: 'おちば', icon: '🍂' }] },
            { id: 'convenience', name: 'コンビニ', icon: '🏪', bg: 'bg-[#f8fafc]', border: 'border-[#cbd5e1]', items: [{ id: 'c1', name: 'おにぎり', icon: '🍙' }, { id: 'c2', name: 'ハンバーガー', icon: '🍔' }, { id: 'c3', name: 'ポテト', icon: '🍟' }, { id: 'c4', name: 'ぎゅうにゅう', icon: '🥛' }, { id: 'c5', name: 'おべんとう', icon: '🍱' }, { id: 'c6', name: 'おちゃ', icon: '🍵' }, { id: 'c7', name: 'バナナ', icon: '🍌' }, { id: 'c8', name: 'ジュース', icon: '🧃' }, { id: 'c9', name: 'たまご', icon: '🥚' }, { id: 'c10', name: 'コーヒー', icon: '☕' }, { id: 'c11', name: 'かさ', icon: '☔' }, { id: 'c12', name: 'しんぶん', icon: '📰' }] }
        ];

        const speak = (text) => {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ja-JP';
            msg.rate = 1.1;
            msg.pitch = 1.4;
            window.speechSynthesis.speak(msg);
        };

        const DragItem = ({ item, x, y }) => (
            <div className="fixed z-[999] pointer-events-none flex flex-col items-center justify-center p-2 bg-white/90 rounded-full shadow-2xl border-4 border-orange-400 w-24 h-24 md:w-32 md:h-32 animate-pulse" style={{ left: x, top: y, transform: 'translate(-50%, -50%)' }}>
                <span className="text-5xl md:text-7xl">{item.icon}</span>
            </div>
        );

        function App() {
            const [gameState, setGameState] = useState('pre_start'); // Changed initial state
            const [currentShop, setCurrentShop] = useState(SHOPS[0]);

            const [targetItems, setTargetItems] = useState([]);
            const [shelfItems, setShelfItems] = useState([]);
            const [foundItems, setFoundItems] = useState([]);

            const [dragState, setDragState] = useState(null);
            const basketRef = useRef(null);

            const [isMuted, setIsMuted] = useState(false);
            const audioCtx = useRef(null);
            const bgmRef = useRef(null);

            const initAudio = () => {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!audioCtx.current && AudioContext) {
                    audioCtx.current = new AudioContext();
                }
                if (audioCtx.current && audioCtx.current.state === 'suspended') {
                    audioCtx.current.resume();
                }
            };

            const playSound = (freq, type) => { /* simplified for brevity */
                if (!audioCtx.current || isMuted) return;
                try {
                    const osc = audioCtx.current.createOscillator();
                    const gain = audioCtx.current.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, audioCtx.current.currentTime);
                    gain.gain.setValueAtTime(0.1, audioCtx.current.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.current.currentTime + 0.2);
                    osc.connect(gain);
                    gain.connect(audioCtx.current.destination);
                    osc.start();
                    osc.stop(audioCtx.current.currentTime + 0.2);
                } catch (e) { }
            };

            const startGame = async () => {
                try {
                    // Attempt Fullscreen and Orientation Lock
                    if (document.documentElement.requestFullscreen) {
                        await document.documentElement.requestFullscreen();
                    } else if (document.documentElement.webkitRequestFullscreen) {
                        await document.documentElement.webkitRequestFullscreen();
                    }
                    if (screen.orientation && screen.orientation.lock) {
                        await screen.orientation.lock('landscape').catch(e => console.log('Lock failed:', e));
                    }
                } catch (e) { console.log('Fullscreen failed:', e); }

                document.body.classList.add('game-started');
                initAudio();
                setGameState('select_shop');
                speak("どこのおみせにいく？");
            };

            const startBGM = () => { if (bgmRef.current && !isMuted) { bgmRef.current.volume = 0.3; bgmRef.current.play().catch(e => { }); } };
            const stopBGM = () => { if (bgmRef.current) { bgmRef.current.pause(); bgmRef.current.currentTime = 0; } };

            useEffect(() => {
                if (bgmRef.current) bgmRef.current.muted = isMuted;
                if (gameState === 'playing' && !isMuted) startBGM();
                else if (isMuted) { }
            }, [isMuted, gameState]);

            useEffect(() => { if (gameState === 'playing') startBGM(); else stopBGM(); }, [gameState]);

            const startShopping = (shop) => {
                initAudio();
                const pool = [...shop.items, ...shop.items, ...shop.items].sort(() => 0.5 - Math.random());
                const shelfContent = pool.slice(0, 20).map((item, idx) => ({ ...item, uniqueId: `${item.id}-${idx}` }));
                const uniqueItemsOnShelf = [...new Set(shelfContent.map(i => i.id))].map(id => shop.items.find(i => i.id === id));
                const shuffledUnique = uniqueItemsOnShelf.sort(() => 0.5 - Math.random());
                const targetCount = 3 + Math.floor(Math.random() * 2); // 3-4 items max for easier list
                const targets = shuffledUnique.slice(0, targetCount);

                setCurrentShop(shop);
                setShelfItems(shelfContent);
                setTargetItems(targets);
                setFoundItems([]);
                setGameState('playing');
                speak(`${shop.name}！`);
                playSound(880, 'sine');
            };

            const handleDropInBasket = (item) => {
                if (foundItems.some(f => f.id === item.id)) { speak("それはもうかったよ！"); return; }
                const isCorrect = targetItems.some(t => t.id === item.id);
                if (isCorrect) {
                    const newFound = [...foundItems, item];
                    setFoundItems(newFound);
                    playSound(1046, 'sine');
                    speak(`${item.name}、オッケー！`);
                    if (newFound.length === targetItems.length) {
                        setGameState('result');
                        speak("やったー！ぜんぶかえたね！");
                    }
                } else {
                    playSound(200, 'triangle');
                    speak("ちがうよ〜");
                }
            };

            // Pointer Event Handlers (Same as before)
            const handlePointerDown = (e, item) => {
                if (e.button && e.button !== 0) return;
                e.currentTarget.setPointerCapture(e.pointerId);
                const c = e.touches ? e.touches[0] : e;
                setDragState({ item, x: c.clientX, y: c.clientY, pointerId: e.pointerId });
                playSound(440, 'sine');
            };
            const handlePointerMove = (e) => {
                if (!dragState) return;
                e.preventDefault();
                const c = e.touches ? e.touches[0] : e;
                setDragState(prev => ({ ...prev, x: c.clientX, y: c.clientY }));
            };
            const handlePointerUp = (e) => {
                if (!dragState) return;
                const c = e.changedTouches ? e.changedTouches[0] : e;
                if (basketRef.current) {
                    const rect = basketRef.current.getBoundingClientRect();
                    if (c.clientX >= rect.left && c.clientX <= rect.right && c.clientY >= rect.top && c.clientY <= rect.bottom) {
                        handleDropInBasket(dragState.item);
                    }
                }
                setDragState(null);
            };

            return (
                <div
                    className="fixed inset-0 bg-slate-900 overflow-hidden font-sans select-none touch-none text-gray-800"
                    onPointerMove={handlePointerMove}
                    onPointerUp={handlePointerUp}
                    onPointerCancel={() => setDragState(null)}
                >
                    <audio ref={bgmRef} src="./ajunano_okaimono.mp3" loop />
                    {dragState && <DragItem item={dragState.item} x={dragState.x} y={dragState.y} />}

                    {/* Pre-Start Screen with Orientation Lock Trigger */}
                    {gameState === 'pre_start' && (
                        <div className="w-full h-full bg-orange-50 flex items-center justify-center">
                            <button onClick={startGame} className="bg-orange-500 text-white text-3xl font-bold py-8 px-16 rounded-[3rem] shadow-[0_10px_0_rgb(180,60,20)] active:translate-y-2 active:shadow-[0_2px_0_rgb(180,60,20)] transition-all animate-bounce-slow">
                                はじめる！ ▶
                            </button>
                        </div>
                    )}

                    {/* ALWAYS Visible Home */}
                    {gameState !== 'pre_start' && (
                        <a href="index.html" className="fixed top-4 left-4 z-[110] bg-zinc-100 p-2 rounded-full border-2 border-zinc-300 w-12 h-12 flex items-center justify-center shadow-md active:scale-95 no-underline text-2xl" title="ホーム">🏠</a>
                    )}

                    {/* Scene Specific UI */}
                    {gameState === 'playing' && (
                        <button
                            onClick={() => { setGameState('select_shop'); stopBGM(); }}
                            className="fixed top-4 left-20 z-[110] bg-blue-100 p-2 rounded-full border-2 border-blue-300 w-12 h-12 flex items-center justify-center shadow-md active:scale-95 transition-all"
                            title="おみせをでる"
                        >
                            <MapIcon size={24} className="text-blue-600" />
                        </button>
                    )}

                    {gameState !== 'pre_start' && (
                        <button onClick={() => setIsMuted(!isMuted)} className="fixed top-4 right-4 z-[110] bg-white/20 p-2 rounded-full text-white backdrop-blur-md">
                            {isMuted ? <VolumeX size={20} /> : <Volume2 size={20} />}
                        </button>
                    )}

                    {/* Shop Select: Horizontal Scroll / Optimized for Landscape */}
                    {gameState === 'select_shop' && (
                        <div className="w-full h-full bg-orange-50 flex flex-col p-4 items-center justify-center">
                            <h2 className="text-2xl font-bold text-orange-600 mb-4 shrink-0">どこの おみせに いく？</h2>
                            {/* Horizontal Scroll Container */}
                            <div className="w-full flex-1 flex items-center overflow-x-auto gap-6 px-8 no-scrollbar snap-x">
                                {SHOPS.map(shop => (
                                    <button key={shop.id} onClick={() => startShopping(shop)} className={`shrink-0 w-40 h-40 md:w-56 md:h-56 flex flex-col items-center justify-center p-2 ${shop.bg} rounded-[2rem] border-4 ${shop.border} shadow-lg active:scale-95 scroll-ml-6 snap-center`}>
                                        <span className="text-6xl md:text-8xl mb-2">{shop.icon}</span>
                                        <span className="text-xl md:text-2xl font-bold text-gray-700">{shop.name}</span>
                                    </button>
                                ))}
                                <div className="w-4 shrink-0"></div>
                            </div>
                        </div>
                    )}

                    {gameState === 'playing' || gameState === 'result' ? (
                        <div className={`relative w-full h-full flex flex-col ${currentShop.bg}`}>

                            {/* Clipboard Shopping List (Sidebar) */}
                            <div className="absolute top-24 left-2 z-30 pointer-events-auto">
                                <ClipboardList items={targetItems} foundItems={foundItems} onSpeak={speak} />
                            </div>

                            {/* Shelves Layout */}
                            <div className="flex-1 overflow-x-auto overflow-y-hidden flex items-center pb-32 no-scrollbar scroll-smooth">
                                <div className="min-w-[8rem] h-full shrink-0"></div>
                                <div className="flex flex-nowrap gap-8 h-full items-center">
                                    {/* Chunk results into shelf rows (e.g. 5 items per shelf row segment) */}
                                    {[0, 5, 10, 15].map(startIdx => (
                                        <div key={startIdx} className="flex flex-col gap-8 w-[500px] shrink-0">
                                            <ShelfLayer>
                                                {shelfItems.slice(startIdx, startIdx + 5).map(item => {
                                                    const isCollected = foundItems.some(f => f.id === item.id);
                                                    return (
                                                        <div key={item.uniqueId} className="w-24 h-24 flex flex-col items-center justify-end shrink-0">
                                                            {!isCollected && (
                                                                <div
                                                                    className="flex flex-col items-center cursor-grab active:cursor-grabbing transform transition-transform hover:scale-110"
                                                                    onPointerDown={(e) => handlePointerDown(e, item)}
                                                                >
                                                                    <span className="text-5xl md:text-6xl drop-shadow-md">{item.icon}</span>
                                                                    <span className="bg-white/90 px-1.5 py-0.5 rounded-full text-[10px] font-bold mt-1 shadow-sm border border-orange-100">{item.name}</span>
                                                                </div>
                                                            )}
                                                        </div>
                                                    );
                                                })}
                                            </ShelfLayer>
                                        </div>
                                    ))}
                                </div>
                                <div className="min-w-[8rem] h-full shrink-0"></div>
                            </div>

                            {/* Basket & Character Side-by-Side */}
                            <div ref={basketRef} className="absolute bottom-0 left-0 right-0 h-32 z-40 flex items-end justify-center pointer-events-none gap-4">
                                <div className="w-full max-w-2xl flex items-end justify-center px-4 pb-2">
                                    {/* Character */}
                                    <div className="shrink-0 animate-sway">
                                        <GirlHalfBody className="w-24 h-24 drop-shadow-lg" />
                                    </div>
                                    {/* Wire Cart */}
                                    <WireCart className="w-48 h-40 -ml-4">
                                        {foundItems.map((item, idx) => (
                                            <span key={idx} className="text-3xl animate-in zoom-in slide-in-from-top-4 duration-300 drop-shadow-md">{item.icon}</span>
                                        ))}
                                    </WireCart>
                                </div>
                            </div>

                            {/* Result */}
                            {gameState === 'result' && (
                                <div className="absolute inset-0 z-[100] bg-black/50 backdrop-blur-sm flex items-center justify-center p-4">
                                    <div className="bg-white rounded-[2rem] p-6 shadow-2xl border-8 border-yellow-400 text-center animate-in zoom-in">
                                        <div className="text-8xl mb-2 animate-bounce">💮</div>
                                        <h2 className="text-3xl font-bold text-orange-500">じょうず！</h2>
                                        <div className="flex gap-4 mt-6 justify-center">
                                            <button onClick={() => startShopping(currentShop)} className="bg-green-500 text-white text-lg font-bold py-3 px-6 rounded-full shadow-lg pointer-events-auto">もういっかい</button>
                                            <button onClick={() => setGameState('select_shop')} className="bg-orange-100 text-orange-600 text-lg font-bold py-3 px-6 rounded-full pointer-events-auto">おみせへ</button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    ) : null}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
