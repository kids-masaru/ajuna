<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>おかいものごっこ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&display=swap');

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            user-select: none;
            touch-action: manipulation;
            /* Important for custom drag handling */
            overscroll-behavior: none;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }

        .animate-bounce-slow {
            animation: bounce 2s infinite;
        }
    </style>
    <script>
        // Global Error Handler
        window.onerror = function (message, source, lineno, colno, error) {
            const root = document.getElementById('root');
            if (root) {
                root.innerHTML = `
                    <div style="color: #f87171; background: #450a0a; padding: 20px; font-family: monospace; height: 100vh; overflow: auto; white-space: pre-wrap;">
                        <h2 style="font-size: 1.5em; margin-bottom: 10px;">⚠️ エラーが発生しました</h2>
                        <p>${message}</p>
                        <p style="opacity: 0.7; font-size: 0.8em;">${source}:${lineno}:${colno}</p>
                    </div>
                `;
            }
        };
    </script>
</head>

<body class="bg-slate-900 overflow-hidden fixed inset-0">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Icons ---
        const IconBase = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const ShoppingBag = (props) => (
            <IconBase {...props}><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" /><path d="M3 6h18" /><path d="M16 10a4 4 0 0 1-8 0" /></IconBase>
        );
        const Star = (props) => (
            <IconBase {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></IconBase>
        );
        const RefreshCw = (props) => (
            <IconBase {...props}><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" /><path d="M21 3v5h-5" /><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" /><path d="M8 21H3v-5" /></IconBase>
        );
        const Play = (props) => (
            <IconBase {...props}><polygon points="5 3 19 12 5 21 5 3" /></IconBase>
        );
        const Home = (props) => (
            <IconBase {...props}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></IconBase>
        );
        const Volume2 = (props) => (
            <IconBase {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" /><path d="M19.07 4.93a10 10 0 0 1 0 14.14" /><path d="M15.54 8.46a5 5 0 0 1 0 7.07" /></IconBase>
        );
        const VolumeX = (props) => (
            <IconBase {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" /><line x1="23" x2="17" y1="9" y2="15" /><line x1="17" x2="23" y1="9" y2="15" /></IconBase>
        );

        const SHOPS = [
            {
                id: 'greengrocer', name: 'やおやさん', icon: '🥕', bg: 'bg-green-50', accent: 'bg-green-500', border: 'border-green-300',
                melody: [440, 493, 523, 587],
                items: [
                    { id: 'v1', name: 'にんじん', icon: '🥕' }, { id: 'v2', name: 'じゃがいも', icon: '🥔' },
                    { id: 'v3', name: 'コーン', icon: '🌽' }, { id: 'v4', name: 'トマト', icon: '🍅' },
                    { id: 'v5', name: 'なす', icon: '🍆' }, { id: 'v6', name: 'きゅうり', icon: '🥒' },
                    { id: 'v7', name: 'たまねぎ', icon: '🧅' }, { id: 'v8', name: 'ブロッコリー', icon: '🥦' },
                    { id: 'v9', name: 'かぼちゃ', icon: '🎃' }, { id: 'v10', name: 'さつまいも', icon: '🍠' },
                    { id: 'v11', name: 'ぶどう', icon: '🍇' }, { id: 'v12', name: 'メロン', icon: '🍈' },
                    { id: 'v13', name: 'すいか', icon: '🍉' }, { id: 'v14', name: 'いちご', icon: '🍓' },
                    { id: 'v15', name: 'もも', icon: '🍑' }, { id: 'v16', name: 'りんご', icon: '🍎' },
                    { id: 'v17', name: 'キノコ', icon: '🍄' }, { id: 'v18', name: 'さくらんぼ', icon: '🍒' }
                ]
            },
            {
                id: 'fish', name: 'おさかなやさん', icon: '🐟', bg: 'bg-blue-50', accent: 'bg-blue-500', border: 'border-blue-300',
                melody: [330, 392, 440, 523],
                items: [
                    { id: 'f1', name: 'さかな', icon: '🐟' }, { id: 'f2', name: 'たこ', icon: '🐙' },
                    { id: 'f3', name: 'いか', icon: '🦑' }, { id: 'f4', name: 'えび', icon: '🦐' },
                    { id: 'f5', name: 'かに', icon: '🦀' }, { id: 'f6', name: 'ふぐ', icon: '🐡' },
                    { id: 'f7', name: 'かい', icon: '🐚' }, { id: 'f8', name: 'さめ', icon: '🦈' },
                    { id: 'f9', name: 'くじら', icon: '🐋' }, { id: 'f10', name: 'いるか', icon: '🐬' },
                    { id: 'f11', name: 'ねったいぎょ', icon: '🐠' }, { id: 'f12', name: 'ロブスター', icon: '🦞' },
                    { id: 'f13', name: 'ペンギン', icon: '🐧' }, { id: 'f14', name: 'かめ', icon: '🐢' }
                ]
            },
            {
                id: 'sweets', name: 'おかしやさん', icon: '🍬', bg: 'bg-pink-50', accent: 'bg-pink-500', border: 'border-pink-300',
                melody: [523, 659, 783, 1046],
                items: [
                    { id: 's1', name: 'あめ', icon: '🍬' }, { id: 's2', name: 'クッキー', icon: '🍪' },
                    { id: 's3', name: 'チョコ', icon: '🍫' }, { id: 's4', name: 'ドーナツ', icon: '🍩' },
                    { id: 's5', name: 'ケーキ', icon: '🍰' }, { id: 's6', name: 'プリン', icon: '🍮' },
                    { id: 's7', name: 'アイス', icon: '🍦' }, { id: 's8', name: 'だんご', icon: '🍡' },
                    { id: 's9', name: 'ペロペロキャンディ', icon: '🍭' }, { id: 's10', name: 'かきごおり', icon: '🍧' },
                    { id: 's11', name: 'はちみつ', icon: '🍯' }, { id: 's12', name: 'ポップコーン', icon: '🍿' },
                    { id: 's13', name: 'バースデーケーキ', icon: '🎂' }, { id: 's14', name: 'クロワッサン', icon: '🥐' }
                ]
            },
            {
                id: 'convenience', name: 'コンビニ', icon: '🏪', bg: 'bg-slate-50', accent: 'bg-slate-600', border: 'border-slate-300',
                melody: [440, 554, 659, 880],
                items: [
                    { id: 'c1', name: 'おにぎり', icon: '🍙' }, { id: 'c2', name: 'パン', icon: '🍞' },
                    { id: 'c3', name: 'たまご', icon: '🥚' }, { id: 'c4', name: 'ぎゅうにゅう', icon: '🥛' },
                    { id: 'c5', name: 'おべんとう', icon: '🍱' }, { id: 'c6', name: 'おちゃ', icon: '🍵' },
                    { id: 'c7', name: 'バナナ', icon: '🍌' }, { id: 'c8', name: 'サンドイッチ', icon: '🥪' },
                    { id: 'c9', name: 'ハンバーガー', icon: '🍔' }, { id: 'c10', name: 'ポテト', icon: '🍟' },
                    { id: 'c11', name: 'ホットドッグ', icon: '🌭' }, { id: 'c12', name: 'ピザ', icon: '🍕' },
                    { id: 'c13', name: 'ジュース', icon: '🧃' }, { id: 'c14', name: 'コーヒー', icon: '☕' },
                    { id: 'c15', name: 'かさ', icon: '☔' }, { id: 'c16', name: 'しんぶん', icon: '📰' }
                ]
            }
        ];

        const speak = (text) => {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ja-JP';
            msg.rate = 1.1;
            msg.pitch = 1.4;
            window.speechSynthesis.speak(msg);
        };

        // --- Drag & Drop Interfaces ---
        const DragItem = ({ item, x, y }) => (
            <div
                className="fixed z-[999] pointer-events-none flex flex-col items-center justify-center p-2 bg-white/90 rounded-full shadow-2xl border-4 border-orange-400 w-24 h-24 md:w-32 md:h-32 animate-pulse"
                style={{ left: x, top: y, transform: 'translate(-50%, -50%)' }}
            >
                <span className="text-5xl md:text-7xl">{item.icon}</span>
            </div>
        );

        function App() {
            const [gameState, setGameState] = useState('start');
            const [currentShop, setCurrentShop] = useState(SHOPS[0]);

            const [targetItems, setTargetItems] = useState([]);
            const [shelfItems, setShelfItems] = useState([]);
            const [foundItems, setFoundItems] = useState([]);

            const [dragState, setDragState] = useState(null);
            const basketRef = useRef(null);

            const [isMuted, setIsMuted] = useState(false);
            const audioCtx = useRef(null);
            const bgmInterval = useRef(null);

            const initAudio = () => {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!audioCtx.current && AudioContext) {
                    audioCtx.current = new AudioContext();
                }
                if (audioCtx.current && audioCtx.current.state === 'suspended') {
                    audioCtx.current.resume();
                }
            };

            const playSound = (freq, type = 'sine', duration = 0.2, volume = 0.1) => {
                if (!audioCtx.current || isMuted) return;
                try {
                    const osc = audioCtx.current.createOscillator();
                    const gain = audioCtx.current.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, audioCtx.current.currentTime);
                    gain.gain.setValueAtTime(volume, audioCtx.current.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.current.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.current.destination);
                    osc.start();
                    osc.stop(audioCtx.current.currentTime + duration);
                } catch (e) { }
            };

            const playCorrectSound = () => {
                playSound(523, 'sine', 0.1);
                setTimeout(() => playSound(1046, 'sine', 0.3), 100);
            };

            const playWrongSound = () => {
                playSound(200, 'triangle', 0.3, 0.2);
                playSound(150, 'triangle', 0.3, 0.2);
            };

            const startBGM = (shop) => {
                if (bgmInterval.current) clearInterval(bgmInterval.current);
                if (isMuted) return;
                let step = 0;
                bgmInterval.current = setInterval(() => {
                    if (!isMuted && audioCtx.current) {
                        try {
                            const freq = shop.melody[step % shop.melody.length];
                            const osc = audioCtx.current.createOscillator();
                            const gain = audioCtx.current.createGain();
                            osc.type = 'triangle';
                            osc.frequency.setValueAtTime(freq, audioCtx.current.currentTime);
                            gain.gain.setValueAtTime(0.03, audioCtx.current.currentTime);
                            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.current.currentTime + 0.5);
                            osc.connect(gain);
                            gain.connect(audioCtx.current.destination);
                            osc.start();
                            osc.stop(audioCtx.current.currentTime + 0.5);
                            step++;
                        } catch (e) { }
                    }
                }, 600);
            };

            const stopBGM = () => {
                if (bgmInterval.current) clearInterval(bgmInterval.current);
            };

            useEffect(() => {
                if (gameState === 'playing') startBGM(currentShop);
                else stopBGM();
                return () => stopBGM();
            }, [gameState, currentShop, isMuted]);

            const startShopping = (shop) => {
                initAudio();
                // Shelf logic: Repeat items to make shelf long / scrollable
                const pool = [...shop.items, ...shop.items, ...shop.items].sort(() => 0.5 - Math.random());
                const shelfContent = pool.slice(0, 16).map((item, idx) => ({ ...item, uniqueId: `${item.id}-${idx}` }));

                const uniqueItemsOnShelf = [...new Set(shelfContent.map(i => i.id))].map(id => shop.items.find(i => i.id === id));
                const shuffledUnique = uniqueItemsOnShelf.sort(() => 0.5 - Math.random());
                const targetCount = Math.min(uniqueItemsOnShelf.length, Math.floor(Math.random() * 3) + 3);
                const targets = shuffledUnique.slice(0, targetCount);

                setCurrentShop(shop);
                setShelfItems(shelfContent);
                setTargetItems(targets);
                setFoundItems([]);
                setGameState('playing');
                speak(`${shop.name}にきました！おかいものリストのものを、カゴにいれてね！`);
                playSound(880, 'sine', 0.2);
            };

            const checkResult = (newFound) => {
                if (newFound.length === targetItems.length) {
                    setGameState('result');
                    speak("すごーい！ぜんぶかえたよ！おかいものめいじん！");
                }
            };

            const handleInitialStart = () => {
                initAudio();
                speak("どこのおみせにいく？");
                setGameState('select_shop');
                playSound(1046, 'sine', 0.2);
            };

            const handlePointerDown = (e, item) => {
                // Ignore touches on non-primary buttons if mouse
                if (e.button && e.button !== 0) return;

                // Important: Don't prevent default immediately if we want to allow scrolling via swipe on background
                // BUT if we want to drag item, we must capture it.
                // Strategy: If touching an item, assume drag.

                // e.currentTarget.setPointerCapture(e.pointerId); // React handles synthetic events, this might be tricky with re-rendering ghost

                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                setDragState({ item, x: clientX, y: clientY });
                playSound(440, 'sine', 0.1);
            };

            const handlePointerMove = (e) => {
                if (!dragState) return;
                e.preventDefault(); // Stop scrolling while dragging item
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                setDragState(prev => ({ ...prev, x: clientX, y: clientY }));
            };

            const handlePointerUp = (e) => {
                if (!dragState) return;

                const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
                const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;

                if (basketRef.current) {
                    const rect = basketRef.current.getBoundingClientRect();
                    const isInBasket =
                        clientX >= rect.left &&
                        clientX <= rect.right &&
                        clientY >= rect.top &&
                        clientY <= rect.bottom;

                    if (isInBasket) {
                        handleDropInBasket(dragState.item);
                    }
                }
                setDragState(null);
            };

            const handleDropInBasket = (item) => {
                if (foundItems.some(f => f.id === item.id)) {
                    speak("それはもうかったよ！");
                    return;
                }

                const isCorrect = targetItems.some(t => t.id === item.id);
                if (isCorrect) {
                    const newFound = [...foundItems, item];
                    setFoundItems(newFound);
                    playCorrectSound();
                    speak(`${item.name}、ゲット！`);
                    checkResult(newFound);
                } else {
                    playWrongSound();
                    speak("あれ？ちがうよ〜？");
                }
            };

            return (
                <div
                    className="fixed inset-0 bg-slate-900 overflow-hidden font-sans select-none touch-none"
                    onPointerMove={handlePointerMove}
                    onPointerUp={handlePointerUp}
                    onPointerCancel={() => setDragState(null)}
                >
                    {dragState && <DragItem item={dragState.item} x={dragState.x} y={dragState.y} />}

                    <a href="index.html" className="fixed top-4 left-4 z-[110] bg-white/90 backdrop-blur-sm p-2 rounded-full shadow-lg border-2 border-pink-100 text-xl flex items-center justify-center w-12 h-12 active:scale-90 no-underline" title="ホームへ">🏠</a>
                    <button onClick={() => setIsMuted(!isMuted)} className="fixed top-4 right-4 z-[110] bg-white/20 p-3 rounded-full text-white backdrop-blur-md hover:bg-white/30 transition-colors shadow-lg">
                        {isMuted ? <VolumeX size={24} /> : <Volume2 size={24} />}
                    </button>

                    {/* SCENE: Start */}
                    {gameState === 'start' && (
                        <div className="w-full h-full bg-white flex flex-col items-center justify-center p-4">
                            <div className="bg-orange-50 p-6 md:p-10 rounded-[3rem] border-8 border-orange-200 text-center shadow-2xl animate-in zoom-in duration-300 relative max-w-lg w-full">
                                <h1 className="text-4xl md:text-5xl font-bold text-orange-600 mb-8">おかいもの<br />ごっこ</h1>
                                <button onClick={handleInitialStart} className="w-32 h-32 md:w-44 md:h-44 bg-orange-500 rounded-full shadow-[0_8px_0_rgb(180,60,20)] items-center justify-center mx-auto flex active:translate-y-2 transition-all">
                                    <Play className="text-white ml-2 w-16 h-16 md:w-24 md:h-24" fill="white" />
                                </button>
                            </div>
                        </div>
                    )}

                    {/* SCENE: Shop Select */}
                    {gameState === 'select_shop' && (
                        <div className="w-full h-full bg-orange-50 flex flex-col p-4 items-center justify-center">
                            <h2 className="text-2xl md:text-3xl font-bold text-orange-600 mb-6">どこの おみせに いく？</h2>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                {SHOPS.map(shop => (
                                    <button key={shop.id} onClick={() => startShopping(shop)} className={`aspect-square flex flex-col items-center justify-center p-4 ${shop.bg} rounded-[2rem] border-4 ${shop.border} shadow-lg active:scale-95`}>
                                        <span className="text-6xl mb-2">{shop.icon}</span>
                                        <span className="text-xl font-bold text-gray-700">{shop.name}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* SCENE: Shopping Game */}
                    {(gameState === 'playing' || gameState === 'result') && (
                        <div className={`relative w-full h-full flex flex-col ${currentShop.bg} transition-all duration-500`}>

                            {/* Top Bar: Shopping List */}
                            <div className="h-24 md:h-32 bg-white/90 backdrop-blur-sm border-b-4 border-orange-200 flex items-center px-4 gap-4 z-50 shadow-md shrink-0 overflow-x-auto">
                                <span className="bg-orange-100 text-orange-600 font-bold px-3 py-1 rounded-full whitespace-nowrap">かうもの</span>
                                {targetItems.map(item => {
                                    const done = foundItems.some(f => f.id === item.id);
                                    return (
                                        <div key={item.id} className={`flex flex-col items-center justify-center min-w-[4rem] p-1 rounded-lg transition-all ${done ? 'opacity-30 grayscale' : 'animate-bounce-slow'}`}>
                                            <span className="text-3xl md:text-4xl">{item.icon}</span>
                                            <span className="text-xs font-bold text-gray-600">{item.name}</span>
                                            {done && <span className="absolute text-4xl text-green-500 font-bold">✓</span>}
                                        </div>
                                    );
                                })}
                                <div className="ml-auto">
                                    <button onClick={() => { setGameState('select_shop'); stopBGM(); }} className="bg-gray-100 text-gray-500 text-sm font-bold px-4 py-2 rounded-full whitespace-nowrap">
                                        もどる
                                    </button>
                                </div>
                            </div>

                            {/* Middle: Scrolling Shelves */}
                            <div className="flex-1 overflow-x-auto overflow-y-hidden flex items-end pb-8 no-scrollbar scroll-smooth" style={{ WebkitOverflowScrolling: 'touch' }}>
                                <div className="flex px-10 h-3/4 items-end gap-0 min-w-max">
                                    {shelfItems.map((item, idx) => {
                                        const isCollected = foundItems.some(f => f.id === item.id);
                                        return (
                                            <div key={item.uniqueId} className="relative w-32 md:w-48 h-full flex flex-col justify-end group">
                                                {/* Shelf Board */}
                                                <div className="absolute bottom-4 left-0 right-0 h-4 bg-amber-800 rounded shadow-md z-0"></div>
                                                <div className="absolute bottom-0 left-2 right-2 h-full bg-amber-100/50 -z-10 border-x-2 border-amber-200"></div>

                                                {/* Item On Shelf */}
                                                {!isCollected && (
                                                    <div
                                                        className="relative z-10 flex flex-col items-center mb-6 cursor-grab active:cursor-grabbing transition-transform hover:scale-110"
                                                        onPointerDown={(e) => handlePointerDown(e, item)}
                                                    >
                                                        <span className="text-6xl md:text-8xl drop-shadow-lg">{item.icon}</span>
                                                        <span className="bg-white/80 px-2 py-1 rounded-full text-xs font-bold mt-1 shadow-sm">{item.name}</span>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                    <div className="w-48"></div>
                                </div>
                            </div>

                            {/* Bottom: Basket Area */}
                            <div
                                ref={basketRef}
                                className={`h-32 md:h-48 z-40 flex items-center justify-center shrink-0 transition-all duration-300
                                ${dragState ? 'bg-orange-200/50 scale-105' : 'bg-transparent'}`}
                            >
                                <div className="relative w-full max-w-lg h-full mx-auto flex items-end justify-center pb-4">
                                    <div className="absolute bottom-0 w-64 md:w-96 h-24 md:h-32 bg-red-500 rounded-b-[3rem] rounded-t-lg shadow-2xl flex items-center justify-center border-4 border-red-700">
                                        <span className="text-white font-bold text-xl opacity-80">ここに入れる</span>
                                    </div>
                                    <div className="absolute bottom-20 md:bottom-28 w-72 md:w-[28rem] h-8 bg-red-700/50 rounded-full blur-xl"></div>
                                    <ShoppingBag size={80} className="text-white/20 absolute bottom-6" />

                                    <div className="absolute bottom-6 flex gap-[-10px] justify-center w-full px-10 flex-wrap pointer-events-none">
                                        {foundItems.map((item, idx) => (
                                            <span key={idx} className="text-4xl md:text-5xl animate-in zoom-in slide-in-from-top-10 duration-500" style={{ animationDelay: `${idx * 100}ms` }}>
                                                {item.icon}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* Result Overlay */}
                            {gameState === 'result' && (
                                <div className="absolute inset-0 z-[100] bg-black/50 backdrop-blur-sm flex items-center justify-center p-4">
                                    <div className="bg-white rounded-[3rem] p-8 shadow-2xl border-8 border-yellow-400 text-center animate-in zoom-in duration-300">
                                        <div className="text-8xl mb-4 animate-bounce">💮</div>
                                        <h2 className="text-4xl font-bold text-orange-500 mb-2">じょうず！</h2>
                                        <div className="flex flex-col gap-4 mt-8">
                                            <button onClick={() => startShopping(currentShop)} className="bg-green-500 text-white text-2xl font-bold py-4 px-8 rounded-full shadow-lg active:scale-95">
                                                もういっかい
                                            </button>
                                            <button onClick={() => setGameState('select_shop')} className="bg-orange-100 text-orange-600 text-xl font-bold py-3 px-8 rounded-full active:scale-95">
                                                おみせを かえる
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
