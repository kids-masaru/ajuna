<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>おかいものごっこ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&display=swap');

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            user-select: none;
            touch-action: manipulation;
            /* Important for custom drag handling */
            overscroll-behavior: none;
            background-color: #0f172a;
            /* slate-900 */
        }

        /* Hide scrollbar */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .animate-bounce-slow {
            animation: bounce 2s infinite;
        }

        .portrait-warning {
            display: none;
        }

        /* Landscape Enforcement */
        @media (orientation: portrait) {
            .portrait-warning {
                display: flex;
            }

            .game-content {
                display: none !important;
            }
        }
    </style>
    <script>
        window.onerror = function (message, source, lineno, colno, error) {
            const root = document.getElementById('root');
            if (root) {
                root.innerHTML = `
                    <div style="color: #f87171; background: #450a0a; padding: 20px;">
                        <h2>⚠️ エラーが発生しました</h2>
                        <p>${message}</p>
                    </div>
                `;
            }
        };
    </script>
</head>

                items: [
                    { id: 't1', name: 'くまさん', icon: '🧸' }, { id: 't2', name: 'ロボット', icon: '🤖' },
                    { id: 't3', name: 'くるま', icon: '🚗' }, { id: 't4', name: 'きしゃ', icon: '🚂' },
                    { id: 't5', name: 'ボール', icon: '⚽' }, { id: 't6', name: 'ゲーム', icon: '🎮' },
                    { id: 't7', name: 'パズル', icon: '🧩' }, { id: 't8', name: 'たいこ', icon: '🥁' },

                items: [

                    { id: 'fl3', name: 'ひまわり', icon: '🌻' }, { id: 'fl4', name: 'チューリップ', icon: '🌷' },
                    { id: 'fl5', name: 'ハイビスカス', icon: '🌺' }, { id: 'fl6', name: 'サクラ', icon: '🌸' },
                    { id: 'fl7', name: 'マーガレット', icon: '🌼' }, { id: 'fl8', name: 'サボテン', icon: '🌵' },
                    { id: 'fl9', name: 'ツリー', icon: '🌲' }, { id: 'fl10', name: 'クローバー', icon: '🍀' },
                    { id: 'fl11', name: 'もみじ', icon: '🍁' }, { id: 'fl12', name: 'おちば', icon: '🍂' }
                ]
            },
            {
                id: 'convenience', name: 'コンビニ', icon: '🏪', bg: 'bg-slate-50', accent: 'bg-slate-600', border: 'border-slate-300',
                items: [
                    { id: 'c1', name: 'おにぎり', icon: '🍙' }, { id: 'c2', name: 'ハンバーガー', icon: '🍔' },
                    { id: 'c3', name: 'ポテト', icon: '🍟' }, { id: 'c4', name: 'ぎゅうにゅう', icon: '🥛' },
                    { id: 'c5', name: 'おべんとう', icon: '🍱' }, { id: 'c6', name: 'おちゃ', icon: '🍵' },
                    { id: 'c7', name: 'バナナ', icon: '🍌' }, { id: 'c8', name: 'ジュース', icon: '🧃' },
                    { id: 'c9', name: 'たまご', icon: '🥚' }, { id: 'c10', name: 'コーヒー', icon: '☕' },
                    { id: 'c11', name: 'かさ', icon: '☔' }, { id: 'c12', name: 'しんぶん', icon: '📰' }
                ]
            }
        ];

        const speak = (text) => {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ja-JP';
            msg.rate = 1.1;
            msg.pitch = 1.4;
            window.speechSynthesis.speak(msg);
        };

        // --- Drag & Drop Interfaces ---
        const DragItem = ({ item, x, y }) => (
            <div
                className="fixed z-[999] pointer-events-none flex flex-col items-center justify-center p-2 bg-white/90 rounded-full shadow-2xl border-4 border-orange-400 w-24 h-24 md:w-32 md:h-32 animate-pulse"
                style={{ left: x, top: y, transform: 'translate(-50%, -50%)' }}
            >
                <span className="text-5xl md:text-7xl">{item.icon}</span>
            </div>
        );

        function App() {
            const [gameState, setGameState] = useState('start');
            const [currentShop, setCurrentShop] = useState(SHOPS[0]);

            const [targetItems, setTargetItems] = useState([]);
            const [shelfItems, setShelfItems] = useState([]);
            const [foundItems, setFoundItems] = useState([]);

            const [dragState, setDragState] = useState(null);
            const basketRef = useRef(null);

            const [isMuted, setIsMuted] = useState(false);
            const audioCtx = useRef(null);
            const bgmRef = useRef(null); // Reference for MP3 BGM

            const initAudio = () => {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!audioCtx.current && AudioContext) {
                    audioCtx.current = new AudioContext();
                }
                if (audioCtx.current && audioCtx.current.state === 'suspended') {
                    audioCtx.current.resume();
                }
            };

            const playSound = (freq, type = 'sine', duration = 0.2, volume = 0.1) => {
                if (!audioCtx.current || isMuted) return;
                try {
                    const osc = audioCtx.current.createOscillator();
                    const gain = audioCtx.current.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, audioCtx.current.currentTime);
                    gain.gain.setValueAtTime(volume, audioCtx.current.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.current.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.current.destination);
                    osc.start();
                    osc.stop(audioCtx.current.currentTime + duration);
                } catch (e) { }
            };

            const playCorrectSound = () => {
                playSound(523, 'sine', 0.1);
                setTimeout(() => playSound(1046, 'sine', 0.3), 100);
            };

            const playWrongSound = () => {
                playSound(200, 'triangle', 0.3, 0.2);
                playSound(150, 'triangle', 0.3, 0.2);
            };

            const startBGM = () => {
                if (bgmRef.current && !isMuted) {
                    bgmRef.current.volume = 0.3; // Lower BGM volume
                    bgmRef.current.play().catch(e => console.log('BGM Play Error:', e));
                }
            };

            const stopBGM = () => {
                if (bgmRef.current) {
                    bgmRef.current.pause();
                    bgmRef.current.currentTime = 0;
                }
            };

            // Effect to handle Mute Toggle
            useEffect(() => {
                if (bgmRef.current) {
                    bgmRef.current.muted = isMuted;
                    // Ensure playback state matches game state if muted changed
                    if (gameState === 'playing' && !isMuted) {
                        bgmRef.current.play().catch(e => { });
                    } else if (isMuted) {
                        // Just mute, don't stop if playing, but if stopped..
                        // Use HTML attribute for simple mute handling
                    }
                }
            }, [isMuted, gameState]);

            // Effect to Start/Stop BGM based on Game State
            useEffect(() => {
                if (gameState === 'playing') {
                    startBGM();
                } else {
                    stopBGM();
                }
                // Cleanup on unmount or state change handled by effect re-run/cleanup if needed
                return () => {
                    // if leaving playing state? No, simply stopBGM in the else block works.
                };
            }, [gameState]);


            const startShopping = (shop) => {
                initAudio();
                const pool = [...shop.items, ...shop.items, ...shop.items].sort(() => 0.5 - Math.random());
                const shelfContent = pool.slice(0, 20).map((item, idx) => ({ ...item, uniqueId: `${item.id}-${idx}` }));

                const uniqueItemsOnShelf = [...new Set(shelfContent.map(i => i.id))].map(id => shop.items.find(i => i.id === id));
                const shuffledUnique = uniqueItemsOnShelf.sort(() => 0.5 - Math.random());
                const targetCount = Math.min(uniqueItemsOnShelf.length, Math.floor(Math.random() * 3) + 3);
                const targets = shuffledUnique.slice(0, targetCount);

                setCurrentShop(shop);
                setShelfItems(shelfContent);
                setTargetItems(targets);
                setFoundItems([]);
                setGameState('playing');
                speak(`${shop.name}にきました！おかいものリストのものを、カゴにいれてね！`);
                playSound(880, 'sine', 0.2);
            };

            const checkResult = (newFound) => {
                if (newFound.length === targetItems.length) {
                    setGameState('result');
                    speak("すごーい！ぜんぶかえたよ！おかいものめいじん！");
                }
            };

            const handleInitialStart = () => {
                initAudio();
                speak("どこのおみせにいく？");
                setGameState('select_shop');
                playSound(1046, 'sine', 0.2);
            };

            const handlePointerDown = (e, item) => {
                if (e.button && e.button !== 0) return;
                // Capture pointer to ensure we track it even if it leaves the element
                e.currentTarget.setPointerCapture(e.pointerId);

                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                setDragState({ item, x: clientX, y: clientY, pointerId: e.pointerId });
                playSound(440, 'sine', 0.1);
            };

            const handlePointerMove = (e) => {
                if (!dragState) return;
                e.preventDefault();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                setDragState(prev => ({ ...prev, x: clientX, y: clientY }));
            };

            const handlePointerUp = (e) => {
                if (!dragState) return;

                const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
                const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;

                if (basketRef.current) {
                    const rect = basketRef.current.getBoundingClientRect();
                    const isInBasket =
                        clientX >= rect.left &&
                        clientX <= rect.right &&
                        clientY >= rect.top &&
                        clientY <= rect.bottom;

                    if (isInBasket) {
                        handleDropInBasket(dragState.item);
                    }
                }
                setDragState(null);
            };

            const handleDropInBasket = (item) => {
                if (foundItems.some(f => f.id === item.id)) {
                    speak("それはもうかったよ！");
                    return;
                }

                const isCorrect = targetItems.some(t => t.id === item.id);
                if (isCorrect) {
                    const newFound = [...foundItems, item];
                    setFoundItems(newFound);
                    playCorrectSound();
                    speak(`${item.name}、ゲット！`);
                    checkResult(newFound);
                } else {
                    playWrongSound();
                    speak("あれ？ちがうよ〜？");
                }
            };

            return (
                <div
                    className="fixed inset-0 bg-slate-900 overflow-hidden font-sans select-none touch-none"
                    onPointerMove={handlePointerMove}
                    onPointerUp={handlePointerUp}
                    onPointerCancel={() => setDragState(null)}
                >
                    {/* AUDIO ELEMENT FOR BGM */}
                    <audio ref={bgmRef} src="./ajunano_okaimono.mp3" loop />

                    {dragState && <DragItem item={dragState.item} x={dragState.x} y={dragState.y} />}

                    <a href="index.html" className="fixed top-4 left-4 z-[110] bg-white/90 backdrop-blur-sm p-4 rounded-full shadow-lg border-2 border-pink-100 text-xl flex items-center justify-center w-14 h-14 active:scale-90 no-underline" title="ホームへ">🏠</a>

                    {/* Scene Specific Controls */}
                    {gameState === 'playing' && (
                        <button
                            onClick={() => { setGameState('select_shop'); stopBGM(); }}
                            className="fixed top-4 right-16 z-[110] bg-white/90 p-3 rounded-full text-gray-600 font-bold border-2 border-orange-200 shadow-lg active:scale-95 flex items-center gap-2"
                        >
                            <LogOut size={24} />
                            <span className="hidden md:inline">おみせをでる</span>
                        </button>
                    )}

                    <button onClick={() => setIsMuted(!isMuted)} className="fixed top-4 right-4 z-[110] bg-white/20 p-3 rounded-full text-white backdrop-blur-md hover:bg-white/30 transition-colors shadow-lg">
                        {isMuted ? <VolumeX size={24} /> : <Volume2 size={24} />}
                    </button>

                    {/* SCENE: Start */}
                    {gameState === 'start' && (
                        <div className="w-full h-full bg-white flex flex-col items-center justify-center p-4">
                            <div className="bg-orange-50 p-6 md:p-10 rounded-[3rem] border-8 border-orange-200 text-center shadow-2xl animate-in zoom-in duration-300 relative max-w-lg w-full">
                                <h1 className="text-4xl md:text-5xl font-bold text-orange-600 mb-8">おかいもの<br />ごっこ</h1>
                                <button onClick={handleInitialStart} className="w-32 h-32 md:w-44 md:h-44 bg-orange-500 rounded-full shadow-[0_8px_0_rgb(180,60,20)] items-center justify-center mx-auto flex active:translate-y-2 transition-all">
                                    <Play className="text-white ml-2 w-16 h-16 md:w-24 md:h-24" fill="white" />
                                </button>
                            </div>
                        </div>
                    )}

                    {/* SCENE: Shop Select */}
                    {gameState === 'select_shop' && (
                        <div className="w-full h-full bg-orange-50 flex flex-col p-4 items-center justify-center">
                            <h2 className="text-2xl md:text-3xl font-bold text-orange-600 mb-6">どこの おみせに いく？</h2>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 overflow-y-auto max-h-full no-scrollbar pb-20">
                                {SHOPS.map(shop => (
                                    <button key={shop.id} onClick={() => startShopping(shop)} className={`aspect-square flex flex-col items-center justify-center p-4 ${shop.bg} rounded-[2rem] border-4 ${shop.border} shadow-lg active:scale-95`}>
                                        <span className="text-6xl mb-2">{shop.icon}</span>
                                        <span className="text-xl font-bold text-gray-700">{shop.name}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* SCENE: Shopping Game */}
                    {(gameState === 'playing' || gameState === 'result') && (
                        <div className={`relative w-full h-full flex flex-col ${currentShop.bg} transition-all duration-500`}>

                            {/* Left Side: Shopping List (Sidebar) */}
                            {/* Added pointer-events-auto to container to enable scrolling/clicking */}
                            <div className="absolute top-24 left-4 bottom-32 w-20 md:w-24 z-30 flex flex-col gap-2 pointer-events-auto">
                                <span className="bg-white/90 text-gray-600 font-bold px-2 py-1 rounded-full text-xs md:text-sm text-center shadow-sm border border-orange-200">かうもの</span>
                                <div className="flex flex-col gap-2 overflow-y-auto pb-24 no-scrollbar h-full">
                                    {targetItems.map(item => {
                                        const done = foundItems.some(f => f.id === item.id);
                                        return (
                                            <div
                                                key={item.id}
                                                onClick={() => speak(item.name)}
                                                className={`bg-white/90 backdrop-blur-sm p-1 rounded-lg shadow-md border-2 border-dashed border-gray-300 flex flex-col items-center transition-all cursor-pointer hover:scale-105 active:scale-95 ${done ? 'opacity-40 grayscale' : ''}`}
                                            >
                                                <span className="text-3xl md:text-4xl">{item.icon}</span>
                                                <span className="text-[10px] md:text-xs font-bold text-gray-600 text-center leading-tight">{item.name}</span>
                                                {done && <span className="absolute inset-0 flex items-center justify-center text-3xl text-green-500 font-bold">✓</span>}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* Middle: Scrolling Shelves (Walking Area) */}
                            {/* Added touch-action: pan-x to allow horizontal scrolling on the background */}
                            <div className="flex-1 overflow-x-auto overflow-y-hidden flex items-center pb-32 no-scrollbar scroll-smooth" style={{ WebkitOverflowScrolling: 'touch', touchAction: 'pan-x' }}>

                                {/* Padding for sidebar */}
                                <div className="min-w-[6rem] md:min-w-[9rem] h-full shrink-0"></div>

                                {/* Flexible grid container for 2 rows */}
                                <div className="grid grid-rows-2 grid-flow-col gap-4 px-4 h-3/4 items-center">
                                    {shelfItems.map((item, idx) => {
                                        const isCollected = foundItems.some(f => f.id === item.id);
                                        return (
                                            <div key={item.uniqueId} className="relative w-28 h-28 md:w-40 md:h-40 flex flex-col items-center justify-end pb-4 group shrink-0">
                                                {/* Shelf Visual: Wood Board for individual item */}
                                                <div className="absolute bottom-2 left-0 right-0 h-3 md:h-4 bg-amber-700/80 rounded-sm shadow-md z-0"></div>
                                                <div className="absolute bottom-[-2px] left-1 right-1 h-1 bg-amber-900/20 blur-[1px] z-[-1]"></div>

                                                {/* Item - Added touch-action: none to prioritize drag */}
                                                {!isCollected && (
                                                    <div
                                                        className="relative z-10 flex flex-col items-center cursor-grab active:cursor-grabbing hover:scale-105 transition-transform mb-1"
                                                        style={{ touchAction: 'none' }}
                                                        onPointerDown={(e) => handlePointerDown(e, item)}
                                                    >
                                                        <span className="text-5xl md:text-7xl drop-shadow-xl select-none filter">{item.icon}</span>
                                                        <span className="bg-white/90 px-2 py-0.5 rounded-full text-[10px] md:text-xs font-bold mt-1 shadow-sm select-none text-slate-700 border border-slate-200">{item.name}</span>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                                {/* End padding */}
                                <div className="min-w-[10rem] h-full shrink-0"></div>
                            </div>

                            {/* Bottom: Basket Area */}
                            <div
                                ref={basketRef}
                                className={`absolute bottom-0 left-0 right-0 h-28 md:h-40 z-40 flex items-end justify-center pointer-events-none transition-all duration-300
                                ${dragState ? 'bg-orange-200/20' : 'bg-transparent'}`}
                            >
                                <div className="relative w-full max-w-md h-full mx-auto flex items-end justify-center pb-2">
                                    {/* Girl Character: Positioned next to basket */}
                                    <div className="absolute bottom-2 -left-4 md:-left-16 z-50 animate-bounce-slow">
                                        <GirlBackView className="w-24 h-32 md:w-32 md:h-40 drop-shadow-xl" />
                                    </div>

                                    {/* Basket Visuals */}
                                    <div className="absolute bottom-[-10%] w-64 md:w-80 h-24 md:h-32 bg-red-500 rounded-[2rem] shadow-2xl flex items-center justify-center border-4 border-red-700 z-10">
                                        <span className="text-white font-bold text-lg opacity-90 mb-6">ここに入れる</span>
                                    </div>
                                    <div className="absolute bottom-6 w-full flex justify-center gap-1 z-0 px-8 flex-wrap">
                                        {foundItems.map((item, idx) => (
                                            <span key={idx} className="text-3xl md:text-4xl animate-in zoom-in slide-in-from-top-4 duration-300 drop-shadow-md">
                                                {item.icon}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* Result Overlay */}
                            {gameState === 'result' && (
                                <div className="absolute inset-0 z-[100] bg-black/50 backdrop-blur-sm flex items-center justify-center p-4">
                                    <div className="bg-white rounded-[3rem] p-8 shadow-2xl border-8 border-yellow-400 text-center animate-in zoom-in duration-300">
                                        <div className="text-8xl mb-4 animate-bounce">💮</div>
                                        <h2 className="text-4xl font-bold text-orange-500 mb-2">じょうず！</h2>
                                        <div className="flex flex-col gap-4 mt-8">
                                            <button onClick={() => startShopping(currentShop)} className="bg-green-500 text-white text-2xl font-bold py-4 px-8 rounded-full shadow-lg active:scale-95 pointer-events-auto">
                                                もういっかい
                                            </button>
                                            <button onClick={() => setGameState('select_shop')} className="bg-orange-100 text-orange-600 text-xl font-bold py-3 px-8 rounded-full active:scale-95 pointer-events-auto">
                                                おみせを かえる
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
