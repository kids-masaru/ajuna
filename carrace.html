<style>

<body class="gp gp-fuchsia">

<!-- メインメニュー -->
<div id="menu-layer" class="overlay">

  <div class="lap-box" id="p1-box" style="border-color: #ff4757;"><div class="lap-name">RED</div><div class="lap-count"><span id="p1-lap">0</span> / 3</div></div>
  <div class="lap-box" id="p2-box" style="border-color: #54a0ff;"><div class="lap-name"><span id="p2-label">COM</span></div><div class="lap-count"><span id="p2-lap">0</span> / 3</div></div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const bgm = document.getElementById('bgm');

// --- Web Audio API (効果音用) ---
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new AudioContext();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

// ピッ、ポーンの音
function playBeep(freq, type, duration, vol = 0.1) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
  
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

// クラッシュ音（ノイズ）
function playCrashSound(duration = 0.6, vol = 0.25) {
  if (!audioCtx) return;
  const bufferSize = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = Math.random() * 2 - 1; // ホワイトノイズ
  }
  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;
  
  // 少しこもった音（ドシャーン）にするフィルター
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 1000;
  
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
  
  noise.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  
  noise.start();
}
// ------------------------------

let W, H, cx, cy, trackW, trackH, cornerR;
let gameState = 'MENU'; 
let gameMode = '1P';    
let comLevel = 'EASY';  // EASY or HARD
let selectedCourse = 'RECT';
let sceneBuf, sceneDirty = true, treePositions = [];
// 斜め見下ろし投影（空0.30＝傾きの強さ／遠近1.5乗）
function HY() { return Math.round(H * 0.30); }
function project(wx, wy) {
  const p = Math.pow(Math.min(Math.max(wy / H, 0), 1), 1.5);
  const sc = 0.50 + 0.52 * p;
  return { x: W / 2 + (wx - W / 2) * sc, y: HY() + p * (H - HY()), scale: sc };
}
function drawCloud(x, y, r) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, 7); ctx.arc(x + r, y + r * 0.2, r * 0.8, 0, 7);
  ctx.arc(x - r, y + r * 0.2, r * 0.8, 0, 7); ctx.arc(x + r * 0.2, y - r * 0.4, r * 0.7, 0, 7);
  ctx.fill();
}
function drawHill(hx, baseY, w, h) {
  ctx.beginPath(); ctx.ellipse(hx, baseY, w / 2, h, 0, Math.PI, Math.PI * 2); ctx.fill();
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
  trackW = Math.min(W * 0.86, 600);
  trackH = Math.min(H * 0.66, 380);
  cornerR = Math.min(trackW, trackH) * 0.35;
  // コース（地面）を実解像度で一度だけ描くオフスクリーン
  if (!sceneBuf) sceneBuf = document.createElement('canvas');
  sceneBuf.width = W; sceneBuf.height = H;
  sceneDirty = true;
}
resize();
window.addEventListener('resize', resize);

// 車のプロパティ初期化
let p1 = {}, p2 = {};
function initCars() {
  p1 = { 
    progress: 0, speed: 0, laps: 0, color: '#ff4757', isPlayer: true, 
    pressing: false, isCrashed: false, crashTimer: 0, 
    isWarning: false, warningCounter: 0, warningDuration: 0 
  };
  p2 = { 
    progress: 0.02, speed: 0, laps: 0, color: '#54a0ff', isPlayer: false, 
    pressing: false, isCrashed: false, crashTimer: 0, 
    isWarning: false, warningCounter: 0, warningDuration: 0 
  };
  document.getElementById('p1-lap').textContent = '0';
  document.getElementById('p2-lap').textContent = '0';
  document.getElementById('p1-box').classList.remove('crashed-hud');
  document.getElementById('p2-box').classList.remove('crashed-hud');
}
initCars();

// --- 走行パラメータ (ゆっくりスピード) ---
const MAX_SPEED = 0.0040;    // 直線での最高速度
const CRASH_SPEED = 0.0035;  // この速度を超えたままカーブに入るとクラッシュ
const WARN_SPEED = 0.0030;   // この速度を超えてカーブに近づくと警告（バイブ＆震え）が発生
const ACCEL = 0.00009;       // 加速度
const FRICTION = 0.00011;    // 減速度

// --- コースの座標と「カーブ判定」 ---
function getTrackPoint(p) {
  p = ((p % 1) + 1) % 1;
  let x, y, angle, isCurve = false;

  if (selectedCourse === 'RECT') {
    const sw = trackW - cornerR * 2;
    const sh = trackH - cornerR * 2;
    const al = (Math.PI * 2 * cornerR) / 4;
    const total = (sw * 2) + (sh * 2) + (al * 4);
    const d = p * total;
    if (d < sw) { x = cx - sw/2 + d; y = cy + trackH/2; angle = 0; }
    else if (d < sw + al) {
      const r = (d - sw) / al; const a = r * (Math.PI / 2);
      x = cx + sw/2 + Math.sin(a) * cornerR; y = cy + sh/2 + Math.cos(a) * cornerR; angle = a;
      isCurve = true;
    }
    else if (d < sw + al + sh) {
      const o = d - (sw + al); x = cx + trackW/2; y = cy + sh/2 - o; angle = Math.PI/2;
    }
    else if (d < sw + al * 2 + sh) {
      const r = (d - (sw + al + sh)) / al; const a = r * (Math.PI / 2);
      x = cx + sw/2 + Math.cos(a) * cornerR; y = cy - sh/2 - Math.sin(a) * cornerR; angle = Math.PI/2 + a;
      isCurve = true;
    }
    else if (d < sw * 2 + al * 2 + sh) {
      const o = d - (sw + al * 2 + sh); x = cx + sw/2 - o; y = cy - trackH/2; angle = Math.PI;
    }
    else if (d < sw * 2 + al * 3 + sh) {
      const r = (d - (sw * 2 + al * 2 + sh)) / al; const a = r * (Math.PI / 2);
      x = cx - sw/2 - Math.sin(a) * cornerR; y = cy - sh/2 - Math.cos(a) * cornerR; angle = Math.PI + a;
      isCurve = true;
    }
    else if (d < sw * 2 + al * 3 + sh * 2) {
      const o = d - (sw * 2 + al * 3 + sh); x = cx - trackW/2; y = cy - sh/2 + o; angle = (Math.PI * 3) / 2;
    }
    else {
      const r = (d - (sw * 2 + al * 3 + sh * 2)) / al; const a = r * (Math.PI / 2);
      x = cx - sw/2 - Math.cos(a) * cornerR; y = cy + sh/2 + Math.sin(a) * cornerR; angle = (Math.PI * 3) / 2 + a;
      isCurve = true;
    }
  } else if (selectedCourse === 'OVAL') {
    const rx = trackW / 2, ry = trackH / 2;
    const aR = p * Math.PI * 2;
    x = cx + Math.cos(aR) * rx; y = cy + Math.sin(aR) * ry;
    const dx = -Math.sin(aR) * rx; const dy = Math.cos(aR) * ry;
    angle = Math.atan2(dy, dx);
    isCurve = Math.abs(Math.cos(aR)) > 0.5;
  } else if (selectedCourse === 'HEART') {
    const t = -p * Math.PI * 2 + Math.PI / 2;
    const scale = trackW / 32;
    x = cx + scale * (16 * Math.pow(Math.sin(t), 3));
    y = cy - scale * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) + scale * 2;
    const nextP = p + 0.001;
    const nt = -nextP * Math.PI * 2 + Math.PI / 2;
    const nx = cx + scale * (16 * Math.pow(Math.sin(nt), 3));
    const ny = cy - scale * (13 * Math.cos(nt) - 5 * Math.cos(2*nt) - 2 * Math.cos(3*nt) - Math.cos(4*nt)) + scale * 2;
    angle = Math.atan2(ny - y, nx - x);
    const inR = (v, min, max) => v > min && v < max;
    isCurve = inR(p, 0.02, 0.1) || inR(p, 0.28, 0.4) || inR(p, 0.47, 0.53) || inR(p, 0.6, 0.72) || inR(p, 0.9, 0.98);
  }
  return { x, y, angle, isCurve };
}

function getCarPosInfo(car, isP1) {
  const pt = getTrackPoint(car.progress);
  const offset = isP1 ? 9 : -9;
  const cxPos = pt.x - Math.sin(pt.angle) * offset;
  const cyPos = pt.y + Math.cos(pt.angle) * offset;
  return { x: cxPos, y: cyPos, angle: pt.angle, isCurve: pt.isCurve };
}

// 任意の進行度でのワールド座標（車の向き計算用）
function posAt(progress, isP1) {
  const pt = getTrackPoint(progress);
  const offset = isP1 ? 9 : -9;
  return { x: pt.x - Math.sin(pt.angle) * offset, y: pt.y + Math.cos(pt.angle) * offset };
}

// コース形状のパスを任意のコンテキストに描く（ワールド座標）
function tracePath(c) {
  const x = cx - trackW/2, y = cy - trackH/2;
  c.beginPath();
  if (selectedCourse === 'RECT') {
    const r = cornerR, w = trackW, h = trackH;
    c.moveTo(x + r, y); c.lineTo(x + w - r, y);
    c.arcTo(x + w, y, x + w, y + r, r); c.lineTo(x + w, y + h - r);
    c.arcTo(x + w, y + h, x + w - r, y + h, r); c.lineTo(x + r, y + h);
    c.arcTo(x, y + h, x, y + h - r, r); c.lineTo(x, y + r);
    c.arcTo(x, y, x + r, y, r); c.closePath();
  } else if (selectedCourse === 'OVAL') {
    c.ellipse(cx, cy, trackW/2, trackH/2, 0, 0, Math.PI * 2);
  } else {
    for (let i = 0; i <= 200; i++) {
      const pt = getTrackPoint(i / 200);
      if (i === 0) c.moveTo(pt.x, pt.y); else c.lineTo(pt.x, pt.y);
    }
    c.closePath();
  }
}

// 背景＋コース（静止画）を実解像度で一度だけ描く（くっきり）
function buildScene() {
  const s = sceneBuf.getContext('2d');
  s.setTransform(1, 0, 0, 1, 0, 0);
  s.imageSmoothingEnabled = true;
  s.clearRect(0, 0, W, H);

  // 芝生（縦じまの芝刈り模様：パースで奥に収束して競技場っぽく）
  s.fillStyle = '#5cb049'; s.fillRect(0, 0, W, H);
  const bands = 16, bandW = W / bands;
  for (let i = 0; i < bands; i++) {
    s.fillStyle = (i % 2 === 0) ? '#58a946' : '#63ba51';
    s.fillRect(Math.floor(i * bandW), 0, Math.ceil(bandW), H);
  }

  s.lineCap = 'round'; s.lineJoin = 'round';
  // 縁石（赤白）
  tracePath(s); s.lineWidth = 62; s.strokeStyle = '#f2f2f2'; s.stroke();
  tracePath(s); s.lineWidth = 62; s.strokeStyle = '#e23b3b'; s.setLineDash([18, 18]); s.stroke(); s.setLineDash([]);
  // アスファルト
  tracePath(s); s.lineWidth = 50; s.strokeStyle = '#4f535c'; s.stroke();
  tracePath(s); s.lineWidth = 46; s.strokeStyle = '#595e69'; s.stroke();
  // センターライン
  tracePath(s); s.lineWidth = 4; s.strokeStyle = '#f7d11e'; s.setLineDash([14, 20]); s.stroke(); s.setLineDash([]);

  // スタート/フィニッシュのチェッカー
  const st = getTrackPoint(0);
  s.save(); s.translate(st.x, st.y); s.rotate(st.angle);
  const cs = 8;
  for (let row = 0; row < 2; row++) for (let i = -3; i < 4; i++) {
    s.fillStyle = ((i + row) % 2 === 0) ? '#ffffff' : '#1a1a1a';
    s.fillRect(row * cs - cs, i * cs, cs, cs);
  }
  s.restore();

  // 木の位置（描画は毎フレーム投影して立体的に行う）
  treePositions = [
    [cx - trackW/2 - 46, cy - trackH/2 - 24], [cx + trackW/2 + 42, cy - trackH/2 - 16],
    [cx + trackW/2 + 48, cy + trackH/2 + 26], [cx - trackW/2 - 42, cy + trackH/2 + 28],
    [cx - trackW * 0.22, cy - trackH/2 - 40], [cx + trackW * 0.22, cy + trackH/2 + 40],
    [cx - trackW/2 - 80, cy + 20], [cx + trackW/2 + 80, cy - 20],
    [cx - trackW * 0.05, cy - trackH/2 - 66], [cx + trackW * 0.38, cy - trackH/2 - 30],
    [cx - trackW * 0.4, cy + trackH/2 + 32], [cx + trackW * 0.12, cy + trackH/2 + 64]
  ];
}

// 木（投影して立体的に：立ち上がり＋影＋遠近スケール）
function drawTree(wx, wy) {
  const pr = project(wx, wy), k = pr.scale;
  ctx.save(); ctx.translate(pr.x, pr.y);
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(0, 0, 13 * k, 4.5 * k, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#7a4a22'; ctx.fillRect(-3 * k, -16 * k, 6 * k, 16 * k);
  ctx.fillStyle = '#1f7a34'; ctx.beginPath(); ctx.arc(0, -26 * k, 15 * k, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#2f9a45'; ctx.beginPath(); ctx.arc(0, -27 * k, 12 * k, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#49b85e'; ctx.beginPath(); ctx.arc(-4 * k, -30 * k, 5.5 * k, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawCar(car, isP1) {
  let cxPos, cyPos, cAngle;

  if (car.isCrashed) {
    cxPos = car.crashX; cyPos = car.crashY; cAngle = car.crashAngle;
    if (car.crashTimer < 30 && Math.floor(Date.now() / 100) % 2 === 0) return;
  } else {
    const info = getCarPosInfo(car, isP1);
    cxPos = info.x; cyPos = info.y; cAngle = info.angle;
    
    if (car.isWarning) {
      cxPos += (Math.random() - 0.5) * 4;
      cyPos += (Math.random() - 0.5) * 4;
    }
  }

  const pr = project(cxPos, cyPos), k = pr.scale * 1.15;
  // 画面上（投影後）の進行方向に車を向ける＝コースに沿って自然に走る
  let drawAngle = cAngle;
  if (!car.isCrashed) {
    const c0 = posAt(car.progress, isP1), c1 = posAt(car.progress + 0.004, isP1);
    const s0 = project(c0.x, c0.y), s1 = project(c1.x, c1.y);
    drawAngle = Math.atan2(s1.y - s0.y, s1.x - s0.x);
  }
  ctx.save();
  ctx.translate(pr.x, pr.y);
  // 影（地面）
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.ellipse(0, 2 * k, 18 * k, 7 * k, 0, 0, Math.PI * 2); ctx.fill();
  // 少し浮かせて立体感（ゆがみ防止のため縦つぶしはしない）
  ctx.translate(0, -3 * k);
  ctx.rotate(drawAngle);
  const s = k;
  // タイヤ
  ctx.fillStyle = '#15171c';
  ctx.fillRect(-12*s,-11*s,7*s,4*s); ctx.fillRect(5*s,-11*s,7*s,4*s);
  ctx.fillRect(-12*s,7*s,7*s,4*s);   ctx.fillRect(5*s,7*s,7*s,4*s);
  // 縁取り＋車体
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(-16*s,-10*s,33*s,20*s);
  ctx.fillStyle = car.color; ctx.fillRect(-15*s,-9*s,31*s,18*s);
  // 上面ハイライト
  ctx.fillStyle = 'rgba(255,255,255,0.28)'; ctx.fillRect(-13*s,-8*s,26*s,5*s);
  // フロントガラス
  ctx.fillStyle = '#bfe9ff'; ctx.fillRect(2*s,-6*s,7*s,12*s);
  ctx.fillStyle = '#7fc7ee'; ctx.fillRect(2*s,-6*s,3*s,12*s);
  // ライト
  ctx.fillStyle = '#fff7c2'; ctx.fillRect(15*s,-7*s,2*s,4*s); ctx.fillRect(15*s,3*s,2*s,4*s);
  ctx.fillStyle = '#c0392b'; ctx.fillRect(-16*s,-7*s,2*s,4*s); ctx.fillRect(-16*s,3*s,2*s,4*s);
  ctx.restore();

  // 状態（クラッシュ/警告）は車の上に立てて表示
  if (car.isCrashed || car.isWarning) {
    ctx.save(); ctx.translate(pr.x, pr.y - 26 * k);
    ctx.font = `${Math.round((car.isCrashed ? 24 : 20) * k)}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(car.isCrashed ? '💥' : '⚠️', 0, 0);
    ctx.restore();
  }
}

function updateCar(car, isP1) {
  const boxId = isP1 ? 'p1-box' : 'p2-box';
  const hudBox = document.getElementById(boxId);

  // --- クラッシュ中（飛んでいる最中）の処理 ---
  if (car.isCrashed) {
    car.crashX += car.crashVx; car.crashY += car.crashVy;
    car.crashVx *= 0.92; car.crashVy *= 0.92;
    car.crashAngle += 0.6; car.crashTimer--;
    
    if (car.crashTimer <= 0) {
      car.isCrashed = false; car.speed = 0; car.isWarning = false;
      car.warningDuration = 0;
      hudBox.classList.remove('crashed-hud');
    }
    return;
  }

  // --- 速度の更新 ---
  if (gameState === 'FINISHED') {
    car.speed *= 0.96;
  } else if (gameState === 'RACING') {
    if (car.isPlayer) {
      if (car.pressing) car.speed = Math.min(car.speed + ACCEL, MAX_SPEED);
      else car.speed = Math.max(car.speed - FRICTION, 0);
    } else {
      // COM AI
      if (comLevel === 'EASY') {
        car.speed = Math.min(car.speed + ACCEL, MAX_SPEED);
      } else {
        let willCrash = false;
        for (let offset = 0; offset <= 0.05; offset += 0.01) {
          if (getTrackPoint(car.progress + offset).isCurve) willCrash = true;
        }
        if (willCrash) car.speed = Math.max(car.speed - FRICTION, WARN_SPEED - 0.0005);
        else car.speed = Math.min(car.speed + ACCEL, MAX_SPEED);
      }
    }
  }

  const posInfo = getCarPosInfo(car, isP1);

  // --- 警告開始の判定 ---
  let nearCurve = false;
  if (gameState === 'RACING' && car.speed > WARN_SPEED) {
    for (let offset = 0; offset <= 0.05; offset += 0.01) {
      if (getTrackPoint(car.progress + offset).isCurve) {
        nearCurve = true;
        break;
      }
    }
  }
  
  // --- タイマーと警告の更新 ---
  if (car.isPlayer) {
    if (!car.pressing) {
      // 指を離せば即座に警告・タイマーをリセット（セーフ！）
      car.isWarning = false;
      car.warningDuration = 0;
      car.warningCounter = 0;
    } else {
      if (nearCurve && !car.isWarning) car.isWarning = true;

      if (car.isWarning) {
        car.warningDuration++; 
        car.warningCounter++;
        if (car.warningCounter % 15 === 0 && navigator.vibrate) {
          navigator.vibrate([40]);
        }
      }
    }
  } else {
    // コンピューター(COM)の場合
    if (nearCurve && comLevel === 'EASY') {
      car.isWarning = true;
      car.warningDuration++;
    } else {
      car.isWarning = false;
      car.warningDuration = 0;
    }
  }

  // --- クラッシュ判定（強制スリップ） ---
  const crashLimit = car.isPlayer ? 120 : (comLevel === 'EASY' ? 15 : 120); 
  
  if (gameState === 'RACING' && car.isWarning && car.warningDuration > crashLimit) {
    car.isCrashed = true;
    car.isWarning = false;
    car.warningDuration = 0;
    car.crashTimer = 60; 
    car.crashX = posInfo.x; 
    car.crashY = posInfo.y; 
    car.crashAngle = posInfo.angle;
    
    const flyAngle = posInfo.angle + (Math.random() * 0.5 - 0.25);
    car.crashVx = Math.cos(flyAngle) * MAX_SPEED * 800;
    car.crashVy = Math.sin(flyAngle) * MAX_SPEED * 800;
    car.speed = 0;
    
    hudBox.classList.add('crashed-hud');
    
    // ★ クラッシュ音再生
    playCrashSound();
    
    if (car.isPlayer && navigator.vibrate) navigator.vibrate([100, 50, 100]); 
    return;
  }

  // --- 進行度の更新 ---
  const prev = car.progress;
  car.progress += car.speed;

  // ラップ判定
  if (Math.floor(car.progress) > Math.floor(prev)) {
    car.laps++;
    const id = isP1 ? 'p1-lap' : 'p2-lap';
    document.getElementById(id).textContent = Math.min(car.laps, 3);
    if (car.laps >= 3 && gameState === 'RACING') {
      gameState = 'FINISHED';
      
      let msg = '';
      if (gameMode === '1P') {
        if (isP1) msg = 'YOU WIN! 🏆';
        else msg = 'YOU LOSE... 😢';
      } else {
        if (isP1) msg = 'RED WIN! 🏆';
        else msg = 'BLUE WIN! 🏆';
      }
      showMsg(msg);
      
      // ゲーム終了時にピロロロンと鳴らす
      setTimeout(() => playBeep(880, 'sine', 0.1), 0);
      setTimeout(() => playBeep(1108, 'sine', 0.1), 100);
      setTimeout(() => playBeep(1318, 'sine', 0.3), 200);

      setTimeout(resetToMenu, 4000);
    }
  }
}

function showMsg(text) {
  const el = document.getElementById('message');
  el.textContent = text; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function startCountdown() {
  const el = document.getElementById('countdown-text');
  el.style.display = 'block';
  let count = 3;
  el.textContent = count;
  
  // 最初の「ピッ」
  playBeep(880, 'sine', 0.1);
  
  // BGM再生
  bgm.currentTime = 0;
  bgm.play().catch(e => console.log("BGM自動再生ブロック"));

  const timer = setInterval(() => {
    count--;
    if (count > 0) {
      el.textContent = count;
      playBeep(880, 'sine', 0.1); // ピッ
    }
    else if (count === 0) { 
      el.textContent = 'GO!'; 
      gameState = 'RACING';
      playBeep(1760, 'sine', 0.4); // ポーン！
    }
    else { 
      el.style.display = 'none'; 
      clearInterval(timer); 
    }
  }, 1000);
}

function resetToMenu() {
  initCars();
  gameState = 'MENU';
  
  bgm.pause();

  document.getElementById('menu-layer').classList.remove('hidden');
  document.getElementById('mode-select').classList.remove('hidden');
  document.getElementById('com-level-select').classList.add('hidden');
  document.getElementById('course-select').classList.add('hidden');
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('difficulty-box').classList.add('hidden');
  document.getElementById('instruction').classList.add('hidden');
}

function gameLoop() {
  if (sceneDirty) { buildScene(); sceneDirty = false; }
  const hy = HY();

  // 空
  const sky = ctx.createLinearGradient(0, 0, 0, hy + 10);
  sky.addColorStop(0, '#6fc1ff'); sky.addColorStop(1, '#e3f4ff');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, hy + 10);
  // 太陽・雲・遠くの丘（背景の賑わい）
  ctx.fillStyle = '#fff1a8'; ctx.beginPath(); ctx.arc(W * 0.84, hy * 0.42, Math.min(W, H) * 0.05, 0, 7); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  drawCloud(W * 0.18, hy * 0.42, hy * 0.13);
  drawCloud(W * 0.52, hy * 0.24, hy * 0.10);
  drawCloud(W * 0.74, hy * 0.6, hy * 0.11);
  ctx.fillStyle = '#7ec96f'; drawHill(W * 0.28, hy + 2, W * 0.64, hy * 0.5);
  ctx.fillStyle = '#5fb457'; drawHill(W * 0.74, hy + 2, W * 0.74, hy * 0.42);
  // 地平線より下は芝生で敷き詰め（台形の外側のすき間を埋める）
  ctx.fillStyle = '#5cb049'; ctx.fillRect(0, hy, W, H - hy);

  // 地面：行ごとにパース（遠いほど細く・圧縮）＝実解像度でくっきり立体的に
  ctx.imageSmoothingEnabled = true;
  const step = 2;
  for (let sy = hy; sy < H; sy += step) {
    const p0 = (sy - hy) / (H - hy);
    const p1 = (sy + step - hy) / (H - hy);
    const wy0 = H * Math.pow(p0, 1 / 1.5);
    const wy1 = Math.min(H, H * Math.pow(p1, 1 / 1.5));
    const sc = 0.50 + 0.52 * p0;
    const dw = W * sc, dx = (W - dw) / 2;
    ctx.drawImage(sceneBuf, 0, wy0, W, Math.max(1, wy1 - wy0), dx, sy, dw, step);
  }
  // 地平線のハイライト
  ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fillRect(0, hy - 1, W, 2);

  // 木（奥→手前の順で重ねる）
  for (const t of treePositions.slice().sort((a, b) => a[1] - b[1])) drawTree(t[0], t[1]);

  updateCar(p1, true);
  updateCar(p2, false);
  // 手前(yが大きい)の車を後に描く
  const y1 = p1.isCrashed ? p1.crashY : getCarPosInfo(p1, true).y;
  const y2 = p2.isCrashed ? p2.crashY : getCarPosInfo(p2, false).y;
  if (y1 <= y2) { drawCar(p1, true); drawCar(p2, false); }
  else { drawCar(p2, false); drawCar(p1, true); }

  requestAnimationFrame(gameLoop);
}

// --- メニュー操作 ---
document.getElementById('btn-1p').onclick = () => {
  gameMode = '1P'; p2.isPlayer = false;
  document.getElementById('p2-label').textContent = 'COM';
  document.getElementById('mode-select').classList.add('hidden');
  document.getElementById('com-level-select').classList.remove('hidden');
};

document.getElementById('btn-2p').onclick = () => {
  gameMode = '2P'; p2.isPlayer = true;
  document.getElementById('p2-label').textContent = 'BLUE';
  document.getElementById('mode-select').classList.add('hidden');
  document.getElementById('course-select').classList.remove('hidden');
};

document.getElementById('btn-com-easy').onclick = () => {
  comLevel = 'EASY';
  document.getElementById('com-level-select').classList.add('hidden');
  document.getElementById('course-select').classList.remove('hidden');
};

document.getElementById('btn-com-hard').onclick = () => {
  comLevel = 'HARD';
  document.getElementById('com-level-select').classList.add('hidden');
  document.getElementById('course-select').classList.remove('hidden');
};

document.getElementById('btn-course-rect').onclick = () => { selectedCourse = 'RECT'; sceneDirty = true; startGame(); };
document.getElementById('btn-course-oval').onclick = () => { selectedCourse = 'OVAL'; sceneDirty = true; startGame(); };
document.getElementById('btn-course-heart').onclick = () => { selectedCourse = 'HEART'; sceneDirty = true; startGame(); };

// --- 戻るボタンの操作 ---
document.getElementById('btn-back-from-level').onclick = () => {
  document.getElementById('com-level-select').classList.add('hidden');
  document.getElementById('mode-select').classList.remove('hidden');
};

document.getElementById('btn-back-from-course').onclick = () => {
  document.getElementById('course-select').classList.add('hidden');
  if (gameMode === '1P') {
    document.getElementById('com-level-select').classList.remove('hidden');
  } else {
    document.getElementById('mode-select').classList.remove('hidden');
  }
};

function startGame() {
  // オーディオコンテキストの初期化（ユーザー操作のタイミングで行う）
  initAudio();

  document.getElementById('menu-layer').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('instruction').classList.remove('hidden');
  
  if (gameMode === '1P') {
    document.getElementById('instruction').innerHTML = "長押しで加速！<br>ブルッときたら2秒以内に離せばセーフ⚠️";
    document.getElementById('difficulty-box').classList.remove('hidden');
    document.getElementById('difficulty-text').textContent = comLevel === 'EASY' ? 'よわい' : 'つよい';
  } else {
    document.getElementById('instruction').innerHTML = "左側:RED 右側:BLUE<br>ブルッときたら2秒以内に離せばセーフ⚠️";
    document.getElementById('difficulty-box').classList.add('hidden');
  }

  gameState = 'COUNTDOWN';
  startCountdown();
}

// --- 操作入力 (マルチタッチ対応) ---
const activePointers = new Map();

function updatePressingStates() {
  if (gameState !== 'RACING') return;
  let p1Press = false, p2Press = false;

  activePointers.forEach((x) => {
    if (gameMode === '1P') p1Press = true;
    else {
      if (x < W / 2) p1Press = true;
      else p2Press = true;
    }
  });
  p1.pressing = p1Press;
  p2.pressing = p2Press;
}

canvas.addEventListener('pointerdown', (e) => {
  activePointers.set(e.pointerId, e.clientX);
  updatePressingStates();
});

const endPtr = (e) => {
  activePointers.delete(e.pointerId);
  updatePressingStates();
};
window.addEventListener('pointerup', endPtr);
window.addEventListener('pointercancel', endPtr);
canvas.addEventListener('pointermove', (e) => {
  if (activePointers.has(e.pointerId)) {
    activePointers.set(e.pointerId, e.clientX);
    updatePressingStates();
  }
});

// キーボード
window.addEventListener('keydown', (e) => {
  if (gameState !== 'RACING') return;
  if (e.code === 'Space') p1.pressing = true;
  if (e.code === 'Enter') p2.pressing = true;
});
window.addEventListener('keyup', (e) => {
  if (e.code === 'Space') p1.pressing = false;
  if (e.code === 'Enter') p2.pressing = false;
});

requestAnimationFrame(gameLoop);
</script>
