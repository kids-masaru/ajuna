<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ブランコ</title>
<link rel="stylesheet" href="assets/kit.css">
<style>
body {
  margin: 0; padding: 0;
  overflow: hidden;
  user-select: none;
  touch-action: manipulation;
  overscroll-behavior: none;
  width: 100vw; height: 100dvh;
}

#game {
  width: 100vw; height: 100dvh;
  position: relative;
  overflow: hidden;
}

/* Background image */
#bg {
  position: absolute;
  inset: 0;
  background: url('swing_bg.png') center/cover no-repeat;
  z-index: 0;
}

/* Swing pendulum */
#pendulum-wrap {
  position: absolute;
  top: 22%;
  left: 50%;
  width: 0; height: 0;
  z-index: 5;
}

#pendulum {
  position: absolute;
  transform-origin: 0 0;
  transform: rotate(0deg);
  will-change: transform;
}

#swing-girl-img {
  position: absolute;
  top: 0;
  left: -75px;
  width: 150px;
  height: auto;
  pointer-events: none;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
}

/* Rope extension from branch to pendulum origin */
#rope-ext {
  position: absolute;
  top: 18%;
  left: 50%;
  width: 3px;
  height: 4%;
  background: linear-gradient(180deg, #a08060, #c0a080);
  z-index: 4;
  transform: translateX(-50%);
}

/* HUD */
#hud {
  position: absolute;
  top: max(10px, env(safe-area-inset-top));
  left: 0; right: 0;
  z-index: 20;
  display: flex;
  justify-content: space-between;
  padding: 0 12px;
  pointer-events: none;
}

#score-box, #timer-box {
  background: rgba(0,0,0,0.5);
  border-radius: 16px;
  padding: 6px 14px;
  font-weight: 800;
  font-size: 15px;
  color: white;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  backdrop-filter: blur(4px);
}

#timer-box.warning { color: #ff6b6b; animation: timer-warn 0.5s infinite alternate; }
@keyframes timer-warn { 0% { opacity: 1; } 100% { opacity: 0.5; } }

/* Height bar */
#height-bar-wrap {
  position: absolute;
  right: 10px;
  top: 25%;
  width: 24px;
  height: 35%;
  background: rgba(0,0,0,0.3);
  border-radius: 12px;
  border: 2px solid rgba(255,255,255,0.4);
  z-index: 15;
  overflow: hidden;
  backdrop-filter: blur(4px);
}
#height-bar {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 0%;
  background: linear-gradient(180deg, #fbbf24, #f472b6);
  border-radius: 0 0 10px 10px;
  transition: height 0.3s;
}
#height-label {
  position: absolute;
  right: 8px;
  top: calc(25% - 16px);
  font-size: 9px;
  font-weight: 800;
  color: white;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  z-index: 15;
}

/* Push button */
#push-btn {
  position: absolute;
  bottom: max(24px, 6%);
  left: 50%;
  transform: translateX(-50%);
  width: 110px; height: 110px;
  border-radius: 50%;
  border: 5px solid rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.15);
  z-index: 15;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  font-weight: 900;
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.15s;
  backdrop-filter: blur(4px);
  text-shadow: 0 1px 3px rgba(0,0,0,0.3);
}

#push-btn.ready {
  border-color: #fbbf24;
  background: rgba(251,191,36,0.5);
  color: #fff;
  box-shadow: 0 0 30px rgba(251,191,36,0.6), 0 0 60px rgba(251,191,36,0.3);
  animation: btn-pulse 0.4s ease-in-out infinite alternate;
}
@keyframes btn-pulse {
  0% { transform: translateX(-50%) scale(1); }
  100% { transform: translateX(-50%) scale(1.1); }
}
#push-btn:active { transform: translateX(-50%) scale(0.9); }
#push-btn.perfect-flash {
  border-color: #fbbf24;
  background: rgba(251,191,36,0.7);
  box-shadow: 0 0 40px rgba(251,191,36,0.8);
}
#push-btn.good-flash {
  border-color: #34d399;
  background: rgba(52,211,153,0.6);
  box-shadow: 0 0 30px rgba(52,211,153,0.6);
}
#push-btn.miss-flash {
  border-color: #f87171;
  background: rgba(248,113,113,0.4);
}

/* Arrow */
#arrow {
  position: absolute;
  bottom: max(145px, 18%);
  left: 50%;
  transform: translateX(-50%);
  font-size: 32px;
  z-index: 15;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
}
#arrow.show {
  opacity: 1;
  animation: arrow-bounce 0.3s ease-in-out infinite alternate;
}
@keyframes arrow-bounce {
  0% { transform: translateX(-50%) translateY(0); }
  100% { transform: translateX(-50%) translateY(8px); }
}

/* Result text */
#result-text {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 30px;
  font-weight: 900;
  z-index: 20;
  pointer-events: none;
  opacity: 0;
  text-shadow: 0 3px 8px rgba(0,0,0,0.4);
}
#result-text.show { opacity: 1; animation: result-pop 0.5s ease-out; }
@keyframes result-pop {
  0% { transform: translateX(-50%) scale(0.5); }
  50% { transform: translateX(-50%) scale(1.3); }
  100% { transform: translateX(-50%) scale(1); }
}

/* Sparkle effects */
.sparkle {
  position: absolute;
  pointer-events: none;
  z-index: 10;
  font-size: 16px;
  animation: sparkle-fly 0.8s ease-out forwards;
}
@keyframes sparkle-fly {
  0% { opacity: 1; transform: scale(0.5); }
  50% { opacity: 1; transform: scale(1.2); }
  100% { opacity: 0; transform: scale(0.5) translateY(-30px); }
}

/* Title screen */
#title-screen {
  position: fixed; inset: 0; z-index: 50;
  background: url('swing_bg.png') center/cover no-repeat;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px;
  transition: opacity 0.5s;
}
#title-screen::before {
  content: '';
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.3);
}
#title-screen > * { position: relative; z-index: 1; }
#title-screen.hidden { opacity: 0; pointer-events: none; }
.title-emoji { font-size: 60px; animation: gp-float 3s ease-in-out infinite; }
.title-name {
  font-size: clamp(2rem, 8vw, 2.8rem);
  font-weight: 900; color: #fff;
  text-shadow: 0 3px 12px rgba(0,0,0,0.5);
}
.title-sub {
  font-size: 1rem; font-weight: 700;
  color: rgba(255,255,255,0.9);
  text-align: center; line-height: 1.6;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
}

/* Result screen */
#result-screen {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; opacity: 0; pointer-events: none;
  transition: opacity 0.5s;
}
#result-screen.show { opacity: 1; pointer-events: auto; }
.result-card {
  background: white; border-radius: 24px;
  padding: 28px 24px; max-width: 300px; width: 85%;
  display: flex; flex-direction: column;
  align-items: center; gap: 12px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}
.result-emoji { font-size: 56px; }
.result-title { font-weight: 900; font-size: 1.5rem; color: #333; }
.result-score { font-weight: 800; font-size: 1.2rem; color: #ec4899; }
.result-detail { font-weight: 700; font-size: 0.9rem; color: #888; }
</style>
</head>
<body class="gp gp-pink">
  <a href="index.html" class="gp-home" aria-label="ホーム">🏠</a>

  <div id="game">
    <div id="bg"></div>

    <div id="hud">
      <div id="timer-box">🕐 <span id="timer">30</span></div>
      <div id="score-box">⭐ <span id="score">0</span></div>
    </div>
    <div id="height-label">たかさ</div>
    <div id="height-bar-wrap"><div id="height-bar"></div></div>

    <div id="pendulum-wrap">
      <div id="pendulum">
        <img id="swing-girl-img" src="swing_girl.png" alt="ブランコの女の子">
      </div>
    </div>

    <div id="arrow">👇</div>
    <div id="result-text"></div>
    <div id="push-btn">おして！</div>
  </div>

  <div id="title-screen">
    <div class="title-emoji">🎠</div>
    <div class="title-name">ブランコ</div>
    <div class="title-sub">ボタンがひかったら おして！<br>タイミングよく おすと<br>たかく とべるよ！</div>
    <button class="gp-btn gp-btn--lg" id="btn-start" style="margin-top:16px">はじめる！</button>
  </div>

  <div id="result-screen">
    <div class="result-card gp-pop">
      <div class="result-emoji" id="r-emoji">🎉</div>
      <div class="result-title" id="r-title">すごい！</div>
      <div class="result-score" id="r-score"></div>
      <div class="result-detail" id="r-detail"></div>
      <button class="gp-btn gp-btn--lg" id="btn-retry" style="margin-top:8px">もういっかい！</button>
    </div>
  </div>

<script>
window.onerror = function(msg, src, line) {
  var d = document.createElement('div');
  d.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:red;color:white;padding:8px;font-size:12px;';
  d.textContent = 'ERR: ' + msg + ' (line ' + line + ')';
  document.body.appendChild(d);
};

var pendulum = document.getElementById('pendulum');
var pushBtn = document.getElementById('push-btn');
var arrowEl = document.getElementById('arrow');
var resultText = document.getElementById('result-text');
var scoreEl = document.getElementById('score');
var timerEl = document.getElementById('timer');
var timerBox = document.getElementById('timer-box');
var heightBar = document.getElementById('height-bar');
var gameEl = document.getElementById('game');

var AudioCtx = window.AudioContext || window.webkitAudioContext;
var audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

var state = 'title';
var angle = 0;
var angularVel = 0;
var swingHeight = 5;
var score = 0;
var combo = 0;
var totalPushes = 0;
var perfectCount = 0;
var goodCount = 0;
var gameTime = 30;
var timeLeft = 30;
var timerInterval = null;
var pushCooldown = false;
var isReady = false;

var gravity = 0.0004;
var damping = 0.998;

function playChime(freq) {
  ensureAudio();
  var t = audioCtx.currentTime;
  var osc = audioCtx.createOscillator();
  var g = audioCtx.createGain();
  osc.connect(g); g.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(0.1, t);
  g.gain.exponentialRampToValueAtTime(0.01, t + 0.12);
  osc.start(t); osc.stop(t + 0.12);
}

function playPerfect() {
  ensureAudio();
  var t = audioCtx.currentTime;
  [880, 1100, 1320].forEach(function(f, i) {
    var osc = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    osc.connect(g); g.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(f, t + i * 0.06);
    g.gain.setValueAtTime(0, t + i * 0.06);
    g.gain.linearRampToValueAtTime(0.12, t + i * 0.06 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.01, t + i * 0.06 + 0.15);
    osc.start(t + i * 0.06); osc.stop(t + i * 0.06 + 0.15);
  });
}

function playGood() {
  ensureAudio();
  var t = audioCtx.currentTime;
  var osc = audioCtx.createOscillator();
  var g = audioCtx.createGain();
  osc.connect(g); g.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(660, t);
  osc.frequency.exponentialRampToValueAtTime(880, t + 0.1);
  g.gain.setValueAtTime(0.1, t);
  g.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
  osc.start(t); osc.stop(t + 0.15);
}

function playMiss() {
  ensureAudio();
  var t = audioCtx.currentTime;
  var osc = audioCtx.createOscillator();
  var g = audioCtx.createGain();
  osc.connect(g); g.connect(audioCtx.destination);
  osc.type = 'square';
  osc.frequency.setValueAtTime(200, t);
  osc.frequency.exponentialRampToValueAtTime(100, t + 0.12);
  g.gain.setValueAtTime(0.05, t);
  g.gain.exponentialRampToValueAtTime(0.01, t + 0.12);
  osc.start(t); osc.stop(t + 0.12);
}

function playFanfare() {
  ensureAudio();
  var t = audioCtx.currentTime;
  [523, 659, 784, 880, 1047].forEach(function(f, i) {
    var osc = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    osc.connect(g); g.connect(audioCtx.destination);
    osc.type = i < 3 ? 'square' : 'sine';
    osc.frequency.setValueAtTime(f, t + i * 0.12);
    g.gain.setValueAtTime(0, t + i * 0.12);
    g.gain.linearRampToValueAtTime(0.15, t + i * 0.12 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.01, t + i * 0.12 + (i === 4 ? 0.5 : 0.2));
    osc.start(t + i * 0.12); osc.stop(t + i * 0.12 + (i === 4 ? 0.5 : 0.2));
  });
}

function spawnSparkles() {
  for (var i = 0; i < 4; i++) {
    var el = document.createElement('div');
    el.className = 'sparkle';
    el.textContent = '✨';
    el.style.left = (30 + Math.random() * 40) + '%';
    el.style.top = (30 + Math.random() * 30) + '%';
    el.style.animationDelay = (Math.random() * 0.2) + 's';
    gameEl.appendChild(el);
    el.addEventListener('animationend', function() { this.remove(); });
  }
}

function showResult(text, color, cls) {
  resultText.textContent = text;
  resultText.style.color = color;
  resultText.classList.remove('show');
  void resultText.offsetWidth;
  resultText.classList.add('show');
  pushBtn.className = cls + '-flash';
  setTimeout(function() {
    resultText.classList.remove('show');
    pushBtn.className = '';
  }, 500);
}

function handleTap() {
  if (state !== 'playing' || pushCooldown) return;
  totalPushes++;
  pushCooldown = true;
  setTimeout(function() { pushCooldown = false; }, 300);

  if (isReady && angle < 0) {
    var backness = Math.abs(angle) / Math.max(swingHeight, 5);

    if (backness > 0.7) {
      combo++;
      perfectCount++;
      var points = 100 * Math.min(combo, 5);
      score += points;
      swingHeight = Math.min(55, swingHeight + 5);
      angularVel += 0.015;
      showResult('パーフェクト！ +' + points, '#fbbf24', 'perfect');
      playPerfect();
      spawnSparkles();
      if (navigator.vibrate) navigator.vibrate(30);
    } else {
      combo++;
      goodCount++;
      var points = 50 * Math.min(combo, 3);
      score += points;
      swingHeight = Math.min(55, swingHeight + 2);
      angularVel += 0.01;
      showResult('いいね！ +' + points, '#34d399', 'good');
      playGood();
    }
  } else {
    combo = 0;
    showResult('おしい！', '#f87171', 'miss');
    playMiss();
  }

  scoreEl.textContent = score;
  heightBar.style.height = Math.min(100, (swingHeight / 55) * 100) + '%';
}

var lastTime = 0;
var readyChimePlayed = false;

function gameLoop(now) {
  if (state !== 'playing') { requestAnimationFrame(gameLoop); return; }

  var dt = lastTime ? (now - lastTime) : 16;
  lastTime = now;
  if (dt > 50) dt = 50;

  var angleRad = angle * Math.PI / 180;
  var accel = -gravity * Math.sin(angleRad) * dt;
  angularVel += accel;
  angularVel *= damping;
  angle += angularVel * dt;

  pendulum.style.transform = 'rotate(' + angle + 'deg)';

  var wasReady = isReady;
  isReady = angle < -2 && angularVel > -0.003;

  if (isReady && !pushCooldown) {
    pushBtn.classList.add('ready');
    arrowEl.classList.add('show');
    if (!readyChimePlayed) {
      playChime(1200);
      readyChimePlayed = true;
    }
  } else {
    pushBtn.classList.remove('ready');
    arrowEl.classList.remove('show');
    if (!isReady) readyChimePlayed = false;
  }

  requestAnimationFrame(gameLoop);
}

function startGame() {
  state = 'playing';
  angle = -8;
  angularVel = 0;
  swingHeight = 8;
  score = 0;
  combo = 0;
  totalPushes = 0;
  perfectCount = 0;
  goodCount = 0;
  timeLeft = gameTime;
  lastTime = 0;
  pushCooldown = false;
  isReady = false;
  readyChimePlayed = false;

  scoreEl.textContent = '0';
  timerEl.textContent = timeLeft;
  timerBox.classList.remove('warning');
  heightBar.style.height = '0%';

  document.getElementById('title-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.remove('show');

  timerInterval = setInterval(function() {
    timeLeft--;
    timerEl.textContent = timeLeft;
    if (timeLeft <= 10) timerBox.classList.add('warning');
    if (timeLeft <= 0) endGame();
  }, 1000);

  requestAnimationFrame(gameLoop);
}

function endGame() {
  state = 'ended';
  clearInterval(timerInterval);
  pushBtn.className = '';
  arrowEl.classList.remove('show');

  setTimeout(function() {
    playFanfare();
    var emoji = document.getElementById('r-emoji');
    var title = document.getElementById('r-title');
    var scoreR = document.getElementById('r-score');
    var detail = document.getElementById('r-detail');

    scoreR.textContent = '⭐ ' + score + ' てん';
    if (score >= 2000) { emoji.textContent = '🏆'; title.textContent = 'すごすぎ！！'; }
    else if (score >= 1000) { emoji.textContent = '🎉'; title.textContent = 'やったね！'; }
    else if (score >= 400) { emoji.textContent = '😊'; title.textContent = 'がんばったね！'; }
    else { emoji.textContent = '🎠'; title.textContent = 'おしまい！'; }

    var details = [];
    if (perfectCount > 0) details.push('パーフェクト ' + perfectCount + ' かい');
    if (goodCount > 0) details.push('いいね ' + goodCount + ' かい');
    detail.textContent = details.join(' / ');

    document.getElementById('result-screen').classList.add('show');
  }, 500);
}

pushBtn.addEventListener('pointerdown', function(e) {
  e.preventDefault();
  handleTap();
});
document.getElementById('btn-start').addEventListener('click', function() {
  ensureAudio();
  startGame();
});
document.getElementById('btn-retry').addEventListener('click', function() {
  ensureAudio();
  startGame();
});
document.addEventListener('dblclick', function(e) { e.preventDefault(); });
document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
