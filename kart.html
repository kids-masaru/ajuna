<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ドットカート</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; touch-action:none; }
  html,body { width:100%; height:100%; overflow:hidden; background:#0a0a14; font-family:"Courier New",monospace; }

  .rotate-notice { display:none; }
  @media (orientation:portrait) { .rotate-notice { position:fixed; inset:0; z-index:99999; background:#0a0a14; color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:16px; padding:24px; } }
  .rotate-notice .ico { font-size:60px; animation:rot 1.5s ease-in-out infinite; }
  .rotate-notice p { font-size:16px; margin-top:18px; letter-spacing:1px; }
  @keyframes rot { 0%,40%{transform:rotate(0);} 60%,100%{transform:rotate(90deg);} }
  .rotate-go { margin-top:18px; font-family:inherit; font-weight:800; font-size:16px; color:#fff; background:#2244cc; border:3px solid #fff; padding:12px 24px; cursor:pointer; box-shadow:3px 3px 0 #000; }
  .rotate-go:active { transform:translate(2px,2px); box-shadow:1px 1px 0 #000; }

  #stage { position:absolute; inset:0; overflow:hidden; }
  #stage.force-landscape { width:100vh; height:100vw; transform:rotate(90deg); transform-origin:top left; left:100%; top:0; }
  body.forced .rotate-notice { display:none !important; }

  canvas { display:block; image-rendering:pixelated; image-rendering:crisp-edges; width:100%; height:100%; }

  .steer-btn { position:absolute; bottom:16px; width:80px; height:80px; z-index:12;
    border-radius:50%; background:rgba(255,255,255,.2); border:3px solid rgba(255,255,255,.5);
    color:#fff; font-size:32px; display:none; align-items:center; justify-content:center; }
  #btnL { right:106px; }
  #btnR { right:16px; }
  .steer-btn.on { background:rgba(255,255,255,.5); transform:scale(.92); }

  #btnGas { position:absolute; bottom:16px; left:16px; width:80px; height:80px; z-index:12;
    border-radius:50%; background:rgba(80,200,80,.3); border:3px solid rgba(80,255,80,.6);
    color:#fff; font-size:28px; font-weight:bold; display:none; align-items:center; justify-content:center; }
  #btnGas.on { background:rgba(80,255,80,.6); }

  #homeBtn { position:absolute; top:8px; left:8px; z-index:30; width:36px; height:36px;
    background:rgba(255,255,255,.18); border:2px solid rgba(255,255,255,.5); border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:18px;
    text-decoration:none; box-shadow:2px 2px 0 #000; }

  #itemBtn { position:absolute; right:16px; bottom:106px; width:80px; height:80px; z-index:12;
    border:4px solid #fff; border-radius:16px; background:rgba(0,0,0,.45);
    display:none; flex-direction:column; align-items:center; justify-content:center;
    color:#fff; box-shadow:3px 3px 0 #000; font-size:36px; }
  #itemBtn .dash { font-size:30px; opacity:.5; }
  #itemBtn .lbl { font-size:9px; letter-spacing:1px; margin-top:2px; opacity:.85; }
  #itemBtn .item-icon { font-size:36px; display:none; }
  #itemBtn.ready { border-color:#ffd93b; background:rgba(40,20,0,.6); animation:pulse 1s infinite; }
  #itemBtn.ready .item-icon { display:block; }
  #itemBtn.ready .dash { display:none; }
  @keyframes pulse { 0%,100%{box-shadow:3px 3px 0 #000;} 50%{box-shadow:0 0 14px #ffd93b,3px 3px 0 #000;} }

  #msg { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:20;
    color:#fff; text-align:center; text-shadow:2px 2px 0 #000; pointer-events:none; width:80%; }
  #msg h1 { font-size:28px; letter-spacing:3px; color:#ffd93b; margin-bottom:6px; }
  #msg h2 { font-size:13px; letter-spacing:2px; color:#7fd0ff; margin-bottom:14px; }
  #msg p { font-size:12px; line-height:1.8; }
  #msg .big { font-size:40px; color:#ff5a5a; margin:8px 0; }
  #startBtn { pointer-events:auto; margin-top:16px; display:inline-block; background:#2244cc; color:#fff;
    border:3px solid #fff; padding:12px 30px; font-size:15px; font-weight:bold; letter-spacing:2px;
    font-family:inherit; cursor:pointer; box-shadow:4px 4px 0 #000; }
  #startBtn:active { transform:translate(2px,2px); box-shadow:2px 2px 0 #000; }

  #count { position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); z-index:25;
    font-size:80px; font-weight:bold; color:#fff; text-shadow:4px 4px 0 #000,0 0 22px #ffd93b;
    pointer-events:none; opacity:0; }

  #flashOverlay { position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:15; transition:opacity 0.15s; }

  .hidden { display:none !important; }
</style>
</head>
<body>

<div class="rotate-notice">
  <div class="ico">📱</div>
  <p>スマホを横向きにしてね</p>
  <button class="rotate-go" onclick="forceLandscape()">よこむきにする 🔄</button>
</div>

<div id="stage">
  <a id="homeBtn" href="index.html">🏠</a>
  <canvas id="game"></canvas>

  <div id="btnL" class="steer-btn">◀</div>
  <div id="btnGas">GO</div>
  <div id="btnR" class="steer-btn">▶</div>
  <div id="itemBtn"><span class="item-icon"></span><span class="dash">?</span><span class="lbl">ITEM</span></div>
  <div id="count"></div>
  <div id="flashOverlay"></div>

  <div id="msg">
    <h1>PIXEL KART RACING</h1>
    <h2>ドットカート</h2>
    <p>GO＝アクセル ◀▶＝ハンドル<br>アイテムボックスを取ってアイテムゲット！<br>右下ボタンでアイテム使用<br>3周してゴールゲートをくぐれ！</p>
    <button id="startBtn">スタート</button>
  </div>
</div>

<script>

/* ---- Canvas setup ---- */
const cv = document.getElementById('game'), ctx = cv.getContext('2d');
let W = 320, H = 180, HORIZON;
let outputImageData;

function resizeCanvas(){
  const stage = document.getElementById('stage');
  const forced = stage.classList.contains('force-landscape');
  const ww = forced ? window.innerHeight : window.innerWidth;
  const wh = forced ? window.innerWidth : window.innerHeight;
  const scale = Math.min(ww/320, wh/180);
  W = Math.round(ww/scale);
  H = Math.round(wh/scale);
  HORIZON = Math.round(H * 0.4);
  cv.width = W; cv.height = H;
  ctx.imageSmoothingEnabled = false;
  outputImageData = ctx.createImageData(W, H);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

    {x: 280, y: 470},
    {x: 300, y: 510},
    {x: 280, y: 550},
    {x: 240, y: 580},
    {x: 220, y: 620},
    // Final right curve leading back to start
    {x: 210, y: 650},
    {x: 215, y: 675},
    {x: 230, y: 695},
  ];
  return pts;
}

function catmullRom(p0, p1, p2, p3, t) {
  const t2 = t*t, t3 = t2*t;
  return {
    x: 0.5 * ((2*p1.x) + (-p0.x+p2.x)*t + (2*p0.x-5*p1.x+4*p2.x-p3.x)*t2 + (-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
    y: 0.5 * ((2*p1.y) + (-p0.y+p2.y)*t + (2*p0.y-5*p1.y+4*p2.y-p3.y)*t2 + (-p0.y+3*p1.y-3*p2.y+p3.y)*t3)
  };
}

function smoothTrack(controlPts, stepsPerSegment) {
  const n = controlPts.length;
  const result = [];
  for (let i = 0; i < n; i++) {
    const p0 = controlPts[(i-1+n) % n];
    const p1 = controlPts[i];
    const p2 = controlPts[(i+1) % n];
    const p3 = controlPts[(i+2) % n];
    for (let s = 0; s < stepsPerSegment; s++) {
      result.push(catmullRom(p0, p1, p2, p3, s / stepsPerSegment));
    }
  }
  return result;
}

/* Start line position (index into trackWaypoints) */
let startLineIdx = 0;

function buildTrackMap() {
  const controlPts = buildTrackCenterline();
  trackCenterline = controlPts;
  trackWaypoints = smoothTrack(controlPts, 20);
  startLineIdx = 0; // first waypoint is start area

  /* Fill background with grass */
  trackCtx.fillStyle = '#3a8';
  trackCtx.fillRect(0, 0, MAP_SIZE, MAP_SIZE);

  /* Draw grass checkerboard pattern */
  for (let gy = 0; gy < MAP_SIZE; gy += 32) {
    for (let gx = 0; gx < MAP_SIZE; gx += 32) {
      if (((gx/32) + (gy/32)) % 2 === 0) {
        trackCtx.fillStyle = '#2a7';
        trackCtx.fillRect(gx, gy, 32, 32);
      }
    }
  }

  /* Draw rumble strips (wider than road) */
  trackCtx.lineWidth = ROAD_WIDTH * 2 + 14;
  trackCtx.lineCap = 'round';
  trackCtx.lineJoin = 'round';
  trackCtx.strokeStyle = '#d33';
  trackCtx.setLineDash([12, 12]);
  drawTrackPath(trackCtx);
  trackCtx.stroke();

  /* Draw white part of rumble strip */
  trackCtx.strokeStyle = '#eee';
  trackCtx.lineDashOffset = 12;
  drawTrackPath(trackCtx);
  trackCtx.stroke();
  trackCtx.setLineDash([]);
  trackCtx.lineDashOffset = 0;

  /* Draw road surface */
  trackCtx.lineWidth = ROAD_WIDTH * 2;
  trackCtx.strokeStyle = '#555';
  drawTrackPath(trackCtx);
  trackCtx.stroke();

  /* Draw road edge lines (thin white) */
  trackCtx.lineWidth = ROAD_WIDTH * 2 - 4;
  trackCtx.strokeStyle = '#666';
  drawTrackPath(trackCtx);
  trackCtx.stroke();

  /* Draw center dashed line */
  trackCtx.lineWidth = 2;
  trackCtx.strokeStyle = '#fff';
  trackCtx.setLineDash([10, 14]);
  drawTrackPath(trackCtx);
  trackCtx.stroke();
  trackCtx.setLineDash([]);

  /* Draw start/finish checkerboard */
  drawStartFinishLine();

  /* Cache pixel data */
  const imgData = trackCtx.getImageData(0, 0, MAP_SIZE, MAP_SIZE);
  trackMapData = new Uint32Array(imgData.data.buffer);
}

function drawTrackPath(c) {
  c.beginPath();
  c.moveTo(trackWaypoints[0].x, trackWaypoints[0].y);
  for (let i = 1; i < trackWaypoints.length; i++) {
    c.lineTo(trackWaypoints[i].x, trackWaypoints[i].y);
  }
  c.closePath();
}

function drawStartFinishLine() {
  /* Draw checkerboard across the road at the start position */
  const idx = startLineIdx;
  const wp = trackWaypoints;
  const n = wp.length;
  const p = wp[idx];
  const pNext = wp[(idx + 1) % n];
  /* Direction tangent */
  const dx = pNext.x - p.x;
  const dy = pNext.y - p.y;
  const len = Math.sqrt(dx*dx + dy*dy) || 1;
  /* Normal (perpendicular) */
  const nx = -dy / len;
  const ny = dx / len;

  const checkerSize = 8;
  const rows = 4;
  const cols = Math.floor(ROAD_WIDTH * 2 / checkerSize);

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const along = (r - rows/2) * checkerSize;
      const across = (c - cols/2) * checkerSize;
      const cx = p.x + (dx/len) * along + nx * across;
      const cy = p.y + (dy/len) * along + ny * across;
      trackCtx.fillStyle = ((r + c) % 2 === 0) ? '#111' : '#fff';
      trackCtx.fillRect(cx - checkerSize/2, cy - checkerSize/2, checkerSize, checkerSize);
    }
  }
}

/* Check if a position is on the road (by color) */
function isOnRoad(wx, wy) {
  const mx = Math.floor(wx) & (MAP_SIZE - 1);
  const my = Math.floor(wy) & (MAP_SIZE - 1);
  const pixel = trackMapData[my * MAP_SIZE + mx];
  /* Road colors are grays: #555 = 0xFF555555, #666 = 0xFF666666 */
  const r = (pixel >> 0) & 0xFF;
  const g = (pixel >> 8) & 0xFF;
  const b = (pixel >> 16) & 0xFF;
  /* Road pixels: gray tones where r=g=b and value > 0x40 and < 0xA0 */
  /* Also include checkerboard (very dark or white) and white lines */
  const isGray = Math.abs(r - g) < 20 && Math.abs(g - b) < 20;
  const isRoad = isGray && r > 0x30;
  /* Also check for rumble strip (red/white) - treat as partial road */
  const isRumble = (r > 0xBB && g < 0x50 && b < 0x50); // red
  return isRoad || isRumble;
}

/* ================================================================
   MODE 7 RENDERER
   ================================================================ */
const CAMERA_HEIGHT = 80;
const FOCAL_LENGTH = 160;
const FOG_START = 400;
const FOG_END = 900;

/* Sky gradient colors */
const SKY_TOP_R = 0x3b, SKY_TOP_G = 0x7d, SKY_TOP_B = 0xd8;
const SKY_BOT_R = 0xbf, SKY_BOT_G = 0xe0, SKY_BOT_B = 0xff;

function renderSky() {
  const outBuf = outputImageData.data;
  for (let y = 0; y < HORIZON; y++) {
    const t = y / (HORIZON || 1);
    const r = SKY_TOP_R + (SKY_BOT_R - SKY_TOP_R) * t;
    const g = SKY_TOP_G + (SKY_BOT_G - SKY_TOP_G) * t;
    const b = SKY_TOP_B + (SKY_BOT_B - SKY_TOP_B) * t;
    const ri = r | 0, gi = g | 0, bi = b | 0;
    for (let x = 0; x < W; x++) {
      const idx = (y * W + x) * 4;
      outBuf[idx] = ri;
      outBuf[idx+1] = gi;
      outBuf[idx+2] = bi;
      outBuf[idx+3] = 255;
    }
  }

  /* Draw simple mountain silhouettes on the sky */
  const mountainScroll = (-player.angle * 60) % W;
  const mountains = [
    { period: 70, amp: 28, yOff: HORIZON, color_r: 0x6b, color_g: 0x7a, color_b: 0x8c },
    { period: 54, amp: 20, yOff: HORIZON, color_r: 0x56, color_g: 0x66, color_b: 0x78 },
  ];
  for (const m of mountains) {
    for (let x = 0; x < W; x++) {
      const wx = (x + mountainScroll + 10000) % m.period;
      const peak = m.yOff - m.amp * Math.max(0, 1 - Math.abs(wx - m.period/2) / (m.period/2));
      for (let y = Math.floor(peak); y < m.yOff && y >= 0; y++) {
        if (y < HORIZON) {
          const idx = (y * W + x) * 4;
          outBuf[idx] = m.color_r;
          outBuf[idx+1] = m.color_g;
          outBuf[idx+2] = m.color_b;
          outBuf[idx+3] = 255;
        }
      }
    }
  }

  /* Simple clouds */
  const cloudScroll = (-player.angle * 30 + 10000) % W;
  for (let i = 0; i < 5; i++) {
    const cx = ((i * 90 + cloudScroll) % (W + 80)) - 40;
    const cy = 10 + (i % 3) * 12;
    for (let dy = -4; dy <= 4; dy++) {
      const hw = 12 - Math.abs(dy) * 2;
      for (let dx = -hw; dx <= hw; dx++) {
        const px = Math.floor(cx + dx);
        const py = cy + dy;
        if (px >= 0 && px < W && py >= 0 && py < HORIZON) {
          const idx = (py * W + px) * 4;
          outBuf[idx] = 255;
          outBuf[idx+1] = 255;
          outBuf[idx+2] = 255;
          outBuf[idx+3] = 200;
        }
      }
    }
  }
}

function renderMode7() {
  if (!trackMapData) return;
  const outData = new Uint32Array(outputImageData.data.buffer);
  const mapData = trackMapData;

  const cosA = Math.cos(player.angle);
  const sinA = Math.sin(player.angle);

  /* Fog color (sky bottom) in ABGR */
  const fogColor_R = SKY_BOT_R;
  const fogColor_G = SKY_BOT_G;
  const fogColor_B = SKY_BOT_B;

  for (let screenY = HORIZON; screenY < H; screenY++) {
    const rowDist = CAMERA_HEIGHT * FOCAL_LENGTH / (screenY - HORIZON + 1);

    /* Fog factor */
    let fog = 0;
    if (rowDist > FOG_START) {
      fog = Math.min(1, (rowDist - FOG_START) / (FOG_END - FOG_START));
    }
    const fogR = fog * fogColor_R;
    const fogG = fog * fogColor_G;
    const fogB = fog * fogColor_B;
    const invFog = 1 - fog;

    for (let screenX = 0; screenX < W; screenX++) {
      const dx = (screenX - W * 0.5) * rowDist / FOCAL_LENGTH;
      const dz = rowDist;

      const worldX = player.x + dx * cosA - dz * sinA;
      const worldZ = player.y + dx * sinA + dz * cosA;

      const mapX = Math.floor(worldX) & (MAP_SIZE - 1);
      const mapY = Math.floor(worldZ) & (MAP_SIZE - 1);

      let pixel = mapData[mapY * MAP_SIZE + mapX];

      if (fog > 0) {
        const pr = (pixel >> 0) & 0xFF;
        const pg = (pixel >> 8) & 0xFF;
        const pb = (pixel >> 16) & 0xFF;
        const nr = (pr * invFog + fogR) | 0;
        const ng = (pg * invFog + fogG) | 0;
        const nb = (pb * invFog + fogB) | 0;
        pixel = 0xFF000000 | (nb << 16) | (ng << 8) | nr;
      }

      outData[screenY * W + screenX] = pixel;
    }
  }
}

/* ================================================================
   SPRITE PROJECTION (project world objects onto screen)
   ================================================================ */
function worldToScreen(objX, objY) {
  /* Object position relative to player */
  const dx = objX - player.x;
  const dy = objY - player.y;

  /* Rotate into camera space */
  const cosA = Math.cos(player.angle);
  const sinA = Math.sin(player.angle);
  const cameraX = dx * cosA + dy * sinA;
  const cameraZ = -dx * sinA + dy * cosA;

  if (cameraZ <= 1) return null; // behind camera

  const screenX = (W * 0.5) + (cameraX * FOCAL_LENGTH / cameraZ);
  const screenY = HORIZON + (CAMERA_HEIGHT * FOCAL_LENGTH / cameraZ);

  return { sx: screenX, sy: screenY, dist: cameraZ };
}

];
const TOTAL_WEIGHT = ITEMS.reduce((s,i) => s+i.weight, 0);

  return ITEMS[0].name;
}

function makeTintedKart(color, size) {
  const key = color + '_' + size;
  if (cpuTintCache[key]) return cpuTintCache[key];
  const w = size, h = Math.round(size * (kartImg.height / kartImg.width));
  const oc = document.createElement('canvas');

  const ox = oc.getContext('2d');
  ox.drawImage(kartImg, 0, 0, w, h);
  ox.globalCompositeOperation = 'source-atop';
  ox.fillStyle = color; ox.globalAlpha = 0.5; ox.fillRect(0,0,w,h);
  cpuTintCache[key] = oc;
  return oc;
}

function initPlayer() {
  /* Place player at start line, facing along the track */
  const wp = trackWaypoints;
  const startIdx = startLineIdx;
  const p0 = wp[startIdx];
  const p1 = wp[(startIdx + 5) % wp.length];
  player.x = p0.x;
  player.y = p0.y;
  player.angle = Math.atan2(p1.y - p0.y, p1.x - p0.x);
  player.speed = 0;
  player.steer = 0;
  player.lap = 0;
  player.item = null;
  player.boostT = 0;
  player.starT = 0;
  player.spinT = 0;
  player.waypointIdx = 10;
  player.lastCrossIdx = -1;
  player.lightningT = 0;
  player.flashT = 0;
  player.checkpointHalf = false;
}

function initCPUs() {
  cpus = [];
  const wp = trackWaypoints;
  const n = wp.length;
  for (let i = 0; i < 3; i++) {
    const offset = 15 + i * 10;
    const idx = (startLineIdx - offset + n) % n;
    const p = wp[idx];
    const pn = wp[(idx + 5) % n];
    cpus.push({
      x: p.x + (i - 1) * 15,
      y: p.y + (i - 1) * 8,
      angle: Math.atan2(pn.y - p.y, pn.x - p.x),
      speed: 0,
      baseSpeed: 2.5 + Math.random() * 0.6,
      color: CPU_COLORS[i],
      waypointIdx: (idx + 20) % n,
      lap: 0,
      spinT: 0,
      shrinkT: 0,
      lapProgress: 0, // fractional progress through lap
      checkpointHalf: false
    });
  }
}

function placeItemBoxes() {
  itemBoxPositions = [];
  const wp = trackWaypoints;
  const n = wp.length;
  const numSets = 6;
  const spacing = Math.floor(n / numSets);
  const laneOffsets = [-25, -8, 8, 25];

  for (let s = 0; s < numSets; s++) {
    const baseIdx = (Math.floor(spacing * (s + 0.5)) + startLineIdx) % n;
    const p = wp[baseIdx];
    const pn = wp[(baseIdx + 3) % n];
    const dx = pn.x - p.x, dy = pn.y - p.y;
    const len = Math.sqrt(dx*dx + dy*dy) || 1;
    const nx = -dy/len, ny = dx/len;

    for (const off of laneOffsets) {
      itemBoxPositions.push({
        x: p.x + nx * off,
        y: p.y + ny * off,
        taken: false,
        respawnT: 0
      });
    }
  }
}

function useItem() {
  if (gameState !== 'play' || !player.item) return;
  const it = player.item;
  player.item = null;
  updateItemUI();
  switch (it) {
    case 'mushroom':

      break;
    case 'star':

      player.boostT = 8.0;
      break;
    case 'banana':
      bananas.push({
        x: player.x - Math.cos(player.angle) * 30,
        y: player.y - Math.sin(player.angle) * 30,
        active: true
      });
      break;
    case 'shell': {
      const spd = 5;
      shells.push({
        x: player.x + Math.cos(player.angle) * 20,
        y: player.y + Math.sin(player.angle) * 20,

      });

/* ================================================================
   SPIN OUT
   ================================================================ */
function spinOutPlayer() {
  if (player.starT > 0 || player.spinT > 0) return;
  player.spinT = 1.5;
  player.speed *= 0.2;
}
function spinOutCPU(c) {
  if (c.spinT > 0) return;
  c.spinT = 1.5;
  c.speed *= 0.2;
}

/* ================================================================
   LAP COUNTING
   Using waypoint-based progress tracking.
   The track has N waypoints in a loop. We track what fraction
   of the loop has been traversed.
   ================================================================ */
function nearestWaypointIdx(x, y) {
  let best = 0, bestD = Infinity;
  const wp = trackWaypoints;
  /* Only check every 5th to save time */
  for (let i = 0; i < wp.length; i += 5) {
    const dx = wp[i].x - x, dy = wp[i].y - y;
    const d = dx*dx + dy*dy;
    if (d < bestD) { bestD = d; best = i; }
  }
  /* Refine around best */
  const start = (best - 5 + wp.length) % wp.length;
  for (let j = 0; j < 11; j++) {
    const i = (start + j) % wp.length;
    const dx = wp[i].x - x, dy = wp[i].y - y;
    const d = dx*dx + dy*dy;
    if (d < bestD) { bestD = d; best = i; }
  }
  return best;
}

/* Cross start line detection */
const LAP_ZONE_RADIUS = 50;
function checkLapCrossing(entity) {
  const wp = trackWaypoints;
  const n = wp.length;
  const curIdx = nearestWaypointIdx(entity.x, entity.y);
  const halfN = Math.floor(n / 2);

  /* Must have passed the halfway point */
  if (curIdx > halfN * 0.4 && curIdx < halfN * 1.6) {
    entity.checkpointHalf = true;
  }

  /* Near start line and has passed checkpoint */
  if (entity.checkpointHalf && curIdx < n * 0.05) {
    const sp = wp[startLineIdx];
    const dx = entity.x - sp.x;
    const dy = entity.y - sp.y;
    if (dx*dx + dy*dy < LAP_ZONE_RADIUS * LAP_ZONE_RADIUS) {
      entity.lap++;
      entity.checkpointHalf = false;
      return true;
    }
  }
  return false;
}

function getProgress(entity) {
  const n = trackWaypoints.length;
  const idx = nearestWaypointIdx(entity.x, entity.y);
  return entity.lap + idx / n;
}

function getPosition() {
  const pp = getProgress(player);
  let pos = 1;
  for (const c of cpus) { if (getProgress(c) > pp) pos++; }
  return pos;
}

/* ================================================================
   UPDATE
   ================================================================ */
function update(dt) {
  if (gameState !== 'play') return;

  /* Timers */
  if (player.boostT > 0) player.boostT -= dt;
  if (player.starT > 0) player.starT -= dt;
  if (player.spinT > 0) player.spinT -= dt;
  if (player.lightningT > 0) player.lightningT -= dt;
  if (player.flashT > 0) player.flashT -= dt;

  /* Steering */
  let tSteer = 0;
  if (player.spinT <= 0) {
    if (input.left || keys['ArrowLeft']) tSteer = -1;
    if (input.right || keys['ArrowRight']) tSteer += 1;
  } else {
    tSteer = Math.sin(player.spinT * 12) * 1.5;
  }
  player.steer += (tSteer - player.steer) * 0.15;

  /* Speed */
  const gasOn = input.gas || keys['ArrowUp'];
  const onRoad = isOnRoad(player.x, player.y);
  let maxSpeed = player.maxSpeed;
  if (!onRoad) maxSpeed *= 0.45;
  if (player.boostT > 0) { maxSpeed = player.maxSpeed * 1.8; }

  if (gasOn) {
    player.speed += (onRoad ? 0.06 : 0.03);
  } else {
    player.speed -= 0.03;
  }
  player.speed = Math.max(0, Math.min(maxSpeed, player.speed));

  /* Turning: steering rate inversely related to speed (faster = wider turns) */
  const turnRate = 0.03 * (1.0 + 0.5 / (1 + player.speed * 0.5));
  player.angle += player.steer * player.speed * turnRate;

  /* Move forward */
  player.x += Math.cos(player.angle) * player.speed;
  player.y += Math.sin(player.angle) * player.speed;

  /* Lap crossing */
  if (checkLapCrossing(player)) {
    if (player.lap >= player.totalLaps) return winGame();
  }

  /* Item box collision */
  for (const box of itemBoxPositions) {
    if (box.taken) { box.respawnT -= dt; if (box.respawnT <= 0) box.taken = false; continue; }
    const dx = player.x - box.x, dy = player.y - box.y;
    if (dx*dx + dy*dy < 20*20) {
      box.taken = true; box.respawnT = 5;
      if (!player.item) { player.item = randomItem(); updateItemUI(); }
    }
  }

  /* Banana collision (player) */
  for (const b of bananas) {
    if (!b.active) continue;
    const dx = player.x - b.x, dy = player.y - b.y;
    if (dx*dx + dy*dy < 15*15) {
      spinOutPlayer(); b.active = false;
    }
  }

  /* Shell movement & collision */
  for (const s of shells) {
    if (!s.active) continue;
    s.x += s.dx;
    s.y += s.dy;
    s.ttl -= dt;
    if (s.ttl <= 0 || !isOnRoad(s.x, s.y)) { s.active = false; continue; }
    /* Shell hits CPU */
    for (const c of cpus) {
      const dx = s.x - c.x, dy = s.y - c.y;
      if (dx*dx + dy*dy < 20*20) {
        spinOutCPU(c); s.active = false; break;
      }
    }
  }

  /* Star collision with CPUs */
  if (player.starT > 0) {
    for (const c of cpus) {
      const dx = player.x - c.x, dy = player.y - c.y;
      if (dx*dx + dy*dy < 30*30) { spinOutCPU(c); }
    }
  }

  /* CPU update */
  const wp = trackWaypoints;
  const nWp = wp.length;
  for (const c of cpus) {
    if (c.spinT > 0) c.spinT -= dt;
    if (c.shrinkT > 0) { c.shrinkT -= dt; if (c.shrinkT <= 0) c.speed = c.baseSpeed; }

    /* AI: steer toward next waypoint */
    const target = wp[c.waypointIdx];
    const dx = target.x - c.x, dy = target.y - c.y;
    const distToWp = Math.sqrt(dx*dx + dy*dy);

    if (distToWp < 25) {
      c.waypointIdx = (c.waypointIdx + 5) % nWp;
    }

    const desiredAngle = Math.atan2(dy, dx);
    let angleDiff = desiredAngle - c.angle;
    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

    if (c.spinT <= 0) {
      c.angle += angleDiff * 0.08;
      const targetSpeed = c.baseSpeed * (c.shrinkT > 0 ? 0.5 : 1);
      c.speed += (targetSpeed - c.speed) * 0.05;
      /* Add wobble */
      c.speed += Math.sin(performance.now() * 0.001 + cpus.indexOf(c) * 2) * 0.01;
    } else {
      c.angle += Math.sin(c.spinT * 12) * 0.2;
    }

    c.x += Math.cos(c.angle) * c.speed;
    c.y += Math.sin(c.angle) * c.speed;

    /* CPU lap crossing */
    checkLapCrossing(c);

    /* CPU banana collision */
    for (const b of bananas) {
      if (!b.active) continue;
      const bx = c.x - b.x, by = c.y - b.y;
      if (bx*bx + by*by < 15*15) { spinOutCPU(c); b.active = false; }
    }
  }

  /* Player-CPU collision */
  for (const c of cpus) {
    const dx = c.x - player.x, dy = c.y - player.y;
    const d = dx*dx + dy*dy;
    if (d < 25*25 && player.spinT <= 0 && c.spinT <= 0) {
      if (player.starT > 0) {
        spinOutCPU(c);
      } else {
        player.speed *= 0.7; c.speed *= 0.7;
        const pushDist = 10;
        const len = Math.sqrt(d) || 1;
        player.x -= (dx/len) * pushDist;
        player.y -= (dy/len) * pushDist;
        c.x += (dx/len) * pushDist;
        c.y += (dy/len) * pushDist;
      }
    }
  }

  /* Clean up */
  bananas = bananas.filter(b => b.active);
  shells = shells.filter(s => s.active);

  gameTime = (performance.now() - player.startT) / 1000;
}

/* ================================================================
   COUNTDOWN & START
   ================================================================ */
document.getElementById('startBtn').addEventListener('click', beginCountdown);

function beginCountdown() {
  document.getElementById('msg').classList.add('hidden');
  document.getElementById('btnL').style.display = 'flex';
  document.getElementById('btnGas').style.display = 'flex';
  document.getElementById('btnR').style.display = 'flex';
  itemBtnEl.style.display = 'flex';

  buildTrackMap();
  initPlayer();
  initCPUs();
  placeItemBoxes();
  bananas = []; shells = [];
  updateItemUI();

  gameState = 'countdown';
  countVal = 3;
  gameTime = 0;
  runCount();
}

function runCount() {
  if (countVal > 0) {
    countEl.textContent = countVal;
    countEl.style.color = '#fff';
    flashCount();
    countVal--;
    setTimeout(runCount, 1000);
  } else {
    countEl.textContent = 'GO!';
    countEl.style.color = '#7CFC00';
    flashCount();
    gameState = 'play';
    player.startT = performance.now();
    setTimeout(() => countEl.style.opacity = 0, 800);
  }
}
function flashCount() {
  countEl.style.transition = 'none';
  countEl.style.opacity = 1;
  countEl.style.transform = 'translate(-50%,-50%) scale(1.4)';
  requestAnimationFrame(() => {
    countEl.style.transition = 'all .8s';
    countEl.style.transform = 'translate(-50%,-50%) scale(1)';
  });
}

function winGame() {
  gameState = 'win';
  const pos = getPosition();
  document.getElementById('btnL').style.display = 'none';
  document.getElementById('btnGas').style.display = 'none';
  document.getElementById('btnR').style.display = 'none';
  itemBtnEl.style.display = 'none';
  const m = document.getElementById('msg');
  m.classList.remove('hidden');
  const posStr = ['1st','2nd','3rd','4th'][pos - 1];
  m.innerHTML = `<h1>GOAL!</h1><div class="big">${posStr} PLACE</div><p>TIME ${gameTime.toFixed(2)}秒</p><button id="startBtn">もう一回</button>`;
  document.getElementById('startBtn').addEventListener('click', beginCountdown);
  itemBtnEl.classList.remove('ready');
}

/* ================================================================
   DRAWING - SPRITES ON TOP OF MODE 7
   ================================================================ */

function drawSprites() {
  /* Collect all sprites to draw */
  const sprites = [];

  /* CPU karts */
  for (const c of cpus) {
    const proj = worldToScreen(c.x, c.y);
    if (proj) {
      sprites.push({ type: 'cpu', proj, data: c });
    }
  }

  /* Item boxes */
  for (const box of itemBoxPositions) {
    if (box.taken) continue;
    const proj = worldToScreen(box.x, box.y);
    if (proj) {
      sprites.push({ type: 'itembox', proj, data: box });
    }
  }

  /* Bananas */
  for (const b of bananas) {
    if (!b.active) continue;
    const proj = worldToScreen(b.x, b.y);
    if (proj) {
      sprites.push({ type: 'banana', proj, data: b });
    }
  }

  /* Shells */
  for (const s of shells) {
    if (!s.active) continue;
    const proj = worldToScreen(s.x, s.y);
    if (proj) {
      sprites.push({ type: 'shell', proj, data: s });
    }
  }

  /* Sort far to near */
  sprites.sort((a, b) => b.proj.dist - a.proj.dist);

  /* Draw each sprite */
  for (const sp of sprites) {
    const { sx, sy, dist } = sp.proj;
    const scale = FOCAL_LENGTH / dist;

    switch (sp.type) {
      case 'cpu': {
        const c = sp.data;
        let sc = Math.max(6, 40 * scale);
        if (c.shrinkT > 0) sc *= 0.55;

        /* Shadow */
        ctx.fillStyle = 'rgba(0,0,0,.2)';
        ctx.beginPath();
        ctx.ellipse(sx, sy, sc * 0.5, sc * 0.15, 0, 0, Math.PI * 2);
        ctx.fill();

        if (kartReady && sc > 8) {
          const w = Math.round(sc * 1.2);
          const h = Math.round(w * (kartImg.height / kartImg.width));
          const tinted = makeTintedKart(c.color, w);
          ctx.save();
          ctx.translate(sx, sy - sc * 0.5);
          if (c.spinT > 0) ctx.rotate(Math.sin(c.spinT * 12) * 0.3);
          ctx.drawImage(tinted, -w/2, -h/2);
          ctx.restore();
        } else {
          ctx.fillStyle = c.color;
          ctx.fillRect(sx - sc*0.3, sy - sc*0.7, sc*0.6, sc*0.5);
        }
        break;
      }
      case 'itembox': {
        const sc = Math.max(4, 20 * scale);
        const t = performance.now() * 0.003;
        const colors = ['#ff0000','#ff8800','#ffff00','#00ff00','#0088ff','#8800ff'];
        const ci = Math.floor(t) % colors.length;
        const h = Math.max(2, sc * 0.8);
        ctx.fillStyle = colors[ci];
        ctx.fillRect(sx - sc/2, sy - h, sc, h);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = Math.max(1, sc * 0.1);
        ctx.strokeRect(sx - sc/2, sy - h, sc, h);
        if (h > 4) {
          ctx.fillStyle = '#fff';
          ctx.font = 'bold ' + Math.floor(h * 0.8) + 'px monospace';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('?', sx, sy - h/2);
          ctx.textBaseline = 'alphabetic';
        }
        break;
      }
      case 'banana': {
        const sc = Math.max(3, 12 * scale);
        ctx.fillStyle = '#ffd700';
        ctx.beginPath();
        ctx.arc(sx, sy - sc * 0.3, sc * 0.5, Math.PI * 0.2, Math.PI * 1.2);
        ctx.fill();
        ctx.lineWidth = Math.max(1, sc * 0.15);
        ctx.strokeStyle = '#b8860b';
        ctx.stroke();
        break;
      }
      case 'shell': {
        const sc = Math.max(3, 12 * scale);
        ctx.fillStyle = '#22cc44';
        ctx.beginPath();
        ctx.arc(sx, sy - sc * 0.3, sc * 0.4, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#116622';
        ctx.lineWidth = Math.max(1, sc * 0.1);
        ctx.stroke();
        break;
      }
    }
  }
}

/* ================================================================
   DRAW PLAYER KART (always at screen center-bottom)
   ================================================================ */
function drawPlayerKart() {
  const centerX = W/2 + player.steer * 8;
  const wobble = (player.spinT > 0) ? Math.sin(player.spinT * 12) * 8 : 0;
  const kartY = H - Math.round(H * 0.33);

  /* Shadow */
  ctx.fillStyle = 'rgba(0,0,0,.28)';
  ctx.beginPath();
  ctx.ellipse(W/2 + wobble, H - Math.round(H * 0.17), Math.round(W * 0.11), Math.round(H * 0.04), 0, 0, Math.PI * 2);
  ctx.fill();

  /* Boost flame */
  if (player.boostT > 0) {
    ctx.fillStyle = (Math.floor(performance.now() * 0.01) % 2) ? '#ffae00' : '#ff3b00';
    ctx.fillRect(W/2 + wobble - Math.round(W * 0.04), kartY + Math.round(H * 0.18), Math.round(W * 0.08), Math.round(H * 0.05));
  }

  /* Star rainbow flash */
  if (player.starT > 0) {
    const rc = ['#ff0000','#ff8800','#ffff00','#00ff00','#0088ff','#ff00ff'];
    const ci = Math.floor(performance.now() * 0.01) % rc.length;
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = rc[ci];
    const w2 = Math.round(W * 0.22), h2 = Math.round(w2 * 0.8);
    ctx.fillRect(centerX + wobble - w2/2, kartY - 4, w2, h2);
    ctx.globalAlpha = 1.0;
  }

  if (kartReady) {
    const w = Math.round(W * 0.2);
    const h = Math.round(w * (kartImg.height / kartImg.width));
    ctx.save();
    ctx.translate(centerX + wobble, kartY);
    if (player.spinT > 0) ctx.rotate(Math.sin(player.spinT * 12) * 0.3);
    else ctx.rotate(player.steer * 0.06);
    ctx.drawImage(kartImg, -w/2, 0, w, h);
    ctx.restore();
  }
}

/* ================================================================
   MINIMAP (draws actual track shape from waypoints)
   ================================================================ */
function drawMiniMap() {
  const mw = Math.round(W * 0.2);
  const mh = mw;
  const ox = W - mw - 6;
  const oy = 6;

  ctx.fillStyle = 'rgba(0,0,0,.55)';
  ctx.fillRect(ox, oy, mw, mh);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(ox + 0.5, oy + 0.5, mw - 1, mh - 1);

  /* Scale track to fit minimap */
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const p of trackWaypoints) {
    if (p.x < minX) minX = p.x;
    if (p.y < minY) minY = p.y;
    if (p.x > maxX) maxX = p.x;
    if (p.y > maxY) maxY = p.y;
  }
  const rangeX = maxX - minX || 1;
  const rangeY = maxY - minY || 1;
  const scaleM = (mw - 12) / Math.max(rangeX, rangeY);
  const offX = ox + (mw - rangeX * scaleM) / 2;
  const offY = oy + (mh - rangeY * scaleM) / 2;

  function miniX(wx) { return offX + (wx - minX) * scaleM; }
  function miniY(wy) { return offY + (wy - minY) * scaleM; }

  /* Draw track path */
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(miniX(trackWaypoints[0].x), miniY(trackWaypoints[0].y));
  for (let i = 1; i < trackWaypoints.length; i += 3) {
    ctx.lineTo(miniX(trackWaypoints[i].x), miniY(trackWaypoints[i].y));
  }
  ctx.closePath();
  ctx.stroke();

  /* Start line marker */
  const sp = trackWaypoints[startLineIdx];
  ctx.fillStyle = '#fff';
  ctx.fillRect(miniX(sp.x) - 2, miniY(sp.y) - 2, 4, 4);

  /* Player dot */
  ctx.fillStyle = '#ff3b3b';
  ctx.beginPath();
  ctx.arc(miniX(player.x), miniY(player.y), 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.stroke();

  /* CPU dots */
  for (const c of cpus) {
    ctx.fillStyle = c.color;
    ctx.beginPath();
    ctx.arc(miniX(c.x), miniY(c.y), 2.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

/* ================================================================
   HUD
   ================================================================ */
function drawHUD() {
  ctx.textAlign = 'left';
  const fs = Math.max(10, Math.round(H * 0.07));
  ctx.font = 'bold ' + fs + 'px monospace';

  /* Lap */
  ctx.fillStyle = 'rgba(0,0,0,.6)';
  ctx.fillRect(4, 4, Math.round(W * 0.25), fs + 6);
  ctx.fillStyle = '#fff';
  ctx.fillText('LAP ' + Math.min(player.lap + 1, player.totalLaps) + '/' + player.totalLaps, 8, fs + 2);

  /* Speed */
  ctx.fillStyle = 'rgba(0,0,0,.6)';
  ctx.fillRect(4, fs + 12, Math.round(W * 0.25), fs + 6);
  ctx.fillStyle = '#7CFC00';
  const speedDisplay = Math.round(player.speed * 60);
  ctx.fillText('SPD ' + speedDisplay, 8, fs * 2 + 10);

  /* Position */
  if (gameState === 'play') {
    const pos = getPosition();
    const posStr = ['1st','2nd','3rd','4th'][pos - 1];
    ctx.fillStyle = 'rgba(0,0,0,.6)';
    ctx.fillRect(4, fs * 2 + 20, Math.round(W * 0.15), fs + 6);
    ctx.fillStyle = (pos === 1) ? '#ffd93b' : '#fff';
    ctx.fillText(posStr, 8, fs * 3 + 18);
  }

  /* Time */
  ctx.fillStyle = '#fff';
  ctx.fillText(gameTime ? gameTime.toFixed(1) : '0.0', 8, H - 8);

  /* Off-road indicator */
  if (gameState === 'play' && !isOnRoad(player.x, player.y)) {
    ctx.fillStyle = 'rgba(0,0,0,.5)';
    ctx.fillRect(W/2 - 40, HORIZON + 10, 80, fs + 4);
    ctx.fillStyle = '#ff4444';
    ctx.textAlign = 'center';
    ctx.fillText('OFF ROAD', W/2, HORIZON + 8 + fs);
    ctx.textAlign = 'left';
  }
}

/* ================================================================
   FLASH OVERLAY
   ================================================================ */
function drawFlash() {
  if (player.flashT > 0) {
    flashEl.style.opacity = Math.min(1, player.flashT * 3);
  } else {
    flashEl.style.opacity = 0;
  }
}

/* ================================================================
   MAIN RENDER
   ================================================================ */
function render() {
  /* Clear output buffer */
  const buf32 = new Uint32Array(outputImageData.data.buffer);
  buf32.fill(0xFF000000);

  /* 1. Sky (rendered into imageData buffer) */
  renderSky();

  /* 2. Mode 7 ground */
  renderMode7();

  /* 3. Put imageData to canvas */
  ctx.putImageData(outputImageData, 0, 0);

  /* 4. Draw sprites on top (using canvas API for easier drawing) */
  drawSprites();

  /* 5. Player kart */
  drawPlayerKart();

  /* 6. UI elements */
  drawMiniMap();
  drawHUD();
  drawFlash();
}

/* ================================================================
   GAME LOOP
   ================================================================ */
let lastTime = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - lastTime) / 1000);
  lastTime = now;
  try {
    update(dt);
    render();
  } catch(e) {
    ctx.fillStyle='#f00'; ctx.font='14px monospace'; ctx.textAlign='left';
    ctx.fillText('ERR: '+e.message, 10, 30);
    ctx.fillText(e.stack?e.stack.split('\n')[1]:'', 10, 50);
  }
  requestAnimationFrame(loop);
}
try { requestAnimationFrame(loop); } catch(e) {
  document.getElementById('game').getContext('2d').fillStyle='#f00';
  document.getElementById('game').getContext('2d').font='16px monospace';
  document.getElementById('game').getContext('2d').fillText('INIT ERR: '+e.message, 10, 30);
}
