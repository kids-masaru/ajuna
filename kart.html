<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>レーシング</title>
<link rel="stylesheet" href="assets/kit.css">
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#0c1020; }
  body { touch-action:none; -webkit-user-select:none; user-select:none; }
  canvas#game { display:block; image-rendering:pixelated; }

  .rotate-notice { display:none; }
  @media (orientation: portrait) {
    .rotate-notice { position:fixed; inset:0; z-index:99999; background:#11141d; color:#fff;
      display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:16px; padding:24px; }
  }
  .rotate-notice .ico { font-size:84px; animation:rotnudge 1.6s ease-in-out infinite; }
  @keyframes rotnudge { 0%,100%{transform:rotate(-12deg);} 50%{transform:rotate(78deg);} }
  .rotate-notice h2 { font-size:28px; font-weight:900; text-shadow:0 3px 0 #e23b3b; }
  .rotate-notice p { color:#ffd84d; font-weight:800; }
  .rotate-go { margin-top:18px; font-family:inherit; font-weight:800; font-size:18px; color:#fff;
    background:#e23b3b; border:none; border-radius:14px; padding:12px 24px; box-shadow:0 5px 0 #9e2020; cursor:pointer; }
  .rotate-go:active { transform:translateY(5px); box-shadow:0 0 0 #9e2020; }

  #stage { position:absolute; inset:0; }
  #stage.force-landscape { width:100vh; height:100vw; transform:rotate(90deg); transform-origin:top left; left:100%; top:0; }
  body.forced .rotate-notice { display:none !important; }

  #hud { position:absolute; top:max(8px,env(safe-area-inset-top)); left:0; right:0; z-index:30;
    display:flex; justify-content:center; gap:8px; pointer-events:none; }
  .hud-box { background:rgba(16,20,30,.72); color:#fff; border:3px solid var(--gp-accent-soft);
    border-radius:12px; padding:4px 12px; font-weight:900; text-align:center; min-width:64px; backdrop-filter:blur(4px); }
  .hud-box small { display:block; font-size:10px; font-weight:800; color:#ffd84d; }

  #mini { position:absolute; top:max(8px,env(safe-area-inset-top)); right:10px; z-index:30;
    background:rgba(16,20,30,.6); border:3px solid rgba(255,255,255,.5); border-radius:10px; }
  #itemIcon { position:absolute; top:64px; left:50%; transform:translateX(-50%); z-index:30; font-size:40px;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.4)); display:none; }

  .pedal { position:absolute; bottom:max(14px,env(safe-area-inset-bottom)); width:84px; height:84px; z-index:30;
    border-radius:50%; background:rgba(255,255,255,.22); border:3px solid rgba(255,255,255,.6); color:#fff;
    font-size:38px; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(3px); }
  #btnL { left:18px; } #btnR { right:18px; }
  .pedal.on { background:rgba(255,255,255,.5); transform:scale(.94); }

  .screen { position:absolute; inset:0; z-index:50; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px; text-align:center; padding:20px; }
  .cover { background:radial-gradient(120% 90% at 50% 0%, color-mix(in srgb,var(--gp-accent) 55%,#11131f) 0%, transparent 60%), linear-gradient(180deg,#1b1e2c,#11131f); }
  .hidden { display:none !important; }
  #cd { position:absolute; inset:0; z-index:40; display:flex; align-items:center; justify-content:center;
    font-size:120px; font-weight:900; color:#fff; text-shadow:0 6px 0 #e23b3b,0 9px 0 rgba(0,0,0,.3); pointer-events:none; }
</style>
</head>
<body class="gp gp-fuchsia gp-dark">

<div class="rotate-notice">
  <div class="ico">📱</div>
  <h2>よこむきにしてね</h2>
  <p>スマホを よこにすると あそべるよ！</p>
  <button class="rotate-go" onclick="forceLandscape()">よこむきにする 🔄</button>
</div>

<div id="stage">
  <a href="index.html" class="gp-home">🏠</a>
  <canvas id="game"></canvas>

  <div id="hud" class="hidden">
    <div class="hud-box"><small>しゅうかい</small><span id="lap">1/3</span></div>
    <div class="hud-box"><small>じゅんい</small><span id="rank">1/8</span></div>
    <div class="hud-box"><small>コイン</small><span id="coins">0</span></div>
  </div>
  <canvas id="mini" class="hidden"></canvas>
  <div id="itemIcon"></div>
  <div id="cd" class="hidden"></div>

  <div id="btnL" class="pedal hidden">◀</div>
  <div id="btnR" class="pedal hidden">▶</div>

  <div id="title" class="screen cover">
    <div class="gp-hero gp-float">🏎️</div>
    <div class="gp-title" style="color:#fff">レーシング</div>
    <p style="color:#ffd84d;font-weight:800;max-width:540px">6にんで 3しゅう レース！<br>みぎ・ひだりの ボタンで ハンドル（アクセルは じどう）<br>？ボックスで アイテム・コインで すこしスピードUP</p>
    <button id="startBtn" class="gp-btn gp-btn--lg">スタート</button>
  </div>

  <div id="result" class="screen cover hidden">
    <div class="gp-hero gp-float">🏆</div>
    <div class="gp-title" style="color:#fff">ゴール！</div>
    <p style="color:#fff;font-weight:800">あなたの じゅんい</p>
    <div id="finalRank" style="font-size:56px;font-weight:900;color:#f1c40f">1 / 8</div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;justify-content:center">
      <a href="index.html" class="gp-btn gp-btn--ghost">🏠 もどる</a>
      <button id="againBtn" class="gp-btn">もういちど</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const screen = canvas.getContext('2d');
const mini = document.getElementById('mini'); const mctx = mini.getContext('2d');
let ctx, buf;

function forceLandscape(){ document.body.classList.add('forced'); document.getElementById('stage').classList.add('force-landscape'); resize(); }
function tryLock(){ try{ const el=document.documentElement; if(el.requestFullscreen)el.requestFullscreen().catch(()=>{}); if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('landscape').catch(()=>{}); }catch(e){} }
document.addEventListener('pointerdown', tryLock, { once:true });

let W,H,DISPW,DISPH,PIX, groundImg=null;
function resize(){
  const forced = document.getElementById('stage').classList.contains('force-landscape');
  DISPW = canvas.width = forced ? window.innerHeight : window.innerWidth;
  DISPH = canvas.height = forced ? window.innerWidth : window.innerHeight;
  PIX = Math.max(2, Math.round(DISPH/150));
  W = Math.ceil(DISPW/PIX); H = Math.ceil(DISPH/PIX);
  if(!buf){ buf=document.createElement('canvas'); ctx=buf.getContext('2d'); }
  buf.width=W; buf.height=H; ctx.imageSmoothingEnabled=false; screen.imageSmoothingEnabled=false; groundImg=null;
  const ms=Math.round(Math.min(DISPW,DISPH)*0.28); mini.width=ms; mini.height=Math.round(ms*0.78);
}
resize(); window.addEventListener('resize', resize);

// 音
let actx=null;
function beep(f,t,d,v=0.15){ try{ if(!actx)actx=new (window.AudioContext||window.webkitAudioContext)(); const o=actx.createOscillator(),g=actx.createGain(); o.type=t;o.frequency.value=f;o.connect(g);g.connect(actx.destination); const n=actx.currentTime; g.gain.setValueAtTime(v,n); g.gain.exponentialRampToValueAtTime(0.001,n+d); o.start(n);o.stop(n+d);}catch(e){} }
function coinSound(){ beep(880,'square',0.06,0.1); setTimeout(()=>beep(1320,'square',0.08,0.1),50); }
function itemSound(){ beep(660,'square',0.07,0.12); setTimeout(()=>beep(990,'square',0.09,0.12),70); }
function boostSound(){ beep(300,'sawtooth',0.3,0.18); }
function spinSound(){ beep(160,'sawtooth',0.3,0.18); }

// コース
const mapW=1024, mapH=1024, GRASS=0xff4db946, ROAD_HALF=84;
const maxSpeed=300, accel=200, turnRate=2.5, offMul=0.4;
const NK=6, COLORS=['#e23b3b','#3478f6','#2aa047','#f1c40f','#9b59b6','#e67e22','#15b8c4','#ec4899'];
let mapCanvas, map32, centerline=[], N=0, startHeading=0;
let karts=[], coins=[], trees=[], boxes=[], bananas=[];
let coinsN=0, state='title', last=0, raceClock=0;
const keys={left:false,right:false};
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

function buildMap(){
  mapCanvas=document.createElement('canvas'); mapCanvas.width=mapW; mapCanvas.height=mapH;
  const m=mapCanvas.getContext('2d');
  m.fillStyle='#46b94d'; m.fillRect(0,0,mapW,mapH);
  m.fillStyle='#3da642'; for(let y=0;y<mapH;y+=26){ const o=((y/26)%2)*26; for(let x=o;x<mapW;x+=52) m.fillRect(x,y,26,26); }
  const cxm=mapW/2, cym=mapH/2, rx=mapW*0.33, ry=mapH*0.27; N=400; centerline=[];
  for(let i=0;i<N;i++){ const a=i/N*Math.PI*2; centerline.push({x:cxm+Math.cos(a)*rx, z:cym+Math.sin(a)*ry}); }
  const stroke=(w,st,dash)=>{ m.lineWidth=w;m.lineJoin='round';m.lineCap='round';m.strokeStyle=st; m.setLineDash(dash||[]);
    m.beginPath(); for(let i=0;i<=N;i++){const p=centerline[i%N]; i?m.lineTo(p.x,p.z):m.moveTo(p.x,p.z);} m.closePath(); m.stroke(); m.setLineDash([]); };
  stroke(ROAD_HALF*2+24,'#eef0f3'); stroke(ROAD_HALF*2+24,'#d23b3b',[30,30]);
  stroke(ROAD_HALF*2,'#8a8f99'); stroke(6,'#f7d11e',[22,30]);
  // スタートライン（チェッカー）をマップにも
  const p0=centerline[0],p1=centerline[1]; const ang=Math.atan2(p1.z-p0.z,p1.x-p0.x);
  m.save(); m.translate(p0.x,p0.z); m.rotate(ang+Math.PI/2); const cs=ROAD_HALF/4;
  for(let r=0;r<2;r++)for(let i=-4;i<4;i++){ m.fillStyle=((i+r)%2===0)?'#fff':'#111'; m.fillRect(r*16-16,i*cs,16,cs);} m.restore();
  const id=m.getImageData(0,0,mapW,mapH); map32=new Uint32Array(id.data.buffer);
  startHeading=Math.atan2(p1.x-p0.x, p1.z-p0.z);

  // 木・コイン(少なめ)・アイテムボックス
  trees=[]; coins=[]; boxes=[]; bananas=[];
  for(let i=0;i<N;i+=15){ const t=perp(i); const o=ROAD_HALF+55+Math.random()*70;
    trees.push({x:centerline[i].x+t.nx*o, z:centerline[i].z+t.nz*o});
    trees.push({x:centerline[i].x-t.nx*o, z:centerline[i].z-t.nz*o}); }
  for(let i=20;i<N;i+=40){ const t=perp(i); const off=(((i/40)%3)-1)*ROAD_HALF*0.5;
    coins.push({x:centerline[i].x+t.nx*off, z:centerline[i].z+t.nz*off, gone:false}); }
  // ？ボックスを中央に横一列（数か所）
  for(const bi of [100,200,300]){ const t=perp(bi); for(let k=-1;k<=1;k++){
    boxes.push({x:centerline[bi].x+t.nx*k*ROAD_HALF*0.5, z:centerline[bi].z+t.nz*k*ROAD_HALF*0.5, active:true, timer:0}); } }
}
function perp(i){ const p=centerline[i%N], q=centerline[(i+1)%N]; let nx=-(q.z-p.z), nz=(q.x-p.x); const l=Math.hypot(nx,nz)||1; return {nx:nx/l, nz:nz/l}; }
function sampleMap(x,y){ x|=0;y|=0; if(x<0||y<0||x>=mapW||y>=mapH)return GRASS; return map32[y*mapW+x]; }
function isRoad(x,y){ const c=sampleMap(x,y); const r=c&0xff,g=(c>>8)&0xff,b=(c>>16)&0xff; return (Math.abs(r-g)<45&&Math.abs(g-b)<45&&b>95); }
function nearestIdx(k){ let best=k.lastIdx,bd=1e18; for(let o=-22;o<=22;o++){ const i=((k.lastIdx+o)%N+N)%N; const p=centerline[i]; const d=(p.x-k.x)**2+(p.z-k.z)**2; if(d<bd){bd=d;best=i;} } return best; }

function makeKarts(){
  karts=[];
  for(let i=0;i<NK;i++){
    const idx=(8 + i*2)%N;              // スタートライン直後に整列
    const t=perp(idx); const lane=((i%2)*2-1)*ROAD_HALF*0.45;
    const p=centerline[idx], q=centerline[(idx+1)%N];
    const hd=Math.atan2(q.x-p.x, q.z-p.z);
    karts.push({ x:p.x+t.nx*lane, z:p.z+t.nz*lane, angle:hd, speed:0, lap:1, lastIdx:idx, prog:0,
      isPlayer:i===0, color:COLORS[i%COLORS.length], spin:0, boost:0, item:null, rank:1, finished:false,
      aiSpeed:0.80+Math.random()*0.16, aiLane:(Math.random()*2-1)*ROAD_HALF*0.5 });
  }
}

// ---- 描画 ----
const HORIZ=()=>Math.round(H*0.42), FOCAL=()=>W*0.5, CAMH=ROAD_HALF*0.62;
function projGround(wx,wz,s,c){ const dx=wx-camX(),dz=wz-camZ(); const fz=dx*s+dz*c; const rx=dx*c-dz*s;
  return { fz, sx:W/2+rx*FOCAL()/fz, sy:HORIZ()+CAMH*FOCAL()/fz, sc:FOCAL()/fz }; }
function camX(){ return karts.length?karts[0].x:0; } function camZ(){ return karts.length?karts[0].z:0; }

function render(){
  const hy=HORIZ();
  const sky=ctx.createLinearGradient(0,0,0,hy); sky.addColorStop(0,'#5bb8ff'); sky.addColorStop(1,'#d4eeff');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,hy);
  ctx.fillStyle='#fff1a8'; ctx.beginPath(); ctx.arc(W*0.8,hy*0.42,Math.max(5,H*0.06),0,7); ctx.fill();
  ctx.fillStyle='#3fa64a'; ctx.fillRect(0,hy-Math.round(H*0.05),W,Math.round(H*0.05));
  if(!map32 || !karts.length){ ctx.fillStyle='#46b94d'; ctx.fillRect(0,hy,W,H-hy); return; }

  const heading=karts[0].angle, s=Math.sin(heading), c=Math.cos(heading), focal=FOCAL();
  const gH=H-hy;
  if(!groundImg||groundImg.width!==W||groundImg.height!==gH) groundImg=ctx.createImageData(W,gH);
  const data=new Uint32Array(groundImg.data.buffer);
  const cx0=camX(), cz0=camZ();
  for(let row=0;row<gH;row++){ const y=row+1, dist=CAMH*focal/y, st=dist/focal, ro=row*W;
    const half=-(W/2)*st;
    let wx=cx0+half*c+dist*s, wz=cz0-half*s+dist*c; const ix=st*c, iz=-st*s;
    for(let col=0;col<W;col++){ data[ro+col]=sampleMap(wx,wz); wx+=ix; wz+=iz; } }
  ctx.putImageData(groundImg,0,hy);

  // スプライト
  const objs=[];
  const add=(o,type,extra)=>{ const pr=projGround(o.x,o.z,s,c); if(pr.fz<12||pr.sy>H+50)return; objs.push({type,...pr,o,extra}); };
  for(const t of trees) add(t,'tree');
  for(const cn of coins) if(!cn.gone) add(cn,'coin');
  for(const b of boxes) if(b.active) add(b,'box');
  for(const b of bananas) add(b,'banana');
  for(let i=1;i<karts.length;i++) add(karts[i],'kart');
  // スタートアーチ
  const arch=archProj(s,c);
  objs.sort((a,b)=>b.fz-a.fz);
  if(arch) drawArch(arch);            // 一番奥に（簡易）
  for(const ob of objs){ if(arch && ob.fz>arch.fz) continue; }
  for(const ob of objs) drawObj(ob);

  // プレイヤー
  const k=karts[0]; const bob=(k.speed/maxSpeed)*(Math.random()>0.5?1:-1)*H*0.006;
  drawKart(W/2, H*0.82, (keys.right?1:0)-(keys.left?1:0), bob, k.color, k.boost>0, k.spin>0);
}
function archProj(s,c){ // スタート/ゴールのアーチ
  const i0=0, t=perp(i0); const cl=centerline[i0];
  const L={x:cl.x+t.nx*(ROAD_HALF+10), z:cl.z+t.nz*(ROAD_HALF+10)};
  const R={x:cl.x-t.nx*(ROAD_HALF+10), z:cl.z-t.nz*(ROAD_HALF+10)};
  const heading=karts[0].angle, sn=Math.sin(heading), cs=Math.cos(heading);
  const pl=projGround(L.x,L.z,sn,cs), pr=projGround(R.x,R.z,sn,cs);
  if(pl.fz<14||pr.fz<14) return null;
  return { fz:(pl.fz+pr.fz)/2, pl, pr };
}
function drawArch(a){ const {pl,pr}=a; const h=Math.min(H*0.5, (pl.sc+pr.sc)/2*ROAD_HALF*2.2);
  ctx.fillStyle='#d23b3b'; ctx.fillRect(pl.sx-3, pl.sy-h, 6, h); ctx.fillRect(pr.sx-3, pr.sy-h, 6, h);
  ctx.fillStyle='#1b6fd6'; ctx.fillRect(Math.min(pl.sx,pr.sx)-4, Math.min(pl.sy,pr.sy)-h-2, Math.abs(pr.sx-pl.sx)+8, h*0.34);
  // チェッカー帯
  const bx=Math.min(pl.sx,pr.sx)-4, bw=Math.abs(pr.sx-pl.sx)+8, by=Math.min(pl.sy,pr.sy)-h-2, bh=h*0.34, n=8, cw=bw/n;
  for(let i=0;i<n;i++){ ctx.fillStyle=(i%2)?'#fff':'#111'; ctx.fillRect(bx+i*cw, by+bh*0.55, cw, bh*0.45); }
}
function drawObj(ob){ const sx=ob.sx, sy=ob.sy, sc=ob.sc, type=ob.type;
  if(type==='coin'){ const r=Math.max(2,sc*ROAD_HALF*0.16);
    ctx.fillStyle='rgba(0,0,0,.22)'; ctx.beginPath(); ctx.ellipse(sx,sy,r,r*0.32,0,0,7); ctx.fill();
    ctx.fillStyle='#e8a200'; ctx.beginPath(); ctx.arc(sx,sy-r,r,0,7); ctx.fill();
    ctx.fillStyle='#ffd11e'; ctx.beginPath(); ctx.arc(sx,sy-r,r*0.78,0,7); ctx.fill();
  } else if(type==='tree'){ const h=Math.max(6,sc*ROAD_HALF*1.0), w=h*0.6;
    ctx.fillStyle='rgba(0,0,0,.2)'; ctx.beginPath(); ctx.ellipse(sx,sy,w*0.5,w*0.16,0,0,7); ctx.fill();
    ctx.fillStyle='#7a4a22'; ctx.fillRect(sx-w*0.1,sy-h*0.42,w*0.2,h*0.42);
    ctx.fillStyle='#177a31'; ctx.beginPath(); ctx.arc(sx,sy-h*0.55,w*0.52,0,7); ctx.fill();
    ctx.fillStyle='#2aa047'; ctx.beginPath(); ctx.arc(sx-w*0.14,sy-h*0.64,w*0.34,0,7); ctx.fill();
  } else if(type==='box'){ const z=Math.max(5,sc*ROAD_HALF*0.42);
    ctx.fillStyle='rgba(0,0,0,.2)'; ctx.beginPath(); ctx.ellipse(sx,sy,z*0.6,z*0.2,0,0,7); ctx.fill();
    ctx.fillStyle='#22cde6'; ctx.fillRect(sx-z*0.5,sy-z*1.5,z,z);
    ctx.fillStyle='#ffffff'; ctx.fillRect(sx-z*0.5,sy-z*1.5,z,z*0.28);
    ctx.fillStyle='#fff'; ctx.font='bold '+Math.round(z*0.9)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('?',sx,sy-z*0.95);
  } else if(type==='banana'){ const r=Math.max(3,sc*ROAD_HALF*0.2);
    ctx.fillStyle='rgba(0,0,0,.2)'; ctx.beginPath(); ctx.ellipse(sx,sy,r,r*0.3,0,0,7); ctx.fill();
    ctx.fillStyle='#f1c40f'; ctx.beginPath(); ctx.ellipse(sx,sy-r*0.6,r,r*0.55,0.5,0,7); ctx.fill();
    ctx.fillStyle='#caa200'; ctx.fillRect(sx-1, sy-r*1.2, 2, r*0.4);
  } else if(type==='kart'){ const w=Math.max(4,sc*ROAD_HALF*0.36), h=w*0.8;
    ctx.fillStyle='rgba(0,0,0,.25)'; ctx.beginPath(); ctx.ellipse(sx,sy,w*0.6,h*0.22,0,0,7); ctx.fill();
    ctx.fillStyle='#15171c'; ctx.fillRect(sx-w*0.6,sy-h*0.8,w*0.24,h*0.7); ctx.fillRect(sx+w*0.36,sy-h*0.8,w*0.24,h*0.7);
    ctx.fillStyle=ob.o.color; ctx.fillRect(sx-w*0.5,sy-h,w,h);
    ctx.fillStyle='rgba(255,255,255,.25)'; ctx.fillRect(sx-w*0.5,sy-h,w,h*0.34);
    ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(sx,sy-h*1.05,w*0.26,0,7); ctx.fill();
    if(ob.o.boost>0){ ctx.fillStyle='#fff7a8'; ctx.fillRect(sx-w*0.3, sy+h*0.05, w*0.6, h*0.12); }
  }
}
function drawKart(cx,cy,lean,bob,color,boost,spin){
  const s=H*0.0013, bw=150*s, bh=72*s; ctx.save(); ctx.translate(cx,cy+bob);
  ctx.rotate((spin?(performance.now()/90):0)+lean*0.09);
  ctx.fillStyle='rgba(0,0,0,.32)'; ctx.beginPath(); ctx.ellipse(0,9*s,bw*0.6,14*s,0,0,7); ctx.fill();
  if(boost){ ctx.fillStyle='rgba(120,200,255,.6)'; ctx.fillRect(-bw*0.4, bh*0.5, bw*0.8, 30*s); }
  ctx.fillStyle='#15171c'; ctx.fillRect(-bw*0.62,-bh*0.38,bw*0.24,bh*0.86); ctx.fillRect(bw*0.38,-bh*0.38,bw*0.24,bh*0.86);
  ctx.fillStyle='#b3271f'; ctx.fillRect(-bw*0.5,-bh*0.74,bw,bh*0.24);
  ctx.fillStyle=color; ctx.fillRect(-bw*0.5,-bh*0.5,bw,bh);
  ctx.fillStyle='rgba(255,255,255,.25)'; ctx.fillRect(-bw*0.5,-bh*0.5,bw,bh*0.32);
  ctx.fillStyle='#3478f6'; ctx.beginPath(); ctx.arc(0,-bh*0.7,24*s,0,7); ctx.fill();
  ctx.fillStyle='#bfe9ff'; ctx.fillRect(-16*s,-bh*0.78,32*s,12*s);
  ctx.restore();
}

// ミニマップ
function drawMini(){
  const w=mini.width,h=mini.height; mctx.clearRect(0,0,w,h);
  const pad=8; const sx=(w-pad*2)/mapW, sy=(h-pad*2)/mapH; const sc=Math.min(sx,sy);
  const ox=pad+(w-pad*2-mapW*sc)/2, oy=pad+(h-pad*2-mapH*sc)/2;
  const X=x=>ox+x*sc, Y=z=>oy+z*sc;
  mctx.strokeStyle='rgba(255,255,255,.85)'; mctx.lineWidth=Math.max(3,sc*ROAD_HALF*1.4); mctx.lineJoin='round';
  mctx.beginPath(); for(let i=0;i<=N;i+=4){ const p=centerline[i%N]; i?mctx.lineTo(X(p.x),Y(p.z)):mctx.moveTo(X(p.x),Y(p.z)); } mctx.closePath(); mctx.stroke();
  // スタート印
  mctx.fillStyle='#fff'; mctx.fillRect(X(centerline[0].x)-3,Y(centerline[0].z)-3,6,6);
  for(let i=karts.length-1;i>=0;i--){ const k=karts[i]; mctx.fillStyle=k.color;
    mctx.beginPath(); mctx.arc(X(k.x),Y(k.z), k.isPlayer?5:3.5,0,7); mctx.fill();
    if(k.isPlayer){ mctx.strokeStyle='#fff'; mctx.lineWidth=2; mctx.stroke(); } }
}

// ---- 更新 ----
function giveItem(k){ const r=Math.random(); if(r<0.5){ k.boost=2.0; if(k.isPlayer){boostSound(); showItem('⚡');} }
  else { // バナナを後ろに落とす
    bananas.push({x:k.x-Math.sin(k.angle)*ROAD_HALF*0.6, z:k.z-Math.cos(k.angle)*ROAD_HALF*0.6, life:10, owner:k});
    if(k.isPlayer){ itemSound(); showItem('🍌'); } } }
let itemTimer=0;
function showItem(ic){ const el=document.getElementById('itemIcon'); el.textContent=ic; el.style.display='block'; itemTimer=1.0; }

function updateKart(k,dt){
  // スピン中
  if(k.spin>0){ k.spin-=dt; k.speed*=0.92; }
  // ハンドル
  const spd=k.speed/maxSpeed;
  if(k.isPlayer){ const steer=(keys.right?1:0)-(keys.left?1:0); if(k.spin<=0) k.angle += steer*turnRate*dt*(0.35+0.65*spd); }
  else { // AI：先のコース中心をまっすぐ狙う
    const idx=nearestIdx(k);
    const aim=centerline[(idx+16)%N];
    const des=Math.atan2(aim.x-k.x, aim.z-k.z);
    const d=Math.atan2(Math.sin(des-k.angle), Math.cos(des-k.angle));
    if(k.spin<=0) k.angle += clamp(d, -turnRate*1.3*dt, turnRate*1.3*dt);
  }
  // 速度
  const cap=maxSpeed*(k.boost>0?1.5:(k.isPlayer?1:k.aiSpeed));
  k.speed=clamp(k.speed+accel*dt, 0, cap);
  if(k.boost>0) k.boost-=dt;
  const onRoad=isRoad(k.x,k.z); const mv=k.speed*(onRoad?1:offMul);
  k.x+=Math.sin(k.angle)*mv*dt; k.z+=Math.cos(k.angle)*mv*dt;
  if(!onRoad) k.speed=Math.min(k.speed,maxSpeed*0.5);
  // 周回
  const idx=nearestIdx(k);
  if(k.lastIdx>N*0.7 && idx<N*0.3) k.lap++;
  if(k.lastIdx<N*0.3 && idx>N*0.7) k.lap--;
  k.lastIdx=idx; k.prog=k.lap*N+idx;
  // ？ボックス
  for(const b of boxes){ if(!b.active)continue; if((b.x-k.x)**2+(b.z-k.z)**2<(ROAD_HALF*0.45)**2){ b.active=false; b.timer=2.0; giveItem(k); } }
  // コイン
  if(k.isPlayer){ for(const cn of coins){ if(cn.gone)continue; if((cn.x-k.x)**2+(cn.z-k.z)**2<(ROAD_HALF*0.6)**2){ cn.gone=true; coinsN++; k.boost=Math.max(k.boost,0.5); coinSound(); document.getElementById('coins').textContent=coinsN; } } }
  // バナナ
  for(const ban of bananas){ if((ban.x-k.x)**2+(ban.z-k.z)**2<(ROAD_HALF*0.35)**2){ if(ban.owner===k && ban.life>9.3) continue; ban.life=0; if(k.spin<=0){ k.spin=1.1; if(k.isPlayer)spinSound(); } } }
}

function update(dt){
  if(state!=='play') return;
  raceClock+=dt;
  for(const k of karts) updateKart(k,dt);
  for(const b of boxes){ if(!b.active){ b.timer-=dt; if(b.timer<=0)b.active=true; } }
  for(let i=bananas.length-1;i>=0;i--){ bananas[i].life-=dt; if(bananas[i].life<=0)bananas.splice(i,1); }
  if(itemTimer>0){ itemTimer-=dt; if(itemTimer<=0)document.getElementById('itemIcon').style.display='none'; }
  // 順位
  const order=[...karts].sort((a,b)=>b.prog-a.prog); order.forEach((k,i)=>k.rank=i+1);
  const me=karts[0];
  document.getElementById('lap').textContent=Math.min(me.lap,3)+'/3';
  document.getElementById('rank').textContent=me.rank+'/'+NK;
  document.getElementById('spd') && (document.getElementById('spd').textContent='');
  // ゴール
  if(me.lap>3 && !me.finished){ me.finished=true; endRace(); }
}

function loop(ts){ const now=ts||0; let dt=(now-last)/1000; last=now; if(dt>0.05)dt=0.05; if(!dt)dt=1/60;
  try{ update(dt); render(); screen.imageSmoothingEnabled=false; screen.drawImage(buf,0,0,W,H,0,0,DISPW,DISPH);
    if(state==='play'||state==='countdown') drawMini(); }catch(e){ console.error(e); }
  requestAnimationFrame(loop); }

// ---- フロー ----
function startGame(){
  if(actx&&actx.state==='suspended')actx.resume();
  buildMap(); makeKarts(); coinsN=0; raceClock=0;
  document.getElementById('coins').textContent='0';
  document.getElementById('title').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('mini').classList.remove('hidden');
  document.getElementById('btnL').classList.remove('hidden');
  document.getElementById('btnR').classList.remove('hidden');
  // カウントダウン
  state='countdown'; const cd=document.getElementById('cd'); cd.classList.remove('hidden'); let n=3; cd.textContent=n; beep(880,'sine',0.12);
  const iv=setInterval(()=>{ n--; if(n>0){cd.textContent=n; beep(880,'sine',0.12);} else { cd.textContent='GO!'; beep(1760,'sine',0.35); state='play'; setTimeout(()=>cd.classList.add('hidden'),600); clearInterval(iv);} },800);
}
function endRace(){
  state='result';
  document.getElementById('finalRank').textContent=karts[0].rank+' / '+NK;
  document.getElementById('hud').classList.add('hidden'); document.getElementById('mini').classList.add('hidden');
  document.getElementById('btnL').classList.add('hidden'); document.getElementById('btnR').classList.add('hidden');
  document.getElementById('itemIcon').style.display='none';
  document.getElementById('result').classList.remove('hidden');
  beep(660,'sine',0.15); setTimeout(()=>beep(990,'sine',0.3),160);
}
document.getElementById('startBtn').onclick=startGame;
document.getElementById('againBtn').onclick=startGame;

// 入力
function bindHold(el,side){ const on=(e)=>{e.preventDefault();keys[side]=true;el.classList.add('on');}; const off=()=>{keys[side]=false;el.classList.remove('on');};
  el.addEventListener('pointerdown',on); el.addEventListener('pointerup',off); el.addEventListener('pointerleave',off); el.addEventListener('pointercancel',off); }
bindHold(document.getElementById('btnL'),'left'); bindHold(document.getElementById('btnR'),'right');
canvas.addEventListener('pointerdown',(e)=>{ if(state!=='play')return; if(e.offsetX<DISPW/2)keys.left=true; else keys.right=true; });
const clr=()=>{ keys.left=false;keys.right=false; document.getElementById('btnL').classList.remove('on'); document.getElementById('btnR').classList.remove('on'); };
canvas.addEventListener('pointerup',clr); canvas.addEventListener('pointercancel',clr);
window.addEventListener('keydown',(e)=>{ if(e.code==='ArrowLeft')keys.left=true; if(e.code==='ArrowRight')keys.right=true; });
window.addEventListener('keyup',(e)=>{ if(e.code==='ArrowLeft')keys.left=false; if(e.code==='ArrowRight')keys.right=false; });

requestAnimationFrame(loop);
if('serviceWorker' in navigator){ navigator.serviceWorker.register('./sw.js?v=50'); }
</script>
