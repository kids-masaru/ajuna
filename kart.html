<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mode7 Kart Racing</title>
<link rel="stylesheet" href="assets/kit.css">
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#0c1020; }
  body { touch-action:none; -webkit-user-select:none; user-select:none; font-family:'Helvetica Neue',Arial,sans-serif; }
  canvas#game { display:block; image-rendering:pixelated; image-rendering:crisp-edges; }

  .rotate-notice { display:none; }
  @media (orientation: portrait) {
    .rotate-notice { position:fixed; inset:0; z-index:99999; background:#11141d; color:#fff;
      display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:16px; padding:24px; }
    .rotate-notice.in-game { display:flex; }
    .rotate-notice.in-title { display:none; }
  }
  .rotate-notice .ico { font-size:84px; animation:rotnudge 1.6s ease-in-out infinite; }
  @keyframes rotnudge { 0%,100%{transform:rotate(-12deg);} 50%{transform:rotate(78deg);} }
  .rotate-notice h2 { font-size:28px; font-weight:900; text-shadow:0 3px 0 #e23b3b; }
  .rotate-notice p { color:#ffd84d; font-weight:800; }
  .rotate-go { margin-top:18px; font-family:inherit; font-weight:800; font-size:18px; color:#fff;
    background:#e23b3b; border:none; border-radius:14px; padding:12px 24px; box-shadow:0 5px 0 #9e2020; cursor:pointer; }
  .rotate-go:active { transform:translateY(5px); box-shadow:0 0 0 #9e2020; }

  #stage { position:absolute; inset:0; }
  #stage.force-landscape { width:100vh; height:100vw; transform:rotate(90deg); transform-origin:top left; left:100%; top:0; }
  body.forced .rotate-notice { display:none !important; }

  #hud { position:absolute; top:max(6px,env(safe-area-inset-top)); left:0; right:0; z-index:30;
    display:flex; justify-content:center; gap:6px; pointer-events:none; }
  .hud-box { background:rgba(16,20,30,.78); color:#fff; border:2px solid rgba(255,255,255,.4);
    border-radius:10px; padding:3px 10px; font-weight:900; text-align:center; min-width:58px; backdrop-filter:blur(4px); font-size:13px; }
  .hud-box small { display:block; font-size:9px; font-weight:700; color:#ffd84d; letter-spacing:.5px; }
  .hud-box .val { font-size:16px; }

  #mini { position:absolute; top:max(6px,env(safe-area-inset-top)); right:8px; z-index:30;
    background:rgba(16,20,30,.65); border:2px solid rgba(255,255,255,.45); border-radius:8px; }

  #itemBox { position:absolute; top:50px; left:50%; transform:translateX(-50%); z-index:30;
    width:52px; height:52px; background:rgba(16,20,30,.8); border:3px solid #22cde6;
    border-radius:10px; display:none; align-items:center; justify-content:center; font-size:32px;
    box-shadow:0 0 12px rgba(34,205,230,.4); }

  #speedBar { position:absolute; bottom:max(12px,env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
    z-index:30; width:140px; height:14px; background:rgba(0,0,0,.5); border:2px solid rgba(255,255,255,.4);
    border-radius:7px; overflow:hidden; pointer-events:none; }
  #speedFill { height:100%; width:0%; background:linear-gradient(90deg,#2aa047,#f1c40f,#e23b3b); border-radius:5px;
    transition:width .05s linear; }

  .pedal { position:absolute; bottom:max(14px,env(safe-area-inset-bottom)); width:88px; height:88px; z-index:30;
    border-radius:50%; background:rgba(255,255,255,.18); border:3px solid rgba(255,255,255,.5); color:#fff;
    font-size:36px; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(3px); }
  #btnL { left:16px; } #btnR { right:16px; }
  .pedal.on { background:rgba(255,255,255,.45); transform:scale(.93); }

  #useItemBtn { position:absolute; bottom:max(110px,calc(env(safe-area-inset-bottom)+96px)); right:16px; z-index:30;
    width:60px; height:60px; border-radius:50%; background:rgba(255,80,80,.5); border:3px solid rgba(255,255,255,.6);
    color:#fff; font-size:24px; font-weight:900; display:none; align-items:center; justify-content:center;
    backdrop-filter:blur(3px); }

  .screen { position:absolute; inset:0; z-index:50; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:12px; text-align:center; padding:20px; }
  .cover { background:radial-gradient(120% 90% at 50% 0%, rgba(226,59,59,.35) 0%, transparent 60%), linear-gradient(180deg,#1b1e2c,#11131f); z-index:60; }
  .hidden { display:none !important; }

  #cd { position:absolute; inset:0; z-index:45; display:flex; align-items:center; justify-content:center;
    font-size:min(30vw,140px); font-weight:900; color:#fff; text-shadow:0 6px 0 #e23b3b,0 9px 0 rgba(0,0,0,.3);
    pointer-events:none; }

  #driftSpark { position:absolute; bottom:max(105px,calc(env(safe-area-inset-bottom)+90px)); left:50%;
    transform:translateX(-50%); z-index:30; pointer-events:none; font-size:20px; display:none; }
</style>
</head>
<body class="gp gp-fuchsia gp-dark">

    <p style="color:#ccc;font-weight:700" id="finalTime"></p>
    <div style="display:flex;gap:14px;flex-wrap:wrap;justify-content:center">
      <a href="index.html" class="gp-btn gp-btn--ghost">🏠 もどる</a>
      <button id="againBtn" class="gp-btn">もういちど</button>
    </div>

<script>
'use strict';

// ====================
// Canvas setup
// ====================
const canvas = document.getElementById('game');
const screen2d = canvas.getContext('2d');
const miniCanvas = document.getElementById('mini');
const mctx = miniCanvas.getContext('2d');
let buf, ctx;

function forceLandscape() {
  document.body.classList.add('forced');
  document.getElementById('stage').classList.add('force-landscape');
  resize();
}
function tryLock() {
  try {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen().catch(()=>{});
    if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
  } catch(e) {}
}
document.addEventListener('pointerdown', tryLock, { once: true });

let groundImg = null;

let W, H, DISPW, DISPH, PIX;
function resize() {
  const forced = document.getElementById('stage').classList.contains('force-landscape');
  DISPW = canvas.width = forced ? window.innerHeight : window.innerWidth;
  DISPH = canvas.height = forced ? window.innerWidth : window.innerHeight;
  PIX = Math.max(2, Math.round(DISPH / 160));
  W = Math.ceil(DISPW / PIX);
  H = Math.ceil(DISPH / PIX);
  if (!buf) { buf = document.createElement('canvas'); ctx = buf.getContext('2d'); }
  buf.width = W; buf.height = H;
  ctx.imageSmoothingEnabled = false;
  screen2d.imageSmoothingEnabled = false;
  groundImg = null;
  const ms = Math.round(Math.min(DISPW, DISPH) * 0.26);
  miniCanvas.width = ms; miniCanvas.height = Math.round(ms * 0.78);
}
resize();
window.addEventListener('resize', resize);

// ====================
// Audio system
// ====================
let actx = null;
function getACtx() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
  return actx;
}

function beep(f, type, dur, vol = 0.12) {
  try {
    const ac = getACtx();
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type; o.frequency.value = f;
    o.connect(g); g.connect(ac.destination);
    const t = ac.currentTime;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur);
  } catch(e) {}
}

// Engine sound
let engineOsc = null, engineGain = null, engineRunning = false;
function startEngine() {
  if (engineRunning) return;
  try {
    const ac = getACtx();
    engineOsc = ac.createOscillator();
    engineGain = ac.createGain();
    const filter = ac.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.value = 600;
    engineOsc.type = 'sawtooth';
    engineOsc.frequency.value = 60;
    engineOsc.connect(filter);
    filter.connect(engineGain);
    engineGain.connect(ac.destination);
    engineGain.gain.value = 0.04;
    engineOsc.start();
    engineRunning = true;
  } catch(e) {}
}
function updateEngineSound(speedRatio) {
  if (!engineRunning || !engineOsc) return;
  try {
    engineOsc.frequency.value = 55 + speedRatio * 120;
    engineGain.gain.value = 0.02 + speedRatio * 0.04;
  } catch(e) {}
}
function stopEngine() {
  if (!engineRunning) return;
  try { engineOsc.stop(); } catch(e) {}
  engineRunning = false; engineOsc = null; engineGain = null;
}

function countdownBeep() { beep(880, 'sine', 0.12, 0.15); }
function goBeep() { beep(1760, 'sine', 0.35, 0.2); }
function itemPickupSound() { beep(660, 'square', 0.06, 0.1); setTimeout(() => beep(990, 'square', 0.08, 0.1), 60); }
function boostSound() { beep(440, 'sawtooth', 0.2, 0.12); setTimeout(() => beep(880, 'sawtooth', 0.15, 0.1), 80); }
function driftBoostSound() { beep(520, 'square', 0.08, 0.12); setTimeout(() => beep(780, 'square', 0.1, 0.12), 60); setTimeout(() => beep(1040, 'square', 0.15, 0.12), 120); }
function shellSound() { beep(200, 'square', 0.15, 0.15); }
function bananaDropSound() { beep(300, 'sine', 0.1, 0.1); }
function spinOutSound() { beep(140, 'sawtooth', 0.4, 0.18); }
function starSound() { beep(880, 'square', 0.06, 0.08); setTimeout(() => beep(1100, 'square', 0.06, 0.08), 70); setTimeout(() => beep(1320, 'square', 0.12, 0.08), 140); }
function finishFanfare() {
  const notes = [660, 880, 1100, 1320];
  notes.forEach((f, i) => setTimeout(() => beep(f, 'square', 0.2, 0.12), i * 120));
}

// ====================
// Track definition
// ====================
const MAP_W = 2048, MAP_H = 2048;
const ROAD_HALF = 100;
const TOTAL_LAPS = 3;
const NUM_RACERS = 4;

const MAX_SPEED = 380;
const ACCEL = 220;
const BRAKE_DECEL = 0.96;
const OFF_ROAD_MUL = 0.55;
const DRIFT_BOOST_SPEED = 1.45;
const DRIFT_BOOST_DUR = 0.8;
const MUSHROOM_BOOST_DUR = 1.5;
const STAR_DUR = 6.0;

// Direct steering constants
const STEER_RATE_BASE = 2.6;    // base turn rate (rad/s) at low speed
const STEER_RATE_HIGH = 1.8;    // turn rate at max speed (wider turns at speed)
const DRIFT_STEER_MUL = 1.35;   // sharper steering while drifting
const STEER_RETURN = 4.0;       // how fast angle stabilizes when not steering

const GRASS_COLOR = 0xff4db946;
let mapCanvas, map32;
let centerline = [], N = 0;

const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

function buildTrack() {
  centerline = [];
  const cx = MAP_W / 2, cy = MAP_H / 2;

  // Custom track shape using control points
  const points = [];
  const numPts = 24;
  for (let i = 0; i < numPts; i++) {
    const a = (i / numPts) * Math.PI * 2;
    let rx = MAP_W * 0.38;
    let ry = MAP_H * 0.32;
    const wobble = Math.sin(a * 3) * MAP_W * 0.06 + Math.cos(a * 2) * MAP_H * 0.04;
    rx += wobble;
    ry += Math.sin(a * 2 + 1) * MAP_H * 0.05;
    points.push({ x: cx + Math.cos(a) * rx, z: cy + Math.sin(a) * ry });
  }

  // Catmull-Rom spline interpolation
  N = 600;
  for (let i = 0; i < N; i++) {
    const t = i / N;
    const idx = t * numPts;
    const i0 = Math.floor(idx);
    const frac = idx - i0;
    const p0 = points[((i0 - 1) % numPts + numPts) % numPts];
    const p1 = points[i0 % numPts];
    const p2 = points[(i0 + 1) % numPts];
    const p3 = points[(i0 + 2) % numPts];

    const t2 = frac * frac, t3 = t2 * frac;
    const x = 0.5 * ((2 * p1.x) + (-p0.x + p2.x) * frac +
      (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * t2 +
      (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * t3);
    const z = 0.5 * ((2 * p1.z) + (-p0.z + p2.z) * frac +
      (2 * p0.z - 5 * p1.z + 4 * p2.z - p3.z) * t2 +
      (-p0.z + 3 * p1.z - 3 * p2.z + p3.z) * t3);
    centerline.push({ x, z });
  }

  // Build the map texture
  mapCanvas = document.createElement('canvas');
  mapCanvas.width = MAP_W; mapCanvas.height = MAP_H;
  const m = mapCanvas.getContext('2d');

  // Grass - richer checkerboard pattern
  m.fillStyle = '#4cc950';
  m.fillRect(0, 0, MAP_W, MAP_H);
  m.fillStyle = '#3fb843';
  for (let y = 0; y < MAP_H; y += 32) {
    const off = ((y / 32) % 2) * 32;
    for (let x = off; x < MAP_W; x += 64) m.fillRect(x, y, 32, 32);
  }

  // Draw road
  const strokePath = (w, st, dash) => {
    m.lineWidth = w; m.lineJoin = 'round'; m.lineCap = 'round'; m.strokeStyle = st;
    m.setLineDash(dash || []);
    m.beginPath();
    for (let i = 0; i <= N; i++) { const p = centerline[i % N]; i ? m.lineTo(p.x, p.z) : m.moveTo(p.x, p.z); }
    m.closePath(); m.stroke(); m.setLineDash([]);
  };

  // Road border (red-white rumble strip)
  strokePath(ROAD_HALF * 2 + 36, '#fff');
  strokePath(ROAD_HALF * 2 + 36, '#e03030', [22, 22]);

  // Road surface - dark asphalt
  strokePath(ROAD_HALF * 2, '#606878');

  // Road lane markings - lighter stripe near edges for lane feel
  strokePath(ROAD_HALF * 2 - 10, '#6b7382');

  // Center dashed line - bright yellow
  strokePath(5, '#ffd700', [18, 24]);

  // Lane edge dashes (white)
  // left lane edge
  const drawLaneEdge = (offsetSign) => {
    m.strokeStyle = 'rgba(255,255,255,0.35)';
    m.lineWidth = 3;
    m.setLineDash([12, 20]);
    m.beginPath();
    for (let i = 0; i <= N; i++) {
      const p = centerline[i % N];
      const t = perp(i % N);
      const ox = p.x + t.nx * ROAD_HALF * 0.52 * offsetSign;
      const oz = p.z + t.nz * ROAD_HALF * 0.52 * offsetSign;
      i ? m.lineTo(ox, oz) : m.moveTo(ox, oz);
    }
    m.closePath(); m.stroke();
    m.setLineDash([]);
  };
  drawLaneEdge(1);
  drawLaneEdge(-1);

  // Start/finish line checker pattern
  const p0 = centerline[0], p1 = centerline[1];
  const startAngle = Math.atan2(p1.z - p0.z, p1.x - p0.x);
  m.save();
  m.translate(p0.x, p0.z);
  m.rotate(startAngle + Math.PI / 2);
  const cs = ROAD_HALF / 4;
  for (let r = 0; r < 3; r++) {
    for (let i = -4; i < 4; i++) {
      m.fillStyle = ((i + r) % 2 === 0) ? '#fff' : '#111';
      m.fillRect(r * 14 - 21, i * cs, 14, cs);
    }
  }
  m.restore();

  const id = m.getImageData(0, 0, MAP_W, MAP_H);
  map32 = new Uint32Array(id.data.buffer);
}

function perp(i) {
  const p = centerline[i % N], q = centerline[(i + 1) % N];
  let nx = -(q.z - p.z), nz = (q.x - p.x);
  const l = Math.hypot(nx, nz) || 1;
  return { nx: nx / l, nz: nz / l };
}

function sampleMap(x, y) {
  x |= 0; y |= 0;
  if (x < 0 || y < 0 || x >= MAP_W || y >= MAP_H) return GRASS_COLOR;
  return map32[y * MAP_W + x];
}

function isRoad(x, y) {
  const c = sampleMap(x, y);
  const r = c & 0xff, g = (c >> 8) & 0xff, b = (c >> 16) & 0xff;
  // Road is gray (r,g,b similar) and not too bright (exclude white rumble strips)
  // Also include the start/finish checker (black and white)
  if (Math.abs(r - g) < 45 && Math.abs(g - b) < 45 && b > 70) return true;
  // Catch dark road pixels
  if (r > 80 && r < 160 && Math.abs(r - g) < 30 && Math.abs(g - b) < 30) return true;
  return false;
}

// ====================
// Game objects
// ====================
let karts = [];
let trees = [], boxes = [], bananas = [], shells = [];
let state = 'title', lastTime = 0, raceClock = 0;
const input = { left: false, right: false, useItem: false };

const ITEM_NONE = 0, ITEM_BANANA = 1, ITEM_SHELL = 2, ITEM_MUSHROOM = 3, ITEM_STAR = 4;
const ITEM_NAMES = ['', '🍌', '🐢', '🍄', '⭐'];

function nearestIdx(k) {
  let best = k.lastIdx, bd = 1e18;
  for (let o = -25; o <= 25; o++) {
    const i = ((k.lastIdx + o) % N + N) % N;
    const p = centerline[i];
    const d = (p.x - k.x) ** 2 + (p.z - k.z) ** 2;
    if (d < bd) { bd = d; best = i; }
  }
  return best;
}

function buildObjects() {
  trees = []; boxes = []; bananas = []; shells = [];

  // Trees along the roadside
  for (let i = 0; i < N; i += 12) {
    const t = perp(i);
    const o1 = ROAD_HALF + 50 + Math.random() * 80;
    const o2 = ROAD_HALF + 50 + Math.random() * 80;
    trees.push({ x: centerline[i].x + t.nx * o1, z: centerline[i].z + t.nz * o1 });
    trees.push({ x: centerline[i].x - t.nx * o2, z: centerline[i].z - t.nz * o2 });
  }

  // Item boxes at several locations
  const boxPositions = [];
  for (let bi = 60; bi < N; bi += Math.floor(N / 5)) {
    boxPositions.push(bi);
  }
  for (const bi of boxPositions) {
    const t = perp(bi);
    for (let k = -1; k <= 1; k++) {
      boxes.push({
        x: centerline[bi].x + t.nx * k * ROAD_HALF * 0.55,
        z: centerline[bi].z + t.nz * k * ROAD_HALF * 0.55,
        active: true, timer: 0
      });
    }
  }
}

function makeKarts() {
  karts = [];
  const colors = ['#e23b3b', '#3478f6', '#2aa047', '#f1c40f'];
  const helmetColors = ['#e23b3b', '#2255cc', '#1a8030', '#d4a800'];
  const visorColors = ['#22bbee', '#88ccff', '#55dd77', '#ffee88'];
  for (let i = 0; i < NUM_RACERS; i++) {
    const idx = (4 + i * 3) % N;
    const t = perp(idx);
    const lane = ((i % 2) * 2 - 1) * ROAD_HALF * 0.35;
    const p = centerline[idx], q = centerline[(idx + 1) % N];
    const hd = Math.atan2(q.x - p.x, q.z - p.z);
    karts.push({
      x: p.x + t.nx * lane,
      z: p.z + t.nz * lane,
      angle: hd,
      speed: 0,
      lap: 1,
      lastIdx: idx,
      prog: 0,
      isPlayer: i === 0,
      color: colors[i],
      helmetColor: helmetColors[i],
      visorColor: visorColors[i],
      spin: 0,
      boost: 0,
      boostMul: 1,
      item: ITEM_NONE,
      rank: i + 1,
      finished: false,
      finishTime: 0,
      // drift
      drifting: false,
      driftTime: 0,
      driftDir: 0,
      // star
      star: 0,
      // AI
      aiSpeed: 0.82 + Math.random() * 0.1,
      aiLane: (Math.random() * 2 - 1) * ROAD_HALF * 0.4,
      // visual
      steerAnim: 0
    });
  }
}

// ====================
// Items
// ====================
function giveRandomItem(k) {
  const r = Math.random();
  const isBehind = k.rank >= 3;
  if (isBehind) {
    if (r < 0.25) k.item = ITEM_STAR;
    else if (r < 0.55) k.item = ITEM_MUSHROOM;
    else if (r < 0.8) k.item = ITEM_SHELL;
    else k.item = ITEM_BANANA;
  } else {
    if (r < 0.05) k.item = ITEM_STAR;
    else if (r < 0.25) k.item = ITEM_MUSHROOM;
    else if (r < 0.55) k.item = ITEM_SHELL;
    else k.item = ITEM_BANANA;
  }
  if (k.isPlayer) {
    itemPickupSound();
    updateItemDisplay(k.item);
  }
}

function useItem(k) {
  if (k.item === ITEM_NONE) return;
  const item = k.item;
  k.item = ITEM_NONE;

  if (item === ITEM_BANANA) {
    bananas.push({
      x: k.x - Math.sin(k.angle) * ROAD_HALF * 0.7,
      z: k.z - Math.cos(k.angle) * ROAD_HALF * 0.7,
      life: 15, owner: k
    });
    if (k.isPlayer) bananaDropSound();
  } else if (item === ITEM_SHELL) {
    shells.push({
      x: k.x + Math.sin(k.angle) * 30,
      z: k.z + Math.cos(k.angle) * 30,
      angle: k.angle,
      speed: MAX_SPEED * 2.2,
      life: 3.0,
      owner: k
    });
    if (k.isPlayer) shellSound();
  } else if (item === ITEM_MUSHROOM) {
    k.boost = MUSHROOM_BOOST_DUR;
    k.boostMul = 1.5;
    if (k.isPlayer) boostSound();
  } else if (item === ITEM_STAR) {
    k.star = STAR_DUR;
    k.boost = STAR_DUR;
    k.boostMul = 1.35;
    if (k.isPlayer) starSound();
  }

  if (k.isPlayer) updateItemDisplay(ITEM_NONE);
}

function updateItemDisplay(item) {
  const el = document.getElementById('itemBox');
  if (item === ITEM_NONE) {
    el.style.display = 'none';
    document.getElementById('useItemBtn').style.display = 'none';
  } else {
    el.style.display = 'flex';
    el.textContent = ITEM_NAMES[item];
    document.getElementById('useItemBtn').style.display = 'flex';
  }
}

// ====================
// Rendering
// ====================
const HORIZ = () => Math.round(H * 0.40);
const FOCAL = () => W * 0.55;
const CAM_HEIGHT = ROAD_HALF * 0.6;

function camX() { return karts.length ? karts[0].x : MAP_W / 2; }
function camZ() { return karts.length ? karts[0].z : MAP_H / 2; }

function projGround(wx, wz, s, c) {
  const dx = wx - camX(), dz = wz - camZ();
  const fz = dx * s + dz * c;
  const rx = dx * c - dz * s;
  const focal = FOCAL();
  return {
    fz,
    sx: W / 2 + rx * focal / fz,
    sy: HORIZ() + CAM_HEIGHT * focal / fz,
    sc: focal / fz
  };
}

function render() {
  const hy = HORIZ();

  // Sky gradient - richer, more vibrant
  const sky = ctx.createLinearGradient(0, 0, 0, hy);
  sky.addColorStop(0, '#1a5faa');
  sky.addColorStop(0.35, '#3b8edf');
  sky.addColorStop(0.65, '#7ec4f0');
  sky.addColorStop(0.85, '#b8e2f8');
  sky.addColorStop(1, '#e0f0fa');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, hy);

  // Sun with warm glow
  const sunX = W * 0.82, sunY = hy * 0.3, sunR = Math.max(5, H * 0.05);
  ctx.fillStyle = 'rgba(255,250,200,.2)';
  ctx.beginPath(); ctx.arc(sunX, sunY, sunR * 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,248,180,.35)';
  ctx.beginPath(); ctx.arc(sunX, sunY, sunR * 2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff8cc';
  ctx.beginPath(); ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2); ctx.fill();

  // Clouds - bigger and fluffier
  ctx.fillStyle = 'rgba(255,255,255,.55)';
  const cTime = performance.now() * 0.00003;
  for (let i = 0; i < 6; i++) {
    const cx2 = ((i * W * 0.22 + cTime * W * 1.2) % (W * 1.6)) - W * 0.2;
    const cy2 = hy * (0.12 + (i % 3) * 0.1);
    const cr = Math.max(4, H * 0.035 + (i % 3) * 1.5);
    ctx.beginPath();
    ctx.arc(cx2, cy2, cr, 0, Math.PI * 2); ctx.fill();
    ctx.arc(cx2 + cr * 1.0, cy2 - cr * 0.25, cr * 0.8, 0, Math.PI * 2); ctx.fill();
    ctx.arc(cx2 - cr * 0.7, cy2 + cr * 0.15, cr * 0.65, 0, Math.PI * 2); ctx.fill();
    ctx.arc(cx2 + cr * 0.3, cy2 - cr * 0.45, cr * 0.55, 0, Math.PI * 2); ctx.fill();
  }

  // Distant mountains
  ctx.fillStyle = '#5598d0';
  ctx.beginPath();
  ctx.moveTo(0, hy);
  for (let x = 0; x <= W; x += 3) {
    const hv = Math.sin(x * 0.008) * H * 0.035 + Math.sin(x * 0.019 + 1.5) * H * 0.02 + Math.cos(x * 0.013) * H * 0.012;
    ctx.lineTo(x, hy - H * 0.055 - hv);
  }
  ctx.lineTo(W, hy); ctx.closePath(); ctx.fill();

  // Nearer hills - green
  ctx.fillStyle = '#3aaa48';
  ctx.beginPath();
  ctx.moveTo(0, hy);
  for (let x = 0; x <= W; x += 3) {
    const hv = Math.sin(x * 0.015) * H * 0.022 + Math.sin(x * 0.007 + 2) * H * 0.018;
    ctx.lineTo(x, hy - H * 0.028 - hv);
  }
  ctx.lineTo(W, hy); ctx.closePath(); ctx.fill();

  if (!map32 || !karts.length) {
    ctx.fillStyle = '#4cc950'; ctx.fillRect(0, hy, W, H - hy); return;
  }

  // Mode 7 ground rendering
  const heading = karts[0].angle;
  const s = Math.sin(heading), c = Math.cos(heading);
  const focal = FOCAL();
  const gH = H - hy;

  if (!groundImg || groundImg.width !== W || groundImg.height !== gH) {
    groundImg = ctx.createImageData(W, gH);
  }
  const data = new Uint32Array(groundImg.data.buffer);
  const cx0 = camX(), cz0 = camZ();

  for (let row = 0; row < gH; row++) {
    const y = row + 1;
    const dist = CAM_HEIGHT * focal / y;
    const st = dist / focal;
    const ro = row * W;
    const half = -(W / 2) * st;
    let wx = cx0 + half * c + dist * s;
    let wz = cz0 - half * s + dist * c;
    const ix = st * c, iz = -st * s;
    for (let col = 0; col < W; col++) {
      data[ro + col] = sampleMap(wx, wz);
      wx += ix; wz += iz;
    }
  }
  ctx.putImageData(groundImg, 0, hy);

  // Collect sprites to sort by depth
  const objs = [];
  const addSprite = (o, type) => {
    const pr = projGround(o.x, o.z, s, c);
    if (pr.fz < 14 || pr.sy > H + 60) return;
    objs.push({ type, ...pr, o });
  };

  for (const t of trees) addSprite(t, 'tree');
  for (const b of boxes) if (b.active) addSprite(b, 'box');
  for (const b of bananas) addSprite(b, 'banana');
  for (const sh of shells) addSprite(sh, 'shell');
  for (let i = 1; i < karts.length; i++) addSprite(karts[i], 'kart');

  objs.sort((a, b) => b.fz - a.fz);

  // Draw start/finish arch
  drawStartArch(s, c);

  // Draw sprites
  for (const ob of objs) drawSprite(ob);

  // Draw player kart
  const pk = karts[0];
  const steerDir = pk.steerAnim;
  const bob = (pk.speed / MAX_SPEED) * (Math.sin(performance.now() * 0.02) * H * 0.004);
  drawPlayerKart(W / 2, H * 0.80, steerDir, bob, pk.color, pk.helmetColor, pk.visorColor, pk.boost > 0, pk.spin > 0, pk.star > 0, pk.drifting, pk.driftDir);
}

function drawStartArch(s, c) {
  const i0 = 0, t = perp(i0);
  const cl = centerline[i0];
  const L = { x: cl.x + t.nx * (ROAD_HALF + 12), z: cl.z + t.nz * (ROAD_HALF + 12) };
  const R = { x: cl.x - t.nx * (ROAD_HALF + 12), z: cl.z - t.nz * (ROAD_HALF + 12) };
  const pl = projGround(L.x, L.z, s, c);
  const pr = projGround(R.x, R.z, s, c);
  if (pl.fz < 14 || pr.fz < 14) return null;

  const h = Math.min(H * 0.5, (pl.sc + pr.sc) / 2 * ROAD_HALF * 2.5);
  // Pillars
  ctx.fillStyle = '#d23b3b';
  ctx.fillRect(pl.sx - 3, pl.sy - h, 6, h);
  ctx.fillRect(pr.sx - 3, pr.sy - h, 6, h);
  // Banner
  const bx = Math.min(pl.sx, pr.sx) - 4;
  const bw = Math.abs(pr.sx - pl.sx) + 8;
  const by = Math.min(pl.sy, pr.sy) - h - 2;
  const bh = h * 0.38;
  ctx.fillStyle = '#1b6fd6';
  ctx.fillRect(bx, by, bw, bh);
  // Checker pattern
  const nc = 10, cw = bw / nc;
  for (let i = 0; i < nc; i++) {
    for (let j = 0; j < 2; j++) {
      ctx.fillStyle = ((i + j) % 2) ? '#fff' : '#111';
      ctx.fillRect(bx + i * cw, by + bh * 0.5 + j * bh * 0.25, cw, bh * 0.25);
    }
  }
  return { fz: (pl.fz + pr.fz) / 2 };
}

function drawSprite(ob) {
  const { sx, sy, sc, type, o } = ob;

  if (type === 'tree') {
    const h = Math.max(6, sc * ROAD_HALF * 1.2);
    const w = h * 0.55;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,.18)';
    ctx.beginPath(); ctx.ellipse(sx, sy, w * 0.45, w * 0.14, 0, 0, Math.PI * 2); ctx.fill();
    // Trunk
    ctx.fillStyle = '#8b5a2b';
    ctx.fillRect(sx - w * 0.09, sy - h * 0.4, w * 0.18, h * 0.4);
    // Foliage layers
    ctx.fillStyle = '#177a31';
    ctx.beginPath(); ctx.moveTo(sx - w * 0.5, sy - h * 0.32); ctx.lineTo(sx + w * 0.5, sy - h * 0.32); ctx.lineTo(sx, sy - h * 0.72); ctx.fill();
    ctx.fillStyle = '#22a840';
    ctx.beginPath(); ctx.moveTo(sx - w * 0.38, sy - h * 0.52); ctx.lineTo(sx + w * 0.38, sy - h * 0.52); ctx.lineTo(sx, sy - h * 0.88); ctx.fill();
    ctx.fillStyle = '#30cc52';
    ctx.beginPath(); ctx.moveTo(sx - w * 0.26, sy - h * 0.7); ctx.lineTo(sx + w * 0.26, sy - h * 0.7); ctx.lineTo(sx, sy - h); ctx.fill();
  } else if (type === 'box') {
    const z = Math.max(5, sc * ROAD_HALF * 0.45);
    const bobY = Math.sin(performance.now() * 0.004 + o.x) * z * 0.18;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,.2)';
    ctx.beginPath(); ctx.ellipse(sx, sy, z * 0.5, z * 0.15, 0, 0, Math.PI * 2); ctx.fill();
    // Box
    const by = sy - z * 1.4 + bobY;
    // Colorful rotating effect
    const phase = (performance.now() * 0.003 + o.x * 0.01) % 1;
    const boxColors = ['#ff4444', '#ffaa00', '#44cc44', '#4488ff', '#ff44ff'];
    const ci = Math.floor(phase * boxColors.length);
    ctx.fillStyle = boxColors[ci];
    ctx.fillRect(sx - z * 0.5, by, z, z);
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,.35)';
    ctx.fillRect(sx - z * 0.5, by, z, z * 0.3);
    // Question mark
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + Math.round(z * 0.7) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('?', sx, by + z * 0.55);
  } else if (type === 'banana') {
    const r = Math.max(2, sc * ROAD_HALF * 0.18);
    ctx.fillStyle = 'rgba(0,0,0,.15)';
    ctx.beginPath(); ctx.ellipse(sx, sy, r, r * 0.3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#f1c40f';
    ctx.beginPath(); ctx.ellipse(sx, sy - r * 0.5, r, r * 0.5, 0.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#c9a100';
    ctx.fillRect(sx - 1, sy - r * 1.1, 2, r * 0.35);
  } else if (type === 'shell') {
    const r = Math.max(3, sc * ROAD_HALF * 0.2);
    ctx.fillStyle = '#2aa047';
    ctx.beginPath(); ctx.arc(sx, sy - r * 0.6, r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#177a31';
    ctx.beginPath(); ctx.arc(sx, sy - r * 0.6, r * 0.6, 0, Math.PI * 2); ctx.fill();
  } else if (type === 'kart') {
    const w = Math.min(H * 0.22, Math.max(6, sc * ROAD_HALF * 0.6));
    const h = w * 0.75;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,.25)';
    ctx.beginPath(); ctx.ellipse(sx, sy, w * 0.55, h * 0.2, 0, 0, Math.PI * 2); ctx.fill();
    // Wheels
    ctx.fillStyle = '#1a1c22';
    ctx.fillRect(sx - w * 0.62, sy - h * 0.78, w * 0.22, h * 0.68);
    ctx.fillRect(sx + w * 0.40, sy - h * 0.78, w * 0.22, h * 0.68);
    // Body
    if (o.star > 0) {
      const flash = Math.sin(performance.now() * 0.02) > 0;
      ctx.fillStyle = flash ? '#fff700' : '#ff8800';
    } else {
      ctx.fillStyle = o.color;
    }
    ctx.fillRect(sx - w * 0.5, sy - h, w, h);
    // Windshield
    ctx.fillStyle = 'rgba(150,210,255,.4)';
    ctx.fillRect(sx - w * 0.5, sy - h, w, h * 0.3);
    // Driver helmet
    ctx.fillStyle = o.helmetColor || '#333';
    ctx.beginPath(); ctx.arc(sx, sy - h * 1.08, w * 0.24, 0, Math.PI * 2); ctx.fill();
    // Visor
    ctx.fillStyle = o.visorColor || '#88ccff';
    ctx.fillRect(sx - w * 0.16, sy - h * 1.18, w * 0.32, w * 0.12);
    // Boost flame
    if (o.boost > 0) {
      ctx.fillStyle = 'rgba(255,200,50,.7)';
      const fw = w * 0.3, fh = h * 0.3 + Math.random() * h * 0.15;
      ctx.fillRect(sx - fw / 2, sy + 2, fw, fh);
    }
  }
}

function drawPlayerKart(cx, cy, lean, bob, color, helmetColor, visorColor, boost, spin, star, drifting, driftDir) {
  const s = H * 0.0016;
  const bw = 170 * s, bh = 80 * s;
  ctx.save();
  ctx.translate(cx, cy + bob);

  let rot = lean * 0.12;
  if (spin) rot = performance.now() / 80;
  if (drifting) rot += driftDir * 0.18;
  ctx.rotate(rot);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,.3)';
  ctx.beginPath(); ctx.ellipse(0, 12 * s, bw * 0.6, 16 * s, 0, 0, Math.PI * 2); ctx.fill();

  // Boost flames
  if (boost) {
    const flameH = 40 * s + Math.random() * 18 * s;
    ctx.fillStyle = 'rgba(255,80,20,.65)';
    ctx.fillRect(-bw * 0.16, bh * 0.48, bw * 0.32, flameH);
    ctx.fillStyle = 'rgba(255,220,60,.55)';
    ctx.fillRect(-bw * 0.09, bh * 0.48, bw * 0.18, flameH * 0.7);
    ctx.fillStyle = 'rgba(255,255,200,.4)';
    ctx.fillRect(-bw * 0.04, bh * 0.48, bw * 0.08, flameH * 0.5);
  }

  // Drift sparks
  if (drifting) {
    const sparkPhase = performance.now() * 0.012;
    ctx.fillStyle = 'rgba(255,200,50,.9)';
    for (let i = 0; i < 4; i++) {
      const sx2 = (Math.sin(sparkPhase + i * 1.8) * bw * 0.35) * driftDir;
      const sy2 = bh * 0.25 + Math.random() * bh * 0.25;
      const sz = 2 + Math.random() * 3;
      ctx.fillRect(sx2 - sz / 2, sy2, sz, sz);
    }
  }

  // Wheels - thicker
  ctx.fillStyle = '#1a1c22';
  const wheelW = bw * 0.24, wheelH = bh * 0.85;
  // Wheel tread highlight
  ctx.fillRect(-bw * 0.64, -bh * 0.40, wheelW, wheelH);
  ctx.fillRect(bw * 0.40, -bh * 0.40, wheelW, wheelH);
  ctx.fillStyle = '#2a2c30';
  ctx.fillRect(-bw * 0.62, -bh * 0.38, wheelW * 0.85, wheelH * 0.15);
  ctx.fillRect(bw * 0.42, -bh * 0.38, wheelW * 0.85, wheelH * 0.15);

  // Rear bumper
  ctx.fillStyle = '#992218';
  ctx.fillRect(-bw * 0.48, bh * 0.28, bw * 0.96, bh * 0.18);

  // Exhaust pipes
  ctx.fillStyle = '#555';
  ctx.fillRect(-bw * 0.22, bh * 0.38, bw * 0.08, bh * 0.14);
  ctx.fillRect(bw * 0.14, bh * 0.38, bw * 0.08, bh * 0.14);

  // Body
  if (star) {
    const flash = Math.sin(performance.now() * 0.015) > 0;
    ctx.fillStyle = flash ? '#ffee00' : '#ff6600';
  } else {
    ctx.fillStyle = color;
  }
  ctx.fillRect(-bw * 0.48, -bh * 0.52, bw * 0.96, bh * 0.8);

  // Body highlight stripe
  ctx.fillStyle = 'rgba(255,255,255,.15)';
  ctx.fillRect(-bw * 0.48, -bh * 0.52, bw * 0.96, bh * 0.15);

  // Windshield
  ctx.fillStyle = 'rgba(180,225,255,.35)';
  ctx.fillRect(-bw * 0.38, -bh * 0.52, bw * 0.76, bh * 0.28);

  // Driver helmet - bigger and more visible
  ctx.fillStyle = helmetColor;
  ctx.beginPath(); ctx.arc(0, -bh * 0.72, 26 * s, 0, Math.PI * 2); ctx.fill();
  // Helmet highlight
  ctx.fillStyle = 'rgba(255,255,255,.2)';
  ctx.beginPath(); ctx.arc(-4 * s, -bh * 0.78, 12 * s, 0, Math.PI * 2); ctx.fill();
  // Visor
  ctx.fillStyle = visorColor;
  ctx.fillRect(-16 * s, -bh * 0.80, 32 * s, 12 * s);
  // Visor glare
  ctx.fillStyle = 'rgba(255,255,255,.3)';
  ctx.fillRect(-14 * s, -bh * 0.80, 10 * s, 4 * s);

  ctx.restore();
}

// ====================
// Minimap
// ====================
function drawMinimap() {
  const w = miniCanvas.width, h = miniCanvas.height;
  mctx.clearRect(0, 0, w, h);

  const pad = 6;
  const sx = (w - pad * 2) / MAP_W, sy = (h - pad * 2) / MAP_H;
  const sc = Math.min(sx, sy);
  const ox = pad + (w - pad * 2 - MAP_W * sc) / 2;
  const oy = pad + (h - pad * 2 - MAP_H * sc) / 2;
  const X = x => ox + x * sc, Y = z => oy + z * sc;

  // Track outline
  mctx.strokeStyle = 'rgba(255,255,255,.7)';
  mctx.lineWidth = Math.max(3, sc * ROAD_HALF * 1.6);
  mctx.lineJoin = 'round';
  mctx.beginPath();
  for (let i = 0; i <= N; i += 3) {
    const p = centerline[i % N];
    i ? mctx.lineTo(X(p.x), Y(p.z)) : mctx.moveTo(X(p.x), Y(p.z));
  }
  mctx.closePath(); mctx.stroke();

  // Start marker
  mctx.fillStyle = '#fff';
  mctx.fillRect(X(centerline[0].x) - 2, Y(centerline[0].z) - 2, 4, 4);

  // Racers
  for (let i = karts.length - 1; i >= 0; i--) {
    const k = karts[i];
    mctx.fillStyle = k.star > 0 ? '#ffee00' : k.color;
    mctx.beginPath();
    mctx.arc(X(k.x), Y(k.z), k.isPlayer ? 5 : 3.5, 0, Math.PI * 2);
    mctx.fill();
    if (k.isPlayer) {
      mctx.strokeStyle = '#fff'; mctx.lineWidth = 1.5; mctx.stroke();
    }
  }
}

// ====================
// Game logic - DIRECT STEERING
// ====================
function updateKart(k, dt) {
  // Spin out
  if (k.spin > 0) {
    k.spin -= dt;
    k.speed *= 0.93;
    if (k.spin <= 0) k.spin = 0;
  }

  const spd = k.speed / MAX_SPEED;

  if (k.isPlayer) {
    // =====================
    // DIRECT STEERING
    // =====================
    const steer = (input.right ? 1 : 0) - (input.left ? 1 : 0);
    k.steerAnim += (steer - k.steerAnim) * Math.min(1, dt * 12);

    // Turn rate scales with speed: slower = tighter, faster = wider
    // At low speed the kart is very responsive; at high speed turns are gentler
    const speedFactor = 1.0 - spd * 0.35; // ranges from 1.0 (stopped) to 0.65 (max speed)
    const turnRate = STEER_RATE_BASE * speedFactor;

    // Drift mechanic
    if (steer !== 0 && k.speed > MAX_SPEED * 0.3 && k.spin <= 0) {
      if (!k.drifting) {
        k.driftTime += dt;
        if (k.driftTime > 0.25) {
          k.drifting = true;
          k.driftDir = steer;
          k.driftTime = 0;
        }
      }
      if (k.drifting) {
        k.driftTime += dt;
      }
    }

    if (steer === 0 && !input.left && !input.right) {
      if (k.drifting) {
        // Release drift => boost
        if (k.driftTime > 0.3) {
          const boostPower = Math.min(k.driftTime, 2.0);
          k.boost = DRIFT_BOOST_DUR * (0.5 + boostPower * 0.5);
          k.boostMul = DRIFT_BOOST_SPEED;
          driftBoostSound();
        }
        k.drifting = false;
        k.driftTime = 0;
        k.driftDir = 0;
      } else {
        k.driftTime = 0;
      }
    }

    // Apply direct steering rotation
    if (k.spin <= 0 && steer !== 0) {
      const driftMul = k.drifting ? DRIFT_STEER_MUL : 1.0;
      // Only steer if moving (no turning while stationary)
      const moveFactor = Math.min(1.0, k.speed / (MAX_SPEED * 0.08));
      k.angle += steer * turnRate * driftMul * moveFactor * dt;
    }

    // Use item
    if (input.useItem && k.item !== ITEM_NONE) {
      useItem(k);
      input.useItem = false;
    }
  } else {
    // AI steering - track-following (unchanged, AI needs this)
    const idx = nearestIdx(k);
    const lookAhead = 18 + Math.round(spd * 8);
    const aimPt = centerline[(idx + lookAhead) % N];
    const t = perp((idx + lookAhead) % N);
    const tx = aimPt.x + t.nx * k.aiLane * 0.3;
    const tz = aimPt.z + t.nz * k.aiLane * 0.3;
    const des = Math.atan2(tx - k.x, tz - k.z);
    const d = Math.atan2(Math.sin(des - k.angle), Math.cos(des - k.angle));
    if (k.spin <= 0) {
      const aiTurnRate = STEER_RATE_BASE * 1.1;
      k.angle += clamp(d, -aiTurnRate * dt, aiTurnRate * dt);
    }

    // AI uses items randomly
    if (k.item !== ITEM_NONE && Math.random() < dt * 0.5) {
      useItem(k);
    }

    // Vary AI lane occasionally
    if (Math.random() < dt * 0.1) {
      k.aiLane = (Math.random() * 2 - 1) * ROAD_HALF * 0.4;
    }
  }

  // Speed
  const boostActive = k.boost > 0;
  const maxSpd = MAX_SPEED * (boostActive ? k.boostMul : (k.isPlayer ? 1.0 : k.aiSpeed));
  k.speed = clamp(k.speed + ACCEL * dt, 0, maxSpd);

  if (k.boost > 0) {
    k.boost -= dt;
    if (k.boost <= 0) { k.boost = 0; k.boostMul = 1; }
  }
  if (k.star > 0) {
    k.star -= dt;
    if (k.star <= 0) k.star = 0;
  }

  const onRoad = isRoad(k.x, k.z);
  const mv = k.speed * (onRoad ? 1 : OFF_ROAD_MUL);
  k.x += Math.sin(k.angle) * mv * dt;
  k.z += Math.cos(k.angle) * mv * dt;

  // Clamp to map
  k.x = clamp(k.x, 10, MAP_W - 10);
  k.z = clamp(k.z, 10, MAP_H - 10);

  if (!onRoad) k.speed = Math.min(k.speed, MAX_SPEED * 0.65);

  // Lap tracking
  const idx = nearestIdx(k);
  if (k.lastIdx > N * 0.75 && idx < N * 0.25) k.lap++;
  if (k.lastIdx < N * 0.25 && idx > N * 0.75) k.lap--;
  k.lastIdx = idx;
  k.prog = k.lap * N + idx;

  // Item box collisions
  for (const b of boxes) {
    if (!b.active) continue;
    if ((b.x - k.x) ** 2 + (b.z - k.z) ** 2 < (ROAD_HALF * 0.5) ** 2) {
      if (k.item === ITEM_NONE) {
        b.active = false;
        b.timer = 3.5;
        giveRandomItem(k);
      }
    }
  }

  // Banana collisions
  for (let i = bananas.length - 1; i >= 0; i--) {
    const ban = bananas[i];
    if ((ban.x - k.x) ** 2 + (ban.z - k.z) ** 2 < (ROAD_HALF * 0.35) ** 2) {
      if (ban.owner === k && ban.life > 14) continue;
      if (k.star > 0) { bananas.splice(i, 1); continue; }
      bananas.splice(i, 1);
      if (k.spin <= 0) {
        k.spin = 1.2;
        k.speed *= 0.4;
        k.drifting = false; k.driftTime = 0; k.driftDir = 0;
        if (k.isPlayer) spinOutSound();
      }
    }
  }

  // Shell collisions
  for (let i = shells.length - 1; i >= 0; i--) {
    const sh = shells[i];
    if (sh.owner === k) continue;
    if ((sh.x - k.x) ** 2 + (sh.z - k.z) ** 2 < (ROAD_HALF * 0.45) ** 2) {
      if (k.star > 0) { shells.splice(i, 1); continue; }
      shells.splice(i, 1);
      if (k.spin <= 0) {
        k.spin = 1.5;
        k.speed *= 0.3;
        k.drifting = false; k.driftTime = 0; k.driftDir = 0;
        if (k.isPlayer) spinOutSound();
      }
    }
  }
}

function update(dt) {
  if (state !== 'play') return;
  raceClock += dt;

  for (const k of karts) updateKart(k, dt);

  // Update shells
  for (let i = shells.length - 1; i >= 0; i--) {
    const sh = shells[i];
    sh.x += Math.sin(sh.angle) * sh.speed * dt;
    sh.z += Math.cos(sh.angle) * sh.speed * dt;
    sh.life -= dt;
    // Bounce off track edges
    if (!isRoad(sh.x, sh.z)) {
      let bestD = 1e18, bestI = 0;
      for (let j = 0; j < N; j += 4) {
        const p = centerline[j];
        const d = (p.x - sh.x) ** 2 + (p.z - sh.z) ** 2;
        if (d < bestD) { bestD = d; bestI = j; }
      }
      const p = centerline[bestI];
      sh.angle = Math.atan2(p.x - sh.x, p.z - sh.z);
    }
    if (sh.life <= 0 || sh.x < 0 || sh.x > MAP_W || sh.z < 0 || sh.z > MAP_H) {
      shells.splice(i, 1);
    }
  }

  // Regenerate item boxes
  for (const b of boxes) {
    if (!b.active) {
      b.timer -= dt;
      if (b.timer <= 0) b.active = true;
    }
  }

  // Clean up bananas
  for (let i = bananas.length - 1; i >= 0; i--) {
    bananas[i].life -= dt;
    if (bananas[i].life <= 0) bananas.splice(i, 1);
  }

  // Rank calculation
  const order = [...karts].sort((a, b) => b.prog - a.prog);
  order.forEach((k, i) => k.rank = i + 1);

  // Update HUD
  const me = karts[0];
  const lapDisplay = Math.min(me.lap, TOTAL_LAPS);
  document.getElementById('lapDisp').textContent = lapDisplay + '/' + TOTAL_LAPS;

  const rankSuffix = ['st', 'nd', 'rd', 'th'];
  document.getElementById('rankDisp').textContent = me.rank + (rankSuffix[me.rank - 1] || 'th');

  const mins = Math.floor(raceClock / 60);
  const secs = Math.floor(raceClock % 60);
  document.getElementById('timeDisp').textContent = mins + ':' + (secs < 10 ? '0' : '') + secs;

  // Speed bar
  document.getElementById('speedFill').style.width = Math.round(me.speed / MAX_SPEED * 100) + '%';

  // Drift indicator
  const sparkEl = document.getElementById('driftSpark');
  if (me.drifting && me.driftTime > 0.3) {
    sparkEl.style.display = 'block';
    if (me.driftTime > 1.5) sparkEl.textContent = '🔥🔥🔥';
    else if (me.driftTime > 0.8) sparkEl.textContent = '✨✨';
    else sparkEl.textContent = '✨';
  } else {
    sparkEl.style.display = 'none';
  }

  // Engine sound
  updateEngineSound(me.speed / MAX_SPEED);

  // Finish
  if (me.lap > TOTAL_LAPS && !me.finished) {
    me.finished = true;
    me.finishTime = raceClock;
    endRace();
  }
}

// ====================
// Game loop
// ====================
function loop(ts) {
  const now = ts || 0;
  let dt = (now - lastTime) / 1000;
  lastTime = now;
  if (dt > 0.06) dt = 0.06;
  if (!dt) dt = 1 / 60;

  try {
    update(dt);
    render();
    screen2d.imageSmoothingEnabled = false;
    screen2d.drawImage(buf, 0, 0, W, H, 0, 0, DISPW, DISPH);
    if (state === 'play' || state === 'countdown') drawMinimap();
  } catch(e) { console.error(e); }

  requestAnimationFrame(loop);
}

// ====================
// Game flow
// ====================
function startGame() {
  getACtx();
  buildTrack();
  buildObjects();
  makeKarts();
  raceClock = 0;

  const rn = document.querySelector('.rotate-notice');
  rn.classList.remove('in-title');
  rn.classList.add('in-game');

  document.getElementById('titleScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  miniCanvas.classList.remove('hidden');
  document.getElementById('speedBar').classList.remove('hidden');
  document.getElementById('btnL').classList.remove('hidden');
  document.getElementById('btnR').classList.remove('hidden');
  updateItemDisplay(ITEM_NONE);

  // Countdown
  state = 'countdown';
  const cd = document.getElementById('cd');
  cd.classList.remove('hidden');
  let n = 3;
  cd.textContent = n;
  countdownBeep();

  const iv = setInterval(() => {
    n--;
    if (n > 0) {
      cd.textContent = n;
      countdownBeep();
    } else {
      cd.textContent = 'GO!';
      goBeep();
      state = 'play';
      startEngine();
      setTimeout(() => cd.classList.add('hidden'), 600);
      clearInterval(iv);
    }
  }, 900);
}

function endRace() {
  state = 'result';
  stopEngine();
  finishFanfare();

  const me = karts[0];
  const rankSuffix = ['st', 'nd', 'rd', 'th'];
  document.getElementById('finalRank').textContent = me.rank + (rankSuffix[me.rank - 1] || 'th');

  const mins = Math.floor(raceClock / 60);
  const secs = Math.floor(raceClock % 60);
  const ms = Math.floor((raceClock % 1) * 100);
  document.getElementById('finalTime').textContent = 'TIME: ' + mins + ':' + (secs < 10 ? '0' : '') + secs + '.' + (ms < 10 ? '0' : '') + ms;

  if (me.rank === 1) document.getElementById('resultEmoji').textContent = '🏆';
  else if (me.rank === 2) document.getElementById('resultEmoji').textContent = '🥈';
  else if (me.rank === 3) document.getElementById('resultEmoji').textContent = '🥉';
  else document.getElementById('resultEmoji').textContent = '🏁';

  document.getElementById('hud').classList.add('hidden');
  miniCanvas.classList.add('hidden');
  document.getElementById('speedBar').classList.add('hidden');
  document.getElementById('btnL').classList.add('hidden');
  document.getElementById('btnR').classList.add('hidden');
  document.getElementById('useItemBtn').style.display = 'none';
  document.getElementById('itemBox').style.display = 'none';
  document.getElementById('driftSpark').style.display = 'none';
  document.getElementById('resultScreen').classList.remove('hidden');
}

document.getElementById('startBtn').onclick = startGame;
document.getElementById('againBtn').onclick = startGame;

// ====================
// Input handling
// ====================
function bindHold(el, side) {
  const on = (e) => { e.preventDefault(); input[side] = true; el.classList.add('on'); };
  const off = () => { input[side] = false; el.classList.remove('on'); };
  el.addEventListener('pointerdown', on);
  el.addEventListener('pointerup', off);
  el.addEventListener('pointerleave', off);
  el.addEventListener('pointercancel', off);
}
bindHold(document.getElementById('btnL'), 'left');
bindHold(document.getElementById('btnR'), 'right');

// Use item button
const useBtn = document.getElementById('useItemBtn');
useBtn.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  input.useItem = true;
});

// Canvas touch for steering (fallback)
canvas.addEventListener('pointerdown', (e) => {
  if (state !== 'play') return;
  if (e.offsetX < DISPW / 2) input.left = true;
  else input.right = true;
});
const clearInput = () => {
  input.left = false; input.right = false;
  document.getElementById('btnL').classList.remove('on');
  document.getElementById('btnR').classList.remove('on');
};
canvas.addEventListener('pointerup', clearInput);
canvas.addEventListener('pointercancel', clearInput);

// Keyboard
window.addEventListener('keydown', (e) => {
  if (e.code === 'ArrowLeft' || e.code === 'KeyA') input.left = true;
  if (e.code === 'ArrowRight' || e.code === 'KeyD') input.right = true;
  if (e.code === 'Space' || e.code === 'ArrowUp') input.useItem = true;
});
window.addEventListener('keyup', (e) => {
  if (e.code === 'ArrowLeft' || e.code === 'KeyA') input.left = false;
  if (e.code === 'ArrowRight' || e.code === 'KeyD') input.right = false;
});

// ====================
// Start
// ====================
requestAnimationFrame(loop);
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js?v=51'); }
</script>
