<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PIXEL MOTO RACING</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; touch-action:none; }
  html,body { width:100%; height:100%; overflow:hidden; background:#0a0a14; font-family:"Courier New",monospace; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { image-rendering:pixelated; image-rendering:crisp-edges; background:#5c94fc; max-width:100%; max-height:100%; }

  .pad { position:fixed; bottom:0; top:0; z-index:10; }
  #padL { left:0; width:55%; }
  #padR { right:0; width:45%; }

  .hint { position:fixed; bottom:10px; font-size:11px; color:#fff; letter-spacing:1px; pointer-events:none; z-index:11; text-shadow:1px 1px 0 #000; opacity:.6; }
  #hintL { left:18px; }

  #itemBtn { position:fixed; right:22px; bottom:22px; width:92px; height:92px; z-index:12;
    border:4px solid #fff; border-radius:16px; background:rgba(0,0,0,.45);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:#fff; pointer-events:none; box-shadow:3px 3px 0 #000; }
  #itemBtn img { width:46px; height:46px; image-rendering:pixelated; display:none; }
  #itemBtn .dash { font-size:34px; opacity:.5; }
  #itemBtn .lbl { font-size:10px; letter-spacing:1px; margin-top:3px; opacity:.85; }
  #itemBtn.ready { border-color:#ffd93b; background:rgba(40,20,0,.6); animation:pulse 1s infinite; }
  #itemBtn.ready img { display:block; } #itemBtn.ready .dash { display:none; }
  @keyframes pulse { 0%,100%{box-shadow:3px 3px 0 #000;} 50%{box-shadow:0 0 14px #ffd93b,3px 3px 0 #000;} }
  #itemBtn.press { transform:translate(2px,2px); }

  #msg { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:20;
    color:#fff; text-align:center; text-shadow:2px 2px 0 #000; pointer-events:none; width:92%; }
  #msg h1 { font-size:30px; letter-spacing:3px; color:#ffd93b; margin-bottom:6px; }
  #msg h2 { font-size:14px; letter-spacing:2px; color:#7fd0ff; margin-bottom:16px; }
  #msg p { font-size:13px; line-height:1.9; }
  #msg .big { font-size:46px; color:#ff5a5a; margin:8px 0; }
  #startBtn { pointer-events:auto; margin-top:20px; display:inline-block; background:#2244cc; color:#fff;
    border:3px solid #fff; padding:13px 34px; font-size:16px; font-weight:bold; letter-spacing:2px;
    font-family:inherit; cursor:pointer; box-shadow:4px 4px 0 #000; }
  #startBtn:active { transform:translate(2px,2px); box-shadow:2px 2px 0 #000; }

  #count { position:fixed; top:40%; left:50%; transform:translate(-50%,-50%); z-index:25;
    font-size:96px; font-weight:bold; color:#fff; text-shadow:4px 4px 0 #000,0 0 22px #ffd93b;
    pointer-events:none; opacity:0; }

  #rotate { position:fixed; inset:0; z-index:50; background:#0a0a14; color:#fff;
    display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
  #rotate .ico { font-size:60px; animation:rot 1.5s ease-in-out infinite; }
  #rotate p { font-size:16px; margin-top:18px; letter-spacing:1px; }
  @keyframes rot { 0%,40%{transform:rotate(0);} 60%,100%{transform:rotate(90deg);} }
  @media (orientation:portrait) { #rotate{display:flex;} }
  #wrap.force-landscape { width:100vh; height:100vw; transform:rotate(90deg); transform-origin:top left; position:fixed; left:100%; top:0; }
  body.forced #rotate { display:none !important; }
  .rotate-go { margin-top:18px; font-family:inherit; font-weight:800; font-size:16px; color:#fff;
    background:#2244cc; border:3px solid #fff; padding:12px 24px; cursor:pointer; box-shadow:3px 3px 0 #000; }
  .rotate-go:active { transform:translate(2px,2px); box-shadow:1px 1px 0 #000; }
  #homeBtn { position:fixed; top:8px; left:8px; z-index:30; width:36px; height:36px;
    background:rgba(255,255,255,.18); border:2px solid rgba(255,255,255,.5); border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:18px;
    text-decoration:none; box-shadow:2px 2px 0 #000; }
  #homeBtn:active { transform:translate(1px,1px); box-shadow:1px 1px 0 #000; }
  .hidden { display:none !important; }
</style>
</head>
<body>
<a id="homeBtn" href="index.html">🏠</a>
<div id="wrap"><canvas id="game" width="320" height="180"></canvas></div>

<div class="pad" id="padL"></div>
<div class="pad" id="padR"></div>
<div class="hint" id="hintL">◀ 押して走る・傾けて曲がる ▶</div>
<div id="itemBtn"><img id="itemImg"><span class="dash">―</span><span class="lbl">ITEM</span></div>
<div id="count"></div>

<div id="msg">
  <h1>PIXEL MOTO RACING</h1>
  <h2>ドットカート</h2>
  <p>左側=押して走る／傾けてハンドル<br>右下=アイテムボタン（きのこでダッシュ）<br>3周してゴールゲートをくぐれ！</p>
  <button id="startBtn">スタート</button>
</div>

<div id="rotate"><div class="ico">📱</div><p>スマホを横向きにしてね</p><button class="rotate-go" onclick="forceLandscape()">よこむきにする 🔄</button></div>

const cv=document.getElementById('game'), ctx=cv.getContext('2d');
const W=320, H=180, HORIZON=72;
const TRACK_W=440;

const itemBtnEl=document.getElementById('itemBtn');
const countEl=document.getElementById('count');

const G={ state:'title', speed:0, maxSpeed:3.6, steer:0, angle:0,
  trackA:-Math.PI/2, offset:0, lap:0, totalLaps:3,
  item:null, boostT:0, bob:0, items:[], time:0, startT:0,
  countVal:0, lineBase:0, nextLine:0 };

function placeItems(){
  G.items=[];
  for(let i=0;i<8;i++) G.items.push({a:(i/8)*Math.PI*2+0.4, taken:false, respawn:0});
}

const input={accel:false,steerX:0};
function bindPad(el,isLeft){
  const move=px=>{const r=el.getBoundingClientRect(); input.steerX=((px-r.left)/r.width-0.5)*2;};
  el.addEventListener('touchstart',e=>{e.preventDefault(); if(isLeft){input.accel=true;move(e.touches[0].clientX);}else useItem();},{passive:false});
  el.addEventListener('touchmove',e=>{e.preventDefault(); if(isLeft)move(e.touches[0].clientX);},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault(); if(isLeft){input.accel=false;input.steerX=0;}},{passive:false});
}
bindPad(document.getElementById('padL'),true);
bindPad(document.getElementById('padR'),false);
document.getElementById('padR').addEventListener('touchstart',()=>itemBtnEl.classList.add('press'));
document.getElementById('padR').addEventListener('touchend',()=>itemBtnEl.classList.remove('press'));

const keys={};
addEventListener('keydown',e=>{keys[e.key]=true; if(e.key===' ')useItem();});
addEventListener('keyup',e=>{keys[e.key]=false;});

function useItem(){ if(G.state!=='play')return; if(G.item){G.boostT=1.4;G.item=null;updateItemUI();} }
function updateItemUI(){ if(G.item){itemBtnEl.classList.add('ready');}else{itemBtnEl.classList.remove('ready');} }

document.getElementById('startBtn').addEventListener('click',beginCountdown);
function beginCountdown(){
  document.getElementById('msg').classList.add('hidden');
  Object.assign(G,{state:'countdown',speed:0,steer:0,angle:0,trackA:-Math.PI/2,offset:0,lap:0,item:null,boostT:0,time:0,countVal:3});
  G.lineBase=G.trackA+0.12; G.nextLine=G.trackA+Math.PI*2;
  placeItems(); updateItemUI(); runCount();
}
function runCount(){
  if(G.countVal>0){ countEl.textContent=G.countVal; countEl.style.color='#fff'; flashCount(); G.countVal--; setTimeout(runCount,1000); }
  else { countEl.textContent='GO!'; countEl.style.color='#7CFC00'; flashCount(); G.state='play'; G.startT=performance.now(); setTimeout(()=>countEl.style.opacity=0,800); }
}
function flashCount(){
  countEl.style.transition='none'; countEl.style.opacity=1; countEl.style.transform='translate(-50%,-50%) scale(1.4)';
  requestAnimationFrame(()=>{countEl.style.transition='all .8s'; countEl.style.transform='translate(-50%,-50%) scale(1)';});
}

function update(dt){
  if(G.state!=='play')return;
  const accelOn=input.accel||keys['ArrowUp'];
  let tSteer=input.steerX;
  if(keys['ArrowLeft'])tSteer=-1; else if(keys['ArrowRight'])tSteer=1;
  G.steer+=(tSteer-G.steer)*0.15;
  if(accelOn)G.speed+=0.08; else G.speed-=0.06;
  let max=G.maxSpeed;
  if(G.boostT>0){G.boostT-=dt; max=G.maxSpeed*1.7; if(accelOn)G.speed+=0.15;}
  G.speed=Math.max(0,Math.min(max,G.speed));
  G.angle+=G.steer*G.speed*0.025;
  G.trackA+=G.speed*0.006;
  G.offset+=G.steer*G.speed*4;
  if(Math.abs(G.offset)>TRACK_W){G.offset=Math.sign(G.offset)*TRACK_W; G.speed*=0.92;}
  if(G.trackA>=G.nextLine){ G.nextLine+=Math.PI*2; G.lap++; if(G.lap>=G.totalLaps)return winGame(); }
  for(const it of G.items){
    if(it.taken){it.respawn-=dt; if(it.respawn<=0)it.taken=false; continue;}
    let da=Math.abs(((it.a-G.trackA)%(Math.PI*2))); if(da>Math.PI)da=Math.PI*2-da;
    if(da<0.05&&Math.abs(G.offset)<160){ it.taken=true; it.respawn=4; if(!G.item){G.item='mushroom';updateItemUI();} }
  }
  G.bob+=G.speed*0.3; G.time=(performance.now()-G.startT)/1000;
}

function winGame(){
  G.state='win'; const m=document.getElementById('msg'); m.classList.remove('hidden');
  m.innerHTML=`<h1>GOAL!</h1><div class="big">★ FINISH ★</div><p>TIME ${G.time.toFixed(2)}秒</p><button id="startBtn">もう一回</button>`;
  document.getElementById('startBtn').addEventListener('click',beginCountdown);
  itemBtnEl.classList.remove('ready');
}

function drawSky(){
  const sky=ctx.createLinearGradient(0,0,0,HORIZON);
  sky.addColorStop(0,'#3b7dd8'); sky.addColorStop(1,'#bfe0ff');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,HORIZON);
  ctx.fillStyle='#fff';
  const cx=(-G.trackA*40)%380;
  for(let i=0;i<5;i++){ let x=((i*90+cx)%380+380)%380-40; const y=14+i%2*12;
    ctx.fillRect(x,y,22,6); ctx.fillRect(x+6,y-4,14,6); ctx.fillRect(x-4,y+4,30,4); }
  const mx=(-G.trackA*30)%320;
  ctx.fillStyle='#6b7a8c'; for(let i=-1;i<7;i++){const x=((i*70+mx)%380+380)%380-40; mountain(x,HORIZON,46,28);}
  ctx.fillStyle='#566678'; for(let i=-1;i<8;i++){const x=((i*54+mx*1.3)%380+380)%380-40; mountain(x,HORIZON,34,20);}
}
function mountain(x,base,w,h){
  ctx.beginPath(); ctx.moveTo(x,base); ctx.lineTo(x+w/2,base-h); ctx.lineTo(x+w,base); ctx.fill();
  const s=ctx.fillStyle; ctx.fillStyle='#dfe8f0';
  ctx.beginPath(); ctx.moveTo(x+w/2-5,base-h+7); ctx.lineTo(x+w/2,base-h); ctx.lineTo(x+w/2+5,base-h+7); ctx.fill();
  ctx.fillStyle=s;
}
function drawGround(){
  for(let y=HORIZON;y<H;y++){
    const p=(y-HORIZON)/(H-HORIZON), dist=1/(p+0.05), worldZ=G.trackA*200+dist*40;
    const roadHalf=TRACK_W/(dist*1.1), center=W/2-G.offset/(dist*1.1)-G.steer*dist*1.5;
    ctx.fillStyle=(Math.floor(worldZ*0.25)%2===0)?'#3f9e3f':'#379037'; ctx.fillRect(0,y,W,1);
    const l=center-roadHalf, r=center+roadHalf;
    ctx.fillStyle=(Math.floor(worldZ*0.5)%2===0)?'#d83b3b':'#f2f2f2'; ctx.fillRect(l-6,y,Math.max(0,r-l+12),1);
    ctx.fillStyle=(Math.floor(worldZ*0.25)%2===0)?'#6f6f76':'#686870'; ctx.fillRect(l,y,Math.max(0,r-l),1);
    if(Math.floor(worldZ*0.5)%2===0){ctx.fillStyle='#f4f4f4'; ctx.fillRect(center-1,y,2,1);}
  }
  drawStartLine();
}
function drawStartLine(){
  for(let n=-1;n<=1;n++){
    const lineA=G.lineBase+n*Math.PI*2; let d=lineA-G.trackA;
    if(d<-0.05||d>0.9)continue;
    const p=1-(Math.max(0,d)/0.9), dist=(1-p)*8+0.5, y=Math.floor(HORIZON+(H-HORIZON)*p);
    const roadHalf=TRACK_W/(dist*1.1), center=W/2-G.offset/(dist*1.1);
    const l=center-roadHalf, r=center+roadHalf, thick=Math.max(2,9*p), sq=Math.max(3,13*p);
    for(let row=0;row<thick;row++){const yy=y+row; if(yy<HORIZON||yy>=H)continue;
      for(let xx=l;xx<r;xx+=sq){const c=((Math.floor((xx-l)/sq)+(row<thick/2?0:1))%2===0)?'#111':'#fff'; ctx.fillStyle=c; ctx.fillRect(xx,yy,sq,1);}}
    drawArch(center,roadHalf,p);
  }
}
function drawArch(center,roadHalf,p){
  if(p<0.04)return;
  const y=Math.floor(HORIZON+(H-HORIZON)*p);
  const postW=Math.max(2,9*p), postH=Math.max(10,72*p);
  const l=center-roadHalf-postW*0.4, r=center+roadHalf-postW*0.6, topY=y-postH;
  for(const px of [l,r]){
    for(let yy=topY; yy<y; yy++){
      ctx.fillStyle=(Math.floor((yy-topY)/Math.max(2,postH/6))%2===0)?'#e23b3b':'#f5f5f5';
      ctx.fillRect(px,yy,postW,1);
    }
  }
  const barH=Math.max(4,16*p);
  ctx.fillStyle='#1f3fae'; ctx.fillRect(l,topY-barH,(r-l)+postW,barH);
  ctx.fillStyle='#3b62e0'; ctx.fillRect(l,topY-barH,(r-l)+postW,Math.max(1,barH*0.4));
  if(p>0.4){
    ctx.fillStyle='#fff'; ctx.font='bold '+Math.floor(barH*0.8)+'px monospace'; ctx.textAlign='center';
    const label=(G.lap>=G.totalLaps-1)?'FINISH':'START';
    ctx.fillText(label, center, topY-barH*0.18);
  }
}
function drawScenery(){
  for(let i=0;i<10;i++){
    const baseA=(i/10)*Math.PI*2; let da=((baseA-G.trackA)%(Math.PI*2)); if(da<0)da+=Math.PI*2;
    if(da>1.1)continue;
    const p=1-(da/1.1), dist=(1-p)*8+0.5, py=HORIZON+(H-HORIZON)*p, sc=46/dist;
    const roadHalf=TRACK_W/(dist*1.1), center=W/2-G.offset/(dist*1.1);
    tree(center-roadHalf-sc*0.6,py,sc); tree(center+roadHalf+sc*0.6,py,sc);
  }
}
function tree(x,y,s){
  if(s<4)return;
  ctx.fillStyle='#5a3a1a'; ctx.fillRect(x-s*0.08,y-s*0.25,s*0.16,s*0.25);
  ctx.fillStyle='#1f6b2f'; ctx.beginPath(); ctx.moveTo(x,y-s); ctx.lineTo(x-s*0.32,y-s*0.3); ctx.lineTo(x+s*0.32,y-s*0.3); ctx.fill();
  ctx.fillStyle='#288a3a'; ctx.beginPath(); ctx.moveTo(x,y-s*0.7); ctx.lineTo(x-s*0.26,y-s*0.2); ctx.lineTo(x+s*0.26,y-s*0.2); ctx.fill();
}
function drawItemsOnTrack(){
  for(const it of G.items){
    if(it.taken)continue;
    let da=((it.a-G.trackA)%(Math.PI*2)); if(da<0)da+=Math.PI*2;
    if(da<0.02||da>1.0)continue;
    const p=1-(da/1.0), dist=(1-p)*8+0.5, py=HORIZON+(H-HORIZON)*p;
    const center=W/2-G.offset/(dist*1.1), sc=Math.max(6,30/dist);
    if(mushReady){ ctx.drawImage(mushImg, center-sc/2, py-sc, sc, sc); }
  }
}
function drawKart(){
  const x=W/2+G.steer*6, y=H-54+Math.sin(G.bob*0.3)*1.5;
  ctx.fillStyle='rgba(0,0,0,.28)'; ctx.beginPath(); ctx.ellipse(W/2,H-16,36,7,0,0,Math.PI*2); ctx.fill();
  if(G.boostT>0){ ctx.fillStyle=(Math.floor(G.bob)%2)?'#ffae00':'#ff3b00'; ctx.fillRect(W/2-14,y+44,28,8); }
  if(kartReady){ const w=64,h=64*(kartImg.height/kartImg.width);
    ctx.save(); ctx.translate(x,y); ctx.rotate(G.steer*0.06); ctx.drawImage(kartImg,-w/2,0,w,h); ctx.restore(); }
}
function drawMiniMap(){
  const mw=58, mh=58, ox=W-mw-6, oy=6, cx=ox+mw/2, cy=oy+mh/2, R=mw/2-9;
  ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(ox,oy,mw,mh);
  ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.strokeRect(ox+.5,oy+.5,mw-1,mh-1);
  ctx.strokeStyle='#888'; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle='#444'; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.stroke();
  const sa=G.lineBase, sx=cx+Math.cos(sa)*R, sy=cy+Math.sin(sa)*R;
  ctx.fillStyle='#fff'; ctx.fillRect(sx-2,sy-2,4,4); ctx.fillStyle='#111'; ctx.fillRect(sx-1,sy-2,2,2); ctx.fillRect(sx-2,sy,2,2);
  const pa=G.trackA, px=cx+Math.cos(pa)*R, py=cy+Math.sin(pa)*R;
  ctx.fillStyle='#ff3b3b'; ctx.beginPath(); ctx.arc(px,py,3,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.stroke();
}
function drawHUD(){
  ctx.textAlign='left';
  ctx.fillStyle='#000'; ctx.fillRect(4,4,70,16);
  ctx.fillStyle='#fff'; ctx.font='bold 11px monospace'; ctx.fillText('LAP '+Math.min(G.lap+1,G.totalLaps)+'/'+G.totalLaps,8,15);
  ctx.fillStyle='#000'; ctx.fillRect(4,22,70,16);
  ctx.fillStyle='#7CFC00'; ctx.fillText('SPD '+Math.round(G.speed*60),8,33);
  ctx.fillStyle='#fff'; ctx.fillText(G.time?G.time.toFixed(1):'0.0',8,H-8);
}
function render(){ drawSky(); drawGround(); drawScenery(); drawItemsOnTrack(); drawKart(); drawMiniMap(); drawHUD(); }

let last=performance.now();
function loop(now){ const dt=Math.min(0.05,(now-last)/1000); last=now; update(dt); render(); requestAnimationFrame(loop); }
requestAnimationFrame(loop);
</script>
