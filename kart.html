<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>レーシング</title>
<link rel="stylesheet" href="assets/kit.css">
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#0c1020; }
  body { touch-action:none; -webkit-user-select:none; user-select:none; }
  canvas#game { display:block; background:#7ec8ff; }

  /* 縦向き案内 */
  .rotate-notice { display:none; }
  @media (orientation: portrait) {
    .rotate-notice { position:fixed; inset:0; z-index:99999; background:#11141d; color:#fff;
      display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:16px; padding:24px; }
  }
  .rotate-notice .ico { font-size:84px; animation:rotnudge 1.6s ease-in-out infinite; }
  @keyframes rotnudge { 0%,100%{transform:rotate(-12deg);} 50%{transform:rotate(78deg);} }
  .rotate-notice h2 { font-size:28px; font-weight:900; text-shadow:0 3px 0 #e23b3b; }
  .rotate-notice p { color:#ffd84d; font-weight:800; }
  .rotate-go { margin-top:18px; font-family:inherit; font-weight:800; font-size:18px; color:#fff;
    background:#e23b3b; border:none; border-radius:14px; padding:12px 24px; box-shadow:0 5px 0 #9e2020; cursor:pointer; }
  .rotate-go:active { transform:translateY(5px); box-shadow:0 0 0 #9e2020; }

  #stage { position:absolute; inset:0; }
  #stage.force-landscape { width:100vh; height:100vw; transform:rotate(90deg); transform-origin:top left; left:100%; top:0; }
  body.forced .rotate-notice { display:none !important; }

  /* HUD */
  #hud { position:absolute; top:max(10px,env(safe-area-inset-top)); left:0; right:0; z-index:30;
    display:flex; justify-content:center; gap:10px; pointer-events:none; }
  .hud-box { background:rgba(16,20,30,.72); color:#fff; border:3px solid var(--gp-accent-soft);
    border-radius:12px; padding:5px 14px; font-weight:900; text-align:center; min-width:80px; backdrop-filter:blur(4px); }
  .hud-box small { display:block; font-size:10px; font-weight:800; color:#ffd84d; }

  /* ハンドルボタン */
  .pedal { position:absolute; bottom:max(14px,env(safe-area-inset-bottom)); width:84px; height:84px; z-index:30;
    border-radius:50%; background:rgba(255,255,255,.22); border:3px solid rgba(255,255,255,.6); color:#fff;
    font-size:38px; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(3px); }
  #btnL { left:18px; } #btnR { right:18px; }
  .pedal.on { background:rgba(255,255,255,.5); transform:scale(.94); }

  /* 画面（タイトル/結果） */
  .screen { position:absolute; inset:0; z-index:50; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px; text-align:center; padding:20px; }
  .cover { background:radial-gradient(120% 90% at 50% 0%, color-mix(in srgb,var(--gp-accent) 55%,#11131f) 0%, transparent 60%), linear-gradient(180deg,#1b1e2c,#11131f); }
  .hidden { display:none !important; }
</style>
</head>
<body class="gp gp-fuchsia gp-dark">

<!-- 縦向き案内 -->
<div class="rotate-notice">
  <div class="ico">📱</div>
  <h2>よこむきにしてね</h2>
  <p>スマホを よこにすると あそべるよ！</p>
  <button class="rotate-go" onclick="forceLandscape()">よこむきにする 🔄</button>
</div>

<div id="stage">
  <a href="index.html" class="gp-home">🏠</a>
  <canvas id="game"></canvas>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div class="hud-box"><small>コイン</small><span id="coins">0</span></div>
    <div class="hud-box"><small>スピード</small><span id="spd">0</span></div>
    <div class="hud-box"><small>のこり</small><span id="time">60</span></div>
  </div>

  <!-- ハンドル -->
  <div id="btnL" class="pedal hidden">◀</div>
  <div id="btnR" class="pedal hidden">▶</div>

  <!-- タイトル -->
  <div id="title" class="screen cover">
    <div class="gp-hero gp-float">🏎️</div>
    <div class="gp-title" style="color:#fff">レーシング</div>
    <p style="color:#ffd84d;font-weight:800;max-width:520px">コインを あつめよう！<br>みぎ・ひだりの ボタンで ハンドル（アクセルは じどう）</p>
    <button id="startBtn" class="gp-btn gp-btn--lg">スタート</button>
  </div>

  <!-- 結果 -->
  <div id="result" class="screen cover hidden">
    <div class="gp-hero gp-float">🏆</div>
    <div class="gp-title" style="color:#fff">ゴール！</div>
    <p style="color:#fff;font-weight:800">あつめたコイン</p>
    <div id="finalScore" style="font-size:56px;font-weight:900;color:#f1c40f">0</div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;justify-content:center">
      <a href="index.html" class="gp-btn gp-btn--ghost">🏠 もどる</a>
      <button id="againBtn" class="gp-btn">もういちど</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ---- 強制横向き ----
function forceLandscape(){ document.body.classList.add('forced'); document.getElementById('stage').classList.add('force-landscape'); resize(); }
function tryLock(){ try{ const el=document.documentElement; if(el.requestFullscreen)el.requestFullscreen().catch(()=>{}); if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('landscape').catch(()=>{}); }catch(e){} }
document.addEventListener('pointerdown', tryLock, { once:true });

let W, H, RES;
function resize(){
  const forced = document.getElementById('stage').classList.contains('force-landscape');
  W = canvas.width = forced ? window.innerHeight : window.innerWidth;
  H = canvas.height = forced ? window.innerWidth : window.innerHeight;
  RES = H / 480;
}
resize();
window.addEventListener('resize', resize);

// ---- 音 ----
let actx=null;
function beep(freq,type,dur,vol=0.15){ try{ if(!actx)actx=new (window.AudioContext||window.webkitAudioContext)(); const o=actx.createOscillator(),g=actx.createGain(); o.type=type; o.frequency.value=freq; o.connect(g); g.connect(actx.destination); const t=actx.currentTime; g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur); o.start(t); o.stop(t+dur);}catch(e){} }
function coinSound(){ beep(880,'square',0.08,0.12); setTimeout(()=>beep(1320,'square',0.10,0.12),60); }
function hitSound(){ beep(120,'sawtooth',0.25,0.2); }

// ---- 疑似3D 設定 ----
const segLen = 220, rumbleLen = 3, roadW = 2200;
const fov = 100, camDepth = 1/Math.tan((fov/2)*Math.PI/180);
const camHeight = 1100;
const drawDist = 140;
let playerZ = camHeight * camDepth;
const maxSpeed = segLen * 60;
const accel = maxSpeed/4, decel = -maxSpeed/3, offDecel = -maxSpeed/1.6;
const centrifugal = 0.32;

let segments = [], trackLen = 0;
let position=0, speed=0, playerX=0;
let coins=0, timeLeft=60, state='title', last=0;
const keys = { left:false, right:false };

function lastY(){ return segments.length===0 ? 0 : segments[segments.length-1].p2.world.y; }
function addSegment(curve, y){
  const n = segments.length;
  segments.push({
    index:n,
    p1:{ world:{x:0,y:lastY(),z:n*segLen}, camera:{}, screen:{} },
    p2:{ world:{x:0,y:y,z:(n+1)*segLen}, camera:{}, screen:{} },
    curve:curve, sprites:[],
    color: Math.floor(n/rumbleLen)%2 ? 'dark':'light'
  });
}
function ease(a,b,p){ return a + (b-a)*(p*p*(3-2*p)); }
function addRoad(enter,hold,leave,curve,y){
  const startY=lastY(), endY=startY+(y||0)*segLen;
  const total=enter+hold+leave;
  for(let n=0;n<enter;n++) addSegment(ease(0,curve,n/enter), ease(startY,endY,n/total));
  for(let n=0;n<hold;n++)  addSegment(curve, ease(startY,endY,(enter+n)/total));
  for(let n=0;n<leave;n++) addSegment(ease(curve,0,n/leave), ease(startY,endY,(enter+hold+n)/total));
}
function addSprite(seg, type, offset){ if(segments[seg]) segments[seg].sprites.push({ type, offset, gone:false }); }

function buildTrack(){
  segments=[];
  const C=60, M=40;
  addRoad(40,60,40,0,0);
  addRoad(M,C,M,2.2,0);
  addRoad(M,C,M,0,1.6);     // 上り
  addRoad(M,C,M,-2.6,0);
  addRoad(M,C,M,0,-1.6);    // 下り
  addRoad(M,C,M,3.2,1.2);
  addRoad(M,80,M,-1.8,0);
  addRoad(M,C,M,1.4,-1.0);
  addRoad(40,60,40,0,0);
  trackLen = segments.length * segLen;
  // 木（沿道）
  for(let n=20;n<segments.length;n+=8){ addSprite(n,'tree', 2+Math.random()*2); addSprite(n+3,'tree', -(2+Math.random()*2)); }
  // コイン（道の上に列）
  for(let n=60;n<segments.length-30;n+=10){
    const lane = (Math.random()*1.4-0.7);
    for(let k=0;k<5;k++) addSprite(n+k,'coin', lane);
  }
  // コーン（よけてね）
  for(let n=90;n<segments.length-40;n+=37){ addSprite(n,'cone', Math.random()*1.2-0.6); }
}

function findSeg(z){ return segments[Math.floor(z/segLen)%segments.length]; }
function project(p, camX, camY, camZ){
  p.camera.x=(p.world.x||0)-camX; p.camera.y=(p.world.y||0)-camY; p.camera.z=(p.world.z||0)-camZ;
  p.screen.scale = camDepth/p.camera.z;
  p.screen.x = Math.round(W/2 + p.screen.scale*p.camera.x*W/2);
  p.screen.y = Math.round(H/2 - p.screen.scale*p.camera.y*H/2);
  p.screen.w = Math.round(p.screen.scale*roadW*W/2);
}
function poly(x1,y1,x2,y2,x3,y3,x4,y4,col){ ctx.fillStyle=col; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.lineTo(x4,y4); ctx.closePath(); ctx.fill(); }

function renderSegment(x1,y1,w1,x2,y2,w2,light){
  const grass = light ? '#46b94d' : '#3fae46';
  const rumble= light ? '#ffffff' : '#d23b3b';
  const road  = light ? '#8a8f99' : '#828791';
  ctx.fillStyle=grass; ctx.fillRect(0,y2,W,y1-y2);
  const r1=w1*0.22, r2=w2*0.22;
  poly(x1-w1-r1,y1, x1-w1,y1, x2-w2,y2, x2-w2-r2,y2, rumble);
  poly(x1+w1+r1,y1, x1+w1,y1, x2+w2,y2, x2+w2+r2,y2, rumble);
  poly(x1-w1,y1, x1+w1,y1, x2+w2,y2, x2-w2,y2, road);
  if(light){ const l1=w1*0.04,l2=w2*0.04; poly(x1-l1,y1,x1+l1,y1,x2+l2,y2,x2-l2,y2,'#f7d11e'); }
}

function spriteScreen(scale, type){
  // ワールドの見かけ幅
  let base = scale * roadW * W/2;
  if(type==='tree') return base*0.0016*RES*70;
  if(type==='coin') return base*0.00045*RES*70;
  if(type==='cone') return base*0.0006*RES*70;
  return base*0.001;
}
function drawSprite(sp, scale, sx, sy){
  let s = scale*roadW*W/2; // road half width on screen at this depth
  if(sp.type==='tree'){
    const h = s*0.55, w=h*0.6;
    ctx.fillStyle='rgba(0,0,0,.18)'; ctx.beginPath(); ctx.ellipse(sx, sy, w*0.5, w*0.16,0,0,7); ctx.fill();
    ctx.fillStyle='#7a4a22'; ctx.fillRect(sx-w*0.08, sy-h*0.42, w*0.16, h*0.42);
    ctx.fillStyle='#1f7a34'; ctx.beginPath(); ctx.arc(sx, sy-h*0.6, w*0.5,0,7); ctx.fill();
    ctx.fillStyle='#2f9a45'; ctx.beginPath(); ctx.arc(sx-w*0.12, sy-h*0.66, w*0.36,0,7); ctx.fill();
  } else if(sp.type==='coin'){
    const r = Math.max(6, s*0.09);
    ctx.fillStyle='rgba(0,0,0,.15)'; ctx.beginPath(); ctx.ellipse(sx, sy, r*0.9, r*0.3,0,0,7); ctx.fill();
    ctx.fillStyle='#f4c20d'; ctx.beginPath(); ctx.arc(sx, sy-r, r,0,7); ctx.fill();
    ctx.fillStyle='#ffe27a'; ctx.beginPath(); ctx.arc(sx, sy-r, r*0.62,0,7); ctx.fill();
    ctx.fillStyle='#f4c20d'; ctx.font='bold '+Math.round(r*1.1)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('★', sx, sy-r);
  } else if(sp.type==='cone'){
    const h=Math.max(10,s*0.18), w=h*0.7;
    ctx.fillStyle='rgba(0,0,0,.18)'; ctx.beginPath(); ctx.ellipse(sx,sy,w*0.6,w*0.18,0,0,7); ctx.fill();
    ctx.fillStyle='#f4731f'; ctx.beginPath(); ctx.moveTo(sx,sy-h); ctx.lineTo(sx-w*0.5,sy); ctx.lineTo(sx+w*0.5,sy); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#fff'; ctx.fillRect(sx-w*0.5, sy-h*0.45, w, h*0.16);
  }
}

function drawKart(cx, cy, lean, bounce){
  const s = H*0.0013;            // スケール
  const bw = 150*s, bh = 70*s;
  ctx.save(); ctx.translate(cx, cy+bounce); ctx.rotate(lean*0.12);
  // 影
  ctx.fillStyle='rgba(0,0,0,.28)'; ctx.beginPath(); ctx.ellipse(0, 6*s, bw*0.62, 16*s,0,0,7); ctx.fill();
  // 後輪
  ctx.fillStyle='#15171c';
  ctx.beginPath(); ctx.roundRect(-bw*0.62, -bh*0.5, bw*0.26, bh*1.0, 8*s); ctx.fill();
  ctx.beginPath(); ctx.roundRect(bw*0.36, -bh*0.5, bw*0.26, bh*1.0, 8*s); ctx.fill();
  // 車体
  ctx.fillStyle='#e23b3b'; ctx.beginPath(); ctx.roundRect(-bw*0.5, -bh*0.55, bw, bh, 14*s); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.22)'; ctx.beginPath(); ctx.roundRect(-bw*0.5, -bh*0.55, bw, bh*0.4, 12*s); ctx.fill();
  // スポイラー
  ctx.fillStyle='#b3271f'; ctx.beginPath(); ctx.roundRect(-bw*0.5, -bh*0.78, bw, bh*0.22, 6*s); ctx.fill();
  // ドライバー（ヘルメット）
  ctx.fillStyle='#3478f6'; ctx.beginPath(); ctx.arc(0, -bh*0.78, 26*s,0,7); ctx.fill();
  ctx.fillStyle='#bfe9ff'; ctx.beginPath(); ctx.roundRect(-18*s, -bh*0.86, 36*s, 16*s, 6*s); ctx.fill();
  ctx.restore();
}

function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

function render(){
  // 空＋遠景
  const hy = H*0.42;
  const sky = ctx.createLinearGradient(0,0,0,hy); sky.addColorStop(0,'#6fc1ff'); sky.addColorStop(1,'#dff2ff');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,hy);
  ctx.fillStyle='#fff1a8'; ctx.beginPath(); ctx.arc(W*0.82, hy*0.4, Math.min(W,H)*0.05,0,7); ctx.fill();
  ctx.fillStyle='#7ec96f'; ctx.beginPath(); ctx.ellipse(W*0.3, hy, W*0.4, hy*0.5,0,Math.PI,2*Math.PI); ctx.fill();
  ctx.fillStyle='#5fb457'; ctx.beginPath(); ctx.ellipse(W*0.75, hy, W*0.45, hy*0.4,0,Math.PI,2*Math.PI); ctx.fill();
  ctx.fillStyle='#46b94d'; ctx.fillRect(0,hy,W,H-hy);

  if(!segments.length) return; // コース未生成（タイトル）

  const base = findSeg(position);
  const basePct = (position % segLen)/segLen;
  const playerSeg = findSeg(position+playerZ);
  const playerPct = ((position+playerZ)%segLen)/segLen;
  const playerY = ease(playerSeg.p1.world.y, playerSeg.p2.world.y, playerPct);
  let maxy=H, x=0, dx=-(base.curve*basePct);

  for(let n=0;n<drawDist;n++){
    const seg = segments[(base.index+n)%segments.length];
    seg.looped = seg.index < base.index;
    seg.clip = maxy;
    project(seg.p1, (playerX*roadW)-x,      playerY+camHeight, position-(seg.looped?trackLen:0));
    project(seg.p2, (playerX*roadW)-x-dx,   playerY+camHeight, position-(seg.looped?trackLen:0));
    x+=dx; dx+=seg.curve;
    if(seg.p1.camera.z<=camDepth || seg.p2.screen.y>=seg.p1.screen.y || seg.p2.screen.y>=maxy) continue;
    renderSegment(seg.p1.screen.x,seg.p1.screen.y,seg.p1.screen.w, seg.p2.screen.x,seg.p2.screen.y,seg.p2.screen.w, seg.color==='light');
    maxy = seg.p1.screen.y;
  }
  // スプライト（奥→手前）
  for(let n=drawDist-1;n>0;n--){
    const seg = segments[(base.index+n)%segments.length];
    for(const sp of seg.sprites){
      if(sp.gone) continue;
      const sc = seg.p1.screen.scale; if(!sc||seg.p1.camera.z<=camDepth) continue;
      const sx = seg.p1.screen.x + sc*sp.offset*roadW*W/2;
      const sy = seg.p1.screen.y;
      if(sy > seg.clip+2) continue;
      drawSprite(sp, sc, sx, sy);
    }
  }
  // プレイヤー
  const bounce = (speed/maxSpeed) * (Math.random()>0.5?1:-1) * H*0.004;
  drawKart(W/2, H*0.86, (keys.left?-1:0)+(keys.right?1:0), bounce);
}

function update(dt){
  if(state!=='play') return;
  speed += accel*dt;
  const playerSeg = findSeg(position+playerZ);
  const spd = speed/maxSpeed;
  const dxs = dt*2.4*spd;
  if(keys.left) playerX -= dxs;
  if(keys.right) playerX += dxs;
  playerX -= dxs*spd*playerSeg.curve*centrifugal;
  if((playerX<-1||playerX>1) && speed>maxSpeed*0.55){ speed += offDecel*dt; }
  playerX = clamp(playerX,-2.4,2.4);
  speed = clamp(speed,0,maxSpeed);
  position = (position + speed*dt) % trackLen; if(position<0) position+=trackLen;

  // 当たり判定（プレイヤーのセグメント）
  for(const sp of playerSeg.sprites){
    if(sp.gone) continue;
    if(sp.type==='coin' && Math.abs(playerX - sp.offset) < 0.5){ sp.gone=true; coins++; coinSound(); document.getElementById('coins').textContent=coins; }
    if(sp.type==='cone' && Math.abs(playerX - sp.offset) < 0.45){ sp.gone=true; speed=maxSpeed*0.2; hitSound(); }
  }
  // HUD
  document.getElementById('spd').textContent = Math.round(spd*120);
}

let acc=0;
function loop(ts){
  const now=ts||0; let dt=(now-last)/1000; last=now; if(dt>0.05)dt=0.05; if(!dt)dt=1/60;
  try { update(dt); render(); } catch(e){ console.error(e); }
  requestAnimationFrame(loop);
}

// ---- タイマー ----
let timer=null;
function startTimer(){
  timeLeft=60; document.getElementById('time').textContent=timeLeft;
  clearInterval(timer);
  timer=setInterval(()=>{
    if(state!=='play')return;
    timeLeft--; document.getElementById('time').textContent=Math.max(0,timeLeft);
    if(timeLeft<=0){ clearInterval(timer); endGame(); }
  },1000);
}
function startGame(){
  if(actx&&actx.state==='suspended')actx.resume();
  buildTrack();
  position=0; speed=0; playerX=0; coins=0;
  document.getElementById('coins').textContent='0';
  document.getElementById('title').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('btnL').classList.remove('hidden');
  document.getElementById('btnR').classList.remove('hidden');
  state='play'; startTimer();
}
function endGame(){
  state='result';
  document.getElementById('finalScore').textContent=coins;
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('btnL').classList.add('hidden');
  document.getElementById('btnR').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
  beep(660,'sine',0.15); setTimeout(()=>beep(990,'sine',0.3),160);
}
document.getElementById('startBtn').onclick = startGame;
document.getElementById('againBtn').onclick = startGame;

// ---- 入力（ボタン＋画面左右＋キーボード）----
function bindHold(el, side){
  const on=(e)=>{ e.preventDefault(); keys[side]=true; el.classList.add('on'); };
  const off=(e)=>{ keys[side]=false; el.classList.remove('on'); };
  el.addEventListener('pointerdown',on); el.addEventListener('pointerup',off);
  el.addEventListener('pointerleave',off); el.addEventListener('pointercancel',off);
}
bindHold(document.getElementById('btnL'),'left');
bindHold(document.getElementById('btnR'),'right');
// 画面の左右半分でも操作
canvas.addEventListener('pointerdown',(e)=>{ if(state!=='play')return; if(e.offsetX<W/2)keys.left=true; else keys.right=true; });
const clearTouch=()=>{ keys.left=false; keys.right=false; document.getElementById('btnL').classList.remove('on'); document.getElementById('btnR').classList.remove('on'); };
canvas.addEventListener('pointerup',clearTouch);
canvas.addEventListener('pointercancel',clearTouch);
window.addEventListener('keydown',(e)=>{ if(e.code==='ArrowLeft')keys.left=true; if(e.code==='ArrowRight')keys.right=true; });
window.addEventListener('keyup',(e)=>{ if(e.code==='ArrowLeft')keys.left=false; if(e.code==='ArrowRight')keys.right=false; });

requestAnimationFrame(loop);

// ---- Service Worker ----
if('serviceWorker' in navigator){ navigator.serviceWorker.register('./sw.js?v=46'); }
</script>
</body>
</html>
