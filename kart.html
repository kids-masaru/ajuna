<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ドットカート</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; touch-action:none; }
  html,body { width:100%; height:100%; overflow:hidden; background:#0a0a14; font-family:"Courier New",monospace; }

  .rotate-notice { display:none; }
  @media (orientation:portrait) { .rotate-notice { position:fixed; inset:0; z-index:99999; background:#0a0a14; color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:16px; padding:24px; } }
  .rotate-notice .ico { font-size:60px; animation:rot 1.5s ease-in-out infinite; }
  .rotate-notice p { font-size:16px; margin-top:18px; letter-spacing:1px; }
  @keyframes rot { 0%,40%{transform:rotate(0);} 60%,100%{transform:rotate(90deg);} }
  .rotate-go { margin-top:18px; font-family:inherit; font-weight:800; font-size:16px; color:#fff; background:#2244cc; border:3px solid #fff; padding:12px 24px; cursor:pointer; box-shadow:3px 3px 0 #000; }
  .rotate-go:active { transform:translate(2px,2px); box-shadow:1px 1px 0 #000; }

  #stage { position:absolute; inset:0; overflow:hidden; }
  #stage.force-landscape { width:100vh; height:100vw; transform:rotate(90deg); transform-origin:top left; left:100%; top:0; }
  body.forced .rotate-notice { display:none !important; }

  canvas { display:block; image-rendering:pixelated; image-rendering:crisp-edges; width:100%; height:100%; }

  .steer-btn { position:absolute; bottom:16px; width:80px; height:80px; z-index:12;
    border-radius:50%; background:rgba(255,255,255,.2); border:3px solid rgba(255,255,255,.5);
    color:#fff; font-size:32px; display:none; align-items:center; justify-content:center; }
  #btnL { left:16px; }
  #btnR { right:116px; }
  .steer-btn.on { background:rgba(255,255,255,.5); transform:scale(.92); }

  #homeBtn { position:absolute; top:8px; left:8px; z-index:30; width:36px; height:36px;
    background:rgba(255,255,255,.18); border:2px solid rgba(255,255,255,.5); border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:18px;
    text-decoration:none; box-shadow:2px 2px 0 #000; }

  #itemBtn { position:absolute; right:16px; bottom:16px; width:80px; height:80px; z-index:12;
    border:4px solid #fff; border-radius:16px; background:rgba(0,0,0,.45);
    display:none; flex-direction:column; align-items:center; justify-content:center;
    color:#fff; box-shadow:3px 3px 0 #000; font-size:36px; }
  #itemBtn .dash { font-size:30px; opacity:.5; }
  #itemBtn .lbl { font-size:9px; letter-spacing:1px; margin-top:2px; opacity:.85; }
  #itemBtn .item-icon { font-size:36px; display:none; }
  #itemBtn.ready { border-color:#ffd93b; background:rgba(40,20,0,.6); animation:pulse 1s infinite; }
  #itemBtn.ready .item-icon { display:block; }
  #itemBtn.ready .dash { display:none; }
  @keyframes pulse { 0%,100%{box-shadow:3px 3px 0 #000;} 50%{box-shadow:0 0 14px #ffd93b,3px 3px 0 #000;} }

  #msg { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:20;
    color:#fff; text-align:center; text-shadow:2px 2px 0 #000; pointer-events:none; width:80%; }
  #msg h1 { font-size:28px; letter-spacing:3px; color:#ffd93b; margin-bottom:6px; }
  #msg h2 { font-size:13px; letter-spacing:2px; color:#7fd0ff; margin-bottom:14px; }
  #msg p { font-size:12px; line-height:1.8; }
  #msg .big { font-size:40px; color:#ff5a5a; margin:8px 0; }
  #startBtn { pointer-events:auto; margin-top:16px; display:inline-block; background:#2244cc; color:#fff;
    border:3px solid #fff; padding:12px 30px; font-size:15px; font-weight:bold; letter-spacing:2px;
    font-family:inherit; cursor:pointer; box-shadow:4px 4px 0 #000; }
  #startBtn:active { transform:translate(2px,2px); box-shadow:2px 2px 0 #000; }

  #count { position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); z-index:25;
    font-size:80px; font-weight:bold; color:#fff; text-shadow:4px 4px 0 #000,0 0 22px #ffd93b;
    pointer-events:none; opacity:0; }

  #flashOverlay { position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:15; transition:opacity 0.15s; }

  .hidden { display:none !important; }
</style>
</head>
<body>

<div class="rotate-notice">
  <div class="ico">📱</div>
  <p>スマホを横向きにしてね</p>
  <button class="rotate-go" onclick="forceLandscape()">よこむきにする 🔄</button>
</div>

<div id="stage">
  <a id="homeBtn" href="index.html">🏠</a>
  <canvas id="game"></canvas>

  <div id="btnL" class="steer-btn">◀</div>
  <div id="btnR" class="steer-btn">▶</div>
  <div id="itemBtn"><span class="item-icon"></span><span class="dash">?</span><span class="lbl">ITEM</span></div>
  <div id="count"></div>
  <div id="flashOverlay"></div>

  <div id="msg">
    <h1>PIXEL KART RACING</h1>
    <h2>ドットカート</h2>
    <p>◀▶ ボタンでハンドル（アクセルは自動）<br>アイテムボックスを取ってアイテムゲット！<br>右下ボタンでアイテム使用<br>3周してゴールゲートをくぐれ！</p>
    <button id="startBtn">スタート</button>
  </div>
</div>

<script>
function forceLandscape(){
  document.body.classList.add('forced');
  document.getElementById('stage').classList.add('force-landscape');
  resizeCanvas();
}

const cv=document.getElementById('game'), ctx=cv.getContext('2d');
let W=320, H=180, HORIZON=72;
const TRACK_W=440;
const FULL_LAP=Math.PI*2;

function resizeCanvas(){
  const stage=document.getElementById('stage');
  const forced=stage.classList.contains('force-landscape');
  const ww=forced?window.innerHeight:window.innerWidth;
  const wh=forced?window.innerWidth:window.innerHeight;
  const scale=Math.min(ww/320, wh/180);
  W=Math.round(ww/scale); H=Math.round(wh/scale);
  HORIZON=Math.round(H*0.4);
  cv.width=W; cv.height=H;
  ctx.imageSmoothingEnabled=false;
}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);

const ITEMS=[
  {name:'mushroom', emoji:'\u{1F344}', weight:35},
  {name:'banana',   emoji:'\u{1F34C}', weight:25},
  {name:'shell',    emoji:'\u{1F422}', weight:20},
  {name:'star',     emoji:'⭐',    weight:10},
  {name:'lightning', emoji:'⚡',   weight:10}
];
const TOTAL_WEIGHT=ITEMS.reduce((s,i)=>s+i.weight,0);
function randomItem(){
  let r=Math.random()*TOTAL_WEIGHT, cum=0;
  for(const it of ITEMS){cum+=it.weight; if(r<cum) return it.name;}
  return ITEMS[0].name;
}
function itemEmoji(name){ const f=ITEMS.find(i=>i.name===name); return f?f.emoji:'?'; }

const CPU_COLORS=['#3399ff','#ff9933','#cc33ff'];
let cpus=[];
function initCPUs(){
  cpus=[];
  for(let i=0;i<3;i++){
    cpus.push({
      trackA: -Math.PI/2 - 0.08*(i+1),
      offset: -80 + i*80,
      speed: 2.6 + Math.random()*0.6,
      baseSpeed: 2.6 + Math.random()*0.6,
      color: CPU_COLORS[i],
      spinT: 0,
      shrinkT: 0,
      lap: 0,
      nextLine: -Math.PI/2 + FULL_LAP + 0.12,
      lineBase: -Math.PI/2 + 0.12
    });
  }
}

/* ---- ITEM BOXES (rainbow ? boxes) ---- */
function placeItemBoxes(){
  G.itemBoxes=[];
  const N=18;
  for(let i=0;i<N;i++){
    G.itemBoxes.push({
      a:(i/N)*FULL_LAP + 0.3,
      laneOffset: (i%3-1)*100,
      taken:false, respawn:0
    });
  }
}

/* ---- INPUT ---- */

  const off=()=>{input[dir]=false;el.classList.remove('on');};

const keys={};

/* ---- ITEM USE ---- */
function useItem(){
  if(G.state!=='play'||!G.item)return;
  const it=G.item;
  G.item=null;
  updateItemUI();
  switch(it){
    case 'mushroom':
      G.boostT=1.5;
      break;
    case 'star':
      G.starT=8.0;
      G.boostT=8.0;
      break;
    case 'banana':
      G.bananas.push({a:G.trackA-0.04, offset:G.offset, active:true});
      break;
    case 'shell':
      G.shells.push({a:G.trackA+0.02, offset:G.offset, speed:0.025, active:true, ttl:6});
      break;
    case 'lightning':
      G.lightningT=5.0;
      G.flashT=0.3;
      for(const c of cpus){c.shrinkT=5.0; c.speed=c.baseSpeed*0.5;}
      break;
  }
}

function updateItemUI(){
  if(G.item){
    itemBtnEl.classList.add('ready');
    itemIconEl.textContent=itemEmoji(G.item);
  } else {
    itemBtnEl.classList.remove('ready');
    itemIconEl.textContent='';
  }
}

/* ---- SPIN OUT ---- */
function spinOutPlayer(){
  if(G.starT>0) return;
  if(G.spinT>0) return;
  G.spinT=1.5;
  G.speed*=0.2;
}
function spinOutCPU(c){
  if(c.spinT>0) return;
  c.spinT=1.5;
  c.speed*=0.2;
}

/* ---- COUNTDOWN & START ---- */
document.getElementById('startBtn').addEventListener('click',beginCountdown);
function beginCountdown(){
  document.getElementById('msg').classList.add('hidden');
  document.getElementById('btnL').style.display='flex';
  document.getElementById('btnR').style.display='flex';
  itemBtnEl.style.display='flex';
  Object.assign(G,{state:'countdown',speed:0,steer:0,angle:0,trackA:-Math.PI/2,
    offset:0,lap:0,item:null,boostT:0,starT:0,spinT:0,time:0,countVal:3,
    lightningT:0,flashT:0});
  G.bananas=[]; G.shells=[];
  G.lineBase=G.trackA+0.12; G.nextLine=G.trackA+FULL_LAP;
  placeItemBoxes(); initCPUs(); updateItemUI(); runCount();
}
function runCount(){
  if(G.countVal>0){ countEl.textContent=G.countVal; countEl.style.color='#fff'; flashCount(); G.countVal--; setTimeout(runCount,1000); }
  else { countEl.textContent='GO!'; countEl.style.color='#7CFC00'; flashCount(); G.state='play'; G.startT=performance.now(); setTimeout(()=>countEl.style.opacity=0,800); }
}
function flashCount(){
  countEl.style.transition='none'; countEl.style.opacity=1; countEl.style.transform='translate(-50%,-50%) scale(1.4)';
  requestAnimationFrame(()=>{countEl.style.transition='all .8s'; countEl.style.transform='translate(-50%,-50%) scale(1)';});
}

/* ---- POSITION RANKING ---- */
function getPlayerProgress(){ return G.lap*FULL_LAP + ((G.trackA - G.lineBase + FULL_LAP*10)%(FULL_LAP)); }
function getCPUProgress(c){ return c.lap*FULL_LAP + ((c.trackA - c.lineBase + FULL_LAP*10)%(FULL_LAP)); }
function getPosition(){
  const pp=getPlayerProgress();
  let pos=1;
  for(const c of cpus){ if(getCPUProgress(c)>pp) pos++; }
  return pos;
}

/* ---- NORMALISE ANGLE DIFF ---- */
function angleDiff(a,b){
  let d=(a-b)%(FULL_LAP);
  if(d>Math.PI) d-=FULL_LAP;
  if(d<-Math.PI) d+=FULL_LAP;
  return d;
}

/* ---- UPDATE ---- */
function update(dt){
  if(G.state!=='play')return;

  /* Timers */
  if(G.boostT>0) G.boostT-=dt;
  if(G.starT>0) G.starT-=dt;
  if(G.spinT>0) G.spinT-=dt;
  if(G.lightningT>0) G.lightningT-=dt;
  if(G.flashT>0) G.flashT-=dt;

  /* Steer */
  let tSteer=0;
  if(G.spinT<=0){
    if(input.left||keys['ArrowLeft'])tSteer=-1;
    if(input.right||keys['ArrowRight'])tSteer+=1;
  } else {
    tSteer=Math.sin(G.spinT*12)*1.5;
  }
  G.steer+=(tSteer-G.steer)*0.18;

  /* Speed */
  G.speed+=0.08;
  let max=G.maxSpeed;
  if(G.boostT>0){max=G.maxSpeed*1.7; G.speed+=0.15;}
  G.speed=Math.max(0,Math.min(max,G.speed));

  /* Movement - slower track progression for longer track feel */
  G.angle+=G.steer*G.speed*0.025;
  G.trackA+=G.speed*0.002;
  G.offset+=G.steer*G.speed*4;
  if(Math.abs(G.offset)>TRACK_W){G.offset=Math.sign(G.offset)*TRACK_W; G.speed*=0.92;}

  /* Lap counting */
  if(G.trackA>=G.nextLine){
    G.nextLine+=FULL_LAP;
    G.lap++;
    if(G.lap>=G.totalLaps) return winGame();
  }

  /* Item box collision */
  for(const box of G.itemBoxes){
    if(box.taken){box.respawn-=dt; if(box.respawn<=0)box.taken=false; continue;}
    let da=angleDiff(box.a, G.trackA%(FULL_LAP));
    if(Math.abs(da)<0.015 && Math.abs(G.offset - box.laneOffset)<120){
      box.taken=true; box.respawn=6;
      if(!G.item){G.item=randomItem(); updateItemUI();}
    }
  }

  /* Banana collision (player) */
  for(let i=G.bananas.length-1;i>=0;i--){
    const b=G.bananas[i];
    if(!b.active)continue;
    let da=angleDiff(b.a%(FULL_LAP), G.trackA%(FULL_LAP));
    if(Math.abs(da)<0.012 && Math.abs(G.offset-b.offset)<80){
      spinOutPlayer(); b.active=false;
    }
  }

  /* Shell movement & collision */
  for(let i=G.shells.length-1;i>=0;i--){
    const s=G.shells[i];
    if(!s.active){continue;}
    s.a+=s.speed;
    s.ttl-=dt;
    if(s.ttl<=0){s.active=false; continue;}
    /* Shell hits CPU */
    for(const c of cpus){
      let da=angleDiff(s.a%(FULL_LAP), c.trackA%(FULL_LAP));
      if(Math.abs(da)<0.015 && Math.abs(s.offset-c.offset)<100){
        spinOutCPU(c); s.active=false; break;
      }
    }
  }

  /* Star collision with CPUs */
  if(G.starT>0){
    for(const c of cpus){
      let da=angleDiff(G.trackA%(FULL_LAP), c.trackA%(FULL_LAP));
      if(Math.abs(da)<0.02 && Math.abs(G.offset-c.offset)<100){
        spinOutCPU(c);
      }
    }
  }

  /* CPU update */
  for(const c of cpus){
    if(c.spinT>0) c.spinT-=dt;
    if(c.shrinkT>0){
      c.shrinkT-=dt;
      if(c.shrinkT<=0) c.speed=c.baseSpeed;
    }
    /* Simple AI: vary speed, slight wobble */
    if(c.spinT<=0){
      c.speed+=(c.baseSpeed*(c.shrinkT>0?0.5:1)-c.speed)*0.05;
      c.speed+=Math.sin(performance.now()*0.001+cpus.indexOf(c)*2)*0.02;
    }
    c.trackA+=c.speed*0.002;
    c.offset+=Math.sin(c.trackA*3+cpus.indexOf(c))*0.8;
    c.offset=Math.max(-TRACK_W*0.8, Math.min(TRACK_W*0.8, c.offset));

    /* CPU lap */
    if(c.trackA>=c.nextLine){
      c.nextLine+=FULL_LAP;
      c.lap++;
    }

    /* CPU banana collision */
    for(let i=G.bananas.length-1;i>=0;i--){
      const b=G.bananas[i];
      if(!b.active)continue;
      let da=angleDiff(b.a%(FULL_LAP), c.trackA%(FULL_LAP));
      if(Math.abs(da)<0.012 && Math.abs(c.offset-b.offset)<80){
        spinOutCPU(c); b.active=false;
      }
    }
  }

  /* Clean up expired items */
  G.bananas=G.bananas.filter(b=>b.active);
  G.shells=G.shells.filter(s=>s.active);

  G.bob+=G.speed*0.3;
  G.time=(performance.now()-G.startT)/1000;
}

function winGame(){
  G.state='win';
  const pos=getPosition();
  document.getElementById('btnL').style.display='none';
  document.getElementById('btnR').style.display='none';
  itemBtnEl.style.display='none';
  const m=document.getElementById('msg'); m.classList.remove('hidden');
  const posStr=['1st','2nd','3rd','4th'][pos-1];
  m.innerHTML=`<h1>GOAL!</h1><div class="big">${posStr} PLACE</div><p>TIME ${G.time.toFixed(2)}秒</p><button id="startBtn">もう一回</button>`;
  document.getElementById('startBtn').addEventListener('click',beginCountdown);
  itemBtnEl.classList.remove('ready');
}

/* ---- DRAWING ---- */
function drawSky(){
  const sky=ctx.createLinearGradient(0,0,0,HORIZON);
  sky.addColorStop(0,'#3b7dd8'); sky.addColorStop(1,'#bfe0ff');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,HORIZON);
  ctx.fillStyle='#fff';
  const cx=(-G.trackA*40)%380;
  for(let i=0;i<5;i++){ let x=((i*90+cx)%380+380)%380-40; const y=14+i%2*12;
    ctx.fillRect(x,y,22,6); ctx.fillRect(x+6,y-4,14,6); ctx.fillRect(x-4,y+4,30,4); }
  const mx=(-G.trackA*30)%320;
  ctx.fillStyle='#6b7a8c'; for(let i=-1;i<7;i++){const x=((i*70+mx)%380+380)%380-40; mountain(x,HORIZON,46,28);}
  ctx.fillStyle='#566678'; for(let i=-1;i<8;i++){const x=((i*54+mx*1.3)%380+380)%380-40; mountain(x,HORIZON,34,20);}
}
function mountain(x,base,w,h){
  ctx.beginPath(); ctx.moveTo(x,base); ctx.lineTo(x+w/2,base-h); ctx.lineTo(x+w,base); ctx.fill();
  const s=ctx.fillStyle; ctx.fillStyle='#dfe8f0';
  ctx.beginPath(); ctx.moveTo(x+w/2-5,base-h+7); ctx.lineTo(x+w/2,base-h); ctx.lineTo(x+w/2+5,base-h+7); ctx.fill();
  ctx.fillStyle=s;
}
function drawGround(){
  for(let y=HORIZON;y<H;y++){
    const p=(y-HORIZON)/(H-HORIZON), dist=1/(p+0.05), worldZ=G.trackA*200+dist*40;
    const roadHalf=TRACK_W/(dist*1.1), center=W/2-G.offset/(dist*1.1)-G.steer*dist*1.5;
    ctx.fillStyle=(Math.floor(worldZ*0.25)%2===0)?'#3f9e3f':'#379037'; ctx.fillRect(0,y,W,1);
    const l=center-roadHalf, r=center+roadHalf;
    ctx.fillStyle=(Math.floor(worldZ*0.5)%2===0)?'#d83b3b':'#f2f2f2'; ctx.fillRect(l-6,y,Math.max(0,r-l+12),1);
    ctx.fillStyle=(Math.floor(worldZ*0.25)%2===0)?'#6f6f76':'#686870'; ctx.fillRect(l,y,Math.max(0,r-l),1);
    if(Math.floor(worldZ*0.5)%2===0){ctx.fillStyle='#f4f4f4'; ctx.fillRect(center-1,y,2,1);}
  }
  drawStartLine();
}
function drawStartLine(){
  for(let n=-1;n<=1;n++){
    const lineA=G.lineBase+n*FULL_LAP; let d=lineA-G.trackA;
    if(d<-0.05||d>0.9)continue;
    const p=1-(Math.max(0,d)/0.9), dist=(1-p)*8+0.5, y=Math.floor(HORIZON+(H-HORIZON)*p);
    const roadHalf=TRACK_W/(dist*1.1), center=W/2-G.offset/(dist*1.1);
    const l=center-roadHalf, r=center+roadHalf, thick=Math.max(2,9*p), sq=Math.max(3,13*p);
    for(let row=0;row<thick;row++){const yy=y+row; if(yy<HORIZON||yy>=H)continue;
      for(let xx=l;xx<r;xx+=sq){const c=((Math.floor((xx-l)/sq)+(row<thick/2?0:1))%2===0)?'#111':'#fff'; ctx.fillStyle=c; ctx.fillRect(xx,yy,sq,1);}}
    drawArch(center,roadHalf,p);
  }
}
function drawArch(center,roadHalf,p){
  if(p<0.04)return;
  const y=Math.floor(HORIZON+(H-HORIZON)*p);
  const postW=Math.max(2,9*p), postH=Math.max(10,72*p);
  const l=center-roadHalf-postW*0.4, r=center+roadHalf-postW*0.6, topY=y-postH;
  for(const px of [l,r]){
    for(let yy=topY; yy<y; yy++){
      ctx.fillStyle=(Math.floor((yy-topY)/Math.max(2,postH/6))%2===0)?'#e23b3b':'#f5f5f5';
      ctx.fillRect(px,yy,postW,1);
    }
  }
  const barH=Math.max(4,16*p);
  ctx.fillStyle='#1f3fae'; ctx.fillRect(l,topY-barH,(r-l)+postW,barH);
  ctx.fillStyle='#3b62e0'; ctx.fillRect(l,topY-barH,(r-l)+postW,Math.max(1,barH*0.4));
  if(p>0.4){
    ctx.fillStyle='#fff'; ctx.font='bold '+Math.floor(barH*0.8)+'px monospace'; ctx.textAlign='center';
    const label=(G.lap>=G.totalLaps-1)?'FINISH':'START';
    ctx.fillText(label, center, topY-barH*0.18);
  }
}

/* ---- SCENERY (more trees) ---- */
function drawScenery(){
  for(let i=0;i<24;i++){
    const baseA=(i/24)*FULL_LAP;
    let da=((baseA-G.trackA%(FULL_LAP))%(FULL_LAP));
    if(da<0)da+=FULL_LAP;
    if(da>1.1)continue;
    const p=1-(da/1.1), dist=(1-p)*8+0.5, py=HORIZON+(H-HORIZON)*p, sc=46/dist;
    const roadHalf=TRACK_W/(dist*1.1), center=W/2-G.offset/(dist*1.1);
    const side=(i%2===0)?-1:1;
    const extraOff=(i%3)*sc*0.3;
    tree(center+side*(roadHalf+sc*0.6+extraOff),py,sc);
  }
}
function tree(x,y,s){
  if(s<4)return;
  ctx.fillStyle='#5a3a1a'; ctx.fillRect(x-s*0.08,y-s*0.25,s*0.16,s*0.25);
  ctx.fillStyle='#1f6b2f'; ctx.beginPath(); ctx.moveTo(x,y-s); ctx.lineTo(x-s*0.32,y-s*0.3); ctx.lineTo(x+s*0.32,y-s*0.3); ctx.fill();
  ctx.fillStyle='#288a3a'; ctx.beginPath(); ctx.moveTo(x,y-s*0.7); ctx.lineTo(x-s*0.26,y-s*0.2); ctx.lineTo(x+s*0.26,y-s*0.2); ctx.fill();
}

/* ---- DRAW ITEM BOXES ON TRACK ---- */
function drawItemBox(cx,cy,sc){
  const t=performance.now()*0.003;
  const colors=['#ff0000','#ff8800','#ffff00','#00ff00','#0088ff','#8800ff'];
  const ci=Math.floor(t)%colors.length;
  const s=sc*0.5;
  /* Box body */
  ctx.fillStyle=colors[ci];
  ctx.fillRect(cx-s/2, cy-s, s, s);
  /* Border */
  ctx.strokeStyle='#fff';
  ctx.lineWidth=Math.max(1,s*0.12);
  ctx.strokeRect(cx-s/2, cy-s, s, s);
  /* Question mark */
  ctx.fillStyle='#fff';
  ctx.font='bold '+Math.floor(s*0.7)+'px monospace';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('?', cx, cy-s/2);
  ctx.textBaseline='alphabetic';
}

function drawItemBoxesOnTrack(){
  for(const box of G.itemBoxes){
    if(box.taken)continue;
    const boxA=box.a%(FULL_LAP);
    const pA=G.trackA%(FULL_LAP);
    let da=boxA-pA;
    if(da<0) da+=FULL_LAP;
    if(da<0.005||da>1.0)continue;
    const p=1-(da/1.0), dist=(1-p)*8+0.5;
    const py=HORIZON+(H-HORIZON)*p;
    const center=W/2-G.offset/(dist*1.1);
    const boxX=center + box.laneOffset/(dist*1.1);
    const sc=Math.max(10,50/dist);
    drawItemBox(boxX, py, sc);
  }
}

/* ---- DRAW BANANAS ON TRACK ---- */
function drawBananasOnTrack(){
  for(const b of G.bananas){
    if(!b.active)continue;
    const bA=b.a%(FULL_LAP);
    const pA=G.trackA%(FULL_LAP);
    let da=bA-pA;
    if(da<-Math.PI) da+=FULL_LAP;
    if(da>Math.PI) da-=FULL_LAP;
    if(da<0.005||da>1.0)continue;
    const p=1-(da/1.0), dist=(1-p)*8+0.5;
    const py=HORIZON+(H-HORIZON)*p;
    const center=W/2-G.offset/(dist*1.1);
    const bx=center + b.offset/(dist*1.1);
    const sc=Math.max(4,20/dist);
    /* Draw banana: yellow curved shape */
    ctx.fillStyle='#ffd700';
    ctx.beginPath();
    ctx.arc(bx, py-sc*0.3, sc*0.4, Math.PI*0.2, Math.PI*1.2);
    ctx.lineWidth=Math.max(1,sc*0.2);
    ctx.strokeStyle='#b8860b';
    ctx.stroke();
    ctx.fill();
  }
}

/* ---- DRAW SHELLS ON TRACK ---- */
function drawShellsOnTrack(){
  for(const s of G.shells){
    if(!s.active)continue;
    const sA=s.a%(FULL_LAP);
    const pA=G.trackA%(FULL_LAP);
    let da=sA-pA;
    if(da<-Math.PI) da+=FULL_LAP;
    if(da>Math.PI) da-=FULL_LAP;
    if(da<0.005||da>1.0)continue;
    const p=1-(da/1.0), dist=(1-p)*8+0.5;
    const py=HORIZON+(H-HORIZON)*p;
    const center=W/2-G.offset/(dist*1.1);
    const sx=center + s.offset/(dist*1.1);
    const sc=Math.max(4,22/dist);
    /* Draw shell: green circle */
    ctx.fillStyle='#22cc44';

    ctx.arc(sx, py-sc*0.3, sc*0.35, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle='#116622';
    ctx.lineWidth=Math.max(1,sc*0.1);
    ctx.stroke();
  }
}

/* ---- DRAW CPU OPPONENTS ---- */
function drawCPUs(){
  for(const c of cpus){
    const cA=c.trackA%(FULL_LAP);
    const pA=G.trackA%(FULL_LAP);
    let da=cA-pA;
    if(da<-Math.PI) da+=FULL_LAP;
    if(da>Math.PI) da-=FULL_LAP;
    if(da<-0.05||da>1.0)continue;
    const p=1-(Math.max(0,da)/1.0), dist=(1-p)*8+0.5;
    const py=HORIZON+(H-HORIZON)*p;
    const center=W/2-G.offset/(dist*1.1);
    const cx2=center + c.offset/(dist*1.1);
    let sc=Math.max(6,36/dist);
    if(c.shrinkT>0) sc*=0.55;
    /* Draw as a simple kart shape */
    ctx.fillStyle='rgba(0,0,0,.2)';
    ctx.beginPath(); ctx.ellipse(cx2,py,sc*0.5,sc*0.15,0,0,Math.PI*2); ctx.fill();
    /* Body */
    ctx.fillStyle=c.color;
    if(c.spinT>0 && Math.floor(c.spinT*10)%2) ctx.fillStyle='#fff';
    ctx.fillRect(cx2-sc*0.3, py-sc*0.7, sc*0.6, sc*0.5);
    /* Head */
    ctx.fillStyle='#ffe0b2';
    ctx.beginPath(); ctx.arc(cx2, py-sc*0.8, sc*0.2, 0, Math.PI*2); ctx.fill();
    /* Helmet */
    ctx.fillStyle=c.color;
    ctx.beginPath(); ctx.arc(cx2, py-sc*0.85, sc*0.18, Math.PI, 0); ctx.fill();
  }
}

/* ---- DRAW PLAYER KART ---- */
function drawKart(){
  const x=W/2+G.steer*8;
  const wobble=(G.spinT>0)?Math.sin(G.spinT*12)*8:0;
  const y=H-Math.round(H*0.3)+Math.sin(G.bob*0.3)*1.5;
  ctx.fillStyle='rgba(0,0,0,.28)'; ctx.beginPath();
  ctx.ellipse(W/2+wobble,H-Math.round(H*0.09),Math.round(W*0.11),Math.round(H*0.04),0,0,Math.PI*2); ctx.fill();
  /* Boost flame */
  if(G.boostT>0){
    ctx.fillStyle=(Math.floor(G.bob)%2)?'#ffae00':'#ff3b00';
    ctx.fillRect(W/2+wobble-Math.round(W*0.04),y+Math.round(H*0.22),Math.round(W*0.08),Math.round(H*0.05));
  }
  /* Star rainbow flash */
  if(G.starT>0){
    const rc=['#ff0000','#ff8800','#ffff00','#00ff00','#0088ff','#ff00ff'];
    const ci=Math.floor(performance.now()*0.01)%rc.length;
    ctx.globalAlpha=0.4;
    ctx.fillStyle=rc[ci];
    const w2=Math.round(W*0.22), h2=Math.round(w2*0.8);
    ctx.fillRect(x+wobble-w2/2, y-4, w2, h2);
    ctx.globalAlpha=1.0;
  }
  if(kartReady){
    const w=Math.round(W*0.2),h=Math.round(w*(kartImg.height/kartImg.width));
    ctx.save(); ctx.translate(x+wobble,y);
    if(G.spinT>0) ctx.rotate(Math.sin(G.spinT*12)*0.3);
    else ctx.rotate(G.steer*0.06);
    ctx.drawImage(kartImg,-w/2,0,w,h); ctx.restore();
  }
}

/* ---- MINIMAP ---- */
function drawMiniMap(){
  const mw=Math.round(W*0.18), mh=mw, ox=W-mw-6, oy=6, cx2=ox+mw/2, cy2=oy+mh/2, R=mw/2-9;
  ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(ox,oy,mw,mh);
  ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.strokeRect(ox+.5,oy+.5,mw-1,mh-1);
  ctx.strokeStyle='#888'; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(cx2,cy2,R,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle='#444'; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(cx2,cy2,R,0,Math.PI*2); ctx.stroke();
  /* Start marker */
  const sa=G.lineBase, sx=cx2+Math.cos(sa)*R, sy=cy2+Math.sin(sa)*R;
  ctx.fillStyle='#fff'; ctx.fillRect(sx-2,sy-2,4,4);
  /* Player dot */
  const pa=G.trackA%(FULL_LAP), px=cx2+Math.cos(pa)*R, py=cy2+Math.sin(pa)*R;
  ctx.fillStyle='#ff3b3b'; ctx.beginPath(); ctx.arc(px,py,3,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.stroke();
  /* CPU dots */
  for(const c of cpus){
    const ca=c.trackA%(FULL_LAP), ccx=cx2+Math.cos(ca)*R, ccy=cy2+Math.sin(ca)*R;
    ctx.fillStyle=c.color; ctx.beginPath(); ctx.arc(ccx,ccy,2.5,0,Math.PI*2); ctx.fill();
  }
}

/* ---- HUD ---- */
function drawHUD(){
  ctx.textAlign='left';
  const fs=Math.max(10,Math.round(H*0.07));
  ctx.font='bold '+fs+'px monospace';
  /* Lap */
  ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(4,4,Math.round(W*0.22),fs+6);
  ctx.fillStyle='#fff'; ctx.fillText('LAP '+Math.min(G.lap+1,G.totalLaps)+'/'+G.totalLaps,8,fs+2);
  /* Speed */
  ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(4,fs+12,Math.round(W*0.22),fs+6);
  ctx.fillStyle='#7CFC00'; ctx.fillText('SPD '+Math.round(G.speed*60),8,fs*2+10);
  /* Position */
  if(G.state==='play'){
    const pos=getPosition();
    const posStr=['1st','2nd','3rd','4th'][pos-1];
    ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(4,fs*2+20,Math.round(W*0.15),fs+6);
    ctx.fillStyle=(pos===1)?'#ffd93b':'#fff';
    ctx.fillText(posStr,8,fs*3+18);
  }
  /* Time */
  ctx.fillStyle='#fff'; ctx.fillText(G.time?G.time.toFixed(1):'0.0',8,H-8);
}

/* ---- LIGHTNING FLASH ---- */
function drawFlash(){
  if(G.flashT>0){
    flashEl.style.opacity=Math.min(1,G.flashT*3);
  } else {
    flashEl.style.opacity=0;
  }
}

/* ---- RENDER ---- */
function render(){
  drawSky();
  drawGround();
  drawScenery();
  drawItemBoxesOnTrack();
  drawBananasOnTrack();
  drawShellsOnTrack();
  drawCPUs();
  drawKart();
  drawMiniMap();
  drawHUD();
  drawFlash();
}

let last=performance.now();
function loop(now){
  const dt=Math.min(0.05,(now-last)/1000);
  last=now;
  update(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
